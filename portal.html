    ).join(''));
  }
  if (d.icp?.gains?.length) {
    h += sc('Ganhos', '<div class="gr gr--2">'+d.icp.gains.map(g=>
      cd(g.gain,tg(g.type==='tangible'?'Tangível':'Intangível',g.type==='tangible'?'green':'yellow'))
    ).join('')+'</div>');
  }
  if (d.where_to_find) {
    const w = d.where_to_find;
    h += sc('Onde Encontrar', '<div class="gr gr--2">'
      +cd('Canais Digitais',(w.digital_channels||[]).map(c=>'<span class="tg tg--red" style="margin:0 .25rem .25rem 0">'+E(c)+'</span>').join(''))
      +cd('Keywords',(w.keywords||[]).map(c=>'<span class="tg tg--gray" style="margin:0 .25rem .25rem 0">'+E(c)+'</span>').join(''))
      +cd('Influenciadores',(w.influencers||[]).join(', '))
      +cd('Comunidades',(w.communities||[]).join(', '))
      +'</div>');
  }
  // Anti-persona — aceita {profile_name, description} OU {label, who, signals[]}
  if (d.anti_persona?.profiles?.length) {
    const ap = d.anti_persona;
    h += sc('Anti-Persona — Quem NÃO é cliente',
      (ap.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .5rem">'+E(ap.description)+'</p>':'')
      +ap.profiles.map(p=>{
        const title = p.profile_name || p.label || '—';
        const descr = p.description || p.who || '';
        const signals = p.signals || p.red_flags || [];
        const body = (descr?'<p style="margin:0 0 .5rem;font-size:.8125rem">'+E(descr)+'</p>':'')
          +(signals.length?'<div style="margin-bottom:.5rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.25rem">Sinais</div>'
            +signals.map(s=>'<div style="font-size:.75rem;margin-bottom:.15rem;color:var(--text-secondary)">• '+E(s)+'</div>').join('')+'</div>':'')

          +(p.operational_rule?'<div style="font-size:.75rem;color:var(--text-muted)"><strong>Regra:</strong> '+E(p.operational_rule)+'</div>':'');
        return cd(title, body, 'danger');
      }).join('')
      +(ap.operational_rule?co('Regra-mãe: '+ap.operational_rule):''));
  }

  // Buyer journey — com funil visual se há volumes implícitos
  if (d.buyer_journey?.stages?.length) {
    const bj = d.buyer_journey;
    // Funil decrescente ilustrativo (cada estágio 100%, 75%, 55%, 40%, 28%, 20%... padrão)
    // Se há critical_leakage_point, o estágio crítico vira vermelho
    const criticalStage = bj.critical_leakage_point?.stage;
    const lossPct = bj.critical_leakage_point?.estimated_loss_pct;
    const n = bj.stages.length;
    const funnelItems = bj.stages.map((s,i)=>{
      const isCritical = criticalStage && (s.stage||'').toLowerCase().includes((criticalStage||'').toLowerCase().split(' ')[0]);
      // decaimento sugestivo: 100 → 20 em n passos
      const vol = Math.round(100*Math.pow(0.68, i));
      return {
        label: s.stage,
        value: vol,
        tone: isCritical ? 'red' : (i<=n/3?'blue':i<=2*n/3?'yellow':'orange'),
        subtext: s.duration_estimate||'',
      };
    });
    const funnelInsight = bj.critical_leakage_point
      ? 'Vazamento crítico em "'+E(criticalStage||'?')+'"'+(lossPct!=null?' — estima-se '+lossPct+'% de perda':'')+'. '
        +(bj.critical_leakage_point.evidence||'').substring(0,140)
      : 'Funil ilustrativo — decaimento típico entre estágios. Use o mapa real de conversões da skill de auditoria para calibrar.';
    h += sc('Jornada de Compra — Visualização',
      insight(chartFunnel(funnelItems), funnelInsight, bj.critical_leakage_point?'bad':'warn'));
    h += sc('Detalhamento da Jornada',
      tb(['Estágio','Gatilho','Estado mental','Canal','Pergunta dominante','Intervenção','Fricção atual','Duração'],
        bj.stages.map(s=>[
          '<strong>'+E(s.stage)+'</strong>',
          E(s.trigger||'—'),
          E(s.mental_state||'—'),
          E(s.primary_channel||'—'),
          '<em>'+E(s.dominant_question||'—')+'</em>',
          E(s.client_intervention||'—'),
          '<span style="color:var(--danger)">'+E(s.friction_today||'—')+'</span>',
          E(s.duration_estimate||'—'),
        ]))
      +(bj.critical_leakage_point?cd('Vazamento crítico',
        (typeof bj.critical_leakage_point === 'string'
          ? '<div style="font-size:.8125rem;line-height:1.5">'+E(bj.critical_leakage_point)+'</div>'
          : '<div style="font-size:.875rem;font-weight:700;color:var(--danger)">'+E(bj.critical_leakage_point.stage||'—')+'</div>'
            +(bj.critical_leakage_point.evidence?'<div style="font-size:.8125rem;margin-top:.25rem">'+E(bj.critical_leakage_point.evidence)+'</div>':'')
            +(bj.critical_leakage_point.estimated_loss_pct!=null?'<div style="margin-top:.25rem">'+tg('Perda estimada: '+bj.critical_leakage_point.estimated_loss_pct+'%','danger')+'</div>':'')),
        'danger'):''));
  }

  // Willingness to pay — barras comparativas + tabela
  if (d.willingness_to_pay?.services?.length) {
    // Extrai valor numérico médio de uma faixa textual tipo "R$ 180-240"
    const parseRange = r => {
      if (typeof r === 'number') return r;
      if (!r) return null;
      const nums = (String(r).match(/\d+[\.,]?\d*/g)||[]).map(x=>parseFloat(x.replace(',','.')));
      if (!nums.length) return null;
      return nums.reduce((a,b)=>a+b,0)/nums.length;
    };
    // Suporte tanto o esquema antigo (current_price, fair_range, premium_range)
    // quanto o novo (current_ticket_range, perceived_fair_range, premium_ceiling)
    const getCur = s => parseRange(s.current_price ?? s.current_ticket_range);
    const getFair = s => parseRange(s.fair_range ?? s.perceived_fair_range);
    const getPrem = s => parseRange(s.premium_range ?? s.premium_ceiling);
    const getCurLabel = s => s.current_price!=null ? (typeof s.current_price==='number'?BRL(s.current_price):s.current_price) : (s.current_ticket_range || '—');
    const getFairLabel = s => s.fair_range || s.perceived_fair_range || '—';
    const getPremLabel = s => s.premium_range || s.premium_ceiling || '—';

    const underpriced = d.willingness_to_pay.services.filter(s=>{
      const c = getCur(s), f = getFair(s);
      return c!=null && f!=null && c < f*0.9;
    });
    const wtpInsight = underpriced.length
      ? underpriced.length+' de '+d.willingness_to_pay.services.length+' serviços estão precificados ABAIXO da faixa justa percebida — espaço para ajuste de preço sem perder conversão. '
        +'Começar pelo "'+(underpriced[0].service||'primeiro')+'" tem o maior ganho direto.'
      : 'Precificação alinhada à percepção de valor — foco em alavancas (bundle, garantia, experiência) para justificar premium.';
    const maxPrice = Math.max(...d.willingness_to_pay.services.map(s=>
      Math.max(getCur(s)||0, getFair(s)||0, getPrem(s)||0)));
    const wtpHeader = '<div style="display:grid;grid-template-columns:minmax(140px,24%) minmax(70px,10%) 1fr minmax(70px,10%) minmax(70px,12%);gap:.75rem;align-items:center;padding:0 0 .5rem;border-bottom:1px solid var(--border);font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600">'
      +'<div>Serviço</div><div style="text-align:right">Atual</div><div>Faixa justa → teto</div><div style="text-align:right">Teto</div><div style="text-align:right">Elasticidade</div></div>';
    const wtpBars = d.willingness_to_pay.services.map(s=>{
      const cur = getCur(s), fair = getFair(s), prem = getPrem(s);
      const curPct = cur?((cur/maxPrice)*100).toFixed(1):0;
      const fairPct = fair?((fair/maxPrice)*100).toFixed(1):0;
      const premPct = prem?((prem/maxPrice)*100).toFixed(1):0;
      const underFair = cur!=null && fair!=null && cur < fair*0.9;
      return '<div style="display:grid;grid-template-columns:minmax(140px,24%) minmax(70px,10%) 1fr minmax(70px,10%) minmax(70px,12%);gap:.75rem;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">'
        +'<div style="font-size:.75rem;font-weight:600;line-height:1.3" title="'+E(s.service)+'">'+E(s.service)+'</div>'
        +'<div style="font-size:.75rem;font-weight:700;text-align:right;color:'+(underFair?CX.red:'var(--text)')+'">'+(cur?BRL(cur):'—')+'</div>'
        +'<div style="position:relative;height:18px;background:var(--surface);border-radius:2px;overflow:hidden">'
        +(prem?'<div style="position:absolute;left:0;top:0;height:100%;width:'+premPct+'%;background:'+CX.yellow+';opacity:.22"></div>':'')
        +(fair?'<div style="position:absolute;left:0;top:0;height:100%;width:'+fairPct+'%;background:'+CX.green+';opacity:.45"></div>':'')
        +(cur?'<div style="position:absolute;left:calc('+curPct+'% - 1px);top:0;width:2px;height:100%;background:'+CX.red+'"></div>':'')
        +'</div>'
        +'<div style="font-size:.6875rem;color:var(--text-muted);text-align:right">'+(prem?BRL(prem):'—')+'</div>'
        +'<div style="text-align:right">'+(s.elasticity?tg(String(s.elasticity).split(/[—\-]/)[0].trim(),{high:'red',alta:'red',media:'yellow','média':'yellow',medium:'yellow',baixa:'green',low:'green'}[String(s.elasticity).toLowerCase().split(/[—\-]/)[0].trim()]||'gray'):'—')+'</div>'
        +'</div>';
    }).join('');
    const wtpLegend = '<div style="display:flex;gap:1.25rem;font-size:.6875rem;margin-top:.75rem;flex-wrap:wrap;color:var(--text-muted)">'
      +'<span><span style="display:inline-block;width:14px;height:10px;background:'+CX.green+';opacity:.5;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Faixa justa percebida</span>'
      +'<span><span style="display:inline-block;width:14px;height:10px;background:'+CX.yellow+';opacity:.32;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Teto premium</span>'
      +'<span><span style="display:inline-block;width:2px;height:12px;background:'+CX.red+';margin-right:.3rem;vertical-align:middle"></span>Preço atual</span>'
      +'<span>· escala: 0 a '+BRL(Math.ceil(maxPrice/50)*50)+'</span></div>';
    h += sc('Disposição a Pagar (WTP)',
      insight(chartTitle('Preço atual × faixa percebida × teto premium — por serviço')+wtpHeader+wtpBars+wtpLegend,
        wtpInsight, underpriced.length?'warn':'good')
      +(d.willingness_to_pay.context?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .5rem;font-style:italic">'+E(d.willingness_to_pay.context)+'</p>':'')
      +tb(['Serviço','Preço atual','Faixa justa','Teto premium','Elasticidade','Alavanca'],
        d.willingness_to_pay.services.map(s=>{
          const elasRaw = s.elasticity ? String(s.elasticity) : '';
          const elasShort = elasRaw.split(/[—\-:]/)[0].trim();
          const elasNote = elasRaw.slice(elasShort.length).replace(/^[\s—\-:]+/,'').trim();
          const elasColor = {high:'red',alta:'red',media:'yellow','média':'yellow',medium:'yellow',baixa:'green',low:'green'}[elasShort.toLowerCase()]||'gray';
          return [
            '<strong>'+E(s.service)+'</strong>',
            E(getCurLabel(s)),
            E(getFairLabel(s)),
            E(getPremLabel(s)),
            elasShort ? tg(elasShort, elasColor) + (elasNote?'<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.25rem;line-height:1.3">'+E(elasNote)+'</div>':'') : '—',
            '<span style="font-size:.75rem;color:var(--text-muted)">'+E(s.pricing_lever||'—')+'</span>',
          ];
        })));
  }

  // Objection library
  if (d.objection_library?.objections?.length) {
    h += sc('Biblioteca de Objeções',
      d.objection_library.objections.map(o=>
        cd('“'+E(o.objection)+'”',
          (o.subtext?'<div style="font-size:.75rem;color:var(--text-muted);font-style:italic;margin-bottom:.375rem">Subtexto: '+E(o.subtext)+'</div>':'')
          +(o.bad_response?'<div style="font-size:.8125rem;color:var(--danger);margin-bottom:.25rem">✗ '+E(o.bad_response)+'</div>':'')
          +(o.good_response?'<div style="font-size:.8125rem;color:var(--success)">✓ '+E(o.good_response)+'</div>':'')
          +(o.when_to_use?'<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.375rem">Uso: '+E(o.when_to_use)+'</div>':''),
          'yellow')
      ).join(''));
  }

  if (d.key_message?.chosen_message) {
    h += '<div class="sum" style="border-left-color:var(--success)"><div class="sum__tag" style="color:var(--success)">Mensagem-Chave</div>'
      +'<p class="sum__text" style="font-size:1.125rem;font-style:italic">'+E(d.key_message.chosen_message)+'</p>'
      +(d.key_message.usage_context?'<p style="font-size:.8125rem;color:var(--text-muted);margin:.5rem 0 0">Uso: '+E(d.key_message.usage_context)+'</p>':'')
      +'</div>';
    if (d.key_message.alternatives?.length) {
      h += sc('Alternativas Avaliadas', d.key_message.alternatives.map(a=>
        cd(a.message+(d.key_message.chosen_message===a.message?' '+tg('Escolhida','green'):''),
          E(a.rationale||'')+(a.approach?' '+tg(a.approach,'gray'):''),
          d.key_message.chosen_message===a.message?'green':'')
      ).join(''));
    }
  }
  h += renderKeyInsight(d.key_insight, { title: 'Ponto de Alavancagem — Persona × Dor Ignorada' });
  h += renderHonestyAlert(d.honesty_alert);
  return h;
},

'ee-s1-auditoria-comunicacao'(d) {
  let h = '';
  h += renderLeituraEstrategica(d, { verdictLabel: 'Veredito da Auditoria' });

  // Score geral + scores por canal
  const sc_clr = v => v >= 70 ? 'good' : v >= 40 ? 'medium' : 'critical';
  const IPC = {alto:'danger',médio:'warning',medio:'warning',baixo:'text-muted'};
  const ipc = imp => IPC[(imp||'').toLowerCase().replace(/\u00e9/g,'e')] || 'text-muted';

  if (d.overall_score != null) {
    const cls = d.overall_classification || sc_clr(d.overall_score);
    const scoreRow = '<div class="gr gr--3">'+mt(d.overall_score+'/100','Score Médio Geral',CLC[cls]||'red')+'</div>';
    h += scoreRow;
  }

  // Canal scores em linha
  const chScores = d.channel_scores || (Array.isArray(d.channels) ? d.channels.map(c=>({channel_name:c.channel_name,score:c.score,classification:c.classification})) : []);
  if (chScores.length) {
    h += sc('Scores por Canal', '<div class="gr gr--3">'+chScores.map(ch=>{
      const cls = ch.classification || sc_clr(ch.score);
      return '<div class="pillar"><div class="pillar__row"><span class="pillar__name">'+E(ch.channel_name||ch.channel)+'</span>'
        +'<span class="pillar__score" style="color:var(--'+(CLC[cls]||'danger')+')">'+N(ch.score)+'/100 '+tg(CLS[cls]||'',CLC[cls])+'</span></div>'
        +pb(ch.score, CLC[cls]||'red')+'</div>';
    }).join('')+'</div>');
  }

  // Top 3 problemas críticos
  if (d.top_problems?.length) {
    h += sc('Top 3 Problemas Críticos', d.top_problems.map(p=>
      cd(p.problem,
        (p.data_evidence||p.evidence?'<p style="margin:0 0 .375rem"><strong>Evidência:</strong> '+E(p.data_evidence||p.evidence)+'</p>':'')
        +(p.impact?'<p style="margin:0 0 .25rem;color:var(--text-secondary)">'+E(p.impact)+'</p>':'')
        +(p.action?'<div style="margin-top:.25rem">'+tg('Ação: '+p.action,'gray')+'</div>':''),
        'danger')
    ).join(''));
  }

  // Canais — detalhe por canal
  const channels = Array.isArray(d.channels) ? d.channels : [];
  if (channels.length) {
    channels.forEach(ch => {
      const cls = ch.classification || sc_clr(ch.score);
      let cHtml = '<div class="pillar__row" style="margin-bottom:.375rem">'
        +'<span class="pillar__score" style="color:var(--'+(CLC[cls]||'danger')+')">'+N(ch.score)+'/100</span>'
        +tg(CLS[cls]||'—', CLC[cls])+'</div>'
        +pb(ch.score, CLC[cls]||'red');

      if (ch.strengths?.length) {
        cHtml += '<div style="margin-top:.625rem">'
          +ch.strengths.map(s=>'<div style="font-size:.8125rem;margin-bottom:.2rem;color:var(--success)">&#10003; '+E(s)+'</div>').join('')
          +'</div>';
      }
      if (ch.top_problems?.length) {
        cHtml += '<div style="margin-top:.5rem">'
          +ch.top_problems.map(p=>'<div style="font-size:.8125rem;margin-bottom:.25rem;color:var(--danger)">&#9650; '+E(p)+'</div>').join('')
          +'</div>';
      }
      if (ch.gaps?.length) {
        cHtml += '<div style="margin-top:.5rem;border-top:1px solid var(--border);padding-top:.5rem">'
          +ch.gaps.map(g=>{
            const col = ipc(g.impact);
            return '<div style="margin-bottom:.375rem">'
              +'<div style="font-size:.8125rem;color:var(--'+col+')">&#9679; '+E(g.gap)+'</div>'
              +(g.evidence?'<div style="font-size:.75rem;color:var(--text-muted);margin-left:.75rem;margin-top:.1rem">'+E(g.evidence)+'</div>':'')
              +'</div>';
          }).join('')
          +'</div>';
      }
      h += sc(E(ch.channel_name||ch.channel), cHtml);
    });
  }

  // Quick wins
  if (d.quick_wins?.length) {
    h += sc('Quick Wins — Executar Agora', tb(['Ação','Canal','Tempo','Impacto','Quem'],
      d.quick_wins.map(q=>[
        E(q.action),
        E(q.channel),
        q.time_hours != null ? (q.time_hours < 1 ? Math.round(q.time_hours*60)+'min' : q.time_hours+'h') : E(q.time_estimate||'—'),
        E(q.impact||q.expected_impact||'—'),
        E(q.who||'—')
      ])));
  }

  // Matriz de gaps
  if (d.gap_matrix?.length) {
    const EC = {baixo:'green',médio:'yellow',medio:'yellow',alto:'red'};
    h += sc('Matriz de Gaps', tb(['#','Canal','Gap','Impacto','Esforço','Ação'],
      d.gap_matrix.map(g=>[
        E(g.rank),
        E(g.channel),
        E(g.gap),
        tg(g.impact, EC[g.impact]||'gray'),
        tg(g.effort, EC[g.effort]||'gray'),
        E(g.action||g.recommended_action||'—')
      ])));
  }

  // Coerência entre canais
  if (d.coherence_gaps?.length) {
    h += sc('Coerência entre Canais', d.coherence_gaps.map(cg=>
      '<div style="font-size:.8125rem;color:var(--danger);margin-bottom:.375rem">&#9650; '+E(cg)+'</div>'
    ).join(''));
  }

  // Competitor benchmark — radar + tabela
  // Aceita: {client_score, best_in_class_score, opportunity_for_client, best_practice_observed}
  if (d.competitor_benchmark?.benchmark_by_channel?.length) {
    const cb = d.competitor_benchmark;
    const cbClient = b => b.client_score ?? 0;
    const cbBench  = b => b.best_in_class_score ?? b.competitor_avg_score ?? 0;
    const cbBest   = b => b.best_practice_observed ?? b.evidence ?? '';
    const cbOpp    = b => b.opportunity_for_client ?? b.immediate_win ?? '';
    // gap vem do JSON mas recalcula se ausente (negativo = atrás do grupo)
    const cbGap    = b => b.gap != null ? b.gap : (cbClient(b) - cbBench(b));

    const radarAxes = cb.benchmark_by_channel.map(b=>({
      name: b.channel,
      value: cbClient(b),
      benchmark: cbBench(b),
    }));
    // Maior gap negativo = cliente mais atrás
    const biggestGap = [...cb.benchmark_by_channel].sort((a,b)=>cbGap(a)-cbGap(b))[0];
    const radarInsight = biggestGap
      ? 'Maior gap vs melhor do grupo está em "'+(biggestGap.channel||'?')+'" ('+cbGap(biggestGap)+' pontos). '
        +String(cbOpp(biggestGap)||'').substring(0,140)
      : '';
    let grpHtml = '';
    if (cb.groups?.length) {
      grpHtml = '<div class="gr gr--2">'+cb.groups.map(g=>
        cd(g.name||'—',
          (g.members?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.25rem">'+(g.members||[]).map(E).join(' · ')+'</div>':'')
          +(g.positioning?'<div style="font-size:.8125rem">'+E(g.positioning)+'</div>':''),
          'gray')
      ).join('')+'</div>';
    }
    h += sc('Benchmark vs Concorrência',
      insight(chartRadar(radarAxes, {title:'Cliente vs Melhor do Grupo (por canal)', tone:'red'}),
        radarInsight, biggestGap?.gap>30?'bad':'warn')
      +grpHtml
      +tb(['Canal','Cliente','Melhor do grupo','Gap','Best practice / evidência','Oportunidade / quick win'],
        cb.benchmark_by_channel.map(r=>{
          const cli = cbClient(r), ben = cbBench(r), gap = cbGap(r);
          return [
            '<strong>'+E(r.channel)+'</strong>',
            tg(N(cli)+'/100',sc_clr(cli)),
            ben!=null?tg(N(ben)+'/100','green'):'—',
            gap!=null?'<span style="color:var('+(gap<0?'--danger':'--success')+');font-weight:700">'+(gap>=0?'+':'')+N(gap)+'</span>':'—',
            '<span style="font-size:.75rem;color:var(--text-secondary)">'+E(cbBest(r)||'—')+'</span>',
            '<span style="font-size:.75rem;color:var(--success)">'+E(cbOpp(r)||'—')+'</span>',
          ];
        }))
      +(cb.strategic_read?co(cb.strategic_read):''));
  }

  // Journey friction map — funil visual + tabela
  if (d.journey_friction_map?.stages?.length) {
    const jm = d.journey_friction_map;
    // Funil: tenta usar current_volume se numérico, senão distribui proporcionalmente pelos leakages
    const stagesNums = jm.stages.map((s,i,arr)=>{
      const v = typeof s.current_volume === 'number' ? s.current_volume : (typeof s.current_volume==='string' && /^[\d.,]+$/.test(s.current_volume.replace(/\./g,'').replace(',','.')) ? parseFloat(s.current_volume.replace(/\./g,'').replace(',','.')) : null);
      return v;
    });
    const hasRealNums = stagesNums.filter(v=>v!=null).length >= 2;
    let funnelItems;
    if (hasRealNums) {
      funnelItems = jm.stages.map((s,i)=>({
        label: s.stage,
        value: stagesNums[i] || 0,
        tone: (s.leakage_pct||0)>=50?'red':(s.leakage_pct||0)>=30?'orange':(s.leakage_pct||0)>=15?'yellow':'green',
        subtext: s.leakage_pct!=null?'vaza '+s.leakage_pct+'%':'',
      }));
    } else {
      // Simula queda com base no leakage_pct de cada estágio
      let running = 1000;
      funnelItems = jm.stages.map((s,i)=>{
        const drop = s.leakage_pct||0;
        if (i>0) running = Math.round(running*(1-drop/100));
        return {
          label: s.stage,
          value: running,
          tone: drop>=50?'red':drop>=30?'orange':drop>=15?'yellow':'green',
          subtext: drop?'vaza '+drop+'%':'',
        };
      });
    }
    const worstStage = [...jm.stages].sort((a,b)=>(b.leakage_pct||0)-(a.leakage_pct||0))[0];
    const funnelInsight = worstStage
      ? 'Maior vazamento: "'+(worstStage.stage||'?')+'" com '+(worstStage.leakage_pct||'?')+'% de perda. '
        +'Causa-raiz: '+(worstStage.root_cause||'?').substring(0,100)+'. Fix '+(worstStage.fix_effort||'?')+'.'
      : '';
    h += sc('Mapa de Fricção do Funil',
      insight(chartFunnel(funnelItems), funnelInsight, worstStage?.leakage_pct>=40?'bad':'warn')
      +tb(['Estágio','Volume atual','Vazamento','Causa-raiz','Esforço','Impacto da correção'],
        jm.stages.map(s=>[
          '<strong>'+E(s.stage)+'</strong>',
          s.current_volume!=null?E(String(s.current_volume)):'—',
          s.leakage_pct!=null?tg(s.leakage_pct+'%', s.leakage_pct>=50?'danger':s.leakage_pct>=30?'red':s.leakage_pct>=15?'yellow':'green'):'—',
          '<span style="font-size:.75rem;color:var(--text-secondary)">'+E(s.root_cause||'—')+'</span>',
          s.fix_effort?tg(IMP[s.fix_effort]||s.fix_effort,{low:'green',medium:'yellow',high:'red'}[s.fix_effort]):'—',
          '<span style="font-size:.75rem;color:var(--success)">'+E(s.fix_impact_estimate||'—')+'</span>',
        ]))
      +(jm.biggest_leakage_summary?cd('Maior vazamento hoje',E(jm.biggest_leakage_summary),'danger'):'')
      +(jm.projected_funnel_90d_realistic?cd('Projeção 90d (realista)',E(jm.projected_funnel_90d_realistic),'green'):''));
  }

  // Tone-of-voice analysis
  if (d.tone_of_voice_analysis?.channel_drift?.length) {
    const tv = d.tone_of_voice_analysis;
    let pillars = '';
    if (tv.brand_voice_target?.pillars?.length) {
      pillars += '<div style="margin-bottom:.5rem"><strong style="font-size:.75rem;color:var(--success)">Voz desejada:</strong> '
        +(tv.brand_voice_target.pillars||[]).map(p=>'<span class="tg tg--green" style="margin:0 .25rem .25rem 0">'+E(p)+'</span>').join('')
        +'</div>';
    }
    if (tv.brand_voice_target?.avoid?.length) {
      pillars += '<div><strong style="font-size:.75rem;color:var(--danger)">Evitar:</strong> '
        +(tv.brand_voice_target.avoid||[]).map(p=>'<span class="tg tg--red" style="margin:0 .25rem .25rem 0">'+E(p)+'</span>').join('')
        +'</div>';
    }
    // Aceita: {actual_tone, alignment_score, drift_notes, example}
    //    ou: {current_tone, target_alignment, gap, fix, priority}
    const alignMap = {alinhado:100,aligned:100,bom:80,boa:80,good:80,parcial:55,partial:55,media:55,'média':55,medium:55,baixa:25,baixo:25,low:25,desalinhado:20,misaligned:20,critico:10,'crítico':10,nenhum:0,none:0,nao:0,'não':0};
    const tvTone = c => c.actual_tone ?? c.current_tone ?? '';
    const tvExample = c => c.example ?? '';
    const tvNotes = c => c.drift_notes ?? c.gap ?? c.fix ?? '';
    const tvScore = c => {
      if (c.alignment_score != null) return c.alignment_score;
      if (c.target_alignment) return alignMap[String(c.target_alignment).toLowerCase()] ?? null;
      return null;
    };

    const alignRows = tv.channel_drift.map(c=>{
      const v = tvScore(c);
      if (v == null) return null;
      const tone = v>=70?'green':v>=40?'yellow':'red';
      const col = chartColor(tone);
      const pct = Math.min(100, Math.max(0, v));
      const statusLabel = v>=70?'Alinhado':v>=40?'Parcial':v>=20?'Baixo':'Crítico';
      return '<div style="display:grid;grid-template-columns:minmax(110px,18%) 1fr minmax(70px,10%) minmax(80px,12%);gap:.75rem;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">'
        +'<div style="font-size:.8125rem;font-weight:600">'+E(c.channel)+'</div>'
        +'<div style="position:relative;height:14px;background:var(--surface);border-radius:2px;overflow:hidden">'
        +'<div style="position:absolute;left:0;top:0;height:100%;width:'+pct+'%;background:'+col+';opacity:.85;border-radius:2px"></div>'
        +'<div style="position:absolute;left:70%;top:-2px;height:18px;width:1px;background:'+CX.muted+';opacity:.45"></div>'
        +'</div>'
        +'<div style="font-size:.8125rem;font-weight:700;text-align:right;color:'+col+'">'+v+'<span style="font-size:.625rem;color:var(--text-muted);font-weight:500">/100</span></div>'
        +'<div style="text-align:right">'+tg(statusLabel,tone)+'</div>'
        +'</div>';
    }).filter(Boolean);
    const alignHeader = '<div style="display:grid;grid-template-columns:minmax(110px,18%) 1fr minmax(70px,10%) minmax(80px,12%);gap:.75rem;align-items:center;padding:0 0 .5rem;border-bottom:1px solid var(--border);font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600">'
      +'<div>Canal</div><div>Alinhamento (0 → 100) · meta: 70</div><div style="text-align:right">Score</div><div style="text-align:right">Status</div></div>';
    const alignChart = alignRows.length
      ? chartTitle('Alinhamento por Canal (0-100)')+alignHeader+alignRows.join('')
        +'<div style="display:flex;gap:1.25rem;font-size:.6875rem;margin-top:.75rem;flex-wrap:wrap;color:var(--text-muted)">'
        +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('green')+';opacity:.85;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Alinhado (≥70)</span>'
        +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('yellow')+';opacity:.85;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Parcial (40-69)</span>'
        +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('red')+';opacity:.85;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Crítico (&lt;40)</span>'
        +'<span>· linha tracejada = meta setorial (70)</span></div>'
      : '';
    const worstCh = [...tv.channel_drift].sort((a,b)=>(tvScore(a)??100)-(tvScore(b)??100))[0];
    const toneInsight = worstCh
      ? 'Canal com maior desvio: "'+(worstCh.channel||'?')+'" ('+(tvScore(worstCh)??'?')+'/100). '
        +String(tvNotes(worstCh)||'').substring(0,140)
      : '';
    const gaugeBlock = (()=>{
      if (tv.coherence_score == null) return '';
      const v = tv.coherence_score, bench = 70;
      const tone = v>=70?'green':v>=40?'yellow':'red';
      const col = chartColor(tone);
      const vPct = Math.min(100, Math.max(0, v));
      const benchPct = Math.min(100, Math.max(0, bench));
      const status = v>=70?'Alinhado':v>=40?'Atenção':'Crítico';
      const bar = chartTitle('Coerência Geral do Tom')
        +'<div style="display:grid;grid-template-columns:minmax(120px,16%) 1fr minmax(90px,14%);gap:1rem;align-items:center">'
        +'<div><div style="font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:.25rem">Score atual</div>'
        +'<div style="font-size:1.75rem;font-weight:800;color:'+col+';line-height:1"><span>'+v+'</span><span style="font-size:.875rem;color:var(--text-muted);font-weight:500">/100</span></div></div>'
        +'<div style="position:relative;padding:1.25rem 0 1.5rem">'
        +'<div style="position:relative;height:16px;background:var(--surface);border-radius:3px;overflow:visible">'
        +'<div style="position:absolute;left:0;top:0;height:100%;width:'+vPct+'%;background:'+col+';opacity:.85;border-radius:3px"></div>'
        +'<div style="position:absolute;left:calc('+benchPct+'% - 1px);top:-6px;height:28px;width:2px;background:'+CX.text+';opacity:.75"></div>'
        +'<div style="position:absolute;left:'+benchPct+'%;top:-20px;transform:translateX(-50%);font-size:.625rem;color:var(--text-muted);white-space:nowrap;font-weight:600">Meta: '+bench+'</div>'
        +'<div style="position:absolute;left:calc('+vPct+'% - 1px);bottom:-6px;height:28px;width:2px;background:'+col+'"></div>'
        +'<div style="position:absolute;left:'+vPct+'%;bottom:-20px;transform:translateX(-50%);font-size:.625rem;color:'+col+';white-space:nowrap;font-weight:700">Atual: '+v+'</div>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;font-size:.625rem;color:var(--text-muted);margin-top:.25rem"><span>0</span><span>40</span><span>70</span><span>100</span></div>'
        +'</div>'
        +'<div style="text-align:right">'+tg(status,tone)+'</div>'
        +'</div>';
      return '<div style="margin:.5rem 0 1rem">'+insight(bar,
        'Coerência geral: '+v+'/100. '+(v>=70?'Boa — foco em manter consistência.':v>=40?'Atenção — desvios entre canais erodem autoridade.':'CRÍTICO — priorizar editorial imediatamente.'),
        v>=70?'good':v>=40?'warn':'bad')+'</div>';
    })();
    h += sc('Coerência do Tom de Voz',
      (pillars?cd('Brand Voice Target',pillars):'')
      +gaugeBlock
      +(alignRows.length?insight(alignChart, toneInsight, (worstCh && tvScore(worstCh)!=null && tvScore(worstCh)<40)?'bad':'warn'):'')
      +tb(['Canal','Tom atual','Exemplo','Alinhamento','Gap / ajuste sugerido'],
        tv.channel_drift.map(c=>{
          const sc100 = tvScore(c);
          const alignLabel = c.target_alignment ? String(c.target_alignment) + (sc100!=null?' ('+sc100+'/100)':'') : (sc100!=null?sc100+'/100':'—');
          return [
            '<strong>'+E(c.channel)+'</strong>',
            '<span style="font-size:.75rem">'+E(tvTone(c)||'—')+'</span>',
            tvExample(c)?'<em style="font-size:.75rem;color:var(--text-muted)">"'+E(tvExample(c))+'"</em>':'—',
            sc100!=null?tg(alignLabel,sc100>=70?'green':sc100>=40?'yellow':'red'):E(alignLabel),
            '<span style="font-size:.75rem;color:var(--text-muted)">'+E(tvNotes(c)||'—')+'</span>',
          ];
        }))
      +(tv.coherence_score!=null?'<div style="margin-top:.75rem">'+mt(tv.coherence_score+'/100','Coerência geral',tv.coherence_score>=70?'green':tv.coherence_score>=40?'yellow':'red')+'</div>':''));
  }

  // URL audit
  if (d.url_audit?.urls?.length) {
    h += sc('Auditoria de URLs',
      d.url_audit.urls.map(u=>
        cd(u.url||'—',
          (u.purpose?'<div style="font-size:.8125rem;margin-bottom:.25rem"><strong>Finalidade:</strong> '+E(u.purpose)+'</div>':'')
          +(u.status_expected?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.375rem">Status esperado: '+E(u.status_expected)+'</div>':'')
          +(u.verify_checklist?.length?'<ul class="cl">'+u.verify_checklist.map(i=>'<li><span class="cl__icon cl__icon--pending">&#9675;</span>'+E(i)+'</li>').join('')+'</ul>':''))
      ).join(''));
  }

  h += renderKeyInsight(d.key_insight, { title: 'Ponto de Alavancagem — Maior Vazamento + Quick Win' });
  h += renderHonestyAlert(d.honesty_alert);
  return h;
},

'ee-s2-pesquisa-mercado'(d) {
  let h = '';

  // ══════════════════════════════════════════════════════════
  // 1. ESTUDO DE MERCADO — TAM / SAM / SOM (com explicações)
  // ══════════════════════════════════════════════════════════
  if (d.tam_sam_som) {
    const t = d.tam_sam_som;
    const tsDefs = {
      tam: {
        acronym: 'TAM',
        full: 'Total Addressable Market',
        pt: 'Mercado Total Endereçável',
        meaning: 'Todo o mercado potencial se fosse possível atender 100% da demanda sem limites geográficos, operacionais ou de perfil.',
        color: 'var(--danger)',
        tone: 'red',
      },
      sam: {
        acronym: 'SAM',
        full: 'Serviceable Available Market',
        pt: 'Mercado Disponível & Servível',
        meaning: 'Fatia do TAM que a empresa consegue atender considerando sua região, canais e perfil de cliente-alvo.',
        color: 'var(--warning)',
        tone: 'yellow',
      },
      som: {
        acronym: 'SOM',
        full: 'Serviceable Obtainable Market',
        pt: 'Mercado Atingível',
        meaning: 'Fatia do SAM que a empresa realisticamente consegue capturar dentro de um horizonte de tempo (tipicamente 1 a 3 anos).',
        color: 'var(--success)',
        tone: 'green',
      },
    };

    function tssCard(key, obj) {
      const def = tsDefs[key];
      if (!obj) return '';
      return '<div style="background:var(--surface);border:1px solid var(--border);border-top:4px solid '+def.color+';border-radius:4px;padding:.875rem 1rem;display:flex;flex-direction:column;gap:.5rem">'
        +'<div style="display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap">'
        +  '<div style="font-size:1.5rem;font-weight:800;color:'+def.color+';letter-spacing:-.02em;line-height:1">'+def.acronym+'</div>'
        +  '<div style="font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">'+E(def.full)+'</div>'
        +'</div>'
        +'<div style="font-size:.75rem;color:var(--text-secondary);font-weight:600">'+E(def.pt)+'</div>'
        +'<div style="font-size:.75rem;color:var(--text-muted);line-height:1.45;font-style:italic;padding:.5rem .625rem;background:rgba(0,0,0,0.02);border-left:2px solid '+def.color+';border-radius:2px">'+E(def.meaning)+'</div>'
        +'<div style="font-size:1.75rem;font-weight:800;color:var(--text-primary);letter-spacing:-.02em;line-height:1.1">'+BRL(obj.value_brl)+'</div>'
        +'<div style="font-size:.75rem;color:var(--text-secondary);line-height:1.5">'+E(obj.description||'')+'</div>'
        +'</div>';
    }

    let tssHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.75rem;margin-bottom:.875rem">'
      + tssCard('tam', t.tam)
      + tssCard('sam', t.sam)
      + tssCard('som', t.som)
      + '</div>';

    // Filtros e premissas em cards colapsáveis
    let tssDetails = '';
    if (t.sam?.filters?.length) {
      tssDetails += '<details style="margin-bottom:.375rem"><summary style="cursor:pointer;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--warning);padding:.375rem 0">Filtros aplicados para chegar ao SAM</summary>'
        +'<ul style="list-style:none;padding:.5rem .75rem;margin:.25rem 0 0;background:var(--surface);border-left:3px solid var(--warning);border-radius:0 3px 3px 0;font-size:.75rem;color:var(--text-secondary);line-height:1.5">'
        + t.sam.filters.map(f => '<li style="margin-bottom:.3rem">• '+E(f)+'</li>').join('')
        + '</ul></details>';
    }
    if (t.som?.assumptions?.length) {
      tssDetails += '<details style="margin-bottom:.375rem"><summary style="cursor:pointer;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--success);padding:.375rem 0">Premissas para atingir o SOM</summary>'
        +'<ul style="list-style:none;padding:.5rem .75rem;margin:.25rem 0 0;background:var(--surface);border-left:3px solid var(--success);border-radius:0 3px 3px 0;font-size:.75rem;color:var(--text-secondary);line-height:1.5">'
        + t.som.assumptions.map(a => '<li style="margin-bottom:.3rem">• '+E(a)+'</li>').join('')
        + '</ul></details>';
    }
    if (t.sources?.length) {
      tssDetails += '<details style="margin-bottom:.375rem"><summary style="cursor:pointer;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:.375rem 0">Fontes consultadas ('+t.sources.length+')</summary>'
        +'<ul style="list-style:none;padding:.5rem .75rem;margin:.25rem 0 0;background:var(--surface);border-radius:3px;font-size:.75rem;color:var(--text-secondary);line-height:1.5">'
        + t.sources.map(s =>
            '<li style="margin-bottom:.3rem"><a href="'+E(s.url)+'" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">'+E(s.name)+'</a>'
            + (s.year?' <span style="color:var(--text-muted)">('+s.year+')</span>':'')
            + '</li>'
          ).join('')
        + '</ul></details>';
    }

    // Funil TAM→SAM→SOM
    let funnelHtml = '';
    if (t.tam?.value_brl && t.sam?.value_brl && t.som?.value_brl) {
      const funnelStages = [
        {name:'TAM — Mercado Total', volume: t.tam.value_brl},
        {name:'SAM — Endereçável', volume: t.sam.value_brl},
        {name:'SOM — Atingível', volume: t.som.value_brl},

      const somPct = (t.som.value_brl/t.tam.value_brl*100);
      const samPct = (t.sam.value_brl/t.tam.value_brl*100);
      const somOverSam = (t.som.value_brl/t.sam.value_brl*100);
      const funnelInsight = 'SAM representa '+samPct.toFixed(2)+'% do TAM (recorte regional). SOM representa '+somOverSam.toFixed(2)+'% do SAM ('+somPct.toFixed(3)+'% do TAM) — '
        +(somOverSam>=5?'meta realista dentro do mercado endereçável.':'fatia conservadora; execução consistente deve atingi-la.');
      funnelHtml = insight(chartFunnel(funnelStages, {title:'Afunilamento de Mercado', fmt:v=>BRL(v)}),
        funnelInsight, somOverSam>=5?'good':'warn');
    }

    h += sc('Estudo de Mercado: TAM × SAM × SOM', tssHtml + tssDetails + funnelHtml);
  }

  // ══════════════════════════════════════════════════════════

    const remainingPct = 100 - progressToSom;

        +    '<div style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--success);margin-bottom:.15rem">SOM</div>'
        +    '<div style="font-size:1.0625rem;font-weight:800;color:var(--success);letter-spacing:-.01em">'+BRL(som)+'</div>'
        +    '<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.125rem">teto de mercado</div>'
        +  '</div>'
        +'</div>'
      : '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.625rem">'
        +  '<div style="text-align:left">'
        +    '<div style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.15rem">Ponto de partida</div>'
        +    '<div style="font-size:.875rem;font-weight:700;color:var(--text-muted)">R$ 0</div>'

        +  '<div style="text-align:center">'
        +    '<div style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--warning);margin-bottom:.15rem">Você está aqui</div>'

        +    '<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.125rem">'+progressToSom.toFixed(1)+'% do caminho</div>'

        +    '<div style="font-size:1.125rem;font-weight:800;color:var(--success);letter-spacing:-.01em">'+BRL(som)+'</div>'

    // Barra de progresso: 3 segmentos quando há meta cliente, 2 quando não há

      +    '<span style="display:inline-flex;align-items:center;gap:.3rem"><span style="width:10px;height:10px;background:var(--warning);border-radius:2px;display:inline-block"></span><strong style="color:var(--warning)">Atual</strong> '+BRL(current)+' ('+curOfSam.toFixed(2)+'% do SAM)</span>'

      +  '</div>'
      +  '<div></div>'

    // ── BLOCO C: Pedagogia — por que o SOM não é o SAM inteiro ──

      enderecavelHtml = '<div style="margin-top:1rem;padding:.875rem 1rem;background:linear-gradient(180deg, rgba(99,102,241,0.04), rgba(99,102,241,0.02));border:1px solid rgba(99,102,241,0.15);border-radius:4px">'
        +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6366f1;margin-bottom:.5rem">Por que o SOM não é o SAM inteiro? — camada do mercado endereçável</div>'
        +(endVal
          ? '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.625rem;font-size:.75rem">'
            +'<div style="padding:.5rem;background:rgba(245,158,11,0.08);border-left:2px solid var(--warning);border-radius:2px"><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem">SAM total</div><div style="font-weight:700;color:var(--text-primary)">'+BRL(sam)+'</div><div style="color:var(--text-muted);font-size:.6875rem">todo o gasto vet da microrregião</div></div>'
            +'<div style="padding:.5rem;background:rgba(99,102,241,0.08);border-left:2px solid #6366f1;border-radius:2px"><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem">Mercado endereçável</div><div style="font-weight:700;color:#6366f1">'+BRL(endVal)+(endPctSam?' <span style="font-size:.6875rem;color:var(--text-muted);font-weight:500">('+endPctSam.toFixed(0)+'% do SAM)</span>':'')+'</div><div style="color:var(--text-muted);font-size:.6875rem">fatia do SAM relevante à oferta</div></div>'
            +'<div style="padding:.5rem;background:rgba(22,163,74,0.08);border-left:2px solid var(--success);border-radius:2px"><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem">SOM</div><div style="font-weight:700;color:var(--success)">'+BRL(som)+(somOverEnd?' <span style="font-size:.6875rem;color:var(--text-muted);font-weight:500">('+somOverEnd.toFixed(0)+'% do endereçável)</span>':'')+'</div><div style="color:var(--text-muted);font-size:.6875rem">capturável pela clínica</div></div>'

          : '')
        +'<div style="font-size:.75rem;color:var(--text-secondary);line-height:1.55">'+(ms.enderecavel_note ? E(ms.enderecavel_note) : 'O SAM inclui todo o gasto vet da microrregião — de tutores ocasionais (consulta isca R$70) até premium humanizados. A clínica <strong>não compete</strong> nos perfis de commodity/ocasional por decisão estratégica. O <strong style="color:#6366f1">Mercado endereçável</strong> é o recorte do SAM onde a oferta dela é relevante — tipicamente o segmento premium humanizado + fatia do médio que upgrade. O SOM é quanto a clínica realisticamente captura DESSE endereçável, disputando com concorrentes de perfil similar. Essa camada explica por que o SOM não é maior mesmo sendo a clínica líder do seu nicho.')+'</div>'
        +'</div>';
    }

    h += sc('Market Share: ' + E(d.client_name || 'Cliente') + ' vs Mercado',
      insight(journey + context + enderecavelHtml,

        progressToSom >= 50 ? 'good' : progressToSom >= 25 ? 'warn' : 'bad'));
  }

  // ══════════════════════════════════════════════════════════

  if (d.competitors?.length) {

      .sort((a,b)=>b.digital_score-a.digital_score);

    const all = ranked.concat(unscored);

    if (all.length) {
      const scoreTone = s => s==null?'var(--text-muted)':s>=7?'var(--success)':s>=4?'var(--warning)':'var(--danger)';
      const scoreLabel = s => s==null?'—':s>=7?'Forte':s>=4?'Médio':'Fraco';
      const maxScore = 10;

        const barW = c.digital_score!=null ? (c.digital_score/maxScore*100).toFixed(1) : 0;
        const rank = idx + 1;
        const isLeader = strongest && c.name === strongest.name;
        const strengths = (c.strengths||[]).slice(0, 4);
        const weaknesses = (c.weaknesses||[]).slice(0, 4);
        const channels = (c.channels||[]).slice(0, 4);

        // Summary row (clicável) — mantém o scorecard visual
        const summary = '<summary style="list-style:none;cursor:pointer;padding:.625rem .75rem;border-radius:3px;transition:background .15s" onmouseover="this.style.background=\'var(--surface)\'" onmouseout="this.style.background=\'transparent\'">'
          +'<div style="display:grid;grid-template-columns:28px minmax(0,1.6fr) minmax(0,3fr) auto 18px;gap:.625rem;align-items:center">'
          +  '<div style="font-size:.75rem;font-weight:800;color:var(--text-muted);text-align:center">#'+rank+'</div>'
          +  '<div style="display:flex;align-items:center;gap:.4rem;min-width:0">'
          +    '<span style="font-size:.8125rem;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+E(c.name)+'">'+E(c.name)+'</span>'
          +    (isLeader?'<span style="flex-shrink:0;font-size:.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--danger);background:rgba(220,38,38,0.1);padding:.1rem .35rem;border-radius:2px;white-space:nowrap">⚡ Líder</span>':'')
          +  '</div>'
          +  '<div style="height:18px;background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;position:relative">'
          +    (c.digital_score!=null?'<div style="height:100%;width:'+barW+'%;background:'+col+';opacity:.85;border-radius:9px"></div>':'')
          +  '</div>'
          +  '<div style="display:flex;align-items:center;gap:.4rem;min-width:110px;justify-content:flex-end">'
          +    '<span style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:'+col+'">'+scoreLabel(c.digital_score)+'</span>'
          +    '<span style="font-size:.875rem;font-weight:800;color:'+col+'">'+(c.digital_score!=null?c.digital_score:'—')+'<span style="color:var(--text-muted);font-weight:500;font-size:.75rem">/10</span></span>'
          +  '</div>'
          +  '<span class="cmp-chev" style="font-size:.75rem;color:var(--text-muted);transition:transform .2s;display:inline-block">▸</span>'
          +'</div>'
          +'</summary>';

        // Painel de detalhes (abre ao clicar)
        const panel = '<div style="padding:.875rem 1rem 1rem;margin:0 .25rem .25rem;background:var(--surface);border-radius:3px;display:flex;flex-direction:column;gap:.75rem;border-left:2px solid '+col+'">'
          + (c.positioning?'<div><div style="font-size:.5625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.25rem">Posicionamento</div>'
              +'<div style="font-size:.8125rem;color:var(--text-secondary);line-height:1.55">'+E(c.positioning)+'</div></div>':'')
          + (c.estimated_pricing?'<div style="font-size:.75rem;color:var(--text-secondary);padding:.5rem .625rem;background:var(--bg);border-radius:3px;border-left:2px solid var(--warning);line-height:1.5">'
              +'<span style="font-size:.5625rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--warning);margin-right:.5rem">Preço</span>'+E(c.estimated_pricing)+'</div>':'')
          + (channels.length?'<div><div style="font-size:.5625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.3rem">Canais de aquisição</div>'
              +'<div style="display:flex;flex-wrap:wrap;gap:.3rem">'
              + channels.map(ch=>'<span style="font-size:.6875rem;color:var(--text-secondary);background:var(--bg);border:1px solid var(--border);padding:.2rem .5rem;border-radius:10px" title="'+E(ch)+'">'+E(ch.length>60?ch.substring(0,58)+'…':ch)+'</span>').join('')
              +'</div></div>':'')
          + ((strengths.length||weaknesses.length)?'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding-top:.25rem">'
              +(strengths.length?'<div>'
                +'<div style="display:flex;align-items:center;gap:.35rem;font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--success);margin-bottom:.4rem">'
                +  '<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--success);color:white;font-size:.625rem">✓</span>'
                +  '<span>Forças</span>'
                +'</div>'
                +'<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.3rem">'
                + strengths.map(s=>'<li style="font-size:.75rem;color:var(--text-secondary);line-height:1.45;padding-left:.75rem;position:relative"><span style="position:absolute;left:0;color:var(--success);font-weight:700">•</span>'+E(s)+'</li>').join('')
                +'</ul></div>':'<div></div>')
              +(weaknesses.length?'<div>'
                +'<div style="display:flex;align-items:center;gap:.35rem;font-size:.625rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--danger);margin-bottom:.4rem">'
                +  '<span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--danger);color:white;font-size:.625rem">!</span>'
                +  '<span>Fragilidades</span>'
                +'</div>'
                +'<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.3rem">'
                + weaknesses.map(w=>'<li style="font-size:.75rem;color:var(--text-secondary);line-height:1.45;padding-left:.75rem;position:relative"><span style="position:absolute;left:0;color:var(--danger);font-weight:700">•</span>'+E(w)+'</li>').join('')
                +'</ul></div>':'<div></div>')
              +'</div>':'')
          +'</div>';

        return '<details class="cmp-row" style="border-bottom:1px solid var(--border)">'+summary+panel+'</details>';
      }).join('');

      const compInsight = ranked.length >= 2
        ? 'Líder digital: '+strongest.name+' ('+strongest.digital_score+'/10). Média do grupo: '+avg.toFixed(1)+'/10. '
          +(avg<5?'Concorrência digital fraca — janela de oportunidade.':avg<7?'Competição média — diferenciação é chave.':'Concorrência forte — foco em nicho e prova social.')
        : 'Clique em cada concorrente para ver análise completa (posicionamento, preço, canais, forças e fragilidades).';

      const hint = '<div style="font-size:.6875rem;color:var(--text-muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem">'
        +'<span style="display:inline-block;width:14px;height:14px;border:1px solid var(--border);border-radius:50%;text-align:center;line-height:12px;font-size:.625rem;color:var(--text-muted)">▸</span>'
        +'<span>Clique em cada linha para ver posicionamento, preço, canais, forças e fragilidades</span>'
        +'</div>';

      const styleBlock = '<style>.cmp-row summary::-webkit-details-marker{display:none}.cmp-row[open] .cmp-chev{transform:rotate(90deg)}.cmp-row[open] summary{background:var(--surface)!important;border-radius:3px 3px 0 0}</style>';

      h += sc('Scorecard Digital dos Concorrentes',
        insight(styleBlock+chartTitle('Ranking por presença digital (0-10)')+hint+'<div style="display:flex;flex-direction:column">'+rows+'</div>', compInsight, avg<5?'good':avg<7?'warn':'bad'));
    }
  }
  if (d.trends?.length) {
    h += sc('Tendências', d.trends.map(t=>cd(t.trend,E(t.evidence),'green')).join(''));
  }
  if (d.unexploited_opportunity) {
    const u = d.unexploited_opportunity;
    // Deriva objeto key_insight a partir da estrutura legada de unexploited_opportunity
    // — description pode conter frase-território entre aspas (vira headline)
    // — why_nobody_does_it no formato "(1)... (2)... (3)..." vira numbered_reasons
    const descText = u.description || '';
    const quoteMatch = descText.match(/['""']([^'""']{8,})['""']/);
    const headline = quoteMatch ? quoteMatch[1] : null;
    const context = quoteMatch ? descText.replace(quoteMatch[0], '"'+quoteMatch[1]+'"') : descText;

    const why = u.why_nobody_does_it || '';
    const parts = why.split(/\s*\((\d)\)\s*/);
    const reasons = [];
    for (let i=1; i<parts.length; i+=2) {
      if (parts[i+1]) reasons.push(parts[i+1].trim());
    }
    // Se não parseou razões, usa why_nobody_does_it bruto como primeira razão
    const finalReasons = reasons.length ? reasons : (why ? [why] : []);

    h += renderKeyInsight({
      headline,
      context,
      numbered_reasons: finalReasons,
      discussion_anchor: 'este é o maior ponto de alavancagem da estratégia — discutir apetite, ritmo de adoção e comunicação proprietária.',
      feasibility: u.feasibility
    }, { title: 'Oportunidade Não Explorada' });
  }
  if (d.real_differentials?.length) {
    const sc2 = {confirmed:'green',potential:'yellow',aspirational:'gray'};
    h += sc('Diferenciais Reais', d.real_differentials.map(r=>cd(r.differential,E(r.icp_relevance)+'<div style="margin-top:.375rem">'+tg(r.status,sc2[r.status])+'</div>',sc2[r.status])).join(''));
  }
  h += renderHonestyAlert(d.honesty_alert);
  return h;
},

'ee-s2-posicionamento'(d) {

    h += '<div style="margin:1.5rem 0;padding:1.25rem 1.5rem;background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(34,197,94,0.02));border:2px solid var(--success);border-radius:8px">'
      +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--success);margin-bottom:.375rem">Proposta Única de Valor</div>'

      +(d.chosen_statement?'<div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid rgba(34,197,94,0.25);font-size:.8125rem;color:var(--text-secondary)"><strong>Declaração:</strong> '+E(d.chosen_statement)+'</div>':'')
      +'</div>';
  }

  // Mapa 2x2
  if (d.positioning_map) {
    const pm = d.positioning_map;
    // Extrai extremos dos eixos (split em "→" ou "↔" ou "-" ou "←→")
    const splitAxis = s => {
      if (!s) return ['', ''];
      const parts = String(s).split(/\s*(?:→|↔|←→|↦|->|\/)\s*/);
      if (parts.length >= 2) return [parts[0].trim(), parts[parts.length-1].trim()];
      return ['', s];
    };
    const [xLow, xHigh] = splitAxis(pm.axis_x);
    const [yLow, yHigh] = splitAxis(pm.axis_y);
    const quadrantLabels = {
      NO: (yHigh||'Y+') + ' · ' + (xLow||'X-'),
      NE: (yHigh||'Y+') + ' · ' + (xHigh||'X+'),
      SO: (yLow||'Y-') + ' · ' + (xLow||'X-'),
      SE: (yLow||'Y-') + ' · ' + (xHigh||'X+'),
    };
    const getCompetitorsInQuadrant = q => (pm.competitor_positions||[]).filter(c=>c.quadrant===q);
    const quadrantCell = q => {
      const comps = getCompetitorsInQuadrant(q);
      const isClient = pm.client_position===q;
      const bg = isClient ? 'rgba(34,197,94,0.10)' : 'var(--surface)';
      const border = isClient ? '2px solid var(--success)' : '1px solid var(--border)';
      return '<div style="padding:.875rem;background:'+bg+';border:'+border+';border-radius:4px;min-height:140px;display:flex;flex-direction:column;gap:.5rem">'
        +'<div style="display:flex;align-items:center;gap:.5rem;padding-bottom:.375rem;border-bottom:1px dashed '+(isClient?'rgba(34,197,94,0.3)':'var(--border)')+'">'
        +  (isClient?'<span style="font-size:.625rem;font-weight:800;color:var(--success);text-transform:uppercase;letter-spacing:.08em">★ '+E(d.client_name||'Cliente')+'</span>':'')
        +  '<span style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:'+(isClient?'var(--success)':'var(--text-secondary)')+'">'+E(quadrantLabels[q])+'</span>'

  return h;
},

'ee-s2-diagnostico-midia'(d) {
  // Helper: trend arrow + % change between two values
  function trend(curr, prev, invertBad) {
    if (!prev || prev === 0) return '';
    const pct = ((curr - prev) / Math.abs(prev) * 100);
    const up = pct >= 0;
    // For CPA/CPL, going up is bad; for clicks/leads, going up is good
    const isGood = invertBad ? !up : up;
    const col = isGood ? 'var(--success)' : 'var(--danger)';
    const arrow = up ? '▲' : '▼';
    return ' <span style="color:'+col+';font-size:.6875rem;font-weight:700">'+arrow+Math.abs(pct).toFixed(0)+'%</span>';
  }

  // Helper: monthly evolution table
  function evTable(rows, cols) {
    if (!rows?.length) return '';
    const headers = ['Mês'].concat(cols.map(c=>c.label));
    const trows = rows.map((r, i) => {
      const prev = rows[i-1];
      return [E(r.month)].concat(cols.map(c => {
        const val = r[c.key];
        const prevVal = prev ? prev[c.key] : null;
        let formatted = val==null ? '—' : (c.fmt ? c.fmt(val) : String(val));
        let tr = prevVal!=null ? trend(val, prevVal, c.badUp||false) : '';
        let cls = c.colorFn ? c.colorFn(val, prev ? prev[c.key] : null) : '';
        return (cls ? tg(formatted, cls) : formatted) + tr;
      }));
    });
    return tb(headers, trows);
  }

  let h = '';

  // Period header
  if (d.data_period) {
    h += '<div style="display:inline-flex;align-items:center;gap:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.375rem .75rem;margin-bottom:.75rem">'
      +'<span style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)">Período analisado</span>'
      +'<span style="font-size:.8125rem;font-weight:700;color:var(--accent)">'+E(d.data_period)+'</span>'
      +(d.data_period_months ? '<span style="font-size:.75rem;color:var(--text-muted)">('+d.data_period_months+' meses)</span>' : '')
      +'</div>';
  }

  h += renderLeituraEstrategica(d, { verdictLabel: 'Veredito de Mídia Paga' });

  // ── GOOGLE ADS ──
  const ga = d.google_ads;
  if (ga) {
    // Divisor forte antes da seção Google Ads
    h += '<div style="margin:2rem 0 1rem;padding:1rem 1.25rem;background:linear-gradient(90deg, rgba(59,130,246,0.08), transparent);border-left:4px solid #3b82f6;border-radius:4px">'
      +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3b82f6;margin-bottom:.125rem">Canal 1</div>'
      +'<div style="font-size:1.25rem;font-weight:800;color:var(--text-primary);letter-spacing:-.01em">Google Ads</div>'
      +(ga.budget_monthly?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem">Investimento atual: '+BRL(ga.budget_monthly)+'/mês · '+(ga.active_campaigns||0)+' campanha'+(ga.active_campaigns!==1?'s':'')+' ativa'+(ga.active_campaigns!==1?'s':'')+' de '+(ga.total_campaigns||0)+' total</div>':'')
      +'</div>';
    const gClsColor = ga.score >= 70?'success':ga.score>=40?'warning':'danger';
    let gaHead = '';

    // Resumo 90 dias — cards + diagnóstico executivo
    {
      const spend = ga.total_spend_90d;
      const monthly = ga.budget_monthly_actual!=null ? ga.budget_monthly_actual : (spend!=null?spend/3:null);
      const cards = '<div class="gr gr--4" style="margin-bottom:.75rem">'
        +(spend!=null?mt(BRL(spend),'Investido 90d',''):'')
        +(ga.avg_ctr!=null?mt(ga.avg_ctr.toFixed(2)+'%','CTR médio',ga.avg_ctr>=3?'green':ga.avg_ctr>=1.5?'yellow':'red'):'')
        +(ga.avg_cpa!=null?mt(BRL(ga.avg_cpa),'CPA médio',ga.avg_cpa<=15?'green':ga.avg_cpa<=25?'yellow':'red'):'')
        +(ga.total_conversions_90d!=null?mt(N(ga.total_conversions_90d),'Conversões 90d',''):'')
        +'</div>';
      const sub = '<div style="display:flex;gap:.75rem;flex-wrap:wrap;font-size:.75rem;color:var(--text-muted);margin-bottom:.5rem">'
        +(monthly!=null?'<span>Média mensal: <strong style="color:var(--text-secondary)">'+BRL(monthly)+'</strong></span>':'')
        +(ga.total_clicks_90d!=null?'<span>Clicks: <strong style="color:var(--text-secondary)">'+N(ga.total_clicks_90d)+'</strong></span>':'')
        +(ga.total_impressions_90d!=null?'<span>Impressões: <strong style="color:var(--text-secondary)">'+N(ga.total_impressions_90d)+'</strong></span>':'')
        +(ga.active_campaigns!=null&&ga.total_campaigns!=null?'<span>Campanhas ativas: <strong style="color:var(--text-secondary)">'+ga.active_campaigns+' de '+ga.total_campaigns+'</strong></span>':'')
        +'</div>';
      const diag = ga.strategic_diagnosis

        : '';
      gaHead = cards + sub + diag;
    }

    // Monthly evolution table
    let gaEvol = '';
    if (ga.monthly_evolution?.length) {
      gaEvol = evTable(ga.monthly_evolution, [
        {key:'cost',   label:'Custo',        fmt: v=>'R$'+v.toFixed(0), badUp:true,  colorFn:(v,p)=>p&&v>p*1.1?'red':p&&v<p*0.9?'green':''},
        {key:'clicks', label:'Clicks',       fmt: v=>N(v),              badUp:false, colorFn:(v,p)=>p&&v<p*0.9?'red':p&&v>p*1.1?'green':''},
