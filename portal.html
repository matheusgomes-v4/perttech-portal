"carousel","midjourney_prompt":"Close-up technical photography, industrial UPS battery bank interior showing individual battery cells with amber warning LED light, dark industrial environment, cold blue technical lighting, high-detail technical equipment photography, B2B industrial aesthetic, space for text overlay on bottom third, no people --ar 1:1 --v 7 --style raw --no text watermarks logos cartoons people bright colors (use this base prompt for each slide, varying the equipment element: Slide 1: battery bank + amber LED, Slide 2: multimeter reading low voltage, Slide 3: UPS alarm panel with warning lights, Slide 4: infrared thermometer on UPS housing, Slide 5: oscilloscope waveform display)","ideogram_prompt":"Carousel cover slide 1080x1080, dark charcoal background #1a1a1a, very large number '5' in electric blue #2563EB Montserrat ExtraBold 160pt centered, below in white bold 32pt: 'sinais que seu nobreak', next line: 'vai falhar em breve', small bottom text in gray: 'Deslize para ver →', Perttech logo bottom right white 140px. Clean minimal B2B design. | For each content slide: same dark background, amber/blue color code for each signal number, signal number large left side, title right side, icon space center. Consistent grid layout.","canva_guide":"Formato: 1080x1080px × 6 slides (capa + 5 sinais + 1 CTA final = 7 slides total). Capa: usar saída do Ideogram direto. Slides 1-5: foto técnica (Midjourney) no 40% superior, zona de texto nos 60% inferiores com fundo #1a1a1a sólido. Número do sinal: Montserrat ExtraBold 80pt azul #2563EB. Título do sinal: Bold 28pt branco. Explicação: Regular 20pt cinza #9ca3af. Logo Perttech: slide CTA apenas. Slide CTA final: fundo azul #2563EB, texto branco, logo branco, WhatsApp 11 96262-0311. Exportar apenas em 1:1 (carousel é nativamente quadrado no Meta)."},{"id":"V4","hook_type":"social_proof","hook_text":"30 anos mantendo empresas 24/7 funcionando sem parar.","short_copy":"30 anos. Empresas com operações críticas 24/7 na Grande São Paulo confiam na Perttech para não parar. Sem downtime elétrico não planejado. Sem técnico que não resolve. Sem segunda visita por culpa do fornecedor.","medium_copy":"Depois de 30 anos no mercado de manutenção de sistemas críticos de energia, chegamos a uma conclusão que nossos clientes já sabem: empresa que opera 24/7 não escolhe fornecedor de manutenção pelo menor preço. Escolhe pelo histórico, pela capacidade técnica e pela garantia de resolução. É por isso que as maiores operações industriais e logísticas do ABC e Grande SP renovam contrato conosco ano após ano. Não somos o fornecedor mais barato — somos o mais confiável para quem não pode arriscar uma parada. Solicite proposta de contrato anual.","headline":"30 anos. Operações críticas.","description":"Empresas com operações 24/7 no ABC escolhem a Perttech para não parar.","button_cta":"Solicitar proposta","visual_concept":"Design minimalista impactante: número '30' em tipografia industrial metálica ocupando 70% do frame, textura de metal envelhecido e patinado (transmite história e solidez), fundo charcoal escuro (#1a1a1a), iluminação lateral fria em azul elétrico criando reflexos metálicos no número, silhuetas sutis de equipamentos industriais (racks, nobreaks) integradas ao fundo como névoa/sombra, composição limpa sem poluição visual. Espaço no terço inferior para overlay de texto em Canva.","recommended_format":"feed_square","midjourney_prompt":"Product photography concept, massive industrial metal number '30' with aged patina texture, charcoal dark background #1a1a1a, cool electric blue side lighting creating metallic reflections on the number, subtle ghost silhouettes of server racks and industrial UPS equipment in the dark background smoke, minimal B2B premium aesthetic, high contrast, sharp focus on number, cinematic depth of field --ar 1:1 --v 7 --style raw --no text watermarks logos people bright colors orange red warm tones","ideogram_prompt":"1080x1080 square, charcoal background #1a1a1a, extra large bold number '30' Montserrat ExtraBold in metallic silver-white with subtle electric blue glow, top left small text in gray #6b7280 uppercase: 'ANOS DE MANUTENÇÃO CRÍTICA', bottom left in white Regular 22pt: 'Empresas 24/7 na Grande SP', subtle horizontal blue line #2563EB separating top from bottom third, Perttech wordmark bottom right white 140px. Powerful minimal layout.","canva_guide":"Formato principal: 1080x1080px. Usar imagem Midjourney como fundo. Overlay de texto no terço inferior: fundo em gradient transparente para preto. Fonte: Montserrat ExtraBold para '30 anos', Regular para subcopy. Subcopy: 'Empresas com operações críticas 24/7 no ABC e Grande SP renovam contrato conosco há décadas' — 20pt branco. CTA: pequeno tag azul 'Solicitar proposta →'. Logo: canto inferior direito 160px. Exportar em 1:1, 4:5 (adicionar faixa escura acima com copy extra) e 9:16 (expandir fundo Midjourney ou adicionar borda escura)."},{"id":"V5","hook_type":"urgencia","hook_text":"Sua última revisão de UPS foi há quanto tempo?","short_copy":"Seu nobreak não avisa quando a bateria vai falhar — mas os dados do diagnóstico preventivo avisam. Quando foi a última revisão técnica do seu UPS? Esta semana temos horários de diagnóstico disponíveis. Gratuito, sem compromisso.","medium_copy":"Bateria de UPS degrada em silêncio. Depois de 3-4 anos, a capacidade residual pode estar abaixo de 60% sem nenhum alarme visível — e um pico de tensão ou queda de energia revela o problema da forma mais cara possível: com a operação parada. A manutenção preventiva existe para isso não acontecer. A Perttech realiza diagnóstico técnico completo com relatório de capacidade de bateria, análise de carga e recomendações de substituição. Horários disponíveis para empresas da Grande SP e ABC. Gratuito, sem compromisso. Reserve agora.","headline":"UPS sem revisão = risco.","description":"Bateria degrada em silêncio. Diagnóstico técnico gratuito esta semana — sem compromisso.","button_cta":"Agendar diagnóstico","visual_concept":"Formato stories vertical (9:16). Técnico Perttech de uniforme escuro inspecionando banco de baterias de UPS industrial com multímetro em mãos, leitura do instrumento visível em close, ambiente de sala de manutenção com iluminação técnica fria, LEDs âmbar piscando no painel do UPS ao fundo indicando aviso, atmosfera de prevenção e cuidado técnico. Ângulo levemente superior para dramaticidade. Espaço no terço superior para texto em Canva.","recommended_format":"stories","midjourney_prompt":"Vertical cinematic photography, professional technician in dark work uniform using a digital multimeter to test an industrial UPS battery bank, instrument display showing reading visible, amber warning LEDs blinking on UPS panel in background, cold technical laboratory lighting, industrial maintenance room environment, professional focused atmosphere, slight top-down angle, 9:16 vertical frame --ar 9:16 --v 7 --style raw --no faces directly visible text watermarks bright colors logos smiling people","ideogram_prompt":"9:16 vertical 1080x1920, top third: dark charcoal background, white uppercase text Montserrat Bold 44pt: 'Quando foi a última revisão do seu UPS?', below in electric blue #2563EB 32pt: 'Bateria degrada em silêncio.', center space reserved for photo overlay, bottom third: solid blue #2563EB rectangle, white text Bold 28pt: 'Diagnóstico gratuito esta semana', subtext Regular 22pt white: 'Perttech · 30 anos · Grande SP e ABC', Perttech logo white 120px bottom centered.","canva_guide":"Formato principal: 1080x1920px (9:16 Stories). Foto Midjourney no centro (60% da altura). Faixa de texto superior: fundo charcoal #1a1a1a, hook em branco Montserrat Bold 40pt, linha azul elétrico como separador. Faixa de texto inferior: fundo azul #2563EB, CTA em branco Bold 28pt, linha 2 Regular 22pt, logo Perttech branco. Safe zones Stories: 250px do topo (espaço para @username do Meta) e 250px do rodapé (espaço para swipe up/link). Exportar também em 4:5 (1080x1350) como versão de feed adaptada."}],"ab_test_guide":{"combinations":["Teste 1 (Semana 1-2) — Fundo de funil: V2 (Resultado/Promessa) vs V1 (Dor/Custo). Mesma audiência, mesmo budget R$250/semana cada. Objetivo: descobrir se o ICP está em modo dor-reconhecimento (V1 ganha) ou pronto para converter (V2 ganha).","Teste 2 (Semana 2-3) — Meio de funil: V3 (Carrossel educacional) standalone como always-on. Budget R$150/semana. Objetivo: qualificar audiência fria com conteúdo técnico antes do remarketing.","Teste 3 (Semana 3-4) — Topo: V4 (Prova Social/30 anos) vs V5 (Urgência/Preventivo). Audiência fria de gestores de TI + Facilities Manager. Budget R$200/semana cada. Objetivo: identificar ângulo de awareness que gera mais cliques qualificados.","Teste 4 (Semana 4+) — Winner do Teste 1 × Winner do Teste 3 em audiência de remarketing (visitantes do site). Budget total R$300/semana."],"success_metrics":{"ctr_min":"1,5% (Meta Ads B2B — abaixo disso rever criativo antes de escalar budget)","cpc_max":"R$ 15 (Meta Ads — aceitável para B2B enterprise; se CPC > R$15 com CTR baixo, pausar e revisar segmentação)","cpl_max":"R$ 80 (alinhado com Cenário B do ee-s2-diagnostico-midia — 45 leads/mês com R$4k investimento)"},"test_duration":"7 dias mínimo por variação — com mínimo de 1.000 impressões por variação antes de qualquer decisão de corte","cut_criteria":"Pausar variação se: CTR < 0,8% após 1.000 impressões e 3 dias completos de veiculação, OU CPC > R$20 após R$100 de gasto sem nenhuma conversão registrada. Nunca pausar antes de 72h mesmo com métricas ruins — o algoritmo Meta precisa de aprendizado mínimo."},"production_brief":{"priority_order":["V2 (Resultado)","V1 (Dor)","V3 (Carrossel)","V4 (Prova Social)","V5 (Urgência)"],"generation_tools":{"static_images":"Midjourney v7 — usar prompts exatos desta skill. Gerar 4 opções por variação e selecionar a mais próxima do conceito visual descrito.","text_overlays":"Ideogram 2.5 — para slides com texto integrado na imagem (V3 Carrossel e V4 alternativa). Gerar 2 opções e selecionar.","final_assembly":"Canva Pro — seguir guias de montagem de cada variação. Usar kit de marca Perttech com logo e fontes Montserrat."},"semi_manual_steps":["1. Copiar prompts Midjourney de cada variação e gerar no Midjourney v7 (4 opções/variação = 20 imagens no total)","2. Para V3 carrossel e V4 texto puro: gerar no Ideogram com os prompts fornecidos (2 opções/slide = 12 imagens)","3. Selecionar a melhor imagem de cada variação e importar para o Canva","4. Montar cada peça seguindo o canva_guide específico da variação","5. Exportar em todos os formatos indicados (1080x1080, 1080x1350, 1080x1920) — total de 16 peças","6. Revisar checklist: logo presente, CTA visível, safe zones respeitadas, DHL/Vopak/Wurth ausentes"],"when_real_photos_available":"Substituir imagens Midjourney de V1 e V2 prioritariamente com fotos reais de: (a) técnico Perttech em campo com cliente enterprise, (b) equipamento UPS aberto/em manutenção, (c) sala de servidores real. Fotos reais do ambiente e equipe superam sintético em 30-60% de CTR em B2B — vale o investimento em um dia de shooting quando budget permitir."},"total_pieces":16},"ee-s3-crm-setup":{"summary":"Pipeline de 8 etapas para a Perttech no Kommo CRM, espelhando o funil real de negociação: da entrada do lead até homologação enterprise e upsell pós-serviço. Cobre dois fluxos: avulso emergencial (ciclo de horas/dias) e contrato anual (5-15 dias, Compras envolvida). Regra crítica: score 4-5★ em < 15 min pela Cristiane — score 1-3★ na régua automática.","summary_headline":"Pipeline 8 etapas espelha o funil real da Perttech: Qualificação → Diagnóstico → Levantamento → Proposta → Homologação → Negociação — score 4-5★ atendido em < 15 min, upsell pós-serviço avulso automático.","summary_highlights":[{"category":"posicao","label":"Etapas do pipeline","value":"8 etapas","subtext":"Qualificação · Diagnóstico · Levantamento · Proposta · Homologação · Negociação","tone":"blue"},{"category":"maturidade","label":"Régua de boas-vindas","value":"3 mensagens / 48h","subtext":"Imediata + 24h + 48h — WhatsApp exclusivo (ICP não responde e-mail frio)","tone":"green"},{"category":"maturidade","label":"Régua de nutrição","value":"4 touchpoints / 30 dias","subtext":"Semanas 1-4 — WhatsApp + e-mail quando disponível","tone":"green"},{"category":"oportunidade","label":"SLA score 4-5★","value":"< 15 minutos","subtext":"Lead de emergência esfria em 30 min — regra não pode ser ignorada","tone":"green"},{"category":"risco","label":"CRM inexistente hoje","value":"Zero histórico","subtext":"Kommo a contratar — sem base de leads para importar na largada","tone":"red"},{"category":"risco","label":"E-mails de leads","value":"Provavelmente nulos","subtext":"Meta Lead Ads capta só telefone — e-mail da nutrição depende de campo extra no form","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"A Perttech tem um diferencial de CRM raro para o segmento: lead de emergência com score 4-5★ (nobreak falhando agora, decisor em linha direta) pode ser atendido em < 15 minutos pela Cristiane enquanto qualquer concorrente sem CRM trata esse lead como um número na lista. Tempo de resposta < 30 minutos é o fator #1 de conversão em serviços emergenciais B2B."},{"category":"contexto","text":"O funil atual da Perttech é 100% manual: orçamento por telefone/e-mail/WhatsApp sem rastreabilidade. A Cristiane Ramos e Cristiane Tavares operam sem pipeline visual, sem score e sem automação. Toda conversão depende de memória e reação — o que funciona com indicação mas vai falhar em escala quando as campanhas gerarem volume."},{"category":"ameaca","text":"Sem score claro, Cristiane vai tratar um lead de 'consulta de preço sem urgência' com o mesmo esforço de um 'coordenador de TI com nobreak falhando agora'. O lead quente vai esfriar enquanto o SDR gasta energia no lead frio. A régua automática para score 1-3★ existe para resolver exatamente isso."},{"category":"acao","text":"Ações imediatas: (1) Contratar Kommo plano Avançado (~R$120-180/usuário/mês — mínimo 2 usuários: Cristiane Ramos + Cristiane Tavares). (2) Verificar se 11 96262-0311 é número ativo no WhatsApp Business. (3) Configurar pipeline antes de subir qualquer campanha — sem CRM, leads de anúncio entram e somem."}],"key_insight":{"headline":"Lead score 4-5★ atendido em < 15 minutos — essa é a regra que a Cristiane precisa respeitar sem exceção.","context":"O ICP da Perttech (Ricardo Silva, Coordenador de Infraestrutura) está em emergência quando busca no Google por 'manutenção nobreak urgente ABC'. Ele não está comparando fornecedores — ele está decidindo em minutos quem vai ligar primeiro. Se a Perttech responder em < 15 minutos e o concorrente em 2 horas (ou não responder), a venda é da Perttech. Se a Perttech demorar, perde para quem estava mais rápido — mesmo que seja tecnicamente inferior. O score 4-5★ é o gatilho dessa regra.","numbered_reasons":["(1) Lead B2B de emergência tem decisão tomada em 15-30 minutos — se o técnico não está em contato nesse janela, o Ricardo já ligou para o concorrente seguinte","(2) Cristiane Ramos e Cristiane Tavares hoje não têm como distinguir visualmente qual lead é emergência vs curiosidade passiva — o score resolve isso com um campo obrigatório na qualificação","(3) A nutrição automática para score 1-3★ captura os leads morenos sem desgastar o SDR humano — Cristiane foca 100% no que pode fechar, bot cuida do resto por 30 dias"],"discussion_anchor":"Esta regra precisa de suporte operacional: Cristiane Ramos (Supervisora Comercial) precisa ter notificação de lead novo no celular, 24/7 em dias úteis, com SLA de resposta de 15 minutos para score 4-5★. Se ela não puder honrar isso em determinado período, deve-se configurar redistribuição de lead para Cristiane Tavares. Se a regra quebrar nos primeiros 30 dias, o A/B dos criativos não vai ter dados de conversão válidos."},"honesty_alert":"3 limitações: (1) Kommo precisa ser contratado do zero — a Perttech não tem CRM. Plano Avançado recomendado para Salesbot ilimitado (~R$120-180/usuário/mês). Verificar com Altair viabilidade financeira antes de configurar. (2) WhatsApp Business API (para volume alto) vs WhatsApp Web (gratuito, para início): recomendado começar com WhatsApp Web no número 11 96262-0311. Se volume de leads superar 50/mês, migrar para API via 360dialog ou Gupshup. (3) E-mail na régua de nutrição só funciona se o formulário de captação (LP ou Meta Lead Ads) incluir campo de e-mail obrigatório. Sem e-mail capturado, as 3 mensagens de nurturing ficam só no WhatsApp — o que é suficiente para o ICP B2B desta Perttech.","pipeline_stages":[{"order":1,"name":"Lead Novo","description":"Novo contato entrou — qualquer origem. Ainda não qualificado. Salesbot de boas-vindas dispara automaticamente. Cristiane tem até 15 min para atribuir Score se vier de Google Ads (lead de busca ativa = alta intenção).","entry_criteria":"Lead criado via formulário, WhatsApp, Meta Lead Ads ou Google Ads","exit_criteria":"Cristiane atribuiu Score SDR e confirmou pelo menos nome + empresa + problema/interesse","auto_actions":["Disparar Salesbot Boas-Vindas imediatamente via WhatsApp","Tag de Origem aplicada automaticamente","Notificar Cristiane Ramos no app Kommo"]},{"order":2,"name":"Qualificado","description":"Cristiane confirmou: empresa no ICP B2B + problema elétrico real identificado + Score SDR atribuído. Aqui decide-se o fluxo: score 1-2★ vai para nutrição automática; score 3★ recebe follow-up humano em 48h; score 4-5★ avança direto para agendamento.","entry_criteria":"Score SDR atribuído (campo obrigatório para sair de Lead Novo). Pelo menos 1 campo de Tipo de Atendimento e Equipamento Principal preenchidos.","exit_criteria":"Data de visita confirmada com o cliente. Para score 1-2★: entrada na régua de nutrição (não avança no pipeline).","auto_actions":["Score SDR obrigatório — bloqueia saída de Lead Novo sem preenchimento","Se Score 1-2★: tag 'Nutrição Automática' + disparar Salesbot de Nutrição","Se Score 3★: criar tarefa para Cristiane 'Follow-up em 48h'","Se Score 4-5★: alerta sonoro prioritário no app Kommo para Cristiane Ramos"]},{"order":3,"name":"Diagnóstico Agendado","description":"Data e hora de visita técnica ou reunião comercial confirmadas com o cliente. Dois sub-fluxos: (A) Avulso emergencial — técnico vai ao cliente com ferramentas e peças para resolver na mesma visita. (B) Contrato anual — visita comercial da Cristiane para levantamento de infraestrutura e apresentação da proposta de contrato.","entry_criteria":"Campo 'Data da Visita' preenchido. Técnico ou Cristiane designado.","exit_criteria":"Visita realizada. Para avulso: técnico registrou no CRM o equipamento atendido, problema e solução. Para contrato: levantamento de infraestrutura documentado.","auto_actions":["Enviar confirmação WhatsApp ao cliente 24h antes: 'Olá, {nome}! Confirmando a visita técnica amanhã às [hora] na sua empresa. Nosso técnico já vai preparado para o equipamento. Qualquer dúvida: 11 96262-0311.'","Criar tarefa interna: técnico responsável + endereço + equipamento a atender","Para avulso 4-5★: disparar alerta se técnico não registrar resultado em até 4h após o horário agendado"]},{"order":4,"name":"Levantamento Concluído","description":"Técnico realizou o diagnóstico no site do cliente. Infraestrutura mapeada: equipamentos, marcas, modelos, estado atual, SLA necessário, riscos identificados. Esse estágio existe porque, para contratos anuais, o levantamento técnico precede a proposta formal — Cristiane não envia proposta sem dados do técnico. Para avulso simples, pode pular direto para Proposta Enviada.","entry_criteria":"Técnico registrou no lead: lista de equipamentos + diagnóstico + escopo do serviço/contrato recomendado.","exit_criteria":"Cristiane enviou orçamento (avulso) ou proposta de contrato formal (contrato anual).","auto_actions":["Notificar Cristiane: 'Levantamento de {empresa} concluído — preparar proposta'","Criar tarefa: 'Enviar proposta para {nome} em até 24h'","Para avulso de emergência resolvida na mesma visita: avançar diretamente para Fechado-Ganho com OS registrada"]},{"order":5,"name":"Proposta Enviada","description":"Orçamento de serviço avulso OU proposta formal de contrato anual entregue ao cliente (WhatsApp, e-mail ou presencialmente). Contém: escopo, SLA, valor, condições de pagamento. Para contratos: inclui cláusula de retorno sem custo se não resolver na primeira visita.","entry_criteria":"Documento de proposta/orçamento enviado e confirmado como recebido pelo cliente.","exit_criteria":"Cliente deu retorno: aprovação, pedido de ajuste ou encaminhou para Compras.","auto_actions":["Registrar data de envio da proposta (campo obrigatório)","Criar tarefa automática: 'Follow-up proposta {empresa} em 48h' se não houver resposta","Tag 'Temperatura: Quente' aplicada automaticamente","Alerta se lead ficar > 5 dias em Proposta Enviada sem movimentação: 'Proposta para {empresa} sem resposta há 5 dias — contatar hoje'"]},{"order":6,"name":"Em Homologação / Aprovação","description":"Proposta encaminhada para Compras, TI Corporativo ou Jurídico do cliente. Estágio crítico para clientes enterprise: processo de homologação de novo fornecedor pode levar 5-15 dias úteis. Cristiane precisa manter contato com o iniciador técnico (não Compras diretamente) para acompanhar o processo internamente.","entry_criteria":"Cliente confirmou que encaminhou para Compras/decisor interno. OU: avulso de alto ticket aguardando aprovação do gestor de facilities.","exit_criteria":"Aprovação de Compras recebida OU contraproposta solicitada (vai para Negociação) OU recusa.","auto_actions":["Criar tarefa recorrente: 'Follow-up homologação {empresa} a cada 3 dias úteis'","Alerta se lead ficar > 15 dias sem movimentação: 'Homologação {empresa} parada há 15 dias — acionar Ricardo Silva (iniciador técnico)'","Tag 'Fase Decisória: Compras Envolvida' ou 'Jurídico/Homologação'"]},{"order":7,"name":"Em Negociação de Condições","description":"Compras ou cliente solicitou ajuste de preço, escopo, prazo de pagamento ou condições do contrato. Cristiane aciona Altair para decidir margem de desconto ou contrapartida (ex: desconto em troca de contrato mais longo). Não ceder sem contrapartida registrada.","entry_criteria":"Contraproposta recebida por escrito (WhatsApp ou e-mail) — nunca negociar por telefone sem registro.","exit_criteria":"Acordo final fechado (avançar para Fechado-Ganho) ou impasse sem solução (Fechado-Perdido).","auto_actions":["Tag 'Negociação em andamento' + notificar Altair Lima Bitencourt automaticamente","Criar tarefa: 'Definir contrapartida para {empresa} — Altair decide em 24h'","Registrar todas as contrapropostas no histórico do lead (campo 'Notas de Negociação')"]},{"order":8,"name":"Fechado-Ganho","description":"Contrato assinado ou OS aprovada. Pagamento confirmado ou faturamento emitido. Para contratos anuais: data de vencimento registrada, lembrete de renovação configurado para 60 dias antes. Para avulso: verificar abertura para upsell de contrato anual — Cristiane faz abordagem 30 dias após serviço entregue.","entry_criteria":"Assinatura, aprovação formal ou pagamento confirmado.","exit_criteria":"N/A — estágio final positivo.","auto_actions":["Tag 'Produto Final' obrigatório antes de fechar como Ganho","Para Contrato Anual: registrar data de vencimento + criar lembrete automático 60 dias antes: 'Renovação do contrato com {empresa} em 60 dias — iniciar abordagem'","Para Serviço Avulso: criar tarefa em 30 dias: 'Upsell pós-serviço — ligar para {nome} e apresentar contrato anual'","Enviar mensagem WhatsApp de encerramento: 'Obrigada, {nome}! Tudo certo por nossa parte. Qualquer necessidade, pode me chamar diretamente: 11 96262-0311. É um prazer ter a {empresa} com a gente.'"]},{"order":9,"name":"Fechado-Perdido","description":"Lead não converteu. Campo 'Motivo de Perda' OBRIGATÓRIO. Dados de perda são o principal insumo para o ee-s4-diagnostico-comercial e para ajuste de copy/criativo nas próximas rodadas.","entry_criteria":"Lead recusou formalmente ou parou de responder após todas as tentativas.","exit_criteria":"N/A — estágio final negativo. Não excluir o lead.","auto_actions":["Campo 'Motivo de Perda' obrigatório: Preço acima do budget | Escolheu concorrente | Processo de homologação não aprovado | Sem urgência no momento | Burocracia interna travou | Lead sumiu após proposta | Outro","Tag 'Nutrição concluída sem resposta' se vier da régua de 30 dias","Criar tarefa em 90 dias: 'Reativação — {empresa} perdida por [motivo] há 3 meses — nova abordagem?'"]}],"tags":{"origin":["Meta Ads","Google Ads","Indicação de Cliente","Indicação de Parceiro (Engenharia)","Site Orgânico","WhatsApp Orgânico","GMB","Evento / Visita Comercial","Outro"],"score":["1★ — Curiosidade passiva, sem urgência, empresa fora do ICP → Nutrição automática","2★ — Interesse demonstrado, empresa no ICP, sem urgência declarada → Nutrição automática","3★ — Problema elétrico confirmado, empresa no ICP, prazo indefinido → Follow-up manual em 48h","4★ — Emergência confirmada OU contrato com prazo em < 30 dias, decisor direto → Cristiane em < 15 min","5★ — Emergência ativa AGORA ou licitação em andamento, decisor em contato direto → Cristiane em < 5 min, prioridade máxima"],"tipo_atendimento":["Emergência — sistema parado ou prestes a parar, atendimento imediato","Corretivo Agendado — problema identificado, visita marcada sem urgência de horas","Preventivo — manutenção preventiva semestral ou anual programada","Contrato Novo — proposta de contrato anual para novo cliente","Renovação de Contrato — cliente ativo com contrato próximo do vencimento","Upsell Pós-Serviço — avulso convertendo para contrato anual","Venda de Produto — nobreak, estabilizador ou bateria"],"equipamento_principal":["UPS Industrial (> 3kVA)","Nobreak Rack / Torre (até 3kVA)","Estabilizador","Banco de Baterias","Sistema Híbrido (UPS + gerador)","Estabilizador Industrial","Outro"],"fase_decisoria":["Iniciador Técnico (TI / Manutenção / Facilities) — tem autoridade em emergência","Compras Envolvida — processo formal de cotação","Homologação / Jurídico — contrato enterprise em aprovação","Diretoria / Decisor Final — aprovação de alto ticket"],"products":["Contrato Anual de Manutenção","Serviço Avulso On-Site","Serviço Avulso Balcão","Venda de Nobreak","Venda de Estabilizador","Vistoria Técnica Inicial"],"temperature":["Frio — sem engajamento após 2 contatos ou score 1-2★","Morno — respondeu, tem problema, sem urgência ou prazo definido","Quente — visita agendada ou proposta enviada","Urgente — emergência ativa, score 4-5★, atendimento em andamento"]},"welcome_sequence":[{"order":1,"timing":"imediata","channel":"whatsapp","message":"Olá, *{nome}*! Sou a Cristiane, da Perttech.\nRecebi seu contato sobre manutenção de sistemas elétricos. Que bom!\nPosso te ligar agora para entender o que você precisa — qual é o melhor horário?"},{"order":2,"timing":"24h_sem_resposta","channel":"whatsapp","message":"Oi, *{nome}*! Passando pra não deixar passar.\nEmpresas que operam 24/7 costumam deixar essa conversa para depois — e a gente só se fala quando já virou emergência.\nSe quiser adiantar: qual equipamento tem te preocupado?"},{"order":3,"timing":"48h_sem_resposta","channel":"whatsapp","message":"Última mensagem, *{nome}*. Prometo! 😊\nSe manutenção preventiva de sistemas elétricos for algo que sua empresa precisa estruturar, me responde *'quero conversar'* que entro em contato em seguida.\nSe não for o momento, fico por aqui quando precisar."}],"nurture_sequence":[{"week":1,"channel":"whatsapp + email","message_type":"conteudo_de_valor","whatsapp_message":"Oi, *{nome}*! Dica técnica rápida da Perttech:\nBateria de nobreak com mais de 3 anos sem revisão pode estar operando com menos de 60% da capacidade original — sem nenhum alarme visível.\nO equipamento da sua empresa tem revisão em dia?","email_subject":"Seu nobreak está operando com capacidade real? Um teste rápido revela","email_body":"Olá, {nome}!\n\nUma informação técnica que a maioria dos gestores de TI e Infraestrutura só descobre na hora errada:\n\nBaterias de nobreak degradam em silêncio. Depois de 3-4 anos de uso, a capacidade residual pode estar abaixo de 60% sem nenhum alarme ou indicador visual. A pane elétrica revela o problema da forma mais cara possível: com a operação parada.\n\nA manutenção preventiva semestral existe para detectar isso antes — com relatório de capacidade de bateria, análise de carga e recomendação de substituição com prazo.\n\nSe quiser verificar como está o estado dos equipamentos da sua empresa, posso agendar uma visita técnica de diagnóstico gratuita.\n\nÉ só responder este e-mail ou me chamar no WhatsApp: 11 96262-0311.\n\nAbraços,\nCristiane Ramos\nPerttech — Supervisora Comercial"},{"week":2,"channel":"whatsapp + email","message_type":"caso_de_sucesso","whatsapp_message":"Oi, *{nome}*! Uma situação que vivemos com frequência:\nEmpresa com operação 24/7 nos chamou em emergência — nobreak falhou na virada de turno da madrugada. Técnico chegou, resolveu na primeira visita.\nHoje têm contrato anual com a gente e não passam por isso mais. Posso contar como funciona?","email_subject":"Como uma empresa 24/7 parou de perder o sono com pane elétrica — história real","email_body":"Olá, {nome}!\n\nDeixa eu te contar uma situação que se repete bastante:\n\nUm coordenador de infraestrutura de uma empresa que opera 24/7 no ABC nos ligou às 2h da manhã. Nobreak do rack de servidores tinha dado pane. Ele estava há três horas tentando achar fornecedor disponível. Ligou pra Perttech como última tentativa.\n\nO técnico foi, chegou com as peças certas, resolveu na mesma visita. Operação voltou antes das 5h.\n\nDois meses depois, essa empresa fechou contrato anual com a gente. Hoje, o coordenador tem o número da Perttech salvo como 'emergência elétrica — resolve' — não mais como 'mais um no Google'.\n\nA diferença: técnico que vai preparado para o equipamento específico, não para uma visita de diagnóstico sem resolução.\n\nSe quiser entender como funciona o contrato anual da Perttech para empresas da Grande SP e ABC, é só responder ou me chamar no WhatsApp: 11 96262-0311.\n\nCristiane Ramos\nPerttech"},{"week":3,"channel":"whatsapp","message_type":"diferencial_produto","whatsapp_message":"Oi, *{nome}*! O que diferencia a Perttech na prática:\nTécnico vai preparado para o equipamento *específico* da sua empresa — não para uma visita de diagnóstico sem resolução.\n30 anos. Multimarca. _Resolve na 1ª visita ou retornamos sem custo adicional._\nFaz sentido conversar?"},{"week":4,"channel":"whatsapp + email","message_type":"oferta_cta","whatsapp_message":"Última mensagem, *{nome}*.\nEsta semana ainda temos vagas para visita técnica de diagnóstico *gratuita* para empresas na Grande SP e ABC.\nSe quiser garantir a sua: responde *'diagnóstico'* que agendo.\nQualquer coisa, fico por aqui. 👋","email_subject":"Visita técnica de diagnóstico gratuita — últimas vagas desta semana","email_body":"Olá, {nome}!\n\nÚltima mensagem desta sequência — quero ser direto:\n\nEsta semana temos vagas disponíveis para visita técnica de diagnóstico gratuita para empresas na Grande SP e ABC. Sem compromisso.\n\nO que inclui:\n• Avaliação do estado atual dos seus equipamentos elétricos críticos\n• Relatório de capacidade de bateria e análise de carga\n• Recomendação de substituição ou manutenção preventiva com prazo e custo estimados\n\nSe fizer sentido para a sua empresa, é só responder este e-mail ou me chamar no WhatsApp: 11 96262-0311.\n\nSe não for o momento agora, tudo bem — pode guardar o contato para quando precisar.\n\nAbraços,\nCristiane Ramos\nPerttech — Supervisora Comercial\n11 96262-0311"}],"qualification_rules":{"score_criteria":{"1_star":"Curiosidade passiva. Perfil fora do ICP (residencial, empresa < 10 funcionários, produto de baixo ticket). Sem urgência declarada. Pergunta genérica de preço. → Régua de nutrição automática, sem esforço de SDR humano.","2_star":"Interesse demonstrado. Empresa alinhada ao ICP B2B, mas sem urgência clara ou timeline definido. Lead respondeu mas não tem problema elétrico confirmado. → Régua de nutrição automática + follow-up manual na semana 3.","3_star":"Problema elétrico confirmado. Empresa no ICP. Prazo indefinido ou burocracia de homologação. Tem interesse real mas sem urgência de horas/dias. → Follow-up manual pela Cristiane em 24-48h.","4_star":"Emergência confirmada (pane ativa ou iminente) OU interesse em contrato anual com prazo em < 30 dias. Decisor técnico (TI/Manutenção) em contato direto. → Cristiane Ramos entra em < 15 minutos.","5_star":"Emergência ativa AGORA — sistema parado ou prestes a parar. OU: licitação enterprise em andamento com prazo em < 7 dias. Decisor com poder de aprovação imediata. → Cristiane Ramos em < 5 minutos, prioridade absoluta acima de tudo."},"sla_by_score":{"4_and_5_star":"< 15 minutos (score 4★) ou < 5 minutos (score 5★) — notificação sonora no app Kommo para Cristiane Ramos","3_star":"Follow-up humano em 24-48h","1_and_2_star":"Salesbot assume — sem esforço humano até semana 3 ou até o lead responder"},"redistribution_rule":"Se Cristiane Ramos não puder atender em < 15 min (reunião, folga), lead score 4-5★ deve ser imediatamente redirecionado para Cristiane Tavares. Configurar no Kommo: se lead score 4-5★ não tiver tarefa assumida em 10 min, notificar Cristiane Tavares."},"kommo_setup_guide":{"step_1_pipeline":{"title":"PASSO 1 — Criar o pipeline","instructions":["Acesse Leads > ícone de engrenagem no pipeline","Renomeie as etapas para: Lead Novo | Em Contato | Visita Agendada | Proposta Enviada | Em Decisão | Fechado-Ganho","Adicione Fechado-Perdido como etapa especial (botão vermelho padrão do Kommo)","Configure Fechado-Perdido com campo obrigatório 'Motivo de Perda' (lista com as opções definidas nas tags)"]},"step_2_custom_fields":{"title":"PASSO 2 — Campos customizados","instructions":["Configurações > Campos > Criar campo para cada item:","Origem: tipo Lista — opções: Meta Ads | Google Ads | Indicação | Site Orgânico | WhatsApp Orgânico | GMB | Outro","Score SDR: tipo Lista — opções: 1★ | 2★ | 3★ | 4★ | 5★ — marcar como obrigatório na etapa 'Em Contato'","Produto de Interesse: tipo Lista — opções: Contrato Anual | Avulso On-Site | Avulso Balcão | Nobreak | Estabilizador | Vistoria","Temperatura: tipo Lista — opções: Frio | Morno | Quente","Motivo de Perda: tipo Lista — obrigatório apenas em Fechado-Perdido"]},"step_3_whatsapp":{"title":"PASSO 3 — Conectar WhatsApp","instructions":["Integrações > WhatsApp — selecionar 'WhatsApp Web' para início (gratuito)","Escanear QR Code com o número 11 96262-0311 (número principal da Perttech)","Verificar que o número está ativo no WhatsApp Business (não pessoal)","Configurar: mensagens recebidas pelo WhatsApp criam leads automaticamente na etapa 'Lead Novo' com tag 'WhatsApp Orgânico'","Testar enviando mensagem para o número e verificando entrada no pipeline"]},"step_4_salesbot_welcome":{"title":"PASSO 4 — Salesbot de Boas-Vindas","instructions":["Salesbot > Criar novo bot > Nomear: 'Boas-Vindas Perttech'","Trigger: Quando novo lead é criado | Condição: Origem = Meta Ads OU Google Ads OU Site Orgânico","Ação 1: Enviar Mensagem 1 imediatamente via WhatsApp (texto conforme welcome_sequence order 1)","Wait: 24 horas","Condição: Lead respondeu? → SIM: mover para 'Em Contato' + notificar Cristiane | NÃO: enviar Mensagem 2","Wait: 24 horas (total 48h desde o início)","Condição: Lead respondeu? → SIM: mover para 'Em Contato' | NÃO: enviar Mensagem 3","Após Mensagem 3: tag 'Frio' + disparar Salesbot de Nutrição"]},"step_5_salesbot_nurture":{"title":"PASSO 5 — Salesbot de Nutrição","instructions":["Salesbot > Criar novo bot > Nomear: 'Nutrição 30 dias Perttech'","Trigger: Lead com Score SDR = 1★ ou 2★ OU lead com tag 'Frio' após boas-vindas","Semana 1 (Dia 1): Enviar WhatsApp Nutrição Semana 1 + Email Semana 1 se e-mail disponível","Wait: 7 dias","Condição: Lead respondeu? → SIM: mover para 'Em Contato' + notificar Cristiane | NÃO: continuar","Semana 2 (Dia 8): Enviar WhatsApp Nutrição Semana 2 + Email Semana 2","Wait: 7 dias | Verificar resposta → mesmo fluxo","Semana 3 (Dia 15): Enviar WhatsApp Nutrição Semana 3 (sem e-mail)","Wait: 7 dias | Verificar resposta","Semana 4 (Dia 22): Enviar WhatsApp + Email Nutrição Semana 4","Ao final: Se não respondeu → mover para Fechado-Perdido com Motivo 'Nutrição concluída sem resposta'"]},"step_6_meta_integration":{"title":"PASSO 6 — Integração Meta Lead Ads (quando campanhas subirem)","instructions":["Integrações > Facebook > Conectar conta de anúncios da Perttech","Mapear campos do Lead Form para Kommo: Nome → Nome | Telefone → Telefone | E-mail → E-mail (adicionar campo e-mail no formulário Meta)","Tag automática: 'Origem: Meta Ads' ao criar lead","Lead criado automaticamente na etapa 'Lead Novo' → aciona Salesbot de Boas-Vindas","IMPORTANTE: adicionar campo personalizado no Lead Form Meta: 'O que você precisa?' com opções Manutenção Preventiva | Manutenção Corretiva/Emergência | Contrato Anual | Orçamento de Equipamento → mapear para campo 'Produto de Interesse' no Kommo"]},"step_7_google_ads":{"title":"PASSO 7 — Integração Google Ads via Make/Zapier","instructions":["Criar conta Make (ex-Integromat) ou Zapier","Trigger: Google Ads Lead Form Extension (disponível no Google Ads como extensão de formulário)","Ação: Criar contato no Kommo com tag 'Google Ads' + etapa 'Lead Novo'","Alternativa: Google Ads > Extensions > Lead Form > configurar webhook para Kommo API","Prioridade: configurar ANTES de subir campanhas Google — lead de emergência via Google Search precisa entrar no CRM imediatamente"]}},"test_checklist":[{"test":"TESTE 1: Pipeline","steps":["Criar lead manual: Nome 'Teste Pipeline', Empresa 'Empresa Teste', Telefone 11 00000-0000","Mover o lead por todas as 6 etapas clicando em arrastar no Kanban","Em 'Em Contato': verificar que campo Score SDR é obrigatório (não deixa avançar sem preencher)","Em 'Fechado-Perdido': verificar que campo Motivo de Perda é obrigatório","Atribuir todas as tags (Origem, Produto, Temperatura) e verificar que aparecem no cartão do lead","Excluir o lead de teste após verificação"],"passed":null},{"test":"TESTE 2: Salesbot de Boas-Vindas","steps":["Criar lead manual com WhatsApp real para teste (número da Cristiane Ramos)","Marcar Origem como 'Meta Ads' para acionar o trigger do Salesbot","Verificar que Mensagem 1 chega imediatamente no WhatsApp de teste","Não responder por 24h — verificar que Mensagem 2 chega no timing correto","Continuar sem responder — verificar Mensagem 3 às 48h","Verificar que após Mensagem 3 o lead recebe tag 'Frio'"],"passed":null},{"test":"TESTE 3: Salesbot de Nutrição","steps":["Criar lead de teste com Score SDR = 1★","Verificar que Salesbot de Nutrição dispara após trigger","Verificar estrutura do fluxo no editor visual do Salesbot (4 blocos de semana com delays de 7 dias)","Simular resposta em alguma semana e verificar que lead é movido para 'Em Contato' e Cristiane é notificada","Verificar que ao final (sem resposta) o lead vai para Fechado-Perdido com motivo 'Nutrição concluída sem resposta'"],"passed":null},{"test":"TESTE 4: Integração WhatsApp","steps":["Enviar mensagem de WhatsApp para o número 11 96262-0311 de um número externo","Verificar que a mensagem aparece como novo lead no Kommo (etapa 'Lead Novo', tag 'WhatsApp Orgânico')","Responder a mensagem pelo Kommo e verificar que o lead recebe a resposta no WhatsApp","Verificar formatação: *negrito* e _itálico_ aparecem corretamente no WhatsApp","Verificar histórico completo de mensagens dentro do lead no Kommo"],"passed":null},{"test":"TESTE 5: Cenário Real — Lead de Emergência","steps":["Simular lead de alta urgência: criar lead manual com Score SDR = 5★ e tag 'Meta Ads'","Verificar que notificação prioritária chega para Cristiane Ramos no app Kommo","Cronometrar tempo de resposta da Cristiane (meta: < 5 minutos para 5★)","Mover o lead de 'Lead Novo' → 'Em Contato' → 'Visita Agendada' em sequência rápida","Verificar que todas as tags obrigatórias podem ser preenchidas sem fricção durante o atendimento de emergência"],"passed":null}]},"ee-s3-forecast-midia":{"summary":"Forecast de 3 meses para a Perttech: investimento progressivo de R$3.000 (Mês 1) a R$5.000 (Mês 3), projetando 148 leads qualificados e 13 vendas no período com ROAS 3,5x ao final [E]. Google Search concentra 70% do budget — único canal com alta intenção de compra e zero concorrente em leilão no ABC/Grande SP. Pré-requisito absoluto: SSL+LP no ar antes de qualquer real investido.","summary_headline":"R$12K em 3 meses, ROAS 3,5x realista no Mês 3 — 70% para Google Search fundo (zero concorrente no leilão); sem SSL+LP o forecast inteiro não vai ao ar.","summary_highlights":[{"category":"posicao","label":"Budget total 3 meses","value":"R$ 12.000 [E]","subtext":"R$3K (Mês 1) → R$4K (Mês 2) → R$5K (Mês 3)","tone":"blue"},{"category":"oportunidade","label":"ROAS realista Mês 3","value":"3,5x [E]","subtext":"Conta nova, sem histórico — break-even em Mês 2, escala em Mês 3","tone":"green"},{"category":"oportunidade","label":"Leads projetados 90 dias","value":"148 leads [E]","subtext":"30 (M1) + 49 (M2) + 69 (M3) — CPL caindo com otimização","tone":"green"},{"category":"janela","label":"Break-even de ROAS","value":"Mês 2","subtext":"Mês 1 abaixo do break-even (1,7x) — normal em lançamento B2B","tone":"yellow"},{"category":"risco","label":"Pré-requisito bloqueante","value":"SSL + LP","subtext":"Sem LP com HTTPS, ROAS = 0 — todo lead vai para tela de erro","tone":"red"},{"category":"risco","label":"LTV não contabilizado","value":"Subestimado","subtext":"Ticket R$2.500 = 1ª transação; contratos anuais rendem R$6K-20K/ano","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"A Perttech é o único player do segmento de manutenção de nobreaks B2B no ABC/Grande SP sem concorrente em Google Ads. CPC estimado em R$3-8 [E] (vs R$8-18 com concorrência estabelecida) — cada dia de atraso no lançamento é um dia que a janela de dominância pode se fechar se a Danffer ou Recomex decidirem entrar no leilão."},{"category":"contexto","text":"O ROAS calculado no forecast usa apenas a primeira transação (ticket médio R$2.500 [E]). O modelo de negócio real da Perttech é recorrente: contratos anuais (Curva A) rendem R$6K-20K/ano por cliente. Um único contrato enterprise fechado via digital em Mês 1 já paga o budget do mês inteiro — o ROAS real, ajustado por LTV, é 3-5x maior do que o mostrado aqui."},{"category":"ameaca","text":"SSL expirado em www.perttech.com.br é o único bloqueio que pode zerar o forecast completo. Google Ads não aprova destinos sem HTTPS. Meta Ads rejeita anúncios com LP insegura. Sem LP própria com certificado válido, os R$12K de budget se tornam R$0 de retorno. Este risco é resolvível: ee-s3-landing-page em subdomínio (landing.perttech.com.br) com Let's Encrypt resolve em 1 dia de trabalho."},{"category":"acao","text":"Sequência de setup antes de gastar o primeiro real: (1) Instalar Meta Pixel no site atual — não depende de SSL, pode ser feito hoje. (2) Criar Google Ads + conversões. (3) Criar LP em subdomínio com HTTPS. (4) Lançar Google Search Emergência (cluster de mais alta intenção). (5) Meta awareness cargos TI/Facilities na semana seguinte. Nessa ordem — não inverter."}],"key_insight":{"headline":"Google Search Emergência com 40% do budget é a alocação mais alavancada: ICP em pânico + zero concorrente no leilão = CPL de R$60-80 [E] para um lead que fecha em horas.","context":"O Ricardo Silva que está no Google digitando 'manutenção nobreak urgente ABC' às 22h com o servidor parado não está comparando fornecedores — está ligando para quem aparecer primeiro. Se a Perttech estiver no topo com 'Técnico hoje, resolve na 1ª visita' e os concorrentes só estiverem no orgânico (posição 3-10), a Perttech vai capturar leads com intenção máxima de compra por CPC entre R$3 e R$8. Esse cluster sozinho pode gerar 40-60% de todas as vendas dos 3 meses com apenas 40% do budget.","numbered_reasons":["(1) Lead de emergência tem ciclo de venda de horas, não dias — a conversão lead→venda é 2-3x maior do que leads de topo (15-25% [E] vs 5-8% para leads de awareness)","(2) Zero dos 5 concorrentes identificados tem presença em Google Ads — a Perttech vai aparecer como único resultado pago no cluster de maior intenção do segmento","(3) CPC de emergência R$3-8 [E] gera CPL de R$40-80 [E] para o lead de mais alto valor (emergência → ticket R$800-3.000 + potencial de upsell para contrato anual)"],"discussion_anchor":"Se o Altair decidir distribuir o budget igualmente entre todas as fases (25% cada), vai diluir exatamente o cluster que paga o investimento inteiro. A concentração em fundo de funil precisa ser mantida nos primeiros 60 dias — depois que os dados de conversão por canal chegarem, redistribuir com base em CPL real, não em premissa."},"honesty_alert":"4 limitações: (1) Zero histórico de campanhas da Perttech — todos os números são [E] baseados em benchmarks B2B dos arquivos V4 + ajuste para ausência de concorrente no leilão. CPL real pode ser 30% melhor ou pior. (2) Ticket médio R$2.500 [E] é conservador: é a primeira transação. Contratos anuais assinados geram R$6K-20K/ano em recorrência — o ROI real de 12 meses é 3-5x o ROAS mostrado. (3) Taxa de conversão lead→venda de 8-10% assume CRM Kommo configurado e Cristiane respondendo score 4-5★ em < 15 minutos. Sem CRM, cada lead tem chance de se perder antes da venda. (4) Budget progressivo assume LP pronta e SSL válido no início do Mês 1. Qualquer atraso de 2+ semanas na LP empurra todos os números 1 mês à frente.","assumptions":["CPL Mês 1: R$100 [E] — 25% acima do benchmark (fase de aprendizado do algoritmo, primeiras 2 semanas de campanha ativa). Fonte: regra benchmark V4 'Mês 1 = CPL 20-30% acima' + orçamento R$3K (acima do limiar de R$2K onde penalização é maior).","CPL Mês 2: R$82 [E] — benchmark B2B (manutenção técnica sem concorrente em leilão). Fonte: benchmarks B2B 'Serviços B2B/Consultoria' (R$90 médio) ajustado -10% pelo campo sem disputa de leilão.","CPL Mês 3: R$72 [E] — 10% abaixo do benchmark com algoritmo otimizado e públicos refinados. Fonte: regra benchmark V4 'Mês 3 = CPL 10-15% abaixo'.","Ticket médio: R$2.500 [E] — mix de 65% avulso on-site (R$900 médio) e 35% primeiro pagamento/proposta de contrato anual (R$5.000). Não inclui LTV recorrente de contratos — subestimado intencionalmente para conservadorismo.","Taxa de conversão lead→venda: 5% (M1) / 8% (M2) / 10% (M3) [E]. Fonte: benchmark 'Serviços B2B — conversão reunião→venda 15-35%' × conversão WhatsApp→reunião 30-40% = 5-14% blended. Conservador por ser conta nova sem histórico.","Distribuição de budget: 70% Google Ads / 30% Meta Ads. Fonte: diagnóstico de mídia Perttech (ee-s2-diagnostico-midia) Cenário B — Google Search é canal primário de leads (alta intenção); Meta é canal de awareness e retargeting.","Google Search CPC: R$3-8 [E]. Fonte: ee-s2-diagnostico-midia — zero concorrente em leilão identificado (Recomex, Danffer, Seko, Central do Nobreak, RD Energia: todos sem Google Ads). Ref: benchmarks B2B Search R$15-40 com concorrência — ajustado para campo vazio.","Ramp-up: Mês 1 com budget R$3.000 (abaixo do steady state de R$4.000) por conta do tempo de setup e aprendizado do algoritmo. Campanhas ativas projetadas para 2,5 semanas do Mês 1 — setup ocupa a primeira semana.","Sazonalidade: sem ajuste específico para Meses 1-3 (maio-agosto). Fevereiro seria negativo (briefing: 'menos dias úteis') — não está neste janela de forecast. Mês 3 (agosto) próximo ao final do semestre industrial — potencial positivo para contratos preventivos.","ROAS calculado sobre primeira transação apenas. LTV de 12 meses (contratos anuais) tornaria o ROAS 3-5x maior — ver nota em honesty_alert."],"financial_model":[{"month":1,"label":"Ramp-up","budget":3000,"cpl":100,"leads":30,"conversion_rate":5,"sales":2,"revenue":5000,"roas":1.7,"notes":"Mês de setup e primeiras campanhas. Budget menor por conta do tempo de configuração (Google Ads, Meta BM, LP, Pixel). Apenas Google Search Emergência ativa desde a semana 3 — Meta awareness entra na semana 4. CPL mais alto por aprendizado do algoritmo. 2 vendas estimadas (arredondamento de 30 × 5% = 1,5). ROAS abaixo do break-even é esperado e normal em lançamento B2B."},{"month":2,"label":"Otimização","budget":4000,"cpl":82,"leads":49,"conversion_rate":8,"sales":4,"revenue":10000,"roas":2.5,"notes":"Primeiro mês completo com todas as campanhas ativas. Google Search Emergência + Preventivo + Meta awareness + remarketing (se pixel > 300 eventos). Otimizações: pausar keywords sem resultado, escalar ganhadores, lançar retargeting. ROAS de 2,5x indica que o canal está funcionando. Pixel acumula audiência para lookalike em Mês 3."},{"month":3,"label":"Escala","budget":5000,"cpl":72,"leads":69,"conversion_rate":10,"sales":7,"revenue":17500,"roas":3.5,"notes":"Escala do que funciona. Budget +25% concentrado em Google Search Emergência (melhor ROAS). Meta com lookalike se base > 500 visitantes. Segunda rodada de criativos (Midjourney V2 com fotos reais do time). ROAS 3,5x confirma modelo viável para escala. Decisão: manter R$5K/mês ou escalar para R$6-8K com base nos dados reais de CPL e conversão."}],"scenarios":{"realistic":{"label":"Realista — base do forecast","budget_total_3m":12000,"leads_total_3m":148,"sales_total_3m":13,"revenue_total_3m":32500,"avg_roas":2.7,"cpl_range":"R$72–R$100","notes":"Benchmark B2B sem concorrente em leilão, ajustado para campo novo. Break-even em Mês 2. ROAS 3,5x no Mês 3. CRM funcionando, Cristiane atendendo score 4-5★ em < 15 min."},"optimistic":{"label":"Otimista — CPL -20%, conversão +20%","budget_total_3m":12000,"leads_total_3m":184,"sales_total_3m":18,"revenue_total_3m":45000,"avg_roas":3.75,"cpl_range":"R$58–R$80","condition":"Criativos performam acima da média (CTR > 2%), LP com CVR > 8%, Cristiane com taxa de conversão > 12%, nenhum concorrente entra no leilão","notes":"Mês 1: CPL R$80, 38 leads, 2 vendas, ROAS 1,7x. Mês 2: CPL R$65, 61 leads, 6 vendas, ROAS 3,75x. Mês 3: CPL R$58, 86 leads, 10 vendas, ROAS 5,0x."},"pessimistic":{"label":"Pessimista — CPL +30%, conversão -20%","budget_total_3m":12000,"leads_total_3m":113,"sales_total_3m":7,"revenue_total_3m":17500,"avg_roas":1.46,"cpl_range":"R$94–R$130","condition":"Criativos com CTR baixo, LP com baixa performance, processo comercial ainda desorganizado (CRM sem adoção), algum concorrente entra no leilão no Mês 2","notes":"Mês 1: CPL R$130, 23 leads, 1 venda, ROAS 0,8x. Mês 2: CPL R$107, 37 leads, 2 vendas, ROAS 1,25x. Mês 3: CPL R$94, 53 leads, 4 vendas, ROAS 2,0x. Mesmo no pessimista, ROAS cresce — evidência de que o mercado responde. Ação: se Mês 1 chegar a CPL > R$130, parar Meta e dobrar Google Search antes de continuar."}},"platform_distribution":[{"platform":"Google Ads Search","percentage":70,"monthly_value":2800,"objective":"Capturar ICP em alta intenção de compra: emergência corretiva (40% do budget) + preventivo/contratos (30% do budget). Canal primário — zero concorrente em leilão. Único destino para o Ricardo Silva que está pesquisando às 22h com nobreak parado.","campaigns":["Cluster 1 — Emergência: R$1.120/mês (40% do Google). Keywords: 'manutenção nobreak urgente', 'nobreak quebrou empresa', 'técnico nobreak abc'","Cluster 2 — Preventivo/Contrato: R$840/mês (30% do Google). Keywords: 'contrato manutenção nobreak', 'manutenção preventiva nobreak empresa'","Cluster 3 — Marca/Competitors: R$280/mês (10% do Google). Brand defense + conquista de 'Danffer nobreak', 'Recomex nobreak'"],"start_week":"Semana 3 do Mês 1 (após LP no ar)"},{"platform":"Meta Ads","percentage":30,"monthly_value":1200,"objective":"Awareness para cargos TI/Facilities/Manutenção na Grande SP + remarketing de visitantes do site. Canal secundário para Mês 1-2; potencial de escala em Mês 3 com lookalike.","campaigns":["Campanha Awareness: R$600/mês (50% do Meta). Segmentação por cargo: Coordenador de TI, Gerente de Manutenção, Facilities Manager. Raio Grande SP. Creative: V1 (Dor) e V4 (Prova Social 30 anos)","Campanha Retargeting: R$400/mês (33% do Meta). Visitantes do site sem conversão. Ativa apenas após pixel > 300 eventos (estimativa: semana 3-4 do Mês 1). Creative: V2 (Resultado — promessa garantida)","Campanha Lookalike: R$200/mês (17% do Meta). Disponível apenas no Mês 3 após pixel > 500 eventos. Lookalike 1% de convertidos + visitantes"],"start_week":"Semana 4 do Mês 1 (awareness) / Mês 2 Semana 1 (retargeting após pixel acumular)"}],"funnel_distribution":[{"phase":"Topo","percentage":20,"monthly_value_ref":800,"objective":"Meta Ads awareness cargos TI/Facilities — criar consciência de marca entre o ICP que ainda não está em emergência. Acumulação de audiência para retargeting futuro.","note":"Percentual menor que o padrão 'marca nova 40-50%' porque o ICP B2B enterprise tem ciclo de pesquisa ativo (busca quando tem problema) — não precisa de tanta descoberta passiva quanto B2C"},{"phase":"Meio","percentage":25,"monthly_value_ref":1000,"objective":"Google Search preventivo/contratos + Meta consideration para visitantes que pesquisaram mas não converteram. Educacional — '5 sinais que seu nobreak vai falhar' + proposta de contrato anual."},{"phase":"Fundo","percentage":40,"monthly_value_ref":1600,"objective":"Google Search emergência — cluster de maior intenção e maior ROI. Lead em pânico com sistema parado, decidindo em minutos. Maior concentração de budget por ter zero concorrente e CPL mais baixo."},{"phase":"Remarketing","percentage":15,"monthly_value_ref":600,"objective":"Retargeting de visitantes do site sem conversão + RLSA Google (visitantes que pesquisaram novamente). Disponível a partir da semana 4 do Mês 1. Audiência de menor CPL após pixel acumular 300+ eventos."}],"timeline":[{"month":1,"focus":"Setup + Lançamento Google Search","goal":"Infraestrutura 100% configurada, primeiras 2 semanas de Google Search Emergência ativa, primeiras 30 leads e 2 vendas [E]. LP no ar com HTTPS válido.","weekly_actions":["Semana 1 — Setup total: (1) Instalar Meta Pixel em www.perttech.com.br (não depende de SSL — pode ser hoje). (2) Criar conta Google Ads + configurar conversões (WhatsApp click, formulário LP). (3) Criar Meta Business Manager + vincular @perttechnobreaks. (4) Criar GA4 e vincular ao site + LP. (5) Configurar Google Tag Manager para centralizar eventos.","Semana 2 — LP e criativos: (1) Criar LP landing.perttech.com.br com certificado Let's Encrypt (HTTPS gratuito). (2) Subir criativos Meta das variações V1 e V2 no Business Manager. (3) Estruturar campanhas Google Search: grupos de anúncio por cluster (Emergência / Preventivo / Marca). (4) Configurar extensões de anúncio: sitelinks, chamadas, snippets estruturados.","Semana 3 — Lançamento Google Search: (1) Publicar Google Search Emergência com budget diário R$70 (R$2.100/mês). (2) Publicar Google Search Preventivo com budget R$28/dia. (3) Monitorar primeiras impressões e CTR (meta: CTR > 3%). (4) Verificar LP: formulário funcionando, WhatsApp click rastreando, GA4 recebendo eventos.","Semana 4 — Meta awareness + CRM: (1) Publicar Meta Ads awareness (V1 + V4) para cargos TI/Facilities na Grande SP. (2) Verificar Kommo configurado e integrado — primeiro lead de campanha deve entrar no pipeline. (3) Relatório semana 1-4: primeiros leads, CPL estimado, qualidade dos leads (score SDR médio). (4) Decisão: alguma keyword com gasto > R$50 e zero clique? Pausar e substituir."]},{"month":2,"focus":"Otimização + Retargeting","goal":"Primeiros 49 leads [E], 4 vendas [E], CPL caindo para R$82 [E]. Retargeting Meta ativo (pixel > 300 eventos). ROAS 2,5x confirma viabilidade do canal.","weekly_actions":["Semana 5 — Análise e corte: (1) Revisar CPL por keyword cluster e por campanha (Google e Meta). (2) Pausar keywords com CPC > R$15 e zero conversão. (3) Escalar keywords com CPC < R$8 e CTR > 4%. (4) Verificar qualidade dos leads no Kommo: score médio, etapa onde estão, motivos de perda se houver.","Semana 6 — Retargeting: (1) Se pixel > 300 eventos: publicar campanha Meta retargeting (V2 — promessa garantida) para visitantes do site. Budget R$400/mês. (2) Lançar RLSA Google: ajuste de lance +30% para visitantes do site que pesquisam novamente. (3) Avaliar CTR dos criativos Meta: se V1 < 0,8% CTR, testar V3 (Carrossel 5 sinais).","Semana 7 — Teste A/B criativos: (1) Mês 2 semana 3 = dados suficientes para primeiro A/B. Testar V1 (Dor) vs V2 (Resultado) com orçamento igual R$300 cada por 7 dias. (2) Ajustar segmentação Meta se leads vindos de cargos fora do ICP (ex: B2C, pequenas empresas < 20 func). (3) Verificar pipeline Kommo: leads chegando da etapa 'Em Homologação' → tempo médio de fechamento para contratos.","Semana 8 — Revisão de Mês 2: (1) CPL real vs estimado: dentro de ±15%? Manter. > R$100? Reduzir Meta topo e realocar para Google Search fundo. (2) Winner do A/B criativos Meta: pausar perdedor, duplicar budget do vencedor. (3) Projetar Mês 3: se ROAS > 2,5x, escalar budget para R$5.000. Se ROAS < 1,5x, manter R$4.000 e investigar causa."]},{"month":3,"focus":"Escala dos Vencedores","goal":"69 leads [E], 7 vendas [E], CPL R$72 [E], ROAS 3,5x [E]. Segunda rodada de criativos com fotos reais se disponíveis. Lookalike Meta se base > 500 visitantes.","weekly_actions":["Semana 9 — Escala Google: (1) Aumentar budget Google Search Emergência +25% (de R$1.120 para R$1.400). (2) Publicar Google Display Remarketing (banner) com imagens V2 para visitantes que não converteram em 7+ dias. Budget R$300/mês. (3) Avaliar novas keywords de cauda longa: 'empresa manutenção nobreak industrial abc', 'contrato preventivo ups servidor'.","Semana 10 — Lookalike Meta: (1) Se visitantes únicos do site > 500: criar lookalike 1% no Meta e testar com budget R$400/semana por 2 semanas. (2) Se fotos reais do time Perttech estiverem disponíveis: subir novo criativo (versão 2 de V1 e V2 com imagens autênticas) e testar contra versão Midjourney. (3) Revisar motivos de perda no Kommo: padrão identificável? (ex: 'Processo burocrático de homologação' dominando) → ajustar copy para endereçar a objeção.","Semana 11 — Criativos V2: (1) Subir segunda rodada de anúncios com novas mensagens do banco do brandbook (headlines rotacionadas no RSA Google, novo copy no Meta). (2) Ativar V5 (Urgência — 'Sua última revisão de UPS foi há quanto tempo?') no Meta para audiência de retargeting. (3) Verificar score de qualidade Google Ads: todas as campanhas com score 'Bom' ou 'Excelente'? Se 'Ruim': rever relevância de landing page + extensões.","Semana 12 — Análise 90 dias: (1) Relatório completo para Altair: CPL real vs estimado, ROAS real vs forecast, leads por canal, conversões por etapa do pipeline, custo por venda. (2) Decisão de Mês 4: manter R$5K (se ROAS ≥ 3x), escalar para R$6-8K (se ROAS ≥ 4x), manter R$4K (se ROAS < 2,5x e investigar causa). (3) Identificar top-3 keywords e top-2 criativos para concentrar budget no Mês 4."]}],"alerts":[{"metric":"CPL","threshold":"> R$ 130 por 3 dias consecutivos em qualquer campanha","action":"Pausar a campanha com CPL mais alto. Verificar se o problema é (a) keyword fora do ICP, (b) landing page com erro ou (c) segmentação Meta muito ampla. Não aumentar budget antes de entender a causa."},{"metric":"CTR — Meta Ads","threshold":"< 0,8% após 1.000 impressões","action":"Criativo esgotado ou targeting errado. Trocar criativo imediatamente (usar próximo na fila: V1→V3→V5). Se CTR < 0,8% em todos os criativos testados: rever segmentação de público."},{"metric":"CTR — Google Search","threshold":"< 3% em keywords de emergência após 200 impressões","action":"Copy do anúncio não está ressonando. Testar nova headline com a promessa 'Resolve na 1ª visita ou retornamos sem custo'. Verificar se o quality score está penalizando por landing page relevância."},{"metric":"CPC — Google Search","threshold":"> R$ 12 em qualquer keyword de alta intenção","action":"Concorrente novo entrou no leilão. Verificar via Google Ads > Leilões quem é o novo player. Se for Danffer ou Recomex: aumentar lance máximo +20% para manter posição. Alertar operador imediatamente — a janela de CPC baixo pode estar fechando."},{"metric":"Frequência — Meta Ads","threshold":"> 3,0 em 7 dias na mesma audiência","action":"Audiência saturada. Ampliar targeting (add cargos adicionais: Gerente de Compras, Diretor de Operações) ou trocar criativo. Não manter campanha com frequência > 3,5 — CPM sobe e CTR cai."},{"metric":"LP — Disponibilidade","threshold":"Budget diário gasto e zero conversões em um dia inteiro","action":"Verificar imediatamente se landing.perttech.com.br está no ar com HTTPS válido. Clicar no anúncio manualmente. Se LP retornar erro ou aviso de segurança: pausar todas as campanhas imediatamente até resolver. Cada hora com campanha ativa e LP fora = dinheiro perdido."},{"metric":"Taxa de conversão LP","threshold":"< 3% (meta: 6-8% [E]) após 200 visitantes únicos","action":"Problema na LP, não nos anúncios. Revisar: (a) CTA acima do fold visível no mobile? (b) Formulário com mais de 3 campos? (c) Velocidade da página > 3s? (d) Número de WhatsApp clicável? Corrigir antes de aumentar budget."}],"scale_criteria":[{"metric":"CPL — Google Search Emergência","threshold":"< R$ 70 por 2 semanas consecutivas","action":"Aumentar budget dessa campanha específica em +25%. Não escalar Meta ao mesmo tempo — escalar um canal de cada vez para isolar o efeito."},{"metric":"ROAS — mensal","threshold":"> 3,5x por 1 mês completo","action":"Escalar budget total +30% no mês seguinte. Distribuição: 70% do incremento para Google Search fundo, 30% para Meta retargeting."},{"metric":"ROAS — mensal","threshold":"> 4,5x por 1 mês completo","action":"Dobrar budget em Google Search Emergência e criar campanha Performance Max no Google (inclui Search + Display + YouTube automaticamente). Discutir com Altair: pipeline consegue absorver o dobro de leads sem perder qualidade de atendimento?"},{"metric":"Pixel Meta — base de visitantes","threshold":"> 500 visitantes únicos acumulados","action":"Criar lookalike 1% no Meta e lançar como nova campanha de aquisição com budget R$400/semana por 2 semanas de teste antes de escalar."},{"metric":"Taxa de conversão — pipeline Kommo","threshold":"> 12% lead→venda por 2 semanas consecutivas","action":"Processo comercial validado. Escalar budget total em +40% e contratar SDR adicional ou definir turnos de atendimento para a Cristiane Ramos garantir SLA de 15 minutos mesmo em volume alto."}],"pre_launch_checklist":["✗ Meta Pixel instalado em www.perttech.com.br (não depende de SSL)","✗ GA4 configurado e coletando dados","✗ Google Ads conta criada + conversões configuradas (WhatsApp click + formulário)","✗ Meta Business Manager criado + @perttechnobreaks vinculado","✗ LP landing.perttech.com.br no ar com HTTPS válido (Let's Encrypt)","✗ Formulário LP com campos: Nome + Empresa + Telefone + 'O que você precisa?'","✗ Kommo CRM configurado + Cristiane Ramos treinada no pipeline","✗ Número 11 96262-0311 no WhatsApp Business + conectado ao Kommo","Nenhuma campanha deve ir ao ar sem TODOS os itens acima marcados"],"disclaimer":["Todos os números deste forecast são estimativas [E] baseadas em benchmarks B2B da V4 Company, ajustados para o contexto de campo sem concorrente em Google Ads no segmento de manutenção de nobreaks B2B. Sem histórico de campanhas da Perttech para calibrar. CPL real pode variar ±30-40% nos primeiros 60 dias.","ROAS calculado sobre primeira transação (ticket médio R$2.500 [E]). Não inclui LTV de contratos anuais (R$6K-20K/ano por cliente). O retorno real de 12 meses é significativamente maior do que o ROAS mostrado aqui — apresentar para o Altair com essa ressalva.","O forecast assume LP com HTTPS válido e CVR de 6-8% [E]. Se a LP não estiver pronta ou tiver CVR < 3%, os números são inválidos — todos os CPLs dobram ou triplicam com CVR ruim.","Algoritmos de Meta e Google Ads exigem 30-50 conversões registradas para sair da 'fase de aprendizado' e otimizar automaticamente. As primeiras 4-6 semanas de campanha terão CPL mais alto e performance menos estável — é esperado e não é sinal de fracasso.","A janela de CPC baixo (R$3-8 [E]) existe hoje porque nenhum concorrente está em Google Ads. Se Danffer, Recomex ou outro player entrar no leilão enquanto a Perttech está em setup, o CPC sobe imediatamente. Cada semana de atraso no lançamento é uma semana da janela sendo desperdiçada.","Taxa de conversão lead→venda (8-10% [E]) depende diretamente do CRM Kommo funcionando e da Cristiane Ramos atendendo leads score 4-5★ em < 15 minutos. Sem CRM adotado, a taxa real pode cair para 3-5% — eliminando boa parte do ROAS projetado."],"sheets_url":null,"sheets_note":"GOG CLI pendente de configuração. URL da planilha será gerada quando o CLI estiver disponível. Dados do forecast prontos para exportação manual caso necessário."},"ee-s3-gmb-otimizacao":{"summary":"Conteúdo completo para otimização do GMB da Perttech: descrição SEO de 610 caracteres com keywords de manutenção de nobreak + ABC Paulista, 6 categorias, 6 serviços cadastrados, 4 posts para 30 dias e 5 Q&As baseadas nas objeções reais do ICP. Maior alavanca identificada: coletar 3-5 reviews de clientes enterprise com keywords reais — zero reviews hoje é o principal gargalo de ranking no pack local. Passo zero obrigatório: reivindicar acesso admin ao GMB antes de qualquer implementação.","summary_headline":"Reviews de clientes enterprise com keywords reais são a maior alavanca de ranking local da Perttech — zero avaliações hoje vs. concorrentes com 4.8★ decide o pack de 3 antes da descrição ou dos posts.","summary_highlights":[{"category":"risco","label":"Acesso ao GMB","value":"Sem acesso admin","subtext":"Link disponível é de compartilhamento — reivindicar via business.google.com é passo zero","tone":"red"},{"category":"risco","label":"Reviews atuais","value":"0 avaliações","subtext":"Concorrentes com 15+ reviews 4.8★ aparecem antes no pack local independente da qualidade técnica","tone":"red"},{"category":"posicao","label":"Categorias configuradas","value":"1 principal + 6 sec.","subtext":"Principal: 'Empresa de conserto de aparelhos elétricos' — mais específica disponível","tone":"blue"},{"category":"oportunidade","label":"Serviços cadastrados","value":"6 serviços","subtext":"Corretiva · Preventiva · Contrato Anual · Balcão · Ativação · Venda — com keywords e preços","tone":"green"},{"category":"oportunidade","label":"Posts prontos","value":"4 posts / 30 dias","subtext":"Apresentação · Oferta (diagnóstico gratuito) · Educativo (5 sinais) · Prova Social","tone":"green"},{"category":"risco","label":"Fotos disponíveis","value":"0 fotos reais","subtext":"Mínimo 10 fotos para ranking competitivo — tirar com celular é suficiente para começar","tone":"red"}],"summary_key_findings":[{"category":"ameaca","text":"Zero reviews no GMB é o principal gargalo de visibilidade local. O algoritmo do Google Maps usa quantidade + qualidade + recência de avaliações como sinal de proeminência — um concorrente com 15 reviews 4.8★ aparece antes da Perttech mesmo sendo tecnicamente inferior."},{"category":"vantagem","text":"A Perttech tem 30 anos de clientes satisfeitos e nunca pediu uma avaliação. Pedir para 3-5 contatos de confiança pelo WhatsApp hoje custa 10 minutos e pode mover o perfil para o pack local em 30-60 dias — maior ROI de SEO local disponível com custo zero."},{"category":"contexto","text":"Altair não tem acesso admin ao GMB — o link disponível (share.google/vPwwcUx5503ygNfSi) é de compartilhamento. Passo zero obrigatório: reivindicar o perfil via business.google.com antes de qualquer implementação de conteúdo."},{"category":"acao","text":"Sequência de implementação por impacto: (1) Reivindicar acesso GMB — 30 min; (2) Pedir 3 reviews para clientes de confiança — 10 min; (3) Publicar descrição SEO + categorias + serviços — 1h; (4) Publicar posts semanalmente — 15 min/semana; (5) Tirar 10 fotos reais — 30 min."}],"key_insight":{"headline":"Reviews de clientes enterprise com keywords reais ('manutenção de nobreak ABC Paulista') desbloqueiam o pack de 3 do Google Maps — e a Perttech tem 30 anos de clientes que nunca foram pedidos para avaliar.","context":"O algoritmo do Google Business Profile usa três sinais para rankear no pack local: relevância (categorias + keywords), distância (raio de atendimento) e proeminência (reviews + fotos + atividade). A Perttech tem relevância (segmento correto) e distância (sede em SBC com raio de 100km). O que falta é proeminência — e o ativo mais valioso para isso são reviews de clientes como DHL, Vopak e Wurth com keywords naturais. Um review do gestor de TI da DHL dizendo 'excelente manutenção de nobreak no ABC, técnico resolveu na primeira visita' vale mais para o algoritmo do que 10 posts bem escritos.","numbered_reasons":["(1) Zero reviews hoje significa que qualquer concorrente com 5+ avaliações aparece antes no pack local — independente da qualidade técnica ou dos 30 anos de mercado","(2) Reviews enterprise com keywords reais têm efeito de ranking desproporcional — combinam relevância (keyword do segmento), distância (local do cliente) e proeminência (nome reconhecível) em um único sinal","(3) A Perttech tem 30 anos de clientes satisfeitos com recomendação 5/5 no briefing — pedir avaliação por WhatsApp para 3-5 contatos de confiança é a ação de maior ROI disponível: custo zero, impacto mensurável em 30-60 dias"],"discussion_anchor":"Antes de qualquer post ou configuração de categoria, Altair precisa mandar a solicitação de review para 3 clientes hoje. É a única ação que move o ranking local antes que o GMB esteja 100% configurado."},"honesty_alert":"Perfil GMB sem acesso admin confirmado — o link disponível é de compartilhamento, não de gerenciamento. Nenhum conteúdo pode ser implementado até a reivindicação ser concluída. Adicionalmente: zero fotos reais disponíveis (Altair confirmou) e zero reviews — o perfil vai ao ar em estado mínimo de credibilidade visual. Recomendação: tirar pelo menos 5 fotos com celular (técnico em campo, balcão, fachada) antes de publicar o perfil e solicitar tráfego para o GMB.","profile":{"description":"A Perttech oferece manutenção especializada de nobreaks e equipamentos elétricos críticos para empresas no ABC Paulista e Grande São Paulo há 30 anos. Certified Partner APC e Legrand, atendemos mais de 20 marcas — NHS, SMS, Schneider, Powerware e outras. Manutenção corretiva no mesmo dia para emergências, manutenção preventiva programada e contratos anuais com SLA garantido. Resolução na primeira visita ou retornamos sem custo adicional. Técnico especializado na sua empresa. Atendemos São Bernardo do Campo, Santo André, São Caetano, São Paulo e região em raio de 100 km. Fale com o técnico: 11 96262-0311.","description_char_count":610,"category_primary":"Empresa de conserto de aparelhos elétricos","categories_secondary":["Assistência técnica de eletrônicos","Fornecedor de equipamentos de energia","Empresa de manutenção de computadores","Engenheiro eletricista","Loja de nobreaks","Serviço de reparo de computadores"],"attributes":[{"name":"Identifica-se como empresa B2B","value":true},{"name":"Atende no local do cliente","value":true},{"name":"Pagamento: Pix","value":true},{"name":"Pagamento: Transferência/Boleto","value":true}]},"services":[{"name":"Manutenção Corretiva de Nobreak","description":"Diagnóstico e reparo de nobreaks e UPS em pane. Técnico sênior multimarca vai até a empresa com ferramentas e peças para resolução na primeira visita. Atendimento prioritário no mesmo dia para equipamentos críticos no ABC e Grande São Paulo.","price_range":"R$ 250 – R$ 7.000"},{"name":"Manutenção Preventiva de Nobreak","description":"Inspeção técnica periódica de nobreaks, UPS e estabilizadores. Diagnóstico do estado real das baterias, componentes e capacidade de carga. Laudo técnico com recomendações para os próximos 90 dias.","price_range":"R$ 90 – R$ 2.500"},{"name":"Contrato Anual de Manutenção","description":"Contrato com SLA de resposta garantido, visitas preventivas programadas e prioridade em emergências. Para empresas com equipamentos críticos que não podem arriscar parada operacional.","price_range":"Sob consulta"},{"name":"Conserto de Nobreak no Balcão","description":"Cliente traz o equipamento à sede em São Bernardo do Campo. Diagnóstico técnico gratuito. Reparo com garantia e laudo. Atende pessoas físicas e empresas. Todas as marcas.","price_range":"R$ 90 – R$ 6.000"},{"name":"Ativação e Instalação de Nobreak","description":"Instalação técnica e ativação de nobreaks novos. Dimensionamento correto de carga, configuração de parâmetros e teste de autonomia. Certified Partner APC e Legrand.","price_range":"Sob consulta"},{"name":"Venda de Nobreaks e Estabilizadores","description":"Venda de nobreaks e estabilizadores de todas as marcas com dimensionamento técnico correto. APC, NHS, SMS, Legrand e outras. Produto com instalação disponível.","price_range":"R$ 150 – R$ 100.000"}],"posts":[{"week":1,"type":"novidade","title":"30 anos cuidando dos sistemas críticos que não podem parar.","body":"A Perttech nasceu em São Bernardo do Campo com um propósito direto: garantir que empresas com operação 24/7 nunca precisem temer uma pane elétrica.\n\nTrês décadas de especialização em nobreaks e equipamentos elétricos críticos. Mais de 20 marcas atendidas. Certified Partner APC e Legrand.\n\nNosso compromisso é simples: resolução na primeira visita — ou retornamos sem custo adicional.\n\nAtendemos emergências e preventivos no ABC Paulista, São Paulo capital e Grande SP em raio de 100 km.\n\nSe sua empresa depende de servidores, equipamentos industriais ou sistemas de segurança, a Perttech é o técnico especializado que você precisa ter no contato.\n\n11 96262-0311 — WhatsApp e telefone.\nOnde a pane não pode esperar.","cta_label":"Saiba mais","cta_url":"https://wa.me/+5511962620311"},{"week":2,"type":"oferta","title":"Diagnóstico técnico gratuito para novos clientes — saiba o estado real dos seus equipamentos.","body":"Quando foi a última vez que alguém verificou a autonomia real da bateria do seu nobreak?\n\nA maioria das falhas de UPS é previsível — e evitável. O problema é que ninguém descobre antes de a pane acontecer.\n\nA Perttech oferece diagnóstico técnico gratuito para novos clientes na Grande São Paulo. O técnico vai até a sua empresa, avalia o estado real dos equipamentos e entrega um laudo com o que foi encontrado e o que fazer nos próximos 90 dias.\n\nSem compromisso de contratação imediata.\n\nAtendemos empresas no ABC Paulista, São Paulo e região em raio de 100 km — servidores, UPS industriais, sistemas de segurança e comunicação.\n\nAgende agora: 11 96262-0311.","cta_label":"Ligar agora","cta_url":"tel:1141733577"},{"week":3,"type":"novidade","title":"5 sinais de que o seu nobreak precisa de manutenção urgente.","body":"Se você notou algum desses sinais, o equipamento está pedindo atenção antes de virar uma crise:\n\n1. LED de bateria piscando ou com cor diferente do padrão\n2. Alarme sonoro intermitente sem falha de energia aparente\n3. Tempo de autonomia menor que o especificado no manual\n4. Equipamentos ligados apresentando instabilidade ou reinicializações\n5. Nobreak com mais de 3 anos sem manutenção preventiva\n\nEsses sinais não significam que o equipamento vai quebrar hoje — mas significam que ele não vai aguentar a próxima pane com a autonomia que você espera.\n\nA Perttech faz manutenção preventiva e corretiva de nobreaks e equipamentos elétricos críticos no ABC e Grande São Paulo há 30 anos. Certified Partner APC e Legrand. Multimarca.\n\nDiagnóstico on-site: 11 96262-0311.","cta_label":"Falar com técnico","cta_url":"https://wa.me/+5511962620311"},{"week":4,"type":"novidade","title":"Por que empresas com operação crítica escolhem a Perttech.","body":"Há 30 anos, a Perttech mantém sistemas elétricos críticos para empresas que não podem parar no ABC Paulista e Grande São Paulo.\n\nCertified Partner APC e Legrand.\nMais de 20 marcas atendidas.\nTécnico especializado — diagnóstico correto na primeira visita.\nContrato anual com SLA garantido.\n\nPara quem gerencia servidores, UPS industriais, equipamentos médicos ou sistemas de segurança: manutenção de energia não é custo — é seguro de continuidade operacional.\n\nO técnico que vai até a sua empresa já conhece o histórico dos equipamentos. Não está vendo pela primeira vez.\n\nResolução na primeira visita ou retornamos sem custo adicional.\n\nFalar com técnico: 11 96262-0311.\nABC Paulista, São Paulo e Grande SP — até 100 km.","cta_label":"Solicitar proposta","cta_url":"https://wa.me/+5511962620311"}],"qas":[{"question":"Vocês atendem urgências no mesmo dia?","answer":"Sim. Para equipamentos críticos — servidores, UPS industriais, sistemas de segurança — priorizamos o atendimento no mesmo dia no ABC Paulista, São Paulo e Grande SP em raio de 100 km. Entre em contato pelo WhatsApp (11 96262-0311) com o modelo e o problema: confirmamos a disponibilidade mais rápida em minutos."},{"question":"Atendem qualquer marca de nobreak?","answer":"Sim — somos multimarca. Parceiros certificados APC e Legrand, mas atendemos NHS, SMS, Powerware, Schneider, Senoidal, Engetron e mais de 20 marcas. 30 anos de especialização técnica multimarca em São Bernardo do Campo e Grande São Paulo."},{"question":"Qual o raio de atendimento de vocês?","answer":"Atendemos ABC Paulista (São Bernardo do Campo, Santo André, São Caetano do Sul, Diadema), São Paulo capital e Grande São Paulo em raio de até 100 km da nossa sede em São Bernardo do Campo. Para confirmar se sua região está coberta: 11 96262-0311 ou 11 4173-3577."},{"question":"Como funciona o contrato anual de manutenção? Tem SLA?","answer":"O contrato anual inclui visitas preventivas programadas, SLA de resposta garantido em emergências e prioridade de atendimento. Cada empresa recebe uma proposta específica conforme o número e a criticidade dos equipamentos. Para solicitar proposta: 11 96262-0311 (WhatsApp) ou altair@perttech.com.br."},{"question":"Quanto custa uma visita técnica de manutenção?","answer":"O valor varia conforme o tipo de atendimento e o equipamento. Manutenção no balcão (cliente traz): R$ 90 a R$ 6.000. Atendimento on-site (técnico vai ao cliente): R$ 250 a R$ 7.000. Para emergências e contratos: solicite orçamento pelo 11 96262-0311. Diagnóstico técnico gratuito para novos clientes — entre em contato."}],"review_request_template":"Olá [Nome], tudo bem?\n\nGostaria de pedir um favor rápido: você poderia deixar uma avaliação da Perttech no Google? Leva menos de 2 minutos e nos ajuda muito a aparecer para empresas que precisam de manutenção de nobreak na região.\n\nLink direto para avaliação: [link curto do GMB]\n\nMuito obrigado!\nAltair — Perttech","implementation_checklist":{"phase_0_access":["Verificar se o perfil Perttech existe no Google Maps","Reivindicar ou solicitar acesso admin via business.google.com","Verificar o perfil (código por SMS, ligação ou postcard)"],"phase_1_basic":["Nome: Perttech","Endereço: Rua Zurich, 408, São Bernardo do Campo, SP","Telefone: 11 4173-3577","WhatsApp: 11 96262-0311","Site: www.perttech.com.br (ou landing.perttech.com.br quando disponível)","Horário de funcionamento: confirmar com Altair","Categoria principal configurada","Categorias secundárias configuradas"],"phase_2_content":["Descrição SEO publicada (610 chars)","Atributos ativados","6 serviços cadastrados com descrição e preço","5 Q&As publicadas (responder como proprietário)","Post 1 (Apresentação) publicado","Posts 2, 3, 4 agendados semanalmente"],"phase_3_photos":["Logo da Perttech (fundo branco, 720x720px+)","Foto de capa (técnico em ação ou fachada)","Fachada externa","Interior da oficina/balcão","Técnico trabalhando em equipamento","Equipe (Altair + técnicos)","Exemplos de equipamentos atendidos","Veículo da empresa
