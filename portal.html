          E(c.expected_cpc_range||'—'),
          '<span style="font-size:.75rem">'+E(c.bid_strategy||'—')+'</span>',
          '<span style="font-size:.75rem;color:var(--text-muted)">'+E(c.copy_angle||'—')+'</span>',
          '<span style="font-size:.75rem;color:var(--danger)">'+E(c.risk||'—')+'</span>',
        ]));

      // Tabela de oportunidades: keywords relevantes NÃO em uso hoje
      // Fontes suportadas: d.opportunity_keywords[] OU agregação dos campos c.opportunity_keywords[] de cada cluster
      let oppRows = [];
      if (Array.isArray(d.opportunity_keywords) && d.opportunity_keywords.length) {
        oppRows = d.opportunity_keywords;
      } else {
        d.keyword_clusters.forEach(c => {
          if (Array.isArray(c.opportunity_keywords)) {
            c.opportunity_keywords.forEach(k => oppRows.push(Object.assign({cluster:c.cluster}, typeof k==='string'?{keyword:k}:k)));
          }
        });
      }
      let oppBlock = '';
      if (oppRows.length) {
        oppBlock = '<div style="margin-top:1rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Keywords Relevantes Não Utilizadas Hoje — Oportunidades</div>'
          +tb(
            ['Keyword','Cluster','Intent','Volume est.','CPC est.','Por que adicionar'],
            oppRows.map(k=>[
              '<strong style="color:var(--accent)">'+E(k.keyword||'—')+'</strong>',
              k.cluster?'<span style="font-size:.75rem">'+E(k.cluster)+'</span>':'—',
              k.intent?tg(k.intent,{transactional:'green',commercial:'yellow',informational:'gray',navigational:'green'}[k.intent]||'gray'):'—',
              k.volume_estimate!=null?'<span style="font-size:.75rem">'+E(String(k.volume_estimate))+'</span>':(k.search_volume_monthly!=null?'<span style="font-size:.75rem">'+N(k.search_volume_monthly)+'/mês</span>':'—'),
              k.expected_cpc!=null?'<span style="font-size:.75rem">R$'+Number(k.expected_cpc).toFixed(2)+'</span>':(k.cpc_range?'<span style="font-size:.75rem">'+E(k.cpc_range)+'</span>':'—'),
              '<span style="font-size:.75rem;color:var(--text-muted)">'+E(k.rationale||k.why||'—')+'</span>',
            ]))
          +'</div>';
      }

      h += sc('Clusters de Keywords', donutBlock + clustersTable + oppBlock);
    }
  }

  // ── META ADS ──
  const ma = d.meta_ads;
  if (ma) {
    // Divisor forte antes da seção Meta Ads
    h += '<div style="margin:2.5rem 0 1rem;padding:1rem 1.25rem;background:linear-gradient(90deg, rgba(59,130,246,0.08), transparent);border-left:4px solid #1877f2;border-radius:4px">'
      +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#1877f2;margin-bottom:.125rem">Canal 2</div>'
      +'<div style="font-size:1.25rem;font-weight:800;color:var(--text-primary);letter-spacing:-.01em">Meta Ads (Facebook + Instagram)</div>'
      +(ma.budget_monthly?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem">Investimento atual: '+BRL(ma.budget_monthly)+'/mês · '+(ma.active_campaigns||0)+' campanha'+(ma.active_campaigns!==1?'s':'')+' ativa'+(ma.active_campaigns!==1?'s':'')+' de '+(ma.total_campaigns||0)+' total'+(ma.status==='broken'?' · ⚠ links quebrados detectados':'')+'</div>':'')
      +'</div>';
    const mClsColor = ma.score >= 40?'warning':'danger';
    let maHead = '';

    // Resumo 90 dias — cards + diagnóstico executivo
    {
      const spend = ma.total_spend_90d;
      const monthly = ma.budget_monthly_actual!=null ? ma.budget_monthly_actual : (spend!=null?spend/3:null);
      const cards = '<div class="gr gr--4" style="margin-bottom:.75rem">'
        +(spend!=null?mt(BRL(spend),'Investido 90d',''):'')
        +(ma.avg_ctr!=null?mt(ma.avg_ctr.toFixed(2)+'%','CTR médio',ma.avg_ctr>=2?'green':ma.avg_ctr>=1.2?'yellow':'red'):'')
        +(ma.avg_cpm!=null?mt(BRL(ma.avg_cpm),'CPM médio',ma.avg_cpm<=10?'green':ma.avg_cpm<=15?'yellow':'red'):'')
        +(ma.total_reach_90d!=null?mt(N(ma.total_reach_90d),'Alcance 90d',''):(ma.total_clicks_90d!=null?mt(N(ma.total_clicks_90d),'Clicks 90d',''):''))
        +'</div>';
      const sub = '<div style="display:flex;gap:.75rem;flex-wrap:wrap;font-size:.75rem;color:var(--text-muted);margin-bottom:.5rem">'
        +(monthly!=null?'<span>Média mensal: <strong style="color:var(--text-secondary)">'+BRL(monthly)+'</strong></span>':'')
        +(ma.total_clicks_90d!=null?'<span>Clicks: <strong style="color:var(--text-secondary)">'+N(ma.total_clicks_90d)+'</strong></span>':'')
        +(ma.total_impressions_90d!=null?'<span>Impressões: <strong style="color:var(--text-secondary)">'+N(ma.total_impressions_90d)+'</strong></span>':'')
        +(ma.total_ads!=null?'<span>Ads: <strong style="color:var(--text-secondary)">'+N(ma.total_ads)+'</strong></span>':'')
        +(ma.total_campaigns!=null?'<span>Campanhas: <strong style="color:var(--text-secondary)">'+N(ma.total_campaigns)+'</strong></span>':'')
        +'</div>';
      const diag = ma.strategic_diagnosis
        ? cd('Resumo Executivo', '<div style="font-size:.875rem;line-height:1.5;color:var(--text-secondary)">'+E(ma.strategic_diagnosis)+'</div>')
        : '';
      maHead = cards + sub + diag;
    }

    // Monthly evolution table for Meta
    let maEvol = '';
    if (ma.monthly_evolution?.length) {
      maEvol = evTable(ma.monthly_evolution, [
        {key:'spend',      label:'Gasto',       fmt: v=>'R$'+v.toFixed(0), badUp:true},
        {key:'impressions',label:'Impressões',   fmt: v=>N(v),              badUp:false},
        {key:'clicks',     label:'Clicks',       fmt: v=>N(v),              badUp:false},
        {key:'reach',      label:'Alcance',      fmt: v=>N(v),              badUp:false},
        {key:'cpm',        label:'CPM',          fmt: v=>'R$'+v.toFixed(2), badUp:true, colorFn:(v)=>v>15?'red':v>10?'yellow':'green'},
        {key:'ctr',        label:'CTR',          fmt: v=>v.toFixed(2)+'%',  badUp:false, colorFn:(v)=>v<1?'red':v<2?'yellow':'green'},
      ]);
    }

    let maCritical = '';
    if (ma.critical_issues?.length) {
      maCritical = ma.critical_issues.map(i=>
        '<div style="font-size:.8125rem;color:var(--danger);margin-bottom:.3rem">&#9650; '+E(i)+'</div>'
      ).join('');
    }

    let maBench = '';
    if (ma.metrics_vs_benchmark?.length) {
      maBench = tb(['Métrica','Atual','Benchmark','Status'],
        ma.metrics_vs_benchmark.map(m=>[
          E(m.metric), E(m.atual), E(m.benchmark),
          tg(m.gap, m.status==='ok'?'green':m.status==='critical'?'danger':'yellow')
        ]));
    }

    let maBest = '';
    if (ma.best_historical?.length) {
      maBest = ma.best_historical.map(c=>
        '<div style="margin-bottom:.375rem"><div style="font-size:.8125rem;font-weight:600;color:var(--text-primary)">'+E(c.name)+'</div>'
        +'<div style="font-size:.75rem;color:var(--text-muted)">CPM R$'+E(c.cpm)+' · '+N(c.impressions)+' impressões · '+E(c.note)+'</div></div>'
      ).join('');
    }

    h += sc('Meta Ads', maHead
      +(maEvol ? '<div style="margin-bottom:.75rem"><div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Evolução Mensal</div>'+maEvol+'</div>' : '')
      +cd('Problemas Críticos', maCritical, 'danger')
      +(maBench ? '<div style="margin-top:.75rem">'+maBench+'</div>' : '')
      +(maBest ? cd('Histórico de Destaque', maBest) : '')
    );

    // ── Galeria de Criativos (V4MOS) ──
    if (ma.creative_gallery?.length) {
      const gs = ma.creative_gallery_summary || {};
      const verdictColor = {Manter:'var(--success)', Otimizar:'var(--warning)', Eliminar:'var(--danger)'};
      const summaryHead = '<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;font-size:.75rem">'
        +(gs.manter!=null?'<div style="padding:.375rem .75rem;background:rgba(34,197,94,0.12);border:1px solid var(--success);border-radius:6px;color:var(--success);font-weight:700">'+gs.manter+' Manter</div>':'')
        +(gs.otimizar!=null?'<div style="padding:.375rem .75rem;background:rgba(234,179,8,0.12);border:1px solid var(--warning);border-radius:6px;color:var(--warning);font-weight:700">'+gs.otimizar+' Otimizar</div>':'')
        +(gs.eliminar!=null?'<div style="padding:.375rem .75rem;background:rgba(239,68,68,0.12);border:1px solid var(--danger);border-radius:6px;color:var(--danger);font-weight:700">'+gs.eliminar+' Eliminar</div>':'')
        +(gs.total_ads?'<div style="padding:.375rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-muted)">Exibindo '+gs.total_displayed+' de '+gs.total_ads+' ads</div>':'')
        +'</div>';
      const cards = ma.creative_gallery.map(g => {
        const vCol = verdictColor[g.verdict] || 'var(--text-muted)';
        const ctrCol = (g.ctr||0)>=1.5?'var(--success)':(g.ctr||0)>=0.8?'var(--warning)':'var(--danger)';
        const cpcCol = (g.cpc||99)<=1.0?'var(--success)':(g.cpc||99)<=1.8?'var(--warning)':'var(--danger)';
        const perm = g.instagram_permalink_url || '';
        // Normaliza permalink Instagram → URL de embed (.../embed/captioned/)
        const embedUrl = perm ? (perm.replace(/\/$/,'') + '/embed/captioned/') : '';
        return '<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+vCol+';border-radius:8px;overflow:hidden;display:flex;flex-direction:column">'
          +'<div style="padding:.5rem .75rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;border-bottom:1px solid var(--border);background:var(--bg)">'
            +'<span style="background:'+vCol+';color:#fff;padding:.25rem .625rem;border-radius:4px;font-size:.6875rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase">'+E(g.verdict)+'</span>'
            +(perm?'<a href="'+E(perm)+'" target="_blank" rel="noopener" style="font-size:.625rem;color:var(--accent);text-decoration:none">↗ Instagram</a>':'')
          +'</div>'
          +(embedUrl
            ? '<iframe src="'+E(embedUrl)+'" loading="lazy" allowfullscreen scrolling="no" frameborder="0" style="width:100%;height:480px;border:0;background:#0a0a0a;display:block"></iframe>'
            : '<div style="aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:var(--text-muted);font-size:.75rem">Sem preview disponível</div>')
          +'<div style="padding:.75rem;display:flex;flex-direction:column;gap:.5rem;border-top:1px solid var(--border)">'
            +'<div style="font-size:.75rem;font-weight:700;color:var(--text-primary);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+E(g.ad_name||'—')+'</div>'
            +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.25rem;padding:.5rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">'
              +'<div style="text-align:center"><div style="font-size:1rem;font-weight:800;color:'+ctrCol+'">'+(g.ctr!=null?g.ctr.toFixed(2)+'%':'—')+'</div><div style="font-size:.5625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">CTR</div></div>'
              +'<div style="text-align:center"><div style="font-size:1rem;font-weight:800;color:'+cpcCol+'">'+(g.cpc!=null?'R$'+g.cpc.toFixed(2):'—')+'</div><div style="font-size:.5625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">CPC</div></div>'
              +'<div style="text-align:center"><div style="font-size:1rem;font-weight:800;color:var(--text-primary)">'+(g.spend!=null?'R$'+Math.round(g.spend):'—')+'</div><div style="font-size:.5625rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">Spend</div></div>'
            +'</div>'
            +'<div style="font-size:.6875rem;color:var(--text-muted);line-height:1.4">'+E(g.verdict_reason||'')+'</div>'
          +'</div>'
        +'</div>';
      }).join('');
      h += sc('Galeria de Criativos Meta — Top 15 por Spend',
        summaryHead
        +'<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem">'+cards+'</div>'
        +(gs.note?'<p style="margin-top:.75rem;font-size:.6875rem;color:var(--text-muted);font-style:italic">'+E(gs.note)+'</p>':''));
    }

    // Creative testing hypotheses (Meta-only) — posicionado dentro da seção Meta
    if (d.creative_testing_hypotheses?.hypotheses?.length) {
      const ct = d.creative_testing_hypotheses;
      h += sc('Hipóteses de Teste de Criativos',
        ct.hypotheses.map(hy=>
          cd((hy.id?hy.id+' — ':'')+(hy.hypothesis||'—'),
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;font-size:.75rem">'
            +(hy.angle?'<div><strong>Ângulo:</strong> '+E(hy.angle)+'</div>':'')
            +(hy.format?'<div><strong>Formato:</strong> '+E(hy.format)+'</div>':'')
            +(hy.target_audience?'<div><strong>Público:</strong> '+E(hy.target_audience)+'</div>':'')
            +(hy.cta?'<div><strong>CTA:</strong> '+E(hy.cta)+'</div>':'')
            +'</div>'
            +(hy.hook?'<div style="font-size:.8125rem;margin-top:.375rem"><strong>Hook:</strong> <em>"'+E(hy.hook)+'"</em></div>':'')
            +(hy.body?'<div style="font-size:.75rem;margin-top:.25rem;color:var(--text-secondary)">'+E(hy.body)+'</div>':'')
            +(hy.success_criteria?'<div style="font-size:.75rem;margin-top:.375rem;color:var(--success)"><strong>Sucesso:</strong> '+E(hy.success_criteria)+'</div>':'')
            +'<div style="margin-top:.375rem;display:flex;gap:.375rem">'
            +(hy.testing_budget!=null?tg(BRL(hy.testing_budget),'gray'):'')
            +(hy.testing_duration_days!=null?tg(hy.testing_duration_days+' dias','gray'):'')
            +'</div>',
            'yellow')
        ).join('')
        +(ct.testing_budget_total_week_1!=null?co('Budget total semana 1 de testes: '+BRL(ct.testing_budget_total_week_1)):''));
    }
  }

  // ── CONSOLIDADO & PLANO DE AÇÃO ──
  h += '<div style="margin:2.5rem 0 1rem;padding:1rem 1.25rem;background:linear-gradient(90deg, rgba(34,197,94,0.08), transparent);border-left:4px solid var(--success);border-radius:4px">'
    +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--success);margin-bottom:.125rem">Síntese</div>'
    +'<div style="font-size:1.25rem;font-weight:800;color:var(--text-primary);letter-spacing:-.01em">Consolidado & Plano de Ação</div>'
    +'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem">Problemas priorizados · cenários de realocação · forecast · metas 90 dias</div>'
    +'</div>';

  // Top problems
  if (d.top_problems?.length) {
    h += sc('Top 3 Problemas Críticos', d.top_problems.map(p=>
      cd(p.problem,
        '<p style="margin:0 0 .375rem"><strong>Evidência:</strong> '+E(p.data_evidence)+'</p>'
        +'<p style="margin:0;color:var(--text-secondary)">'+E(p.impact)+'</p>',
        'danger')
    ).join(''));
  }

  // Action plan
  if (d.action_plan?.length) {
    h += sc('Plano de Ação — 30 dias', tb(['#','Ação','Prioridade','Impacto','Prazo'],
      d.action_plan.map(a=>[
        E(a.rank),
        E(a.action),
        tg(a.priority, {P1:'red',P2:'yellow',P3:'gray'}[a.priority]||'gray'),
        '<span style="font-size:.75rem;color:var(--text-muted)">'+E(a.expected_impact)+'</span>',
        E(a.deadline)
      ])));
  }

  // Budget reallocation scenarios
  if (d.budget_reallocation_scenarios) {
    const br = d.budget_reallocation_scenarios;
    const sumAlloc = obj => obj ? Object.values(obj).reduce((s,v)=>s+(typeof v==='number'?v:0),0) : 0;
    const scenTotal = s => (s.total_budget_monthly!=null)?s.total_budget_monthly:(sumAlloc(s.google_allocation)+sumAlloc(s.meta_allocation));
    const scenLeads = s => s.expected_leads_monthly ?? s.projected_leads_month ?? null;
    const scenCpl = s => s.expected_cpl ?? s.projected_cpl ?? null;
    const scenName = s => s.name || s.label || '—';
    const scenGoogle = s => s.google_split!=null?s.google_split:sumAlloc(s.google_allocation);
    const scenMeta = s => s.meta_split!=null?s.meta_split:sumAlloc(s.meta_allocation);

    const renderBs = (s, variant) => s ? cd(scenName(s),
      '<div class="gr gr--2" style="gap:.375rem">'
      +mt(BRL(scenTotal(s)),'Budget/mês','')
      +(scenLeads(s)!=null?mt(N(scenLeads(s)),'Leads/mês',''):'')
      +(scenCpl(s)!=null?mt(BRL(scenCpl(s)),'CPL projetado',''):'')
      +(s.expected_roas!=null?mt(s.expected_roas.toFixed(1)+'x','ROAS',''):
        s.delta_leads?mt(s.delta_leads,'Δ Leads',''):'')
      +'</div>'
      +'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">'
      +(scenGoogle(s)>0?'Google: '+BRL(scenGoogle(s))+' · ':'')
      +(scenMeta(s)>0?'Meta: '+BRL(scenMeta(s)):'')
      +'</div>'
      +(s.effort_weeks!=null||s.confidence?('<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">'
        +(s.effort_weeks!=null?'Esforço: '+s.effort_weeks+' sem · ':'')
        +(s.confidence?'Confiança: '+E(s.confidence):'')
        +'</div>'):'')
      +(s.changes?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Mudanças ('+s.changes.length+')</summary>'
        +'<ul style="font-size:.75rem;margin:.375rem 0 0;padding-left:1rem">'+s.changes.map(c=>'<li style="margin-bottom:.2rem">'+E(c)+'</li>').join('')+'</ul></details>':'')
      +(s.campaigns_structure?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Estrutura ('+s.campaigns_structure.length+' campanhas)</summary>'
        +'<div style="font-size:.75rem;margin-top:.375rem">'+s.campaigns_structure.map(c=>
          '<div style="margin-bottom:.25rem">• <strong>'+E(c.campaign)+'</strong> ('+E(c.platform||'')+') — '+(c.budget_monthly!=null?BRL(c.budget_monthly):'—')+' — <em>'+E(c.objective||'')+'</em></div>'
        ).join('')+'</div></details>':'')
      +(s.prerequisites?.length?'<details style="margin-top:.375rem"><summary style="font-size:.75rem;cursor:pointer;color:var(--accent)">Pré-requisitos ('+s.prerequisites.length+')</summary>'
        +'<ul style="font-size:.75rem;margin:.375rem 0 0;padding-left:1rem">'+s.prerequisites.map(c=>'<li>'+E(c)+'</li>').join('')+'</ul></details>':'')
      +(s.risk_assessment?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem">Risco: '+E(s.risk_assessment)+'</div>':''),
      variant) : '';
    // Scenario comparison — metrics as rows, scenarios as columns, inline bars per row
    const scArr = [br.scenario_a_conservative, br.scenario_b_realistic, br.scenario_c_aggressive].filter(Boolean);
    let scChart = '';
    if (scArr.length >= 2) {
      const recommendedIdx = 1; // realista
      const best = scArr.reduce((b,x)=>((scenLeads(x)||0)>(scenLeads(b)||0)?x:b), scArr[0]);
      const scInsightTxt = best
        ? 'Cenário "'+scenName(best).split('—')[0].trim()+'" entrega '+N(scenLeads(best)||0)+' leads/mês a CPL '+BRL(scenCpl(best)||0)+' com budget de '+BRL(scenTotal(best))+'.'
        : '';
      const shortName = s => scenName(s).split('—')[0].trim();
      // Column header
      const colHeader = '<div style="display:grid;grid-template-columns:minmax(140px,20%) repeat('+scArr.length+',1fr);gap:.75rem;align-items:end;padding:0 0 .75rem;border-bottom:2px solid var(--border)">'
        +'<div></div>'
        +scArr.map((s,i)=>{
          const isRec = i===recommendedIdx;
          return '<div style="text-align:center">'
            +(isRec?'<div style="font-size:.6875rem;font-weight:700;color:'+chartColor('green')+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem">★ Recomendado</div>':'<div style="height:1rem"></div>')
            +'<div style="font-size:.875rem;font-weight:700;color:'+(isRec?chartColor('green'):'var(--text)')+'">'+E(shortName(s))+'</div>'
            +'<div style="font-size:.6875rem;color:var(--text-muted);margin-top:.15rem;line-height:1.3">'+E(scenName(s).split('—').slice(1).join('—').trim()||'')+'</div>'
            +'</div>';
        }).join('')+'</div>';
      // Metric rows with inline bars (normalized per row)
      const rows = [
        {label:'Budget/mês', invert:false, values:scArr.map(s=>scenTotal(s)), fmt:v=>BRL(v)},
        {label:'Leads projetados/mês', invert:false, values:scArr.map(s=>scenLeads(s)), fmt:v=>N(v)+' leads'},
        {label:'CPL projetado', invert:true, values:scArr.map(s=>scenCpl(s)), fmt:v=>BRL(v), note:'menor = melhor'},
        {label:'Δ vs atual', invert:false, values:scArr.map(s=>s.delta_leads||null), fmt:v=>v, isText:true},
        {label:'Esforço', invert:true, values:scArr.map(s=>s.effort_weeks), fmt:v=>v+' sem', note:'menor = melhor'},
        {label:'Confiança', invert:false, values:scArr.map(s=>s.confidence||null), fmt:v=>v, isText:true},
      ].filter(r=>r.values.some(v=>v!=null && v!==0));
      const rowsHtml = rows.map(r=>{
        const numVals = r.values.map(v=>typeof v==='number'?v:null);
        const maxV = Math.max(...numVals.filter(v=>v!=null));
        const minV = Math.min(...numVals.filter(v=>v!=null));
        const best = r.invert ? minV : maxV;
        return '<div style="display:grid;grid-template-columns:minmax(140px,20%) repeat('+scArr.length+',1fr);gap:.75rem;align-items:center;padding:.625rem 0;border-bottom:1px solid var(--border)">'
          +'<div><div style="font-size:.75rem;font-weight:600">'+E(r.label)+'</div>'
          +(r.note?'<div style="font-size:.625rem;color:var(--text-muted)">'+E(r.note)+'</div>':'')+'</div>'
          +r.values.map((v,i)=>{
            const isRec = i===recommendedIdx;
            if (v==null) return '<div style="text-align:center;font-size:.75rem;color:var(--text-muted)">—</div>';
            const isBest = typeof v==='number' && v===best && numVals.filter(x=>x===best).length<numVals.filter(x=>x!=null).length;
            const col = isBest?chartColor('green'):(isRec?chartColor('green'):'var(--text)');
            if (r.isText) {
              return '<div style="text-align:center"><div style="font-size:.8125rem;font-weight:'+(isRec?700:600)+';color:'+col+'">'+E(String(r.fmt(v)))+'</div></div>';
            }
            const pct = maxV>0 ? (v/maxV*100) : 0;
            return '<div style="text-align:center">'
              +'<div style="font-size:.8125rem;font-weight:'+(isRec||isBest?700:600)+';color:'+col+';margin-bottom:.2rem">'+E(String(r.fmt(v)))+(isBest?' <span style="font-size:.625rem">★</span>':'')+'</div>'
              +'<div style="height:6px;background:var(--surface);border-radius:2px;overflow:hidden">'
              +'<div style="height:100%;width:'+pct.toFixed(1)+'%;background:'+(isBest?chartColor('green'):isRec?chartColor('green'):CX.muted)+';opacity:'+(isBest||isRec?'.85':'.5')+';border-radius:2px"></div>'
              +'</div></div>';
          }).join('')
          +'</div>';
      }).join('');
      scChart = insight(
        chartTitle('Comparativo de Cenários — Trade-offs Lado a Lado')
        +colHeader+rowsHtml,
        scInsightTxt, 'good');
    }
    h += sc('Cenários de Realocação de Budget',
      (br.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .75rem">'+E(br.description)+'</p>':'')
      +scChart
      +'<div class="gr gr--3">'
      +renderBs(br.scenario_a_conservative,'gray')
      +renderBs(br.scenario_b_realistic,'green')
      +renderBs(br.scenario_c_aggressive,'yellow')
      +'</div>'
      +(br.recommendation?co(br.recommendation):''));
  }

  // Daypart optimization
  if (d.daypart_optimization?.adjustments?.length) {
    h += sc('Otimização por Dia/Hora',
      tb(['Janela','Ajuste de lance','Rationale'],
        d.daypart_optimization.adjustments.map(a=>[
          '<strong>'+E(a.day_time)+'</strong>',
          a.bid_adjustment_pct!=null?tg((a.bid_adjustment_pct>=0?'+':'')+a.bid_adjustment_pct+'%',a.bid_adjustment_pct>=0?'green':'red'):'—',
          '<span style="font-size:.75rem;color:var(--text-secondary)">'+E(a.rationale||'—')+'</span>',
        ])));
  }

  // Forecast sensitivity — REMOVIDO da apresentação (mantido no JSON)
  if (false && d.forecast_sensitivity_analysis) {
    const fs = d.forecast_sensitivity_analysis;
    const bcLeads = bc => bc.leads_monthly ?? bc.leads_month_90d ?? null;
    const bcCpl = bc => bc.cpl ?? bc.cpl_90d_brl ?? null;
    const bcCac = bc => bc.cac ?? bc.cac_90d_brl ?? null;
    let bcHtml = '';
    if (fs.base_case) {
      const bc = fs.base_case;
      bcHtml = (bc.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .5rem"><strong>Caso base:</strong> '+E(bc.description)+'</p>':'')
        +'<div class="gr gr--4">'
        +(bcLeads(bc)!=null?mt(N(bcLeads(bc)),'Leads/mês',''):'')
        +(bcCpl(bc)!=null?mt(BRL(bcCpl(bc)),'CPL',''):'')
        +(bcCac(bc)!=null?mt(BRL(bcCac(bc)),'CAC','green'):'')
        +(bc.revenue_monthly!=null?mt(BRL(bc.revenue_monthly),'Receita/mês','green'):'')
        +(bc.roas!=null?mt(bc.roas.toFixed(1)+'x','ROAS','green'):'')
        +'</div>';
    }
    let varHtml = '';
    let sensChart = '';
    if (fs.variations?.length) {
      // Support both new (delta_vs_base_pct) and old field shapes
      const parsePct = s => {
        if (s==null) return null;
        if (typeof s === 'number') return s;
        const m = String(s).match(/([+-]?\d+(?:\.\d+)?)\s*%/);
        return m ? parseFloat(m[1]) : null;
      };
      const getPct = v => (typeof v.delta_vs_base_pct === 'number' ? v.delta_vs_base_pct
        : parsePct(v.impact_on_leads) ?? parsePct(v.impact_on_revenue));
      const getName = v => v.scenario || v.scenario_name || '—';
      const getLeads = v => v.impact_on_leads_month_90d ?? v.impact_on_leads ?? null;
      const getCpl = v => v.impact_on_cpl_brl ?? v.impact_on_cpl ?? null;

      const baseLeads = fs.base_case ? bcLeads(fs.base_case) : null;
      const sorted = [...fs.variations].sort((a,b)=>(getPct(a)??0)-(getPct(b)??0));
      const maxAbs = Math.max(...sorted.map(v=>Math.abs(getPct(v)??0)), 1);
      if (sorted.length) {
        const worst = sorted[0];
        const worstPct = getPct(worst) ?? 0;
        const sensInsight = 'Cada linha é um cenário "e se" de risco aplicado sobre o caso base. Maior ameaça: "'
          +getName(worst).split('(')[0].trim()+'" derruba '+Math.abs(worstPct).toFixed(0)+'% dos leads. Monitore o gatilho e acione mitigação antes do impacto se materializar.';
        const header = '<div style="display:grid;grid-template-columns:minmax(180px,32%) minmax(90px,12%) 1fr minmax(70px,10%);gap:.75rem;align-items:end;padding:0 0 .5rem;border-bottom:1px solid var(--border);font-size:.6875rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600">'
          +'<div>Cenário de risco</div>'
          +'<div style="text-align:right">Leads/mês</div>'
          +'<div>Perda vs base'+(baseLeads!=null?' (base: '+N(baseLeads)+' leads)':'')+'</div>'
          +'<div style="text-align:right">Δ %</div></div>';
        const rows = sorted.map(v=>{
          const pct = getPct(v) ?? 0;
          const leads = getLeads(v);
          const col = pct<=-25?chartColor('red'):pct<=-10?chartColor('yellow'):chartColor('gray');
          const barPct = Math.min(100, (Math.abs(pct)/maxAbs*100));
          return '<div style="display:grid;grid-template-columns:minmax(180px,32%) minmax(90px,12%) 1fr minmax(70px,10%);gap:.75rem;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">'
            +'<div style="font-size:.75rem;font-weight:600;line-height:1.35">'+E(getName(v))+'</div>'
            +'<div style="text-align:right"><div style="font-size:.8125rem;font-weight:700;color:'+col+'">'+(leads!=null?N(leads):'—')+'</div>'
            +(leads!=null&&baseLeads!=null?'<div style="font-size:.625rem;color:var(--text-muted)">'+(leads-baseLeads>0?'+':'')+N(leads-baseLeads)+' vs base</div>':'')+'</div>'
            +'<div style="position:relative;height:14px;background:var(--surface);border-radius:2px;overflow:hidden">'
            +'<div style="position:absolute;left:0;top:0;height:100%;width:'+barPct.toFixed(1)+'%;background:'+col+';opacity:.8;border-radius:2px"></div>'
            +'</div>'
            +'<div style="text-align:right;font-size:.8125rem;font-weight:700;color:'+col+'">'+(pct>=0?'+':'')+pct.toFixed(0)+'%</div>'
            +'</div>';
        }).join('');
        const legend = '<div style="display:flex;gap:1.25rem;font-size:.6875rem;margin-top:.75rem;flex-wrap:wrap;color:var(--text-muted)">'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('red')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Crítico (≤-25%)</span>'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('yellow')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Moderado (-10% a -25%)</span>'
          +'<span><span style="display:inline-block;width:14px;height:10px;background:'+chartColor('gray')+';opacity:.8;margin-right:.3rem;vertical-align:middle;border-radius:2px"></span>Leve (&gt;-10%)</span>'
          +'<span>· ordenado do maior ao menor impacto</span></div>';
        sensChart = insight(
          chartTitle('O que acontece se cada risco se materializar')
          +header+rows+legend,
          sensInsight, worstPct<-15?'bad':'warn');
      }
      // Detailed table: scenario, cause, leads, cpl, delta, mitigation
      varHtml = '<div style="margin-top:.5rem;font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">Cenários detalhados</div>'
        +fs.variations.map(v => {
          const pct = getPct(v);
          const toneColor = (pct??0)<-15?'danger':(pct??0)<0?'yellow':'gray';
          return cd(getName(v),
            (v.cause?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.375rem"><strong>Causa:</strong> '+E(v.cause)+'</div>':'')
            +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.375rem">'
            +(getLeads(v)!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">Leads/mês</div><div style="font-size:.875rem;font-weight:700">'+N(getLeads(v))+'</div></div>':'')
            +(getCpl(v)!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">CPL</div><div style="font-size:.875rem;font-weight:700">'+BRL(getCpl(v))+'</div></div>':'')
            +(pct!=null?'<div><div style="font-size:.625rem;color:var(--text-muted);text-transform:uppercase">Δ vs base</div><div style="font-size:.875rem;font-weight:700;color:var(--'+(pct<0?'danger':'success')+')">'+(pct>=0?'+':'')+pct.toFixed(0)+'%</div></div>':'')
            +'</div>'
            +(v.impact_on_lifetime_value?'<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.25rem">LTV: '+E(v.impact_on_lifetime_value)+'</div>':'')
            +(v.mitigation?'<div style="font-size:.75rem;padding:.375rem .5rem;background:var(--surface);border-left:2px solid var(--success);border-radius:3px"><strong style="color:var(--success)">Mitigação:</strong> '+E(v.mitigation)+'</div>':''),
            toneColor);
        }).join('');
    }
    h += sc('Análise de Sensibilidade do Forecast',
      (fs.description?'<p style="font-size:.8125rem;color:var(--text-muted);margin:0 0 .75rem">'+E(fs.description)+'</p>':'')
      +bcHtml+varHtml);
  }

  // 90-day goal
  const g90 = d.realistic_goal_90d || d.realistic_goal;
  if (g90) {
    h += sc('Meta Realista — 90 Dias',
      '<div class="gr gr--4">'
      +(g90.target_cpl!=null?mt(BRL(g90.target_cpl),'CPL Alvo','green'):'')
      +(g90.target_cac!=null?mt(BRL(g90.target_cac),'CAC Alvo','green'):'')
      +(g90.target_leads_month!=null?mt(N(g90.target_leads_month),'Leads/mês Alvo','green'):'')
      +(g90.target_agendamentos_month!=null?mt(N(g90.target_agendamentos_month),'Agendamentos Alvo','green'):'')
      +'</div>'
      +(g90.premissas?.length?cd('Premissas',g90.premissas.map(p=>'<div style="font-size:.8125rem;margin-bottom:.2rem">&#9675; '+E(p)+'</div>').join('')):'')
    );
  }

  h += renderKeyInsight(d.key_insight, { title: 'Ponto de Alavancagem — Realocação + Hipótese Principal' });
  h += renderHonestyAlert(d.honesty_alert);

  return h;
},

'ee-s2-diagnostico-criativos'(d) {

  h += renderLeituraEstrategica(d, { verdictLabel: 'Veredito dos Criativos' });

  const counts = d.counts || d.summary_counts || {};
  if (d.total_creatives_analyzed || d.average_score != null) {

      +mt(d.average_score!=null?(d.average_score+'/25'):'—','Score Médio',d.average_score>=20?'green':d.average_score>=13?'yellow':'red')

      : hasImg
      ? '<div style="position:relative;background:#000;aspect-ratio:1/1;overflow:hidden">'
        +'<img src="'+E(p.thumbnail_url||p.image_url)+'" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display=\'none\'">'
        +(hasVideo?'<a href="'+E(p.video_url)+'" target="_blank" rel="noopener" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);color:#fff;font-size:2rem;text-decoration:none">▶</a>':'')
        +'</div>'
      : '<div style="aspect-ratio:1/1;background:var(--border-light);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:.75rem;text-align:center;padding:1rem;gap:.4rem">'
        +'<div style="font-weight:600">'+(p.source==='unavailable'?'Preview indisponível':'Sem imagem')+'</div>'
        +(p.note?'<div style="font-size:.6875rem;line-height:1.3;opacity:.85">'+E(p.note)+'</div>':'')
        +'</div>';

    return '<div class="cd cd--'+tone+'" style="display:flex;flex-direction:column;padding:0;overflow:hidden">'

      +'<div style="padding:.75rem">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem;margin-bottom:.3rem">'
      +'<strong style="font-size:.8125rem;line-height:1.25">'+E(label)+'</strong>'
      +tg((c.verdict||'').toUpperCase(), tone)
      +'</div>'
      +'<div style="font-size:.75rem;color:var(--muted);margin-bottom:.4rem">'
      +E(c.type||'')+(c.format?' · '+E(c.format):'')
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">'
      +'<span style="font-size:.75rem;color:var(--muted)">Score</span>'
      +'<strong style="font-size:.875rem">'+E(c.total_score)+'/25</strong>'
      +'</div>'
      +'<div style="display:flex;gap:.3rem;flex-wrap:wrap;font-size:.6875rem;color:var(--muted);margin-bottom:.4rem">'
      +'<span>H '+E(c.hook_score||'—')+'</span>'
      +'<span>C '+E(c.clarity_score||'—')+'</span>'
      +'<span>I '+E(c.icp_coherence_score||'—')+'</span>'
      +'<span>CTA '+E(c.cta_score||'—')+'</span>'
      +'<span>V '+E(c.visual_score||'—')+'</span>'
      +'</div>'
      +(c.main_issue?'<div style="border-left:3px solid var(--'+(tone==='green'?'success':tone==='yellow'?'warning':'danger')+');padding-left:.5rem;font-size:.75rem;margin-top:.3rem"><strong style="font-size:.6875rem;text-transform:uppercase;color:var(--muted)">Problema</strong><div>'+E(c.main_issue)+'</div></div>':'')
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;gap:.4rem;flex-wrap:wrap">'
      +'<div style="font-size:.6875rem;color:var(--muted)">'+(dateStr?E(dateStr):'')+(platforms?' · '+E(platforms):'')+'</div>'
      +sourceTag
      +'</div>'
      +(igPerm?'<div style="margin-top:.4rem"><a href="'+E(igPerm)+'" target="_blank" rel="noopener" style="font-size:.6875rem">Ver no Instagram ↗</a></div>':'')
      +(p.ads_library_url?'<div style="margin-top:.4rem"><a href="'+E(p.ads_library_url)+'" target="_blank" rel="noopener" style="font-size:.6875rem">Ver na Ads Library ↗</a></div>':'')
      +'</div></div>';
  };

  if (d.creative_matrix?.length) {
    const vc = {manter:'green',otimizar:'yellow',eliminar:'danger'};

      label: verdictLabels[k]||k, value: verdictCount[k], tone: verdictTone[k]||'gray',

    const total = d.creative_matrix.length;
    const elimPct = Math.round(((verdictCount.eliminar||0)/total)*100);
    const manterPct = Math.round(((verdictCount.manter||0)/total)*100);
    const verdictInsight = elimPct >= 40
