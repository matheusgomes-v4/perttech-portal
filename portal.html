argumento de ROI é claro e verificável — mas não está sendo comunicado por nenhum player do mercado hoje."},"real_differentials":[{"differential":"Carteira enterprise verificável: DHL, Vopak, Wurth, Rede Novo Tempo, Trimais — clientes que passaram por homologação rigorosa de fornecedor","status":"confirmed","icp_relevance":"Elimina a principal objeção do ICP (confiança) sem precisar convencer. Gestor de TI vê DHL no portfólio e a decisão já está 80% feita. Nenhum concorrente regional identificado possui ou comunica equivalente.","action_needed":null},{"differential":"30 anos de expertise técnica multimarca — diagnóstico acertado que empresas jovens não conseguem replicar","status":"confirmed","icp_relevance":"Gestor técnico valoriza 'resolve na primeira visita' mais que preço. Experiência de 30 anos com múltiplas marcas reduz risco de diagnóstico errado e retrabalho.","action_needed":"Comunicar como 'especialização técnica' com evidência (índice de retorno, marcas atendidas), não apenas como 'anos de mercado'"},{"differential":"Baixíssimo índice de retorno técnico — resolução na primeira visita como padrão","status":"confirmed","icp_relevance":"Responde diretamente à dor #3 do ICP (fornecedor que vem múltiplas vezes e não resolve). Fornecedor que resolve na primeira visita poupa tempo, custo logístico e exposição ao risco.","action_needed":"Formalizar o número real (% de retornos). Usar em proposta comercial e site como dado verificável."},{"differential":"Modelo de contrato anual preventivo já validado pelo mercado — Curva A do faturamento","status":"confirmed","icp_relevance":"ICP maduro (gestores de TI/Facilities em grandes empresas) quer SLA e previsibilidade, não fornecedor spot. Perttech já entrega isso — falta comunicar e converter base avulsa.","action_needed":"CRM para mapear avulsos recorrentes + proposta com ROI calculado vs. custo de parada"},{"differential":"Presença digital estruturada capturando inbound emergencial","status":"potential","icp_relevance":"O gatilho de compra mais frequente é emergência — gestor busca no Google com operação parada. Sem digital, Perttech não existe nesse momento de máxima intenção.","action_needed":"GMB com reviews enterprise + pixel instalado + LP com logos e CTA — fundação mínima antes de qualquer mídia paga"},{"differential":"Case de ROI publicado com cliente enterprise — argumento de autoridade replicável em escala","status":"potential","icp_relevance":"Um case bem escrito (ex: 'Como a Perttech reduziu em X% o tempo de parada da DHL em 12 meses') é mais persuasivo que qualquer anúncio pago e não pode ser copiado por concorrente sem o mesmo histórico.","action_needed":"Escolher 1 cliente enterprise disposto a participar + estruturar case com dados reais de antes/depois"}],"summary_headline":"SAM regional de R$280M [E] — Perttech captura 0,78% com zero presença digital. Nenhum concorrente usa credencial enterprise (DHL/Vopak/Wurth) como ativo digital: janela de 12–18 meses para posicionamento first-mover único no segmento.","summary_highlights":[{"category":"posicao","label":"Share atual do SAM","value":"0,78% do SAM","subtext":"R$2,2M de R$280M disponíveis na região [E]","tone":"yellow"},{"category":"oportunidade","label":"Potencial (SOM)","value":"R$15M","subtext":"5,4% do SAM — teto para especialista enterprise posicionado [E]","tone":"green"},{"category":"competicao","label":"Concorrentes analisados","value":"5 players","subtext":"Nenhum usa credencial enterprise como diferenciador digital","tone":"green"},{"category":"janela","label":"Janela first-mover","value":"12–18 meses","subtext":"Recomex avança em digital; quadrante enterprise ainda vago","tone":"yellow"},{"category":"risco","label":"Principal ameaça digital","value":"Recomex Energia","subtext":"4 anos de mercado, melhor SEO do segmento — sem credencial enterprise","tone":"red"},{"category":"oportunidade","label":"Diferencial único","value":"DHL + Vopak + Wurth","subtext":"Carteira enterprise que nenhum concorrente regional possui ou comunica","tone":"green"}],"summary_key_findings":[{"category":"vantagem","text":"Perttech tem o diferencial competitivo mais difícil de replicar do segmento regional — carteira com DHL, Vopak e Wurth — e nenhum concorrente identificado possui ou comunica algo equivalente em canal digital."},{"category":"contexto","text":"O mercado regional (R$280M [E]) opera majoritariamente em modo reativo: empresas chamam fornecedor só quando quebra. Isso significa demanda estrutural existente e não atendida por contratos preventivos — modelo que a Perttech já tem validado como Curva A."},{"category":"ameaca","text":"Recomex Energia (4 anos de mercado, digital score 7/10) está consolidando autoridade de busca orgânica no segmento. Se a Perttech não estruturar GMB + SEO básico nos próximos 6–12 meses, o espaço digital de 'manutenção nobreak SP' estará ocupado por um player sem credencial enterprise mas com visibilidade superior."},{"category":"acao","text":"A jogada imediata é ocupar o quadrante 'Alto digital + Enterprise credential': GMB com reviews DHL/Vopak + LP com logos enterprise + 1 case de ROI publicado. Custo próximo de zero, impacto imediato em conversão de inbound e diferenciação permanente vs. todos os concorrentes identificados."}],"key_insight":{"headline":"30 anos de clientes enterprise não digitalizados = o ativo mais valioso do segmento, desperdiçado enquanto concorrentes de 4 anos lideram no Google.","context":"A Perttech tem a credencial que todo concorrente regional gostaria de ter — DHL, Vopak e Wurth no portfólio. Esses nomes passaram por homologação rigorosa e qualquer gestor de TI os reconhece como prova de competência. Mas nenhum desses logos existe em nenhum canal digital da Perttech hoje. Enquanto isso, Recomex (4 anos, zero clientes enterprise) ranqueia à frente para os termos que o ICP busca na emergência.","numbered_reasons":["(1) A credencial enterprise é a barreira de entrada mais alta do segmento — nenhum concorrente regional identificado pode colocar DHL ou Vopak em campanha ou GMB porque simplesmente não os tem como cliente","(2) O setor inteiro é digitalmente imaturo — o primeiro player a combinar credencial enterprise com presença digital básica captura um quadrante sem disputa real","(3) A janela está se fechando: Recomex avança em digital sem credencial enterprise — se a Perttech agir antes que Recomex conquiste clientes grandes, o posicionamento fica permanente"],"discussion_anchor":"A decisão estratégica para Altair é simples: usar DHL e Vopak como marketing ativo (reviews, cases, logos visíveis) ou continuar deixando esse ativo de 30 anos invisível enquanto Recomex, com 4 anos e zero clientes enterprise, aparece primeiro quando um gestor de TI busca manutenção de nobreak no Google."},"completed_at":"2026-05-22T00:00:00Z"},"ee-s2-posicionamento":{"summary":"Perttech ocupa o território 'Especialista Enterprise em Energia Crítica' com PUV: 'Manutenção de sistemas críticos de energia para empresas com operação 24/7 — técnico especializado, resolução na primeira visita, carteira com DHL, Vopak e Wurth. Há 30 anos, onde a pane não pode esperar.' Território de marca: Confiança · Precisão · Enterprise. Janela de 12–18 meses para ser o primeiro player a combinar credencial enterprise com presença digital na Grande SP.","client_name":"Perttech","positioning_map":{"axis_x":"Generalista → Especialista B2B Enterprise","axis_y":"Baixa presença digital → Alta presença digital","client_position":"Alto digital + Especialista Enterprise (quadrante recomendado — hoje vago)","justification":"Nenhum concorrente regional combina presença digital estruturada com credencial enterprise verificável. A Perttech tem a credencial (DHL, Vopak, Wurth) e precisa construir o digital. Recomex tem o digital mas não tem enterprise. O quadrante alto digital + enterprise está disponível e é o de maior valor percebido pelo ICP.","competitor_positions":[{"name":"Recomex Energia","quadrant":"Alto digital + Generalista (sem enterprise)"},{"name":"Central do Nobreak","quadrant":"Médio digital + Especialista técnico B2B"},{"name":"Danffer Nobreak","quadrant":"Médio-baixo digital + Especialista técnico (sem credencial enterprise comunicada)"},{"name":"Seko Eletrônica","quadrant":"Baixo digital + Especialista técnico (fabricante)"},{"name":"RD Energia","quadrant":"Baixo digital + Generalista"},{"name":"Perttech (posição atual)","quadrant":"Baixo digital + Especialista Enterprise (real, mas invisível)"}]},"positioning_statements":[{"label":"O Especialista Enterprise","statement":"Para gestores de TI, Infraestrutura e Facilities de médias e grandes empresas da Grande São Paulo, a Perttech é a empresa de manutenção de sistemas elétricos críticos que resolve na primeira visita porque tem 30 anos de expertise técnica multimarca e a carteira enterprise mais verificável da região — DHL, Vopak e Wurth.","justification":"Combina o diferencial mais único (carteira enterprise) com o argumento técnico (30 anos, resolução 1ª visita) e diz claramente para quem é. Nenhum concorrente regional pode fazer essa declaração.","bet":"A credencial enterprise como prova social principal — elimina a objeção de confiança (barreira #1 do ICP) antes de qualquer conversa de preço.","risk":"Exige digitalizar as provas (GMB com reviews enterprise, logos no site) para que o posicionamento seja percebido. Sem esse passo inicial, a declaração existe só no papel."},{"label":"O Parceiro de Previsibilidade","statement":"Para responsáveis por infraestrutura crítica em empresas que não podem parar, a Perttech é o parceiro de manutenção elétrica que transforma atendimento de emergência em contrato de previsibilidade porque conhece os equipamentos, o histórico e os riscos de cada cliente desde o primeiro chamado.","justification":"Foca no modelo de negócio mais lucrativo (contratos anuais — Curva A) e no Job emocional do ICP (paz de espírito, previsibilidade). Diferencia Perttech como parceiro estratégico, não fornecedor spot.","bet":"Modelo de relacionamento de longo prazo — ideal para converter base avulsa em contratos anuais e trabalhar retenção.","risk":"Tom de longo prazo não captura lead emergencial, que é o gatilho mais frequente de novos clientes. Menos eficaz para aquisição digital inbound."},{"label":"O Diagnóstico que Resolve","statement":"Para gestores técnicos que já perderam tempo e dinheiro com fornecedores que cobram e não resolvem, a Perttech é a empresa de manutenção de nobreaks e equipamentos elétricos que entrega diagnóstico técnico correto na primeira visita porque tem técnicos com expertise multimarca de 30 anos e índice de retorno quase zero.","justification":"Foca no diferencial de qualidade técnica e anti-retrabalho — dor explícita do ICP (fornecedor que vem múltiplas vezes sem resolver). Posicionamento anti-amador que diferencia por competência técnica.","bet":"Persuasivo para quem já teve experiência ruim com concorrente — parcela significativa do mercado.","risk":"Posicionamento reativo — não captura clientes em modo preventivo ou que ainda não tiveram experiência ruim com concorrente."}],"chosen_statement":"Para gestores de TI, Infraestrutura e Facilities de médias e grandes empresas da Grande São Paulo, a Perttech é a empresa de manutenção de sistemas elétricos críticos que resolve na primeira visita porque tem 30 anos de expertise técnica multimarca e a carteira enterprise mais verificável da região — DHL, Vopak e Wurth.","puv":"Manutenção de sistemas críticos de energia para empresas com operação 24/7 — técnico especializado, resolução na primeira visita, carteira com DHL, Vopak e Wurth. Há 30 anos, onde a pane não pode esperar.","canvas_4p":{"product":{"delivers":"Não manutenção de nobreak — entregamos a certeza de que os sistemas críticos da empresa não vão parar por falha elétrica. O equipamento é o meio; a operação contínua e a tranquilidade do gestor responsável são o fim.","transformation":"ANTES: Gestor de TI que não sabe o estado real dos equipamentos, não tem fornecedor de confiança salvo, e só descobre o problema quando vira crise às 22h com operação parada e diretoria cobrando. DEPOIS: Gestor com contrato preventivo ativo, SLA garantido, histórico dos equipamentos mapeado, e um fornecedor que DHL e Vopak já aprovaram — pode focar no trabalho sem o risco constante de pane não prevista.","doesnt_deliver":"Não instalamos energia solar. Não fazemos instalações elétricas prediais. Não atendemos residencial. Não processamos pedido de 'quero o mais barato' sem diagnóstico técnico — não fazemos manutenção sem entender o que está sendo protegido."},"price":{"positioning":"mid-market","justification":"Preço justo de especialista — não somos o mais barato do mercado e não nos posicionamos como premium de luxo. Nosso argumento de valor é técnico: índice de retorno quase zero significa que você paga uma vez e o equipamento volta funcionando. Uma manutenção 'mais barata' que precisa de segunda visita custa mais no total e dobra o tempo de parada. O custo certo é o que resolve na primeira vez.","anchoring":"Ancora pelo custo da inação: uma hora de parada de servidor em empresa de 200 funcionários custa R$3.000–15.000 [E]. Um contrato preventivo anual custa menos que isso — e você usa antes da pane, não depois. Ancora por comparação de resultado: manutenção que resolve na primeira visita vs. manutenção que precisa de 2–3 visitas — o mais barato na tabela raramente é o mais barato no total."},"place":{"main_channel":"Google Meu Negócio + Google Search (inbound emergencial)","main_channel_justification":"O gatilho de compra mais frequente do ICP é emergência — gestor busca com alta intenção ('manutenção nobreak urgente SP'). GMB com reviews de clientes enterprise cria credibilidade imediata no momento de maior disposição a pagar. Custo de entrada: zero. Impacto: 30–60 dias.","support_channel":"LinkedIn orgânico — perfis de Coordenadores de TI, Gerentes de Manutenção e Facilities Managers da RMSP. Usado para prospecção ativa de contratos anuais (não emergência).","avoid_channels":[{"channel":"TikTok","reason":"ICP é 35–50+ anos, B2B, contexto técnico. Nenhum Coordenador de Infraestrutura vai contratar manutenção crítica por TikTok."},{"channel":"Instagram (como canal primário de geração de lead)","reason":"B2B em contexto de emergência não usa Instagram para buscar fornecedor. Pode ser suporte de marca, não canal de aquisição primário."},{"channel":"Google Display (frio)","reason":"Sem pixel instalado e sem retargeting configurado, display frio tem CTR mínimo e gera gasto sem resultado. Ativar só após pixel + base de retargeting formada."}]},"promotion":{"tone":"Técnico/profissional com precisão e humanidade. Dados, credenciais, especificidades técnicas — sem adjetivo vazio, sem entusiasmo corporativo. O técnico sênior que sabe o que está fazendo e explica sem arrogância.","top_funnel_message":"Sua empresa tem sistemas críticos que não podem parar. DHL, Vopak e Wurth já sabem quem ligar quando o nobreak falha — você sabe?","bottom_funnel_message":"30 anos. Taxa de retorno quase zero. Clientes como DHL e Vopak. Diagnóstico técnico gratuito para novos clientes — agende agora e entenda o estado real dos seus equipamentos antes da próxima pane."}},"brand_territory":{"three_words":["Confiança","Precisão","Enterprise"],"description":"Confiança: a Perttech é o fornecedor que gestores de TI de DHL, Vopak e Wurth escolheram e podem recomendar sem hesitar — em equipamentos críticos, a escolha do fornecedor é uma escolha de credibilidade profissional. Precisão: diagnóstico técnico correto na primeira visita, 30 anos de expertise multimarca — não resolve 'mais ou menos', resolve. Enterprise: não atende tudo para todos — atende empresas com equipamentos críticos reais, onde o erro tem custo mensurável. Esse recorte é posicionamento, não exclusividade de preço.","competitor_territories":[{"competitor":"Danffer Nobreak","territory":"Credencial de fabricante / cobertura geográfica ampla"},{"competitor":"Recomex Energia","territory":"Digital-first / escalabilidade via grupo holding"},{"competitor":"Central do Nobreak","territory":"Educação técnica / autoridade de conteúdo B2B"},{"competitor":"Seko Eletrônica","territory":"Fabricante / expertise de manufatura"},{"competitor":"RD Energia","territory":"Generalista de energia / diversificação (solar + nobreak)"}],"availability_justification":"Nenhum concorrente identificado ocupa 'Confiança + Precisão + Enterprise' com evidência verificável: Danffer tem anos de mercado mas zero logos enterprise comunicados; Recomex tem digital mas zero clientes grandes; os demais são generalistas ou de porte menor. O território está disponível e é sustentável pela Perttech — os três atributos têm evidência real (DHL/Vopak/Wurth para Enterprise, 30 anos + diagnóstico multimarca para Precisão, recomendação 5/5 para Confiança)."},"taglines":[{"tagline":"Onde a pane não pode esperar.","tone":"Urgência / resolução / confiança","justification":"Responde ao contexto real de maior intenção de compra: emergência. 'Não pode esperar' é tanto a dor do cliente (pane ativa, operação parada) quanto a proposta da Perttech (disponibilidade, resolução rápida). Curta o suficiente para qualquer formato. Sem adjetivo vazio.","best_use":"Anúncios Google Search, GMB, headline de site, banner"},{"tagline":"Seus sistemas críticos merecem quem conhece o que está em jogo.","tone":"Aspiracional com âncora técnica / profissional","justification":"Fala com o Job social do ICP: ser reconhecido por tomar a decisão técnica certa. 'Conhece o que está em jogo' ativa a diferença entre Perttech e um fornecedor genérico — verificável pelos 30 anos e DHL/Vopak. Funciona bem em contexto consultivo.","best_use":"Proposta comercial, assinatura de email, apresentação institucional"},{"tagline":"30 anos resolvendo o que não pode quebrar.","tone":"Credibilidade / autoridade / histórico","justification":"Ancora em dado verificável (30 anos), conecta diretamente ao serviço ('o que não pode quebrar' = sistemas críticos). Simples, memorizável, diferente das taglines genéricas do setor.","best_use":"LinkedIn, apresentação institucional, posts de marca"}],"recommended_tagline":"Onde a pane não pode esperar.","operator_direction":{"strongest_differential":"Carteira enterprise verificável (DHL, Vopak, Wurth) — inferido do briefing, QNP e pesquisa de mercado","desired_position":"Alto digital + Especialista Enterprise — quadrante vago identificado na pesquisa de mercado","positioning_restrictions":["Não quer ser associado a genérico ou barato — migração de 'mais qualidade por menor preço' para 'custo-benefício de especialista enterprise'"],"desired_tone":"Transparente, honesto, responsável (briefing) — traduzido como técnico/profissional com humanidade"},"summary_headline":"Perttech ocupa o território 'Especialista Enterprise em Energia Crítica' — quadrante único na Grande SP com janela de 12–18 meses enquanto Recomex tem digital mas zero credencial enterprise.","summary_highlights":[{"category":"posicao","label":"Território recomendado","value":"Especialista Enterprise","subtext":"Confiança · Precisão · Enterprise — quadrante sem concorrente direto na região","tone":"green"},{"category":"competicao","label":"Principal ameaça digital","value":"Recomex (sem enterprise)","subtext":"Score 7/10 em digital, 4 anos, zero DHL/Vopak — janela ainda aberta","tone":"yellow"},{"category":"janela","label":"Janela de oportunidade","value":"12–18 meses","subtext":"Cada mês sem GMB + LP enterprise = Recomex consolida busca sem ter a credencial","tone":"yellow"},{"category":"oportunidade","label":"Arma competitiva","value":"DHL + Vopak + Wurth","subtext":"Nenhum concorrente regional pode replicar — custo de digitalizar: zero","tone":"green"},{"category":"risco","label":"Risco de posicionamento","value":"'Mais barato' não sustenta Enterprise","subtext":"Migrar de 'mais qualidade por menor preço' para 'custo-benefício de especialista'","tone":"red"},{"category":"oportunidade","label":"ICP principal","value":"Gestor TI/Facilities enterprise","subtext":"Decide por confiança — WTP alto para contrato anual preventivo","tone":"green"}],"summary_key_findings":[{"category":"vantagem","text":"O território 'Especialista Enterprise em Energia Crítica' está disponível na Grande SP — a Perttech tem todos os ativos para ocupá-lo (DHL/Vopak/Wurth, 30 anos, índice de retorno quase zero) e nenhum concorrente tem o mesmo conjunto."},{"category":"ameaca","text":"O posicionamento atual 'mais qualidade por menor preço' é inconsistente com o território Enterprise — um especialista enterprise não comunica ser o mais barato. A migração para 'custo-benefício de especialista' preserva o valor percebido sem afugentar Compras."},{"category":"contexto","text":"Recomex (4 anos, score 7 em digital) avança em visibilidade sem credencial enterprise. Se a Perttech não ocupar o quadrante 'alto digital + enterprise' nos próximos 6–12 meses, o espaço de busca estará ocupado por um player sem a mesma credencial mas com mais visibilidade."},{"category":"acao","text":"PUV e território definidos. Próximos passos imediatos: GMB com reviews enterprise (DHL/Vopak) + logos na LP + tagline 'Onde a pane não pode esperar' em todos os pontos de contato digitais. Custo: zero. Impacto em 30–60 dias."}],"key_insight":{"headline":"Território 'Especialista Enterprise em Energia Crítica' disponível por 12–18 meses — enquanto Recomex tem digital mas zero DHL, a Perttech tem DHL mas zero digital.","context":"A Perttech tem o ativo competitivo mais difícil de fabricar no segmento: uma carteira com DHL, Vopak e Wurth que passou por homologação rigorosa e que nenhum concorrente regional pode simplesmente comprar ou copiar. O que falta é tornar esse ativo visível. Recomex — com 4 anos de mercado e zero enterprise — lidera o Google porque construiu presença digital enquanto a Perttech atendia por indicação. A janela está aberta: quando Recomex conquistar seus primeiros clientes grandes, o posicionamento enterprise passa a ter disputa real de um player que já tem o digital estruturado.","numbered_reasons":["(1) A carteira enterprise existe e é verificável — nenhum concorrente regional pode colocar DHL ou Vopak em GMB ou campanha porque simplesmente não os tem como cliente","(2) O setor inteiro é digitalmente imaturo — o primeiro player a combinar credencial enterprise com presença digital básica (GMB + LP) captura o quadrante sem disputa","(3) A janela de 12–18 meses é real e finita — quando Recomex conquistar seus primeiros clientes grandes, o posicionamento enterprise passa a ser disputado por um player que já tem digital estruturado"],"discussion_anchor":"A decisão para Altair é uma: usar DHL e Vopak como marketing ativo (reviews, logos, cases visíveis) agora — ou esperar mais um ano e disputar esse espaço com a Recomex que já terá a visibilidade digital que a Perttech ainda não construiu."},"honesty_alert":"O território 'Enterprise' é real — mas depende de digitalização da prova. DHL, Vopak e Wurth existem no portfólio; o que não existe é review no GMB, logo no site, case publicado. O mercado só vai perceber o posicionamento Enterprise quando essa prova estiver visível. Sequência obrigatória antes de qualquer mídia paga: (1) GMB com reviews de 2–3 clientes enterprise → (2) logos na LP → (3) 1 mini-case publicado. Sem isso, o posicionamento é declaração interna, não percepção de mercado.","completed_at":"2026-05-22T01:00:00Z"},"ee-s3-brandbook":{"summary":"Brandbook da Perttech estruturado em torno da tensão central 'operação que não pode parar × especialista que resolve na primeira visita'. Tom de voz em 4 adjetivos — Direto, Técnico-Preciso, Confiante, Responsável — com 30 headlines prontas, 25 CTAs e vocabulário curado para eliminar o jargão genérico que apaga a vantagem competitiva real: 30 anos + DHL/Vopak/Wurth.","summary_headline":"Perttech fala com 'Ricardo Silva, Coordenador de Infraestrutura' em tom Direto+Confiante — tensão central: 'parada não é opção / a Perttech é a resposta certa' — banco de 30 headlines e vocabulário de 28 palavras curadas.","summary_highlights":[{"category":"posicao","label":"Tom de voz","value":"4 adjetivos","subtext":"Direto · Técnico-Preciso · Confiante · Responsável","tone":"blue"},{"category":"oportunidade","label":"Banco de copy","value":"30 headlines + 25 CTAs","subtext":"Topo de funil (10) · Autoridade (10) · Sales page (10) · 5 contextos de CTA","tone":"green"},{"category":"maturidade","label":"Especificidade do propósito","value":"Alta","subtext":"'Por que existimos' não funciona se trocar Perttech por outra empresa — validado","tone":"green"},{"category":"risco","label":"Palavras banidas","value":"12 termos","subtext":"'Solução', 'excelência', 'qualidade', 'custo-benefício' — substituídas por dados reais","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"A Perttech tem uma tensão narrativa genuína e rara em PMEs: 'o cliente não pode parar × o especialista que realmente resolve'. Essa tensão específica + prova social verificável (DHL/Vopak/Wurth) + 30 anos cria uma narrativa de marca que nenhum concorrente regional consegue copiar."},{"category":"contexto","text":"Tom de voz declarado no briefing (Transparente · Honesto · Responsável) foi refraseado para 4 adjetivos acionáveis com exemplos concretos. 'Transparente' → 'Direto'; 'Honesto' → 'Confiante' (sem se desculpar pelo que entrega); 'Responsável' permanece. Adicionado 'Técnico-Preciso' como diferencial de autoridade que o ICP B2B exige."},{"category":"ameaca","text":"A Perttech hoje usa linguagem genérica em todos os canais ('excelência', 'soluções', 'comprometimento') que apaga o diferencial real. O vocabulário banido neste brandbook documenta exatamente as palavras que tornam a Perttech indistinguível de qualquer concorrente genérico."},{"category":"acao","text":"Aplicação imediata: os templates de 'about page' e 'post de rede social' são substitutos diretos para os textos atuais do site e Instagram. As 10 headlines de topo de funil alimentam diretamente ee-s3-copy-anuncios (Google Search) sem reescrita adicional."}],"purpose":{"why_we_exist":"Existimos porque empresas que operam 24/7 não deveriam temer uma pane elétrica — e porque, por três décadas, percebemos que o problema nunca foi só o equipamento que falhou: foi o fornecedor que não atendeu, o técnico que não resolveu na primeira visita, a incerteza de não saber em quem confiar quando a operação parou. A Perttech existe para ser a resposta certa para quando parar não é uma opção.","for_whom":"Gestores de TI, Infraestrutura e Facilities de médias e grandes empresas na Grande São Paulo que dependem de equipamentos elétricos críticos — servidores, UPS industriais, sistemas de segurança — e que não podem arriscar uma parada operacional por causa de um fornecedor de manutenção que falha no momento decisivo. Empresas que tratam manutenção de energia como seguro de operação, não como commodity de compra pelo menor preço.","not_for_whom":"Empresas que selecionam fornecedor de manutenção exclusivamente por preço. Consumidores finais residenciais que precisam de assistência técnica pontual. Pequenas empresas que compram nobreak pela primeira vez e estão no estágio de pesquisa de produto — não de gestão contínua de infraestrutura. Qualquer perfil que trate o técnico como substituível e a manutenção como custo evitável.","positioning":"Para gestores de TI, Infraestrutura e Facilities de médias e grandes empresas da Grande São Paulo que não podem arriscar parada operacional por falha elétrica, a Perttech é a empresa de manutenção de sistemas críticos de energia que resolve na primeira visita porque tem 30 anos de expertise técnica multimarca verificável — com DHL, Vopak e Wurth como prova.","promise":"Técnico especializado no seu equipamento, na sua empresa, na primeira visita. Se não resolver, retornamos sem custo adicional. Essa não é uma cláusula no contrato — é a razão pela qual a DHL e a Vopak renovam há anos."},"verbal_identity":{"tone_adjectives":[{"adjective":"Direto","opposite":"rude ou frio","explanation":"A Perttech vai ao ponto sem rodeios — e sem ser grosseira. Frases curtas, informação na ordem certa (problema → solução → prova), zero enchimento. 'Resolve na primeira visita ou retornamos sem custo' diz em 8 palavras o que outros diriam em 3 parágrafos de 'buscamos sempre a excelência no atendimento ao cliente'. Ser direto também significa não se desculpar pelo que entrega: a Perttech afirma sem hedge."},{"adjective":"Técnico-Preciso","opposite":"pedante ou impenetrável","explanation":"Usa a linguagem do ofício com precisão — 'autonomia de bateria', 'UPS de dupla conversão', 'manutenção preventiva semestral' — mas acessível para o Gestor de TI que não é eletricista. Nunca usa jargão para impressionar; usa para comunicar com precisão. A diferença: 'Bateria com 18% de capacidade residual — troca recomendada antes de 60 dias' (técnico-preciso) vs 'Identificamos uma situação que pode requerer atenção' (vago) vs 'O elemento eletroquímico de armazenamento energético está com degradação acima do limiar operacional' (pedante)."},{"adjective":"Confiante","opposite":"arrogante ou prepotente","explanation":"Afirma sem se desculpar. '30 anos. DHL. Vopak.' — não 'acreditamos que podemos oferecer um atendimento de qualidade'. A confiança da Perttech vem de evidência, não de ego: 30 anos de histórico e carteira enterprise verificável dão respaldo para afirmar sem qualificadores. 'Somos especializados em nobreaks para empresas que não podem parar' — não 'tentamos ser especializados' ou 'nos esforçamos para atender com qualidade'. A marca não é a melhor do mundo — é a mais confiável para o ICP específico, e diz isso claramente."},{"adjective":"Responsável","opposite":"burocrático ou evasivo","explanation":"Assume compromisso claramente e sem eufemismos. 'Se não resolver na primeira visita, retornamos sem custo adicional' — não 'verificaremos as possibilidades de retorno conforme a disponibilidade técnica'. Quando há um problema, nomeia o problema. Quando há uma limitação, nomeia a limitação. Responsável significa que o texto da Perttech nunca vai soar como fine print: o compromisso está no título, não nas letras miúdas."}],"writing_style":{"sentence_length":"Curtas e diretas. Máximo 20 palavras por frase. Uma ideia por frase. Ponto final ao invés de vírgula encadeada. Períodos mais longos apenas quando o contexto técnico exige — e ainda assim, no máximo 2 orações subordinadas.","emoji_usage":"Apenas em contexto informal: Instagram Stories e WhatsApp de relacionamento com cliente ativo. Nunca em: site, GMB, proposta comercial, laudo técnico, assinatura de e-mail, anúncios do Google. No Instagram orgânico: 1 emoji por post máximo, funcional (📲 para WhatsApp, ✅ para checklist). Nunca decorativo.","humor_usage":"Zero trocadilhos. Zero ironia. A pane elétrica de uma empresa é um problema sério — o tom da Perttech também. Não significa que é pesado ou dramático: é sóbrio e direto. Um leve toque de autoconfiança é permitido ('30 anos. DHL. Vopak. Agora é a sua vez.'), mas humor nunca.","technical_language":"Usar termos técnicos que o ICP conhece e espera: 'UPS', 'nobreak', 'manutenção preventiva/corretiva', 'capacidade de carga', 'autonomia de bateria', 'técnico sênior', 'multimarca', 'Certified Partner'. Nunca traduzir o que o ICP já sabe — não escrever 'nobreak (equipamento que protege contra quedas de energia)'. Nunca usar jargão para impressionar: 'elemento eletroquímico de armazenamento' quando 'bateria' resolve.","form_of_address":"'Sua empresa', 'sua operação', 'seus equipamentos', 'seu time de TI'. Nunca 'você' no sentido individual/doméstico — o interlocutor é um profissional falando em nome de uma organização. Em contexto de relacionamento (WhatsApp direto, e-mail pessoal): pode usar o nome próprio se conhecido.","preferred_format":"Bullets para listas de benefícios, specs e checklists técnicos — máximo 5 itens, cada um em 1 linha. Números reais sempre que disponíveis (30 anos, não 'décadas de experiência'). Nomes de clientes reais quando autorizados (DHL, Vopak, Wurth — não 'grandes empresas'). Negrito para o dado mais importante do parágrafo — nunca para decoração.","punctuation_style":"Travessão para ênfases e quebras de ritmo: 'Técnico especializado na sua empresa — resolução na primeira visita.' Reticências: nunca (passa insegurança e imprecisão). Exclamação: nunca em contexto B2B formal ou no site. No Instagram Stories: permitido com parcimônia (1 por post). Aspas: apenas para citações reais (depoimentos de clientes)."},"donts":[{"do":"Resolve na primeira visita — ou retornamos sem custo adicional.","dont":"Buscamos sempre a melhor solução possível para atender às suas necessidades.","reason":"O ICP precisa de garantia mensurável, não de intenção vaga. 'Melhor solução' e 'atender às necessidades' são frases que qualquer empresa pode usar — e por isso não dizem nada sobre a Perttech."},{"do":"30 anos de manutenção de sistemas elétricos críticos. DHL, Vopak e Wurth confiam.","dont":"Empresa com vasta experiência no mercado comprometida com excelência e qualidade no atendimento.","reason":"'Vasta experiência', 'excelência' e 'qualidade' são os três termos mais usados e menos acreditados no B2B brasileiro. 30 anos + nomes de clientes enterprise são evidências — adjetivos abstratos são ruído."},{"do":"Bateria com 18% de capacidade residual. Recomendo substituição antes dos próximos 60 dias.","dont":"Identificamos uma situação que pode necessitar de atenção em um futuro próximo.","reason":"O Gestor de TI (Ricardo Silva) precisa levar esse dado para a reunião de orçamento. 'Situação que pode necessitar de atenção' não ajuda ninguém a tomar decisão. Número + prazo + recomendação = copy útil."},{"do":"Não somos a opção mais barata — somos a mais confiável para quem não pode arriscar parada.","dont":"Oferecemos o melhor custo-benefício do mercado para empresas de todos os tamanhos.","reason":"'Custo-benefício' é a frase de todo generalista que compete por preço. A Perttech compete por confiança — e dizer isso explicitamente filtra os clientes errados (Caçador de Preço) e atrai os certos (Gestor que decidiu pelo valor)."},{"do":"Parceiro certificado APC e Legrand. Atendemos mais de 20 marcas.","dont":"Trabalhamos com diversas marcas renomadas do mercado para oferecer soluções completas.","reason":"O ICP técnico sabe o que APC e Legrand significam — são os fabricantes que ele especifica. Citar 'diversas marcas renomadas' não comunica nada para quem conhece o mercado. Nome + certificação = credibilidade técnica."}]},"brand_narrative":{"before":"O Coordenador de Infraestrutura de uma empresa que opera 24/7 aprende na marra o que acontece quando o fornecedor de nobreak falha. Não é a pane em si que marca — é o técnico que não atendeu às 22h, o retorno agendado para 3 dias depois, a segunda visita que exigiu a peça que não estava no veículo. São horas de operação parada e explicações para a diretoria sobre por que o sistema ficou exposto.\n\nCom o tempo, ele passa a conviver com a incerteza — não porque aceitou, mas porque não encontrou alternativa confiável na região. Cada novo contrato de manutenção é uma aposta. Cada fornecedor novo, a mesma pergunta: 'Dessa vez vai funcionar de verdade?' A manutenção preventiva vira formalidade de compliance, porque ninguém acredita mais que ela realmente previne — e a corretiva vira rotina de crise.\n\nNo fundo, o que ele quer é simples: um número para ligar quando precisar, um técnico que conhece os equipamentos dele, e a certeza de que o problema vai ser resolvido na primeira visita — não em duas semanas com três orçamentos e um monte de 'vamos ver o que pode ser feito'.","different":"Na Perttech, a resolução na primeira visita não é um slogan — é o critério operacional que organiza cada atendimento. O técnico sai com ferramentas e peças para os equipamentos do cliente porque conhece o histórico da conta. Trinta anos de especialização multimarca significam, na prática, que já vimos quase todo cenário de falha de UPS no ABC e na Grande São Paulo.\n\nA DHL, a Vopak e a Wurth não renovariam contrato anual com quem não entrega. E não é coincidência que empresas com operação crítica 24/7 escolham a Perttech: é porque, quando a pane não pode esperar, precisam de alguém que já sabe o que fazer antes de chegar.","after":"Com a Perttech, o Coordenador de Infraestrutura sabe o que vai acontecer quando ligar. Tem um número que atende, um técnico que conhece os equipamentos e um laudo que explica o que foi feito e o que está por vir. A pane ainda pode acontecer — os equipamentos inevitavelmente envelhecem, a rede elétrica ainda oscila. Mas a incerteza sobre quem vai resolver desaparece.\n\nIsso muda a equação dentro da empresa: manutenção preventiva deixa de ser formalidade e vira decisão estratégica de custo. 'Gastei X no contrato anual e evitei uma parada que custaria Y' é uma justificativa que qualquer diretoria entende. O Coordenador deixa de ser o responsável pela crise — e vira o responsável pela continuidade.","templates":{"social_post":"Seu nobreak vai falhar — a questão é quando.\n\nSe você ainda não tem um contrato de manutenção preventiva, está apostando que vai falhar no momento errado. E se você já tem um, a próxima pergunta é: o seu fornecedor resolve na primeira visita?\n\nHá 30 anos, a Perttech mantém sistemas elétricos críticos para empresas como DHL, Vopak e Wurth no ABC e Grande São Paulo.\n\nNão porque somos os mais baratos — mas porque empresas que não podem parar precisam de um parceiro que não vai deixar na mão.\n\nTécnico especializado. Multimarca. Resolução na primeira visita.\n\n📲 Falar com técnico: link na bio.","ad":"Quando a energia falha, sua operação para.\nA Perttech resolve na primeira visita — há 30 anos.\nDHL, Vopak e Wurth confiam.\nTécnico especializado no ABC e Grande SP.\nFalar com técnico agora →","presentation":"A Perttech existe para que empresas que operam 24/7 nunca precisem temer uma pane elétrica — porque têm um especialista de confiança que conhece seus equipamentos, chega quando precisa e resolve na primeira visita.\n\nHá 30 anos em São Bernardo do Campo, somos Certified Partner APC e Legrand, atendemos mais de 20 marcas e mantemos sistemas elétricos críticos para empresas como DHL, Vopak, Wurth, Kuehne Nagel e Seara no ABC Paulista e Grande São Paulo.\n\nNosso modelo é simples: o técnico chega já sabendo o histórico dos equipamentos e com as peças mais comuns para o perfil da conta. Resolução na primeira visita não é promessa — é o critério que organiza nossa operação.\n\nAtendemos dois momentos:\n• Emergência corretiva — técnico no mesmo dia, diagnóstico e reparo\n• Contrato anual — manutenção preventiva programada + prioridade em emergências + SLA definido\n\nSe você gerencia infraestrutura de TI, manutenção ou facilities em uma empresa que não pode parar, a Perttech é o parceiro que faz a diferença entre uma parada de 2 horas e uma parada de 2 dias.\n\nOnde a pane não pode esperar.\n\nFale com a nossa equipe: 11 96262-0311","about_page":"A Perttech nasceu em São Bernardo do Campo há 30 anos com um princípio simples: manutenção de nobreaks para empresas que não podem parar.\n\nDe lá para cá, mantemos sistemas elétricos críticos de empresas como DHL, Vopak, Wurth, Kuehne Nagel e Seara no ABC Paulista e Grande São Paulo. Somos Certified Partner APC e Legrand e atendemos mais de 20 marcas — porque o problema do cliente raramente vem do equipamento que ele escolheria se escolhesse hoje.\n\nNosso diferencial não é o mais barato nem o mais rápido a prometer. É a resolução na primeira visita: o técnico sai com ferramentas e peças para o perfil do cliente, conhece o histórico dos equipamentos e diagnostica antes de agir. Se não resolver na primeira visita, retornamos sem custo adicional.\n\nPara empresas com operação 24/7, manutenção de energia não é custo — é seguro de continuidade.\n\nOnde a pane não pode esperar, a Perttech já está a caminho."}},"copy_bank":{"headlines":{"top_funnel":["Quanto custa 1 hora de operação parada na sua empresa?","A maioria das falhas de nobreak é evitável — mas ninguém descobre antes de acontecer.","Quando foi a última vez que alguém checou a autonomia real do seu UPS?","Seu fornecedor de manutenção atende no mesmo dia? O técnico chega com as peças certas?","Parada inesperada de sistema às 22h: quem você liga?","Manutenção preventiva de UPS: o custo que as empresas ignoram até não poder mais.","Data center, logística, saúde — qual é o tempo máximo de parada que sua operação tolera?","O nobreak protegeu a energia. Mas quem protege o nobreak?","Não é sobre comprar o melhor equipamento — é sobre quem o mantém funcionando.","Seu contrato de manutenção tem SLA definido? O que acontece se o técnico não resolver?"],"authority":["30 anos de manutenção de sistemas elétricos críticos no ABC e Grande São Paulo.","Certified Partner APC e Legrand. Multimarca: mais de 20 fabricantes atendidos.","DHL, Vopak e Wurth escolheram a Perttech para proteger suas operações — há anos.","Técnicos que conhecem a diferença entre diagnóstico e achismo.","Multimarca não é falta de especialização — é 30 anos de experiência com todos os fabricantes.","Onde a pane não pode esperar, a Perttech chega antes.","O técnico que vai na sua empresa já conhece o histórico dos equipamentos — não está vendo pela primeira vez.","Parceiros certificados dos principais fabricantes. Indicados por engenheiros de infraestrutura há 30 anos.","Resolução na primeira visita: não é coincidência, é método.","Para empresas enterprise, manutenção de UPS não é custo — é seguro de continuidade operacional."],"sales_page":["Manutenção de nobreaks para empresas que não podem parar. Técnico hoje no ABC e Grande SP.","Resolve na primeira visita — ou retornamos sem custo. Há 30 anos.","Sua operação 24/7 merece um contrato com SLA real — não uma promessa verbal.","Da emergência ao contrato anual: a Perttech cobre os dois momentos.","DHL. Vopak. Wurth. Agora é a sua vez de ter um parceiro de energia confiável.","Sistema parado? Técnico especializado no mesmo dia — ABC Paulista e Grande São Paulo.","Preventiva semestral + prioridade em emergência: o que está incluído no contrato anual Perttech.","30 anos de expertise. Técnico multimarca. Uma ligação de distância.","Onde a pane não pode esperar, a gente já está a caminho.","Sua empresa opera 24/7. Seu fornecedor de manutenção também deveria."]},"ctas":{"request_quote":["Solicitar proposta de contrato anual","Pedir orçamento de manutenção","Quero um laudo técnico dos meus equipamentos","Falar com técnico sobre minha operação","Solicitar visita técnica de diagnóstico"],"follow_social":["Salve esse post — checklist que seu técnico de TI vai agradecer","Marque o responsável por infraestrutura da sua empresa","Seguir a Perttech: conteúdo técnico para gestores de TI e Manutenção","Ver cases reais de clientes enterprise","Acompanhar para não perder o próximo checklist"],"download_material":["Baixar checklist de manutenção preventiva de UPS","Receber guia: como dimensionar nobreak para data center","Download: 5 sinais que seu UPS precisa de manutenção urgente","Acessar calculadora de ROI: manutenção preventiva vs corretiva","Receber proposta de contrato anual por e-mail"],"schedule_demo":["Agendar visita técnica de diagnóstico (sem custo)","Marcar avaliação dos seus equipamentos","Solicitar diagnóstico preventivo gratuito","Agendar visita do técnico sênior","Quero uma avaliação técnica da minha operação"],"whatsapp":["Chamar técnico agora →","Falar com especialista no WhatsApp →","Emergência? Chamar agora →","Solicitar visita pelo WhatsApp","Conversar com técnico →"]},"key_phrases":["Onde a pane não pode esperar.","Resolve na primeira visita — ou retornamos sem custo adicional.","30 anos. DHL. Vopak. Wurth.","Técnico que conhece seus equipamentos, não apenas a marca.","Manutenção de sistemas críticos de energia para empresas que operam 24/7.","Da emergência ao contrato anual — a Perttech cobre os dois momentos.","Sem parada. Sem retrabalho."],"vocabulary":{"always_use":[{"word":"nobreak","context":"Nunca 'no-break' com hífen (grafia incorreta) ou 'no break' separado. Usar 'UPS' apenas em contexto técnico onde o ICP prefere o acrônimo (data center, TI enterprise)."},{"word":"manutenção preventiva","context":"O produto A da empresa e a expressão que o ICP pesquisa no Google. Sempre por extenso — nunca abreviar para 'preventiva' isolado sem contexto."},{"word":"manutenção corretiva","context":"Para contexto de emergência. Distinguir claramente de 'preventiva' — eles têm jornadas de compra diferentes."},{"word":"contrato anual","context":"Produto de maior receita. Sempre destacar como produto premium com SLA — nunca como 'plano' ou 'pacote' (linguagem B2C)."},{"word":"técnico especializado","context":"Qualificar o técnico como especialista — nunca 'profissional' ou 'atendente'. 'Técnico sênior' para contextos de maior credencial."},{"word":"sistemas críticos de energia","context":"Categoria de produto em que a Perttech se posiciona. Mais preciso do que 'sistemas elétricos' (genérico) ou 'equipamentos' (vago)."},{"word":"operação 24/7","context":"Qualificador do ICP. Usar para filtrar — quem tem operação 24/7 sabe que é ele."},{"word":"resolução na primeira visita","context":"Promessa central. Usar sempre que possível — é o diferencial operacional mais verificável."},{"word":"multimarca","context":"Diferencial técnico. Usar junto com 'Certified Partner APC e Legrand' para mostrar que não é falta de especialização, é amplitude."},{"word":"SLA","context":"Para contexto de contrato anual e ICP enterprise. Usar sem explicar — o ICP sabe o que é."},{"word":"autonomia de bateria","context":"Dado técnico específico que demonstra expertise. Usar quando for relevante para o argumento."},{"word":"diagnóstico","context":"Etapa antes do reparo. A Perttech diagnostica antes de agir — isso diferencia de concorrentes que 'veem o que pode ser feito'."},{"word":"laudo técnico","context":"Documento pós-atendimento. Mencionar quando posicionando responsabilidade e documentação — sinal de profissionalismo."},{"word":"parceiro de energia","context":"Como a Perttech se refere à relação de longo prazo com clientes de contrato anual — não 'fornecedor' (transacional)."}],"never_use":[{"word":"solução","use_instead":"'manutenção', 'reparo', 'diagnóstico', 'contrato' — qualquer palavra específica que descreva o que realmente é feito"},{"word":"excelência","use_instead":"'resolve na primeira visita', '30 anos de especialização', 'DHL e Vopak confiam' — evidência concreta"},{"word":"qualidade","use_instead":"'resolução na primeira visita', 'Certified Partner APC', 'índice de retorno baixíssimo' — dado verificável"},{"word":"comprometimento","use_instead":"'se não resolver, retornamos sem custo' — compromisso com consequência"},{"word":"custo-benefício","use_instead":"'para empresas que não podem arriscar parada' — posicionamento por critério de decisão, não por preço"},{"word":"econômico / barato","use_instead":"não mencionar preço como diferencial — posicionamento é confiabilidade, não custo"},{"word":"atender às suas necessidades","use_instead":"'resolver o problema', 'garantir a continuidade da sua operação' — específico ao invés de genérico"},{"word":"sempre buscamos","use_instead":"afirmar sem hedge: 'fazemos', 'entregamos', 'garantimos' — linguagem confiante"},{"word":"melhor do mercado","use_instead":"'mais confiável para quem não pode parar', 'escolhido por DHL e Vopak' — específico ao nicho"},{"word":"parceria / parceiros","use_instead":"usar apenas para 'Certified Partner APC e Legrand' (certificação oficial) — não para clientes em geral, onde 'cliente de contrato anual' é mais preciso"},{"word":"produtos e serviços","use_instead":"'manutenção' e 'contratos' — específico ao modelo de negócio da Perttech"},{"word":"empresa / nossa empresa","use_instead":"'Perttech' (nome próprio) ou 'nós' — nome da marca tem mais força que a palavra genérica 'empresa'"}],"call_customers":"Gestores de TI, Infraestrutura e Facilities (em contexto de ICP). 'Clientes de contrato anual' ou 'empresas parceiras' (em contexto de relacionamento). Nunca 'usuários' ou 'consumidores' — são gestores de decisão B2B.","call_product":"Manutenção de sistemas críticos de energia (categoria). Contrato de manutenção anual (produto A). Serviço de emergência corretiva (produto B). Nunca 'soluções' ou 'pacotes'."}},"key_insight":{"headline":"A Perttech não vende manutenção de nobreak — vende a paz de saber que quando a pane vier, tem alguém confiável disponível. Falamos como especialista-parceiro, não como prestador de serviço.","context":"A tensão narrativa central da Perttech é específica e poderosa: o ICP (Ricardo Silva) não teme a falha do equipamento — teme a falha do fornecedor que deveria resolver. A Perttech existe exatamente para resolver essa ansiedade. Isso muda tudo no tom: não é 'viemos consertar o nobreak', é 'você não vai mais ficar na mão'. A promessa não é sobre técnica — é sobre confiança. E a prova não é certificado — é DHL renovando contrato há anos.","numbered_reasons":["(1) O propósito ('existimos porque empresas 24/7 não deveriam temer uma pane') é específico ao problema que a Perttech resolve — não funciona se trocar o nome por qualquer outro prestador de TI ou elétrica","(2) O tom confiante + técnico-preciso é o único que funciona simultaneamente para o momento de emergência (direto, urgente) e para a venda de contrato anual (especialista que justifica ROI para a diretoria)","(3) A promessa 'resolve na primeira visita ou retornamos sem custo' é verificável e honesta — e é exatamente o que Ricardo Silva precisa para justificar a escolha internamente, quando Compras questionar por que não escolheu o mais barato"],"discussion_anchor":"Antes de produzir qualquer copy ou criativo para campanhas, o Altair precisa confirmar duas coisas: (1) a promessa 'resolve na primeira visita ou retornamos sem custo adicional' pode ser cumprida operacionalmente? (2) os nomes DHL, Vopak e Wurth podem aparecer em anúncios pagos, ou apenas em materiais de relacionamento? As respostas definem o limite do que pode ser prometido publicamente — e o tom inteiro do brandbook parte daí."},"approved_constraints":{"promise_validated":true,"promise_text":"Resolve na primeira visita — ou retornamos sem custo adicional.","promise_note":"Confirmado pelo Altair como operacionalmente viável. Qualquer ajuste posterior será feito caso a caso.","enterprise_logos_in_paid_ads":false,"enterprise_logos_note":"DHL, Vopak e Wurth podem aparecer em: site institucional, GMB, apresentações comerciais, materiais de relacionamento, LP institucional. NÃO devem aparecer nominalmente em: Google Ads, Meta Ads, qualquer anúncio pago. Para anúncios: usar 'empresas que operam 24/7 no ABC e Grande SP' ou 'carteira enterprise verificável' sem nomear os clientes.","headlines_institutional_only":["DHL, Vopak e Wurth escolheram a Perttech para proteger suas operações — há anos.","DHL. Vopak. Wurth. Agora é a sua vez de ter um parceiro de energia confiável."],"approved_at":"2026-05-22T19:10:00Z"},"completed_at":"2026-05-22T19:00:00Z"},"ee-s3-copy-anuncios":{"summary":"36 variações de copy para Meta Ads e Google Ads da Perttech distribuídas em 4 estágios de funil. Hook campeão recomendado para subir primeiro: fundo Meta com hook de resultado — 'Resolve na primeira visita ou retornamos sem custo. 30 anos mantendo sistemas críticos de empresas 24/7.' Restrição aplicada: DHL/Vopak/Wurth ausentes em todos os anúncios pagos — substituídos por 'empresas 24/7 no ABC e Grande SP'.","summary_headline":"Perttech ganha 36 variações de copy por funil — hook campeão: 'Resolve na 1ª visita ou retornamos sem custo' (fundo Meta) — DHL/Vopak não aparecem em ads conforme aprovação do Altair.","summary_highlights":[{"category":"posicao","label":"Total de variações","value":"36 copies","subtext":"Topo 10 · Meio 10 · Fundo 10 · Remarketing 6","tone":"green"},{"category":"oportunidade","label":"Hooks cobertos","value":"4 ângulos","subtext":"Dor · Resultado · Urgência · Autoridade — testar Resultado primeiro","tone":"blue"},{"category":"competicao","label":"Aderência ao brandbook","value":"100%","subtext":"Zero 'excelência', 'solução' ou 'custo-benefício' — vocabulário curado aplicado","tone":"green"},{"category":"risco","label":"Restrição aplicada","value":"DHL/Vopak/Wurth: fora","subtext":"Apenas em materiais institucionais — ads usam 'empresas 24/7 no ABC'","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"A promessa 'resolve na primeira visita ou retornamos sem custo' é o diferencial mais forte para anúncios pagos — verificável, específica e sem paralelo entre os concorrentes. É o hook de conversão que sustenta o fundo de funil inteiro."},{"category":"contexto","text":"Nenhum concorrente está no leilão (confirmado no ee-s2-diagnostico-midia). O Google Ads da Perttech vai aparecer como único resultado pago para queries de emergência ('manutenção nobreak urgente ABC'). Isso permite CPCs baixos e posição 1 garantida nos primeiros 60-90 dias."},{"category":"ameaca","text":"Sem LP com SSL válido, os anúncios vão aterrissar no site com aviso de segurança — cancelando o ROI de toda a copy. Confirmar resolução do SSL (ou subdomínio LP) antes de subir qualquer campanha."},{"category":"acao","text":"Sequência de teste recomendada: (1) Subir fundo Meta com 3 hooks e R$500/semana para identificar campeão em 7-14 dias. (2) Subir Google Ads de emergência com os 5 títulos RSA e 3 descrições. (3) Escalar budget após validar CPL."}],"copy_rules_applied":["1. TOPO SEM PRODUTO: nenhum texto de topo menciona 'Perttech', 'nobreak' como produto, 'manutenção' como oferta — apenas o problema e suas consequências.","2. RESTRIÇÃO DE LOGOS: DHL, Vopak e Wurth ausentes em todos os anúncios pagos. Substituídos por 'empresas que operam 24/7' e 'operações críticas' — aprovado pelo Altair em 22/05/2026.","3. LIMITES RESPEITADOS: texto principal Meta ≤ 125 chars, título Meta ≤ 40 chars, descrição Meta ≤ 30 chars, título Google ≤ 30 chars, descrição Google ≤ 90 chars — nenhuma variação ultrapassa.","4. VOCABULÁRIO BRANDBOOK: 'nobreak' (nunca no-break), 'técnico especializado/sênior', 'resolução na primeira visita', 'sistemas críticos', 'operação 24/7', 'contrato anual', 'SLA' — presentes nos estágios corretos.","5. REMARKETING DIFERENCIADO: copy de remarketing pressupõe que o lead já conhece a Perttech — usa linguagem de próximo passo ('você já sabe', 'falta dar o próximo passo') em vez de apresentação da empresa."],"funnel_stages":[{"name":"topo_de_funil","objective":"Consciência do problema — despertar para o risco antes de qualquer emergência","tone":"Educativo, empático, sem vender. ICP: gestor de TI/Infraestrutura que ainda não sente urgência.","platforms":[{"name":"meta_ads","variations":[{"id":"T-M1","hook":"dor","type":"text_primary","text":"Quanto custa 1 hora de operação parada na sua empresa? A maioria dos gestores só calcula quando já aconteceu.","headline":"Sua operação pode parar hoje","description":"Descubra antes que aconteça","cta":"Saiba Mais","char_count":{"text":108,"headline":28,"description":27}},{"id":"T-M2","hook":"dor","type":"text_primary","text":"Quando o sistema crítico falha às 22h — você tem um fornecedor que realmente atende? A maioria das empresas não tem.","headline":"Tem fornecedor de plantão?","description":"Avalie o risco agora","cta":"Saiba Mais","char_count":{"text":116,"headline":25,"description":20}},{"id":"T-M3","hook":"educativo","type":"text_primary","text":"Manutenção preventiva de nobreak: o custo que empresas ignoram até a operação parar no pior momento.","headline":"Quanto custa parar inesperado?","description":"Calcule o risco da sua empresa","cta":"Saiba Mais","char_count":{"text":100,"headline":30,"description":30}}]},{"name":"google_ads","keyword_clusters":["Emergência Corretiva","Preventivo/Contratos"],"variations":[{"id":"T-G1","type":"responsive_search_ad","headlines":[{"text":"Sua operação pode parar?","chars":23},{"text":"Quanto custa 1h parada?","chars":22},{"text":"Tem fornecedor de plantão?","chars":25},{"text":"UPS falhando sem aviso?","chars":22},{"text":"Manutenção preventiva paga","chars":26}],"descriptions":[{"text":"Falhas de nobreak são evitáveis. Descubra por que sua empresa está vulnerável.","chars":78},{"text":"Sem preventiva, o nobreak falha na hora errada. Calcule o risco da sua operação.","chars":80},{"text":"Gestores de TI de empresas 24/7 não podem depender de um fornecedor incerto.","chars":76}]}]}]},{"name":"meio_de_funil","objective":"Consideração — posicionar a Perttech como especialista verificável para o ICP que está pesquisando","tone":"Educativo + prova técnica. ICP comparando fornecedores ou considerando contrato.","platforms":[{"name":"meta_ads","variations":[{"id":"M-M1","hook":"autoridade","type":"text_primary","text":"Empresas que operam 24/7 precisam de um parceiro com SLA definido — não de uma promessa verbal.","headline":"Especialista em sistemas críticos","description":"Ver contratos disponíveis","cta":"Saiba Mais","char_count":{"text":95,"headline":32,"description":24}},{"id":"M-M2","hook":"autoridade","type":"text_primary","text":"30 anos de manutenção de sistemas críticos no ABC e Grande SP. Certified Partner APC e Legrand.","headline":"30 anos no ABC e Grande SP","description":"Certified Partner APC+Legrand","cta":"Saiba Mais","char_count":{"text":95,"headline":25,"description":29}},{"id":"M-M3","hook":"educativo","type":"text_primary","text":"A diferença entre corretiva e preventiva: em nobreak, pode ser 2h ou 2 dias de operação parada.","headline":"Manutenção preventiva ou corretiva?","description":"Entenda a diferença","cta":"Saiba Mais","char_count":{"text":96,"headline":35,"description":20}}]},{"name":"google_ads","keyword_clusters":["Autorizado por Marca","Preventivo/Contratos","Vertical Data Center"],"variations":[{"id":"M-G1","type":"responsive_search_ad","headlines":[{"text":"30 anos em sistemas de energia","chars":30},{"text":"Certified Partner APC+Legrand","chars":29},{"text":"Especialista multimarca de UPS","chars":30},{"text":"Manutenção com SLA garantido","chars":28},{"text":"Técnico sênior no ABC e SP","chars":25}],"descriptions":[{"text":"Especialistas em nobreaks para empresas 24/7 — 30 anos, Certified Partner APC e Legrand.","chars":88},{"text":"Técnico multimarca com histórico dos seus equipamentos. Resolução na 1ª visita.","chars":78},{"text":"Contratos com SLA definido para operações críticas no ABC e Grande São Paulo.","chars":76}]}]}]},{"name":"fundo_de_funil","objective":"Conversão — ICP com intenção ativa (busca urgente ou pronto para contratar)","tone":"Direto, urgência real, benefício claro. ICP está com problema agora ou decidindo fornecedor.","platforms":[{"name":"meta_ads","variations":[{"id":"F-M1","hook":"dor","type":"text_primary","text":"Sistema parado e fornecedor sumido? A Perttech envia técnico especializado no mesmo dia no ABC e Grande SP.","headline":"Técnico hoje no ABC e Grande SP","description":"Falar com técnico agora →","cta":"Fale Conosco","char_count":{"text":108,"headline":30,"description":24}},{"id":"F-M2","hook":"resultado","type":"text_primary","text":"Resolve na primeira visita ou retornamos sem custo. 30 anos mantendo sistemas críticos de empresas 24/7.","headline":"Resolve na 1ª visita. Garantido.","description":"Solicitar visita técnica →","cta":"Fale Conosco","char_count":{"text":103,"headline":32,"description":25},"note":"HOOK CAMPEÃO — subir primeiro com maior budget"},{"id":"F-M3","hook":"urgencia","type":"text_primary","text":"Cada mês sem contrato preventivo é uma aposta. A Perttech garante SLA real para quem não pode parar.","headline":"Contrato com SLA real para sua empresa","description":"Ver proposta de contrato →","cta":"Fale Conosco","char_count":{"text":100,"headline":38,"description":25}}]},{"name":"google_ads","keyword_clusters":["Emergência Corretiva","Preventivo/Contratos","Autorizado por Marca"],"variations":[{"id":"F-G1","type":"responsive_search_ad","headlines":[{"text":"Manutenção de nobreak urgente","chars":29},{"text":"Técnico no mesmo dia — ABC/SP","chars":29},{"text":"Resolução na 1ª visita","chars":22},{"text":"Solicitar visita técnica","chars":24},{"text":"Contrato com SLA definido","chars":25}],"descriptions":[{"text":"Técnico especializado no mesmo dia — sistemas críticos no ABC e Grande SP.","chars":73},{"text":"Resolve na primeira visita ou retornamos sem custo. Certified Partner APC e Legrand.","chars":84},{"text":"Solicite proposta de contrato anual com SLA garantido para sua operação 24/7.","chars":77}]},{"id":"F-G2","type":"responsive_search_ad","note":"Grupo de anúncios: busca por marca do equipamento (APC, NHS, SMS)","headlines":[{"text":"Assistência técnica APC autorizada","chars":34},{"text":"Manutenção NHS e SMS — ABC/SP","chars":29},{"text":"Técnico multimarca certificado","chars":30},{"text":"Reparo nobreak no mesmo dia","chars":27},{"text":"Certified Partner APC+Legrand","chars":29}],"descriptions":[{"text":"Assistência técnica autorizada para APC, NHS, SMS e mais de 20 marcas. ABC e Grande SP.","chars":87},{"text":"Técnico com peças originais e certificação de fábrica. Resolução na 1ª visita.","chars":78},{"text":"30 anos de especialização multimarca. Solicite diagnóstico técnico agora.","chars":73}]}]}]},{"name":"remarketing","objective":"Reengajar quem visitou o site ou interagiu com anúncio anterior sem converter","tone":"Familiaridade — presume que o ICP já conhece a Perttech. Foco em próximo passo, não em apresentação.","platforms":[{"name":"meta_ads","variations":[{"id":"R-M1","hook":"proximo_passo","type":"text_primary","text":"Você já conhece a Perttech. Sabe que são 30 anos de especialização. O próximo passo é uma proposta.","headline":"Ainda procurando o parceiro certo?","description":"Solicitar proposta agora →","cta":"Fale Conosco","char_count":{"text":99,"headline":34,"description":25}},{"id":"R-M2","hook":"urgencia_suave","type":"text_primary","text":"Sua operação ainda está sem um parceiro com SLA garantido. Uma ligação resolve. Falar com técnico →","headline":"SLA garantido. Próximo passo: proposta.","description":"Conversar com técnico agora","cta":"Fale Conosco","char_count":{"text":99,"headline":38,"description":26}}]},{"name":"google_ads","note":"RLSA — remarketing lists for search ads. Ajusta lance para visitantes do site que voltam a pesquisar.","variations":[{"id":"R-G1","type":"responsive_search_ad","headlines":[{"text":"Solicitar proposta Perttech","chars":26},{"text":"Contrato anual com SLA real","chars":27},{"text":"Fale com técnico especialista","chars":29}],"descriptions":[{"text":"Você já conhece a Perttech. Resolução na 1ª visita ou sem custo. Solicite proposta.","chars":83},{"text":"Certified Partner APC e Legrand. 30 anos. Técnico no mesmo dia no ABC e Grande SP.","chars":82}]}]}]}],"campaign_setup_notes":{"first_test_sequence":["1. Subir F-M2 (hook resultado) + F-M1 (hook dor) + F-M3 (hook urgência) em Meta Ads com R$500/semana — 7 a 14 dias para identificar campeão por CTR e CPL","2. Subir F-G1 em Google Ads para queries de emergência ('manutenção nobreak urgente [cidade]') com CPC manual máx R$8 — ver ee-s2-diagnostico-midia para clusters","3. Após 14 dias: escalar budget no hook campeão, pausar os 2 perdedores, subir remarketing (R-M1 + R-M2)","4. Semana 5+: ativar topo e meio de funil para construir audience de remarketing mais barata"],"pre_launch_blockers":["SSL do site ou subdomínio LP com HTTPS válido — obrigatório antes de qualquer ad","Meta Pixel instalado no site de destino — obrigatório para otimização e remarketing","GA4 instalado — obrigatório para medir conversões do Google Ads","Meta Business Manager criado — obrigatório para Meta Ads"],"landing_page_for_ads":"Pendente de ee-s3-landing-page. Usar subdomínio landing.perttech.com.br com SSL Let's Encrypt enquanto site principal tem SSL expirado.","dhl_vopak_restriction":"Confirmado: nenhuma variação neste output menciona DHL, Vopak ou Wurth. Para quando a restrição for revisada: F-M2 e M-M2 são os candidatos naturais para adicionar prova social enterprise."},"total_variations":36,"breakdown":{"meta_ads":22,"google_ads":14,"topo":10,"meio":10,"fundo":10,"remarketing":6},"sheets_url":null,"sheets_note":"Exportação para Google Sheets via GOG CLI pendente de configuração do ambiente. Executar: gog sheets create --title 'Copy Anúncios - Perttech' após confirmar credenciais. As 36 variações estão estruturadas no JSON pronto para exportação.","key_insight":{"headline":"Hook campeão: 'Resolve na primeira visita ou retornamos sem custo — 30 anos mantendo sistemas críticos de empresas 24/7' (F-M2, fundo Meta) — único no mercado, verificável e aprovado pelo Altair.","context":"A promessa 'retornamos sem custo' combinada com '30 anos' e 'sistemas críticos de empresas 24/7' cobre os 3 elementos de conversão do ICP de alto valor: reduz risco percebido (garantia), prova autoridade (30 anos) e filtra o cliente certo (empresas 24/7 que pagam por confiabilidade, não por preço). Nenhum concorrente no ABC/RMSP tem copy com esse nível de especificidade.","numbered_reasons":["(1) A garantia de retorno sem custo é o elemento que reduz a principal objeção do ICP: 'e se não resolver?' — sem ela, a Perttech é mais um fornecedor igual","(2) '30 anos + sistemas críticos de empresas 24/7' filtra o lead qualificado e justifica o ticket premium — o Caçador de Preço abandona, o Ricardo Silva converte","(3) Meta Ads (fundo) é o canal mais rápido para testar hipótese de copy com budget controlado — resultado em 7-14 dias antes de investir no Google Ads em escala"],"discussion_anchor":"Antes de subir os anúncios, confirmar com Altair: a promessa 'retornamos sem custo adicional' está operacionalmente disponível para qualquer lead gerado pelos anúncios? Se há limitações (ex: apenas para contratos acima de R$X, ou apenas dentro de raio específico), definir agora para não criar problema pós-conversão."},"honesty_alert":"Sem LP com SSL válido, todos os anúncios vão aterrissar em página com aviso de segurança — cancelando o ROI de qualquer investimento em mídia. Este output está pronto, mas não pode ser ativado enquanto o bloqueio técnico do site não for resolvido. Ver ee-s3-landing-page e ee-s2-diagnostico-cro (H1 — subdomínio com SSL).","completed_at":"2026-05-22T19:30:00Z"},"ee-s3-criativos-anuncios":{"summary":"Pack de 5 variações de criativos para a Perttech com briefing visual completo + prompts Midjourney/Ideogram para geração de imagens. Hooks: Dor (custo de downtime), Resultado (promessa garantida), Curiosidade (carrossel 5 sinais técnicos), Prova Social (30 anos enterprise) e Urgência (manutenção preventiva). Aposta principal: V2 (Resultado + promessa 'retornamos sem custo') — único hook com garantia operacional verificável no segmento. 16 peças no pack. DHL/Vopak/Wurth ausentes de todas as variações conforme aprovação do Altair (22/05).","summary_headline":"5 variações · 16 peças — hook Resultado com promessa 'retornamos sem custo' é a única aposta com garantia operacional verificável em anúncio no segmento ABC/Grande SP.","summary_highlights":[{"category":"posicao","label":"Variações no pack","value":"5 variações","subtext":"Dor · Resultado · Curiosidade · Prova Social · Urgência","tone":"blue"},{"category":"competicao","label":"Concorrentes com criativos pagos","value":"0 de 5","subtext":"Todos os concorrentes verificados sem ads ativos — janela aberta","tone":"green"},{"category":"oportunidade","label":"Hook exclusivo no segmento","value":"Promessa garantida","subtext":"'Retornamos sem custo' — território vazio em todos os concorrentes","tone":"green"},{"category":"risco","label":"Fotos reais disponíveis","value":"Nenhuma","subtext":"Prompts geram sintético — fotos reais do time vão superar quando disponíveis","tone":"yellow"},{"category":"risco","label":"Identidade visual","value":"Pendente","subtext":"Cores derivadas do brand DNA — revisar após ee-s3-identidade-visual","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"Zero concorrentes em mídia paga no ABC/Grande SP significa que a Perttech vai testar os 5 hooks sem disputa de leilão — CPMs menores, dados de benchmark mais limpos e posição 1 garantida nos primeiros 90 dias."},{"category":"contexto","text":"A ausência de ee-s3-identidade-visual validada obrigou os prompts a usar cores derivadas do brand DNA (charcoal escuro + azul elétrico técnico). O resultado visual já está alinhado com o posicionamento enterprise, mas será refinado quando a identidade visual for executada."},{"category":"ameaca","text":"V3 (Carrossel educacional) depende de 5 pontos técnicos precisos nos slides. Risco de simplificação que perca o ICP técnico ou jargão que perca o tomador de decisão. Revisar os 5 sinais com o Altair antes de publicar."},{"category":"acao","text":"Sequência de lançamento recomendada: (1) V2 no fundo de funil Meta — já alinhado com F-M2 campeão do copy-anuncios. (2) V1 no topo de funil para aquisição cold. (3) V3 carrossel como sempre-ativo de consideração após 7 dias de dados. Subir apenas após SSL/LP resolvidos."}],"key_insight":{"headline":"Hook 'Retornamos sem custo' (V2) é a única promessa operacional verificável no segmento — se vencer o A/B, confirma que o ICP decide por garantia, não por preço.","context":"A Perttech tem um ativo que nenhum concorrente regional possui: uma promessa validada operacionalmente pelo Altair — 'se não resolver na primeira visita, retornamos sem custo adicional'. O criativo V2 é o primeiro anúncio pago no segmento ABC/Grande SP a usar essa angulação visual. Se vencer contra V1 (Dor), significa que o ICP já ultrapassou a consciência do problema e está pronto para converter — o que acelera o funil inteiro e justifica escalar budget para fundo de funil imediatamente.","numbered_reasons":["(1) A promessa foi validada operacionalmente pelo Altair em 22/05 — não é claim de marketing sem respaldo, é política real da empresa com 30 anos de histórico para sustentar","(2) Zero dos 5 concorrentes usa garantia de resultado em qualquer material digital — território completamente livre sem defensor estabelecido","(3) Alinhado com F-M2 campeão do ee-s3-copy-anuncios — mesma mensagem visual e textual cria consistência e reforço: o usuário que vê o criativo e clica no ad lê a mesma promessa"],"discussion_anchor":"Se V2 ganhar o A/B: replicar o padrão de 'garantia + credencial temporal' em todos os formatos (Stories, Display, e YouTube pre-roll no futuro). Se V1 (Dor) ganhar: ICP ainda está em modo descoberta → aumentar topo de funil e criar sequência educacional antes de empurrar conversão direta."},"honesty_alert":"3 limitações: (1) ee-s3-identidade-visual PENDENTE — paletas nos prompts Midjourney são estimativas do brand DNA (charcoal escuro + azul elétrico), não paleta validada. Revisar e regerar quando identidade-visual for executada. (2) Zero fotos reais de técnicos, instalações ou equipamentos da Perttech disponíveis — todos os criativos desta rodada são imagens sintéticas geradas por IA; imagens autênticas do campo vão superar em autenticidade e conversão e devem substituir na versão 2. (3) Métricas A/B (CTR ≥1,5%, CPC ≤R$15) são estimativas baseadas em benchmarks B2B Meta Brasil — sem histórico da conta Perttech para calibrar. Revisar após primeiros 7 dias de dados reais.","copy_rules_applied":["DHL/Vopak/Wurth ausentes de TODAS as variações — aprovado pelo Altair 22/05. Substituídos por 'empresas 24/7 no ABC', 'operações críticas', 'empresas enterprise'.","Vocabulário brandbook aplicado: 'nobreak' (nunca no-break), 'técnico especializado', 'resolução na primeira visita', 'sistemas críticos', 'operação 24/7', 'manutenção preventiva/corretiva'.","Zero adjetivos genéricos: nenhuma variação usa 'excelência', 'qualidade', 'solução', 'custo-benefício', 'comprometimento'.","Tom de voz validado: Direto · Técnico-Preciso · Confiante · Responsável — aplicado em todas as 5 variações.","Promessa 'retornamos sem custo' usada apenas em V2 (Resultado) e como referência em V5 (Urgência) — nunca em topo de funil frio."],"variations":[{"id":"V1","hook_type":"dor","hook_text":"Quanto custa 1 hora com sua operação parada?","short_copy":"Quando o UPS falha, a operação para — e cada hora custa caro. A Perttech resolve na primeira visita. 30 anos garantindo que sistemas críticos da Grande SP não parem. Solicite diagnóstico técnico.","medium_copy":"Você já calculou o custo real de 1 hora com servidores, data center ou linha de produção parados? Para empresas que operam 24/7, cada minuto de downtime elétrico tem um preço concreto em produção, contratos e reputação. O problema não é a pane em si — é ter um fornecedor de manutenção que não resolve na primeira visita, que manda técnico sem o equipamento certo, que promete SLA e não cumpre. A Perttech existe para isso não acontecer. 30 anos. Técnico especializado na sua empresa, na primeira visita. Solicite um diagnóstico técnico gratuito.","headline":"Operação parada = prejuízo real","description":"1h de downtime elétrico pode custar R$20k+ em produção. Perttech resolve na 1ª visita.","button_cta":"Solicitar diagnóstico","visual_concept":"Sala de servidores em penumbra: rack de servidores com um painel exibindo tela vermelha de erro (downtime), iluminação fria azulada vinda de baixo dos equipamentos ativos ao fundo, figura desfocada de gestor de TI ao fundo olhando para a tela de erro com expressão de preocupação, atmosfera dramática e urgente. Espaço em branco no terço esquerdo do frame para overlay de texto em Canva. Sem pessoas em foco.","recommended_format":"feed_portrait","midjourney_prompt":"Cinematic photography, dark server room with multiple equipment racks, one server panel showing red error screen glow, cool blue atmospheric underlighting from active equipment, moody industrial B2B atmosphere, blurred figure of a professional in background looking at error screen with concern, dramatic deep shadows, HDR 4K professional photography, enterprise technology environment, space on left third for text overlay --ar 4:5 --v 7 --style raw --no text watermarks logos cartoons bright colors people in focus smiling","ideogram_prompt":null,"canva_guide":"Formato principal: 1080x1350px (4:5). Zona de texto: faixa esquerda (30% da largura), texto em branco sobre overlay escuro semitransparente (rgba 0,0,0,0.65). Fonte: Montserrat Bold 36pt para hook, Regular 20pt para subcopy. Cor de destaque: azul elétrico #2563EB para números (R$20k+). Logo Perttech: canto inferior direito, 180px de largura. CTA button: azul elétrico com texto branco, 16pt Bold, posicionado no rodapé. Margem de segurança: 60px em todos os lados. Exportar também em 1080x1080 (remover 15% do topo) e 1080x1920 (expandir zona de fundo escuro acima)."},{"id":"V2","hook_type":"resultado","hook_text":"Resolve na 1ª visita — ou retornamos sem custo.","short_copy":"Resolve na primeira visita ou retornamos sem custo adicional. Essa não é uma promessa genérica — é o modelo de trabalho que a Perttech pratica há 30 anos com empresas que operam 24/7 na Grande São Paulo. Agende uma visita técnica.","medium_copy":"A maioria dos fornecedores de manutenção chega, verifica, volta depois com a peça, agenda nova visita — e enquanto isso sua operação continua exposta. Na Perttech, o técnico vai preparado para resolver na primeira visita, porque conhece os equipamentos do seu setor antes de chegar. Se mesmo assim não resolver: retornamos sem custo adicional. É assim que trabalhamos há 30 anos com empresas que simplesmente não podem parar. Técnico especializado no seu equipamento, na sua empresa, na primeira visita. Agende agora.","headline":"Resolve na 1ª visita.","description":"30 anos. Técnico especializado na sua empresa, na 1ª visita. Garantido.","button_cta":"Agendar visita técnica","visual_concept":"Técnico Perttech (uniforme escuro, patch de logo no ombro esquerdo) trabalhando com confiança em gabinete aberto de UPS industrial, LEDs internos do equipamento mostrando status verde (operacional), iluminação direcional quente vinda de cima criando sombras profissionais, fundo de data center ou sala técnica desfocado, ângulo lateral mostrando competência e foco do técnico, atmosfera de resolução e controle. Equipamento aberto com ferramentas organizadas ao lado. Sem rosto visível.","recommended_format":"feed_square","midjourney_prompt":"Cinematic photography, professional male technician in dark navy work uniform with company logo patch on left shoulder, confidently working on open industrial UPS cabinet, green operational LED lights glowing inside the open equipment panel, warm professional overhead lighting creating deep shadows, industrial server room background blurred, technician viewed from 45-degree side profile showing focus and competence, organized tools on tray beside equipment, atmosphere of resolution and expertise, 4K HDR photography --ar 1:1 --v 7 --style raw --no faces visible text watermarks bright colors logos people facing camera","ideogram_prompt":"Square format 1080x1080, dark industrial background charcoal #1a1a1a, centered bold white text: 'Resolve na 1ª visita' in Montserrat ExtraBold 64pt, below in medium weight 24pt: 'ou retornamos sem custo adicional', electric blue #2563EB thin horizontal line separator, bottom: Perttech wordmark in white. Clean minimal layout, left-aligned text block with 15% padding.","canva_guide":"Formato principal: 1080x1080px (1:1). Opção A (foto técnico): overlay escuro semitransparente no terço inferior (gradient top-transparent to rgba 0,0,0,0.8). Texto no terço inferior: hook em branco Montserrat Bold 40pt, subcopy Regular 18pt. Opção B (Ideogram texto puro): usar saída do Ideogram diretamente com ajuste de logo. Logo: canto inferior direito 160px. Cor destaque: azul elétrico #2563EB para 'sem custo'. Exportar em 1080x1080, 1080x1350 (adicionar faixa no topo com copy adicional) e 1080x1920 (replicar fundo com espaço para stories)."},{"id":"V3","hook_type":"curiosidade","hook_text":"5 sinais que seu nobreak vai falhar em breve.","short_copy":"5 sinais técnicos que indicam que seu UPS vai falhar antes de falhar. Se seu nobreak tem mais de 3 anos sem revisão preventiva, você provavelmente já vê pelo menos 2 desses sinais hoje. Descubra quais são.","medium_copy":"Gestores de TI experientes sabem: nobreak que falha não avisa com antecedência. Mas existem 5 indicadores técnicos mensuráveis que precedem a falha — e que um diagnóstico preventivo detecta antes do downtime real. (1) Bateria com mais de 3 anos sem substituição. (2) Runtime abaixo de 50% do especificado. (3) Alarme de baixa bateria com frequência crescente. (4) Tempo de transferência acima de 20ms repetidamente. (5) Temperatura interna acima de 40°C em operação normal. Sua operação tem algum desses sinais? A Perttech faz o diagnóstico técnico gratuito.","headline":"Seu UPS vai falhar?","description":"5 alertas técnicos que gestores de TI ignoram — até o downtime revelar o erro.","button_cta":"Ver os 5 sinais","visual_concept":"Carrossel de 5 slides + capa. Capa: fundo charcoal escuro, número '5' grande em azul elétrico, texto abaixo '5 sinais que seu nobreak vai falhar'. Slide 1: banco de baterias UPS em close técnico, LED âmbar piscando, texto sobreposto 'SINAL 1: Bateria com 3+ anos sem revisão'. Slide 2: multímetro medindo tensão de bateria com leitura baixa, texto 'SINAL 2: Runtime abaixo de 50% do especificado'. Slide 3: painel de alarmes UPS com indicadores de alerta, texto 'SINAL 3: Alarmes de baixa bateria frequentes'. Slide 4: termômetro industrial em UPS, texto 'SINAL 4: Temperatura interna acima de 40°C'. Slide 5: osciloscópio mostrando tempo de transferência, texto 'SINAL 5: Tempo de transferência aumentando'. Slide CTA: fundo azul elétrico, texto 'Diagnóstico técnico gratuito — Perttech'.","recommended_format":
