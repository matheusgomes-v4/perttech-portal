follow-up — 'se o cliente não ligar, é sinal que não quer'.","financial_impact_monthly":2200},{"stage":"Cliente Ativo → Renovação / Upsell","current_rate":45,"benchmark":75,"gap":-30,"status":"critical","bottleneck":"GARGALO PRINCIPAL: zero processo de renovação de contratos anuais. Cliente precisa ligar para renovar — Perttech não aborda proativamente. Contratos de R$6K-20K/ano expiram sem follow-up. [E]","root_cause":"Sem CRM ou calendário de vencimentos. Nenhum dos 2 vendedores tem tarefa de acompanhar contratos vigentes. Toda receita recorrente depende da memória do cliente — não da empresa.","financial_impact_monthly":8000}],"primary_bottleneck":{"stage":"Cliente Ativo → Renovação / Upsell","description":"Contratos anuais (Curva A da Perttech: R$6K-20K/contrato) expiram sem abordagem proativa. Com 30 anos de carteira e clientes enterprise como DHL, Vopak e Wurth, estima-se 30-50 contratos ativos — cada não renovação representa R$6K-20K de receita para custo de aquisição zero. O time não sabe quais contratos vencem nos próximos 90 dias. [E]","estimated_improvement":"Régua de renovação 60 dias antes do vencimento: estimativa de +R$8.000/mês em receita recorrente resgatada sem nenhum investimento em mídia [E]"},"objection_map":[{"objection":"Está caro. Recebi um orçamento mais barato.","type":"price","funnel_moment":"proposal","frequency":"high","recommended_response":"Entendo. Me conta: esse outro fornecedor garante resolução na primeira visita? A Perttech tem 30 anos e índice de retorno zero — se não resolver na primeira visita, voltamos sem custo adicional. Quanto custa 1 hora da sua operação parada?","sdr_prevention":"Ancorar no custo de downtime antes de chegar na proposta. Perguntar: 'Já teve problema com fornecedor mais barato antes? Quanto a parada custou?' — não esperar a objeção de preço surgir.","example_dialogue":{"lead_says":"Vi um orçamento por R$300 a menos. Por que a Perttech é mais cara?","sdr_responds":"Boa pergunta, Bruno. Para comparar direito: esse fornecedor tem garantia de resolução na 1ª visita? A Perttech tem — se não resolver, retornamos sem cobrar. Quanto custa 1h com sua operação parada? Pergunto porque muitos clientes nossos fizeram essa conta e nunca mais trocaram."}},{"objection":"Vou pensar. Me liga semana que vem.","type":"urgency","funnel_moment":"qualification","frequency":"high","recommended_response":"Claro. Só me diz: o equipamento está operando normal agora? Alguns clientes foram pensar e precisaram chamar emergência em 3 dias. Se não tem urgência agora, posso agendar uma revisão preventiva enquanto decide — sem compromisso.","sdr_prevention":"Qualificar urgência real logo no primeiro contato: 'O equipamento está com algum sintoma agora ou é consulta preventiva?' — distingue 3★ de 5★ na abertura.","example_dialogue":{"lead_says":"Deixa eu ver com meu gerente e te retorno.","sdr_responds":"Sem problema, Ricardo. Para eu te ajudar melhor: é manutenção preventiva programada ou tem algum sintoma no equipamento agora? Pergunto porque se for emergência, temos técnico disponível hoje mesmo. Se for preventivo, posso já deixar uma data reservada enquanto você confirma."}},{"objection":"Preciso ver com o diretor / gerente de compras.","type":"authority","funnel_moment":"proposal","frequency":"medium","recommended_response":"Perfeito. Para agilizar: posso montar a proposta com o que o seu diretor precisa ver — ROI de manutenção preventiva vs. corretiva, payback, referências como DHL e Vopak. Para quem envio junto com você?","sdr_prevention":"Identificar o decisor no primeiro contato: 'Você é quem decide sobre manutenção de equipamentos ou tem outra pessoa envolvida na aprovação?' — descobrir isso antes de montar a proposta.","example_dialogue":{"lead_says":"Vou precisar passar para aprovação do diretor financeiro.","sdr_responds":"Entendido. Posso mandar uma comparação financeira manutenção preventiva vs. corretiva que costuma facilitar essa aprovação — já fizemos isso para o time de compras do Vopak. Para quem envio junto com a proposta?"}},{"objection":"Não te conheço. Como sei que vocês são bons?","type":"trust","funnel_moment":"first_contact","frequency":"medium","recommended_response":"Faz sentido. A Perttech mantém sistemas de empresas como DHL, Vopak e Wurth há anos. Posso te mandar o contato de um cliente do seu segmento para você ligar e perguntar? Sem pressão.","sdr_prevention":"Apresentar prova social enterprise logo na abertura — não esperar a objeção. '30 anos mantendo DHL, Vopak e Wurth sem parar.' Nunca deixar a dúvida de confiança se instalar.","example_dialogue":{"lead_says":"Nunca ouvi falar da Perttech. Já atenderam empresas do nosso porte?","sdr_responds":"Sim! Mantemos sistemas da DHL e Vopak na Grande SP há anos — empresas de operação crítica 24/7 como a sua. Posso te mandar a lista de clientes do seu segmento para você ver o histórico? E se quiser, posso pedir um contato do DHL para você ligar diretamente."}},{"objection":"Meu fornecedor atual já cuida disso.","type":"competitor","funnel_moment":"qualification","frequency":"low","recommended_response":"Ótimo que já tem fornecedor. Uma pergunta: quando foi a última revisão preventiva que ele fez? Muitos clientes nos ligam depois de uma corretiva cara que poderia ter sido evitada. Oferecemos uma avaliação gratuita — se estiver tudo certo, você tem a certeza documentada.","sdr_prevention":"Perguntar proativamente sobre fornecedor atual e histórico. Posicionar-se como auditoria ou segunda opinião — não como substituto imediato. Baixa ameaça de entrada.","example_dialogue":{"lead_says":"Já temos uma empresa de manutenção há 2 anos, está funcionando.","sdr_responds":"Faz sentido manter quem funciona. Nossos melhores clientes vieram de situações assim: estava tudo bem até não estar mais. Posso fazer uma avaliação do estado dos seus equipamentos sem compromisso — se o atual está fazendo bem feito, você sai com a certeza. Isso tem valor para você?"}}],"objection_pattern":{"most_frequent_type":"price","most_critical_moment":"proposal","deal_killer_objection":"Está caro / orçamento mais barato — crítico porque a Perttech não usa prova social (DHL/Vopak/Wurth) para justificar o preço nos primeiros contatos. Sem âncora de ROI na abertura, o preço vira o único critério de decisão.","main_recommendation":"Ancorar o valor pelo custo de downtime ANTES de enviar proposta. Nunca mandar orçamento sem antes mostrar o ROI da manutenção preventiva vs. corretiva e apresentar a garantia 'resolução na 1ª visita ou retornamos sem custo'."},"qualification_criteria":{"five_star":{"profile":"Empresa B2B com operação crítica 24/7, emergência ativa AGORA ou licitação aberta com prazo de decisão < 7 dias","mandatory_signals":["Equipamento com falha ativa ou operação parada no momento do contato","CNPJ confirmado (empresa, não pessoa física)","Localização dentro do raio de 100 km da sede da Perttech","Decisor ou influenciador técnico no contato (TI, Facilities, Manutenção, Engenharia)"],"action":"Acionar Cristiane Ramos IMEDIATAMENTE — < 5 minutos. WhatsApp direto 11 96262-0311. Técnico disponível hoje. Se Cristiane não responder em 3 min, ligar direto.","example":"Gerente de TI de empresa de logística: 'Nosso nobreak principal apitou, bateria não segura — temos 2h de autonomia.' Ligação recebida às 14h numa segunda-feira. Todo sinal presente → 5★, acionar agora."},"four_star":{"profile":"Empresa B2B com necessidade confirmada e urgência real: contrato vencendo em < 30 dias, emergência iminente (sintoma identificado mas operação ainda rodando) ou processo de cotação ativo","signals":["Empresa com 20+ funcionários ou operação crítica identificada","Contrato de manutenção para renovar ou primeiro contrato a ser firmado","Histórico de problema elétrico recente (< 6 meses)","Solicitou orçamento comparativo — está decidindo agora, não apenas pesquisando"],"min_signals":2,"action":"Cristiane Ramos ou Cristiane Tavares entram em contato em < 15 minutos. Proposta no mesmo dia.","example":"Facilities Manager de hospital: 'Meu contrato de manutenção vence mês que vem, preciso renovar ou trocar.' Ou: 'Tivemos uma falha semana passada, quero revisão geral antes que piore.' → 4★, responder em < 15 min."},"three_star":{"profile":"Empresa B2B com interesse em manutenção preventiva sem urgência imediata, ou em fase de pesquisa / projeto futuro de infraestrutura","signals":["Empresa identificada (CNPJ ou razão social mencionada, segmento claro)","Interesse em manutenção preventiva ou contrato anual — sem data definida","Fase de projeto de engenharia ou expansão (planejando compra futura de equipamentos)","Veio por indicação mas não tem urgência hoje"],"min_signals":2,"action":"Régua de nutrição automática SDR IA — 4 touchpoints em 30 dias. Qualificar urgência real na primeira resposta.","example":"Analista de infraestrutura: 'Estamos expandindo o data center, precisaremos de manutenção de UPS. Ainda estamos em fase de planejamento.' Ou: 'Me indicaram para preventiva, mas não tenho urgência — equipamentos funcionando.' → 3★, régua automática."},"one_two_star":{"profile":"Lead fora do ICP: pessoa física (B2C), empresa muito pequena sem infraestrutura crítica, puro caçador de preço ou localização fora do raio de atendimento","disqualification_signals":["Pessoa física — residencial ou home office sem CNPJ","Solicita apenas preço sem descrever equipamento ou problema (nenhum contexto operacional)","Localização > 100 km da sede","Declara explicitamente que está com outro fornecedor e quer 'só um segundo orçamento para comparar preço'","Microempresa sem infraestrutura crítica (ex: salão de beleza, padaria, mercearia)"],"action":"Resposta gentil e encerramento educado. Nutrição passiva apenas se informou CNPJ e houver potencial de crescimento futuro.","example":"Pessoa física: 'Meu nobreak de casa quebrou, quanto custa consertar?' Ou empresa: 'Preciso do menor preço possível, já tenho 3 orçamentos e quero mais um para comparar.' → 1-2★, resposta gentil + encerramento."},"tiebreaker_rules":{"three_vs_four":"Se empresa identificada + urgência declarada (mesmo sem prazo fechado), vai para 4★. Se urgência é vaga ou 'no futuro sem data', fica em 3★. Dúvida: perguntar 'Em quanto tempo precisa resolver isso?' — resposta 'o quanto antes / essa semana' = 4★.","two_vs_three":"Se informou CNPJ ou razão social + descreveu o problema, é 3★ no mínimo. Se não forneceu nem empresa nem problema concreto (só preço), é 2★."}},"sla":{"five_star_minutes":5,"five_star_responsible":"Cristiane Ramos (Supervisora Comercial) — titular","five_star_channel":"WhatsApp 11 96262-0311 — chamada direta se sem resposta em 3 min. Objetivo: técnico despachado em < 2h.","four_star_hours":0.25,"four_star_responsible":"Cristiane Ramos (titular) ou Cristiane Tavares (backup). Proposta enviada no mesmo dia.","three_star_hours":1,"escalation_5star_minutes":10,"escalation_4star_hours":1,"escalation_responsible":"Altair Lima Bitencourt (sócio) — notificado automaticamente pelo Kommo se SLA violado"},"action_plan":[{"priority":1,"action":"Levantar todos os contratos anuais ativos: listar cliente, valor e data de vencimento. Criar tarefa no Kommo de contato 60 dias antes de cada vencimento. Cristiane Ramos liga pessoalmente para os que vencem em < 90 dias.","responsible":"Cristiane Ramos + Altair (levantamento inicial)","timeline":"Semana 1 — antes de ligar qualquer campanha de mídia","measurement":"% de contratos renovados antes do vencimento (meta: 80% em 90 dias)","expected_impact":"+R$6.000-15.000/mês em receita recorrente resgatada sem investimento em mídia [E]"},{"priority":2,"action":"Definir Cristiane Ramos como responsável por lead digital com SLA de 5 min para 5★ e 15 min para 4★. Cristiane Tavares como backup. Altair recebe alerta automático no Kommo se SLA for violado.","responsible":"Altair (decisão de SLA) + Cristiane Ramos (execução)","timeline":"Semana 1 — junto com setup do Kommo (já configurado no ee-s3-crm-setup)","measurement":"Tempo médio de primeira resposta no Kommo (meta: < 10 min para 4-5★)","expected_impact":"Reduzir perda de leads digitais de emergência — estima-se 30-50% dos leads quentes perdidos hoje por SLA informal [E]"},{"priority":3,"action":"Criar script de 3 perguntas de qualificação para Cristiane Tavares usar no primeiro contato: (1) É empresa? CNPJ? (2) Equipamento com problema ativo agora ou manutenção preventiva? (3) Em quanto tempo precisa resolver?","responsible":"Cristiane Ramos (escreve) + V4 (formaliza no ee-s5-scripts-sdr)","timeline":"Semana 2 — após diagnóstico comercial aprovado","measurement":"% de leads com Score SDR preenchido no Kommo em < 48h do contato (meta: 100%)","expected_impact":"Eliminar orçamentos enviados para 1-2★ — economiza 2-3h/semana de Cristiane Ramos em leads que nunca fechariam"},{"priority":4,"action":"Construir banco de prova social: pedir depoimento de 3 clientes enterprise (DHL, Vopak ou Wurth) — 3 frases sobre agilidade e confiança. Formatar para uso em WhatsApp, proposta e anúncio (uso institucional aprovado pelo Altair).","responsible":"Altair (pede para os clientes) + V4 (formata)","timeline":"30 dias","measurement":"3 depoimentos coletados e formatados para uso nas ferramentas comerciais","expected_impact":"Reduzir objeção de confiança e preço na etapa de proposta — suporte direto à taxa de fechamento"},{"priority":5,"action":"Criar template de proposta com âncora de ROI: custo de parada estimado (horas × faturamento/hora do cliente) vs. investimento em manutenção preventiva. Comparar custo preventivo vs. corretivo com dado real da Perttech.","responsible":"Cristiane Ramos + V4","timeline":"30 dias","measurement":"% de propostas enviadas com template ROI (meta: 100% em 45 dias)","expected_impact":"Melhorar taxa de fechamento de propostas de ~32% para ~40% [E] — âncora de valor elimina comparação puramente por preço"}],"summary_headline":"Funil da Perttech perde mais em renovação de contratos (gap -30pp vs. benchmark) do que em novos leads — carteira de 30 anos nunca foi trabalhada proativamente; gargalo 2: SLA digital inexistente vai travar 100% das campanhas de mídia.","summary_highlights":[{"category":"risco","label":"Gargalo crítico","value":"Renovação -30pp","subtext":"Contratos A da curva ABC expiram sem abordagem — zero CAC","tone":"red"},{"category":"oportunidade","label":"Receita dormindo","value":"+R$8K/mês [E]","subtext":"Carteira existente sem processo ativo de renovação","tone":"green"},{"category":"risco","label":"SLA atual","value":"\"se lembrar\"","subtext":"Lead digital de emergência decide em < 30 min — sem processo","tone":"red"},{"category":"maturidade","label":"Funil formalizado","value":"0 / 4 etapas","subtext":"Nenhuma etapa com processo, script ou SLA documentado","tone":"red"},{"category":"posicao","label":"Base de indicação","value":"Conversão alta [E]","subtext":"Referrals convertem bem — mas não escala via mídia paga","tone":"yellow"},{"category":"oportunidade","label":"Prova social ativa","value":"DHL / Vopak / Wurth","subtext":"Não usada em nenhuma resposta a objeção — ativo desperdiçado","tone":"blue"}],"summary_key_findings":[{"category":"ameaca","text":"Renovação de contratos anuais (Curva A da Perttech) depende 100% do cliente lembrar de ligar — zero processo proativo. Com carteira estimada de 30+ contratos ativos (R$6K-20K cada), cada contrato não renovado é receita perdida para CAC zero. Este é o maior vazamento do funil e custa zero para corrigir."},{"category":"ameaca","text":"SLA informal ('respondo no mesmo dia, se lembrar') vai travar as campanhas de mídia antes de começarem. Lead de emergência que chega via Google decide fornecedor em < 30 minutos — a Perttech não está preparada para atender esse fluxo com o processo atual."},{"category":"contexto","text":"A taxa de conversão atual parece boa porque ~100% dos leads são indicação (pré-qualificados e pré-confiantes). Com mídia paga, o perfil muda: leads mais frios, mais objeções de confiança e preço, maior necessidade de script. O funil atual não foi testado com leads digitais."},{"category":"vantagem","text":"DHL, Vopak e Wurth são ativos de confiança que nunca foram usados como ferramenta de vendas ativa. Três depoimentos desses clientes resolvem >60% das objeções de confiança e preço — custo de captação: uma ligação do Altair."},{"category":"acao","text":"Ação de maior retorno imediato: listar todos os contratos ativos com data de vencimento e ligar para os que vencem em < 90 dias. Estimativa de R$6K-15K recuperados sem nenhum investimento em mídia — deve ser feito antes de ligar qualquer campanha."}],"key_insight":{"headline":"A Perttech está sentada em R$8K-15K/mês de receita que não precisa de anúncio — só precisa de uma planilha e 2 ligações por semana.","context":"Com 30 anos de carteira e contratos anuais de R$6K-20K, a Perttech tem um estoque de receita recorrente que expira em silêncio. Nenhum vendedor tem tarefa de acompanhar vencimento de contratos — o cliente precisa ligar para renovar. Isso é o maior vazamento do funil, custa zero para corrigir e deve ser o primeiro movimento comercial, antes de qualquer campanha de mídia.","numbered_reasons":["(1) Renovação de contratos tem gap de -30pp vs. benchmark de 75% de renovação ativa — etapa mais crítica pela combinação de ticket alto (R$6K-20K) + CAC zero","(2) Causa raiz: ausência de CRM ou calendário de vencimentos — nenhum dos 2 vendedores sabe quais contratos vencem nos próximos 90 dias hoje","(3) Impacto estimado: se 10 contratos não são renovados por ano por falta de follow-up = R$60K-200K/ano de receita de CAC zero simplesmente não capturada [E]"],"discussion_anchor":"Antes de calibrar qualquer script de SDR ou subir campanha de mídia, o Altair precisa responder: 'Quantos contratos ativos temos hoje e quando vencem?' Essa lista existe em algum lugar (e-mail, planilha, memória da Cristiane). Se sim, a primeira ação comercial de impacto real não é digital — é uma ligação para quem vence nos próximos 60 dias."},"honesty_alert":"DADOS DE FUNIL INDISPONÍVEIS: A Perttech não possui nenhuma métrica de funil (leads/mês, taxas de conversão, ciclo médio de venda) — ausência confirmada pelo operador. Todas as taxas quantitativas usam estimativas derivadas de: (1) faturamento anual R$2,2M ÷ ticket médio blended para volume de transações; (2) benchmarks do segmento 'Serviços Gerais' do framework V4; (3) dados qualitativos do Diagnóstico FMA (17/05/2026) como proxy comportamental do time. Nenhuma taxa de conversão é verificada com dados reais. A implementação do Kommo CRM (ee-s3-crm-setup, já configurado) vai gerar os primeiros dados reais a partir do Mês 1 — este diagnóstico deve ser revisado após 60 dias de dados no CRM."},"ee-s5-scripts-sdr":{"summary":"Script de atendimento WhatsApp para Cristiane Ramos e Cristiane Tavares (uso humano — SDR IA fora do escopo desta entrega). 3 opções de abertura por contexto, 4 perguntas de qualificação em sequência, tabela de decisão por perfil de lead, respostas prontas para as 5 objeções mapeadas no diagnóstico comercial e régua de 3 follow-ups. Tom alinhado ao brandbook: Direto, Técnico-Preciso, Confiante, Responsável.","summary_headline":"Playbook WhatsApp para Cristiane Ramos e Cristiane Tavares — 4 perguntas de qualificação + 5 objection killers + 3 follow-ups, tom Perttech, uso humano imediato sem dependência de automação.","summary_highlights":[{"category":"posicao","label":"Formato de entrega","value":"Script humano","subtext":"Para Cristiane Ramos e Cristiane Tavares — SDR IA fora do escopo desta entrega","tone":"blue"},{"category":"oportunidade","label":"Perguntas de qualificação","value":"4 perguntas","subtext":"Urgência → Empresa → Equipamento → Decisor — uma por mensagem, em ordem","tone":"green"},{"category":"oportunidade","label":"Objeções cobertas","value":"5 de 5","subtext":"Preço · Urgência · Autoridade · Confiança · Concorrente — com resposta e contra-argumento","tone":"green"},{"category":"janela","label":"Follow-up","value":"3 mensagens / 3 dias","subtext":"1h · 24h · 3 dias — máx 3 tentativas, só horário comercial","tone":"green"},{"category":"risco","label":"Sem automação","value":"Execução manual","subtext":"Scripts prontos mas dependem de disciplina do time para aplicar consistentemente","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"A Pergunta 1 ('O equipamento está com algum problema agora ou é preventiva?') é o filtro mais poderoso — separa emergência ativa (técnico no mesmo dia) de lead frio (régua de 30 dias) antes de qualquer outra informação. Implementar essa pergunta como padrão resolve o gargalo do funil atual onde todos os leads recebem o mesmo tratamento."},{"category":"contexto","text":"Script adaptado para uso humano imediato — SDR IA não faz parte do escopo desta entrega. Cristiane Ramos e Cristiane Tavares podem usar os roteiros no WhatsApp hoje, sem dependência de ferramenta adicional além do Kommo já configurado."},{"category":"ameaca","text":"A eficácia do script depende de consistência de aplicação — sem automação, o risco é o time usar as perguntas de forma parcial ou pular para o orçamento antes de qualificar. Recomendado: Altair ou Cristiane Ramos fazer uma revisão semanal de 15 min dos atendimentos no Kommo para checar aderência ao roteiro."},{"category":"acao","text":"Próximo passo imediato: Cristiane Ramos salva os scripts como mensagens rápidas no WhatsApp Business — isso reduz o tempo de resposta e elimina improvisação sem treinamento formal. Altair valida com ela presencialmente antes de escalar mídia."}],"key_insight":{"headline":"A Pergunta 1 ('O equipamento está com algum problema agora?') sozinha resolve o maior gargalo do funil atual — time tratava 5★ e 1★ com a mesma mensagem.","context":"O diagnóstico comercial registrou 'mesma mensagem para todos' como causa raiz da perda de leads de emergência. A Pergunta 1 força a distinção logo na abertura: emergência ativa aciona o técnico no mesmo dia; preventivo sem urgência entra na régua. Sem ela, Cristiane envia orçamento para lead frio e perde tempo que deveria estar com o lead quente.","numbered_reasons":["(1) Emergência ativa define SLA de < 5 min e técnico despachado no mesmo dia — sem essa distinção, leads de emergência esperam junto com leads frios","(2) A formulação 'agora' é intencional — força resposta binária e evita o 'mais ou menos' que não qualifica","(3) Tom alinhado ao brandbook: direto, sem rodeios, sem parecer formulário — o lead sente que a empresa já entende a urgência antes de qualquer apresentação"],"discussion_anchor":"Antes de escalar mídia paga, Altair precisa validar presencialmente com Cristiane Ramos: ela vai usar as 4 perguntas em ordem? O handoff para o técnico em < 5 min para 5★ é operacionalmente viável? Sem esse alinhamento, o investimento em Google Ads vai gerar leads que o time não consegue converter no ritmo que o ICP exige."},"scope_note":"SDR IA (automação via Patagon) fora do escopo desta entrega. Scripts gerados para uso humano imediato por Cristiane Ramos e Cristiane Tavares. Caso o módulo de SDR IA seja contratado no futuro, estes scripts servem como base para configuração no Patagon via ee-s5-sdr-ia-config.","agent":{"name":null,"type":"human","responsible":["Cristiane Ramos (Supervisora Comercial — titular)","Cristiane Tavares (Vendedora — backup)"],"escalation_contact":"Altair Lima Bitencourt — acionar diretamente em emergências 5★"},"opening_scripts":[{"option":"A","context":"Lead veio por indicação","message":"Olá, [NOME]! Aqui é a Cristiane, da Perttech.\n[FULANO] me passou seu contato — como posso ajudar?"},{"option":"B","context":"Lead veio pelo Google / anúncio / GMB","message":"Olá, [NOME]! Aqui é a Cristiane, da Perttech — manutenção de nobreaks no ABC e Grande SP.\nO equipamento está com algum problema agora ou é manutenção preventiva?","recommended":true},{"option":"C","context":"Lead já descreveu o problema na primeira mensagem","message":"Olá, [NOME]! Aqui é a Cristiane da Perttech.\nVi o seu ca const E = s => s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const N = n => n != null ? new Intl.NumberFormat('pt-BR').format(n) : '—';
const BRL = n => n != null ? 'R$ ' + new Intl.NumberFormat('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n) : '—';
const PCT = n => n != null ? n.toFixed(1).replace('.',',') + '%' : '—';

function mt(val, label, color, tip) {
  const tipLookup = (typeof MT_TIPS !== 'undefined' && MT_TIPS) ? MT_TIPS[label] : null;
  const tipText = tip || tipLookup || '';
  const help = tipText ? '<span class="mt__help" tabindex="0" aria-label="Explicação">?<span class="mt__tip">'+E(tipText)+'</span></span>' : '';
  return '<div class="mt">'+help+'<div class="mt__val'+(color?' mt__val--'+color:'')+'">'+(typeof val==='number'?N(val):E(String(val)))+'</div><div class="mt__lbl">'+E(label)+'</div></div>';
}

    +(body?'<div class="cd__body">'+body+'</div>':'')
    +'</div>';
}

function tb(heads, rows) {
  if (!rows || !rows.length) return '';
  return '<div class="tw"><table><thead><tr>'+heads.map(h=>'<th>'+E(h)+'</th>').join('')+'</tr></thead><tbody>'
    +rows.map(r=>'<tr>'+r.map(c=>'<td>'+(c!=null?String(c):'')+' </td>').join('')+'</tr>').join('')
    +'</tbody></table></div>';
}

function chatBubbles(msgs) {
  return '<div class="chat">'+msgs.map(m=>{
    const who = m.from||'sdr';
    return '<div class="chat__msg chat__msg--'+who+'"><div class="chat__who chat__who--'+who+'">'
      +E(m.name||who)+'</div>'+E(m.text)+'</div>';
  }).join('')+'</div>';
}

function checklist(items, statusKey) {
  return '<ul class="cl">'+items.map(it=>{
    const st = statusKey ? (it[statusKey]||'pending') : 'pending';
    const icons = {done:'&#10003;', pending:'&#9675;', blocked:'&#10007;', pass:'&#10003;', fail:'&#10007;', partial:'&#9679;'};
    const cls = {done:'done',pending:'pending',blocked:'blocked',pass:'done',fail:'blocked',partial:'pending'};
    return '<li><span class="cl__icon cl__icon--'+(cls[st]||'pending')+'">'+(icons[st]||'&#9675;')+'</span><span>'
      +(typeof it==='string'?E(it):E(it.item||it.test||it.action||''))+'</span></li>';
  }).join('')+'</ul>';
}

function sc(title, html) { return '<div class="sc"><h3>'+E(title)+'</h3>'+html+'</div>'; }

function renderGantt(actions) {
  if (!actions || !actions.length) return '';
  const maxWeek = Math.max(...actions.map(a => a.week_end || a.week_start || 1), 5);
  const LW = 33;
  const BW = ((100 - LW) / maxWeek).toFixed(2);
  const cols = LW + '% ' + Array(maxWeek).fill(BW + '%').join(' ');
  const IC = {alto:'var(--danger)',alto2:'var(--danger)','médio':'var(--warning)',medio:'var(--warning)',baixo:'#94a3b8'};
  const getColor = imp => IC[(imp||'baixo').toLowerCase().replace(/\u00e9/g,'e')] || '#94a3b8';

  let h = '<div style="margin-top:.25rem">';
  // Header row
  h += '<div style="display:grid;grid-template-columns:'+cols+';gap:2px;margin-bottom:.375rem">';
  h += '<div></div>';
  for (let w = 1; w <= maxWeek; w++) h += '<div style="font-size:.625rem;font-weight:700;text-align:center;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em">S'+w+'</div>';
  h += '</div>';

  // Group by track
  const tracks = [];
  actions.forEach(a => { const t = a.track || 'Geral'; if (!tracks.includes(t)) tracks.push(t); });

  tracks.forEach(track => {
    h += '<div style="font-size:.5625rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);padding:.5rem 0 .25rem;border-top:1px solid var(--border)">'+E(track)+'</div>';
    actions.filter(a => (a.track || 'Geral') === track).forEach(a => {
      const s = Math.max(1, a.week_start || 1);
      const e = Math.min(maxWeek, a.week_end || s);
      const color = getColor(a.impact);
      h += '<div style="display:grid;grid-template-columns:'+cols+';gap:2px;margin-bottom:3px;align-items:center">';
      h += '<div style="font-size:.7rem;color:var(--text-secondary);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding-right:.375rem" title="'+E(a.action)+'">'+E(a.action)+'</div>';
      for (let w = 1; w <= maxWeek; w++) {
        if (w >= s && w <= e) {
          const br = (s===e) ? '3px' : (w===s) ? '3px 0 0 3px' : (w===e) ? '0 3px 3px 0' : '0';
          h += '<div style="height:20px;background:'+color+';border-radius:'+br+';opacity:.82" title="'+E(a.action)+' (S'+s+'–S'+e+')"></div>';
        } else {
          h += '<div style="height:20px;background:var(--surface);border-radius:3px"></div>';
        }
      }
      h += '</div>';
    });
  });

  // Legend
  h += '<div style="display:flex;gap:.75rem;align-items:center;margin-top:.625rem;padding-top:.5rem;border-top:1px solid var(--border)">';
  h += '<span style="font-size:.6875rem;color:var(--text-muted)">Impacto:</span>';
  [['Alto','var(--danger)'],['Médio','var(--warning)'],['Baixo','#94a3b8']].forEach(function(pair) {
    h += '<div style="display:flex;align-items:center;gap:.25rem"><div style="width:10px;height:10px;background:'+pair[1]+';border-radius:2px;opacity:.82"></div><span style="font-size:.6875rem;color:var(--text-secondary)">'+pair[0]+'</span></div>';
  });
  h += '</div>';

  h += '</div>';
  return h;
}

// ===== SVG CHART LIBRARY =====
// Paleta semântica consistente
const CX = {
  red:'#dc2626', danger:'#b91c1c', orange:'#f97316', yellow:'#eab308',
  green:'#16a34a', emerald:'#059669', blue:'#2563eb', purple:'#7c3aed',
  gray:'#94a3b8', muted:'#64748b', line:'#e2e8f0', bg:'#f8fafc', text:'#0f172a'
};
const chartColor = (tone) => CX[tone] || CX.gray;

// insight(): wraps a chart with an auto-insight bullet (leitura estratégica do gráfico)
function insight(chartHtml, insightText, tone) {
  const borderColor = tone==='bad' ? CX.red : tone==='good' ? CX.green : tone==='warn' ? CX.yellow : CX.blue;
  return '<div class="chart-wrap" style="margin-bottom:.75rem">'
    +'<div style="padding:.25rem 0 .5rem">'+chartHtml+'</div>'
    +(insightText ? '<div style="margin-top:.25rem;padding:.5rem .75rem;border-left:3px solid '+borderColor+';background:var(--surface);border-radius:3px;font-size:.75rem;color:var(--text-secondary);line-height:1.45"><strong style="color:'+borderColor+';font-size:.6875rem;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:.15rem">Leitura</strong>'+E(insightText)+'</div>' : '')
    +'</div>';
}

// chartTitle: subtítulo de gráfico
function chartTitle(t) {
  return '<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.375rem">'+E(t)+'</div>';
}

// BAR HORIZONTAL: comparar valores lado a lado
// items: [{label, value, tone, subtext}]
function chartHBar(items, opts) {
  opts = opts || {};
  if (!items?.length) return '';
  const max = opts.max || Math.max(...items.map(i=>i.value||0));
  if (!max) return '';
  const fmt = opts.fmt || (v=>v);
  const lw = opts.labelWidth || 120;
  return (opts.title?chartTitle(opts.title):'')
    +'<div style="display:flex;flex-direction:column;gap:.375rem">'+items.map(it=>{
      const pct = ((it.value||0)/max*100).toFixed(1);
      const col = chartColor(it.tone||'blue');
      return '<div style="display:grid;grid-template-columns:'+lw+'px 1fr 70px;gap:.5rem;align-items:center">'
        +'<div style="font-size:.75rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+E(it.label)+'">'+E(it.label)+'</div>'
        +'<div style="height:18px;background:var(--surface);border-radius:3px;overflow:hidden;position:relative">'
        +'<div style="height:100%;width:'+pct+'%;background:'+col+';border-radius:3px;opacity:.85"></div>'
        +(it.subtext?'<div style="position:absolute;top:50%;transform:translateY(-50%);left:8px;font-size:.6875rem;color:white;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.4)">'+E(it.subtext)+'</div>':'')
        +'</div>'
        +'<div style="font-size:.75rem;font-weight:700;color:'+col+';text-align:right">'+E(String(fmt(it.value)))+'</div>'
        +'</div>';
    }).join('')+'</div>';
}

// DONUT: distribuição percentual
// slices: [{label, value, tone}]
function chartDonut(slices, opts) {
  opts = opts || {};
  if (!slices?.length) return '';
  const total = slices.reduce((s,x)=>s+(x.value||0),0);
  if (!total) return '';
  const size = opts.size || 160;
  const cx = size/2, cy = size/2, r = size*0.4, ir = size*0.26;
  let angle = -Math.PI/2;
  const paths = slices.map(s=>{
    const frac = (s.value||0)/total;
    const a2 = angle + frac*Math.PI*2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx+r*Math.cos(angle), y1 = cy+r*Math.sin(angle);
    const x2 = cx+r*Math.cos(a2),   y2 = cy+r*Math.sin(a2);
    const x3 = cx+ir*Math.cos(a2),  y3 = cy+ir*Math.sin(a2);
    const x4 = cx+ir*Math.cos(angle), y4 = cy+ir*Math.sin(angle);
    const d = 'M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' L '+x3+' '+y3+' A '+ir+' '+ir+' 0 '+large+' 0 '+x4+' '+y4+' Z';
    angle = a2;
    return '<path d="'+d+'" fill="'+chartColor(s.tone||'blue')+'" opacity=".85"><title>'+E(s.label)+': '+(frac*100).toFixed(1)+'%</title></path>';
  }).join('');
  const legend = slices.map(s=>{
    const pct = ((s.value||0)/total*100).toFixed(1);
    return '<div style="display:flex;align-items:center;gap:.375rem;font-size:.75rem;margin-bottom:.2rem">'
      +'<div style="width:10px;height:10px;background:'+chartColor(s.tone||'blue')+';border-radius:2px;flex-shrink:0"></div>'
      +'<div style="flex:1;color:var(--text-secondary)">'+E(s.label)+'</div>'
      +'<div style="font-weight:700;color:var(--text-primary)">'+pct+'%</div>'
      +'</div>';
  }).join('');
  const centerLabel = opts.center || '';
  return (opts.title?chartTitle(opts.title):'')
    +'<div style="display:grid;grid-template-columns:'+size+'px 1fr;gap:1rem;align-items:center">'
    +'<svg viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'">'+paths
    +(centerLabel?'<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="14" font-weight="700" fill="'+CX.text+'">'+E(centerLabel.split('|')[0])+'</text>'
      +'<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="9" fill="'+CX.muted+'" text-transform="uppercase">'+E(centerLabel.split('|')[1]||'')+'</text>':'')
    +'</svg>'
    +'<div>'+legend+'</div>'
    +'</div>';
}

// GAUGE: métrica vs benchmark (semicírculo)
// value: atual, benchmark: meta/média, max: teto da escala
function chartGauge(value, benchmark, max, opts) {
  opts = opts || {};
  if (value == null || max == null) return '';
  const w = opts.size || 220, h = w*0.72;
  const cx = w/2, cy = h*0.78, r = w*0.40;
  const pct = Math.min(1, Math.max(0, value/max));
  const benchPct = benchmark!=null ? Math.min(1, Math.max(0, benchmark/max)) : null;
  const angleStart = Math.PI, angleEnd = 0;
  const valAngle = angleStart + (angleEnd-angleStart)*pct;
  // Inverted logic: for CPL/CPA lower is better
  const invert = opts.invert;
  const isGood = invert ? (benchmark!=null && value <= benchmark) : (benchmark!=null && value >= benchmark);
  const tone = isGood ? 'green' : (benchmark!=null ? 'red' : 'blue');
  const col = chartColor(tone);

  const arcPath = (a1, a2, rad) => {
    const x1 = cx+rad*Math.cos(a1), y1 = cy+rad*Math.sin(a1);
    const x2 = cx+rad*Math.cos(a2), y2 = cy+rad*Math.sin(a2);
    const large = Math.abs(a2-a1) > Math.PI ? 1 : 0;
    const sweep = a2 > a1 ? 1 : 0;
    return 'M '+x1+' '+y1+' A '+rad+' '+rad+' 0 '+large+' '+sweep+' '+x2+' '+y2;
  };
  const bench = benchPct != null ? angleStart + (angleEnd-angleStart)*benchPct : null;
  const benchX = bench != null ? cx+r*Math.cos(bench) : null;
  const benchY = bench != null ? cy+r*Math.sin(bench) : null;
  const benchXi = bench != null ? cx+(r-10)*Math.cos(bench) : null;
  const benchYi = bench != null ? cy+(r-10)*Math.sin(bench) : null;

  const fmt = opts.fmt || (v=>v);
  return (opts.title?chartTitle(opts.title):'')
    +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" style="max-width:'+w+'px">'
    +'<path d="'+arcPath(angleStart, angleEnd, r)+'" fill="none" stroke="'+CX.line+'" stroke-width="10" stroke-linecap="round"/>'
    +'<path d="'+arcPath(angleStart, valAngle, r)+'" fill="none" stroke="'+col+'" stroke-width="10" stroke-linecap="round" opacity=".9"/>'
    +(bench != null ? '<line x1="'+benchXi+'" y1="'+benchYi+'" x2="'+benchX+'" y2="'+benchY+'" stroke="'+CX.text+'" stroke-width="2"/><circle cx="'+benchX+'" cy="'+benchY+'" r="4" fill="'+CX.text+'"/>' : '')
    +'<text x="'+cx+'" y="'+(cy-28)+'" text-anchor="middle" font-size="9" fill="'+CX.muted+'" text-transform="uppercase" letter-spacing=".05em">'+E(opts.metricLabel||'Atual')+'</text>'
    +'<text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" font-size="22" font-weight="800" fill="'+col+'">'+E(String(fmt(value)))+'</text>'
    +'<text x="'+(cx-r+4)+'" y="'+(cy+12)+'" text-anchor="start" font-size="8" fill="'+CX.muted+'">0</text>'
    +'<text x="'+(cx+r-4)+'" y="'+(cy+12)+'" text-anchor="end" font-size="8" fill="'+CX.muted+'">'+E(String(fmt(max)))+'</text>'
    +(benchmark != null ? '<text x="'+cx+'" y="'+(cy+28)+'" text-anchor="middle" font-size="10" fill="'+CX.muted+'">Benchmark setor: '+E(String(fmt(benchmark)))+'</text>':'')
    +'</svg>';
}

// FUNNEL: estágios com conversão entre níveis
// stages: [{label, value, tone, subtext}]
function chartFunnel(stages) {
  if (!stages?.length) return '';
  const max = stages[0].value || Math.max(...stages.map(s=>s.value||0));
  if (!max) return '';
  return '<div style="display:flex;flex-direction:column;gap:.25rem">'+stages.map((s,i)=>{
    const pct = ((s.value||0)/max*100);
    const col = chartColor(s.tone||'blue');
    const prev = i>0 ? stages[i-1].value : null;
    const drop = prev && prev > 0 ? (((prev - (s.value||0))/prev)*100).toFixed(0) : null;
    return (drop!==null ? '<div style="text-align:center;font-size:.625rem;color:'+CX.red+';margin:-.1rem 0;font-weight:700">↓ vaza '+drop+'%</div>' : '')
      +'<div style="display:grid;grid-template-columns:140px 1fr 80px;gap:.5rem;align-items:center">'
      +'<div style="font-size:.75rem;font-weight:600;color:var(--text-primary)" title="'+E(s.label)+'">'+E(s.label)+'</div>'
      +'<div style="height:28px;background:var(--surface);border-radius:3px;overflow:hidden;position:relative">'
      +'<div style="height:100%;width:'+pct.toFixed(1)+'%;background:'+col+';border-radius:3px;opacity:.85;min-width:20px"></div>'
      +'<div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 .5rem;font-size:.6875rem;color:'+(pct>40?'white':'var(--text-primary)')+';font-weight:700;text-shadow:'+(pct>40?'0 1px 2px rgba(0,0,0,.4)':'none')+'">'+E(s.subtext||'')+'</div>'
      +'</div>'
      +'<div style="font-size:.8125rem;font-weight:700;text-align:right;color:'+col+'">'+(typeof s.value==='number'?N(s.value):E(String(s.value||'—')))+'</div>'
      +'</div>';
  }).join('')+'</div>';
}

// RADAR: comparar scores multi-dimensionais (ex: pilares, competitor)
// axes: [{name, value, benchmark}]
function chartRadar(axes, opts) {
  opts = opts || {};
  if (!axes?.length || axes.length < 3) return '';
  const size = opts.size || 260;
  const cx = size/2, cy = size/2, maxR = size*0.37;
  const max = opts.max || 100;
  const n = axes.length;
  const pt = (i, val) => {
    const a = -Math.PI/2 + (i/n)*Math.PI*2;
    const rad = maxR * (val/max);
    return (cx+rad*Math.cos(a))+','+(cy+rad*Math.sin(a));
  };
  const axisLine = axes.map((_,i)=>{
    const a = -Math.PI/2 + (i/n)*Math.PI*2;
    return '<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+maxR*Math.cos(a))+'" y2="'+(cy+maxR*Math.sin(a))+'" stroke="'+CX.line+'" stroke-width="1"/>';
  }).join('');
  const rings = [0.25,0.5,0.75,1].map(f=>{
    const pts = axes.map((_,i)=>{
      const a = -Math.PI/2 + (i/n)*Math.PI*2;
      return (cx+maxR*f*Math.cos(a))+','+(cy+maxR*f*Math.sin(a));
    }).join(' ');
    return '<polygon points="'+pts+'" fill="none" stroke="'+CX.line+'" stroke-width="1" opacity=".6"/>';
  }).join('');
  const valPoly = '<polygon points="'+axes.map((a,i)=>pt(i,a.value||0)).join(' ')+'" fill="'+chartColor(opts.tone||'blue')+'" fill-opacity=".28" stroke="'+chartColor(opts.tone||'blue')+'" stroke-width="2"/>';
  const benchPoly = axes[0].benchmark!=null ? '<polygon points="'+axes.map((a,i)=>pt(i,a.benchmark||0)).join(' ')+'" fill="none" stroke="'+CX.muted+'" stroke-width="1.5" stroke-dasharray="4 3"/>':'';
  const labels = axes.map((a,i)=>{
    const ang = -Math.PI/2 + (i/n)*Math.PI*2;
    const lr = maxR + 18;
    const lx = cx+lr*Math.cos(ang), ly = cy+lr*Math.sin(ang);
    const anchor = Math.cos(ang) > 0.3 ? 'start' : Math.cos(ang) < -0.3 ? 'end' : 'middle';
    return '<text x="'+lx+'" y="'+(ly+3)+'" font-size="10" font-weight="600" fill="'+CX.text+'" text-anchor="'+anchor+'">'+E(a.name)+'</text>'
      +'<text x="'+lx+'" y="'+(ly+14)+'" font-size="9" fill="'+chartColor(opts.tone||'blue')+'" font-weight="700" text-anchor="'+anchor+'">'+(a.value||0)+(a.benchmark!=null?'/'+a.benchmark:'')+'</text>';
  }).join('');
  // Padding para labels nao cortarem
  const padX = 70, padY = 28;
  const vbW = size + padX*2, vbH = size + padY*2;
  return (opts.title?chartTitle(opts.title):'')
    +'<svg viewBox="'+(-padX)+' '+(-padY)+' '+vbW+' '+vbH+'" width="100%" height="'+vbH+'" preserveAspectRatio="xMidYMid meet" style="max-width:'+vbW+'px;display:block;margin:0 auto;overflow:visible">'
    +rings+axisLine+benchPoly+valPoly+labels
    +'</svg>'
    +(axes[0].benchmark!=null?'<div style="display:flex;gap:.75rem;justify-content:center;margin-top:.25rem;font-size:.6875rem;color:var(--text-muted)"><span><span style="display:inline-block;width:10px;height:10px;background:'+chartColor(opts.tone||'blue')+';opacity:.5;margin-right:.25rem;vertical-align:middle"></span>Atual</span><span><span style="display:inline-block;width:10px;height:2px;background:'+CX.muted+';margin-right:.25rem;vertical-align:middle"></span>Benchmark</span></div>':'');
}

// EFFORT x IMPACT MATRIX: prioriza acoes em 2x2 (Quick Wins / Grandes Projetos / Preencher / Revisar)
// items: [{label, effort: 'low|medium|high', impact: 'baixo|medio|alto', rank, tooltip}]
function chartEffortImpact(items, opts) {
  opts = opts || {};
  if (!items?.length) return '';
  const w = 520, h = 420;
  const pad = {l: 64, r: 24, t: 40, b: 56};
  const iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
  const effX = {low: 0.25, medium: 0.55, high: 0.85};
  const impY = {alto: 0.18, medio: 0.5, baixo: 0.82};
  const xCol = v => pad.l + iw * (effX[v] ?? 0.5);
  const yRow = v => pad.t + ih * (impY[v] ?? 0.5);
  // Fundo dos quadrantes
  const midX = pad.l + iw/2, midY = pad.t + ih/2;
  const quads = ''
    + '<rect x="'+pad.l+'" y="'+pad.t+'" width="'+(iw/2)+'" height="'+(ih/2)+'" fill="'+CX.green+'" opacity=".10"/>'
    + '<rect x="'+midX+'" y="'+pad.t+'" width="'+(iw/2)+'" height="'+(ih/2)+'" fill="'+CX.blue+'" opacity=".10"/>'
    + '<rect x="'+pad.l+'" y="'+midY+'" width="'+(iw/2)+'" height="'+(ih/2)+'" fill="'+CX.gray+'" opacity=".10"/>'
    + '<rect x="'+midX+'" y="'+midY+'" width="'+(iw/2)+'" height="'+(ih/2)+'" fill="'+CX.red+'" opacity=".10"/>';
  const labelsQ = ''
    + '<text x="'+(pad.l+iw/4)+'" y="'+(pad.t+14)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+CX.green+'">QUICK WINS</text>'
    + '<text x="'+(midX+iw/4)+'" y="'+(pad.t+14)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+CX.blue+'">GRANDES PROJETOS</text>'
    + '<text x="'+(pad.l+iw/4)+'" y="'+(midY+14)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+CX.muted+'">PREENCHER</text>'
    + '<text x="'+(midX+iw/4)+'" y="'+(midY+14)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+CX.red+'">REVISAR</text>';
  // Grid
  const axes = ''
    + '<line x1="'+pad.l+'" y1="'+pad.t+'" x2="'+pad.l+'" y2="'+(pad.t+ih)+'" stroke="'+CX.line+'" stroke-width="1"/>'
    + '<line x1="'+pad.l+'" y1="'+(pad.t+ih)+'" x2="'+(pad.l+iw)+'" y2="'+(pad.t+ih)+'" stroke="'+CX.line+'" stroke-width="1"/>'
    + '<line x1="'+midX+'" y1="'+pad.t+'" x2="'+midX+'" y2="'+(pad.t+ih)+'" stroke="'+CX.line+'" stroke-width="1" stroke-dasharray="4 4"/>'
    + '<line x1="'+pad.l+'" y1="'+midY+'" x2="'+(pad.l+iw)+'" y2="'+midY+'" stroke="'+CX.line+'" stroke-width="1" stroke-dasharray="4 4"/>';
  // Labels dos eixos
  const axLabels = ''
    + '<text x="'+(pad.l+iw/2)+'" y="'+(h-12)+'" text-anchor="middle" font-size="11" font-weight="700" fill="'+CX.text+'">ESFORCO (menor → maior)</text>'
    + '<text x="'+(pad.l-22)+'" y="'+(pad.t+ih/2)+'" text-anchor="middle" font-size="11" font-weight="700" fill="'+CX.text+'" transform="rotate(-90 '+(pad.l-22)+' '+(pad.t+ih/2)+')">IMPACTO (menor → maior)</text>'
    + '<text x="'+xCol('low')+'" y="'+(pad.t+ih+16)+'" text-anchor="middle" font-size="9" fill="'+CX.muted+'">Baixo</text>'
    + '<text x="'+xCol('medium')+'" y="'+(pad.t+ih+16)+'" text-anchor="middle" font-size="9" fill="'+CX.muted+'">Medio</text>'
    + '<text x="'+xCol('high')+'" y="'+(pad.t+ih+16)+'" text-anchor="middle" font-size="9" fill="'+CX.muted+'">Alto</text>'
    + '<text x="'+(pad.l-6)+'" y="'+(yRow('alto')+3)+'" text-anchor="end" font-size="9" fill="'+CX.muted+'">Alto</text>'
    + '<text x="'+(pad.l-6)+'" y="'+(yRow('medio')+3)+'" text-anchor="end" font-size="9" fill="'+CX.muted+'">Medio</text>'
    + '<text x="'+(pad.l-6)+'" y="'+(yRow('baixo')+3)+'" text-anchor="end" font-size="9" fill="'+CX.muted+'">Baixo</text>';
  // Agrupa itens na mesma celula para nao sobrepor
  const bucket = {};
  items.forEach((it, idx) => {
    const key = (it.effort||'medium')+'|'+(it.impact||'medio');
    (bucket[key] = bucket[key] || []).push({...it, _i: idx});
  });
  let dots = '';
  Object.values(bucket).forEach(group => {
    const n = group.length;
    group.forEach((it, j) => {
      const cx = xCol(it.effort||'medium');
      const cy = yRow(it.impact||'medio');
      // offset radial se houver mais de 1 no mesmo balde
      const off = n>1 ? 16 : 0;
      const ang = n>1 ? (j/n) * Math.PI*2 - Math.PI/2 : 0;
      const dx = cx + off*Math.cos(ang), dy = cy + off*Math.sin(ang);
      const isCritical = it.impact==='alto' && it.effort==='low';
      const col = isCritical ? CX.green : it.impact==='alto' ? CX.blue : it.impact==='medio' ? CX.yellow : CX.gray;
      dots += '<circle cx="'+dx+'" cy="'+dy+'" r="13" fill="'+col+'" stroke="#fff" stroke-width="2">'
        + '<title>'+E(it.tooltip||it.label||'')+'</title></circle>'
        + '<text x="'+dx+'" y="'+(dy+4)+'" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" pointer-events="none">'+E(String(it.rank||(it._i+1)))+'</text>';
    });
  });
  return (opts.title?chartTitle(opts.title):'')
    + '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="max-width:'+w+'px;display:block;margin:0 auto">'
    + quads + axes + labelsQ + axLabels + dots + '</svg>';
}

// WATERFALL: cenários com entradas e saídas progressivas
// items: [{label, value, tone}] — o valor pode ser positivo ou negativo
function chartWaterfall(items, opts) {
  opts = opts || {};
  if (!items?.length) return '';
  const w = opts.width || 480, h = opts.height || 180;
  const lab = 20, right = 20, top = 20, bottom = 30;
  const cw = (w-lab-right)/items.length;
  let running = 0;
  const running_ = items.map(it=>{ const from = running; running += (it.value||0); return {from, to: running}; });
  const allVals = running_.flatMap(r=>[r.from,r.to]);
  const maxV = Math.max(...allVals, 0), minV = Math.min(...allVals, 0);
  const yScale = v => top + (h-top-bottom) * (1 - (v-minV)/Math.max(1,maxV-minV));
  const bars = items.map((it,i)=>{
    const r = running_[i];
    const col = chartColor(it.tone || (it.value>=0?'green':'red'));
    const y0 = yScale(r.from), y1 = yScale(r.to);
    const yTop = Math.min(y0,y1), hh = Math.max(2, Math.abs(y1-y0));
    const x = lab + i*cw + cw*0.15;
    const bw = cw*0.7;
    return '<rect x="'+x+'" y="'+yTop+'" width="'+bw+'" height="'+hh+'" fill="'+col+'" opacity=".85"/>'
      +'<text x="'+(x+bw/2)+'" y="'+(yTop-4)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+CX.text+'">'+(it.value>=0?'+':'')+(opts.fmt?opts.fmt(it.value):it.value)+'</text>'
      +'<text x="'+(x+bw/2)+'" y="'+(h-bottom+14)+'" text-anchor="middle" font-size="9" fill="'+CX.muted+'">'+E(it.label)+'</text>';
  }).join('');
  const baseline = '<line x1="'+lab+'" y1="'+yScale(0)+'" x2="'+(w-right)+'" y2="'+yScale(0)+'" stroke="'+CX.line+'" stroke-width="1"/>';
  return (opts.title?chartTitle(opts.title):'')
    +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="xMidYMid meet">'
    +baseline+bars
    +'</svg>';
}

// GROUPED BARS: 2-3 series side by side (ex: cenários A/B/C em 3 métricas)
// series: [{name, tone, values:[v1,v2,...]}], categories: [label1, ...]
function chartGroupedBars(categories, series, opts) {
  opts = opts || {};
  if (!categories?.length || !series?.length) return '';
  const w = opts.width || 520, h = opts.height || 200;
  const pad = {l:40,r:20,t:30,b:40};
  const cw = (w-pad.l-pad.r)/categories.length;
  const bw = (cw*0.7)/series.length;
  const all = series.flatMap(s=>s.values);
  const max = Math.max(...all, 0);
  const yScale = v => pad.t + (h-pad.t-pad.b) * (1 - v/Math.max(1,max));
  const groups = categories.map((cat,i)=>{
    const gx = pad.l + i*cw + cw*0.15;
    return series.map((s,si)=>{
      const x = gx + si*bw;
      const val = s.values[i]||0;
      const y = yScale(val);
      const barH = (h-pad.b) - y;
      const col = chartColor(s.tone||'blue');
      return '<rect x="'+x+'" y="'+y+'" width="'+(bw-2)+'" height="'+Math.max(0,barH)+'" fill="'+col+'" opacity=".85"/>'
        +'<text x="'+(x+bw/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="9" font-weight="700" fill="'+CX.text+'">'+(opts.fmt?opts.fmt(val):val)+'</text>';
    }).join('')
    +'<text x="'+(gx+cw*0.35)+'" y="'+(h-pad.b+14)+'" text-anchor="middle" font-size="10" font-weight="600" fill="'+CX.text+'">'+E(cat)+'</text>';
  }).join('');
  const legend = '<div style="display:flex;gap:.75rem;justify-content:center;margin-top:.25rem;font-size:.6875rem">'
    +series.map(s=>'<span><span style="display:inline-block;width:10px;height:10px;background:'+chartColor(s.tone||'blue')+';opacity:.85;margin-right:.25rem;vertical-align:middle"></span>'+E(s.name)+'</span>').join('')
    +'</div>';
  const yAxis = opts.yLabel ? '<text x="8" y="'+(pad.t+(h-pad.t-pad.b)/2)+'" transform="rotate(-90 8 '+(pad.t+(h-pad.t-pad.b)/2)+')" text-anchor="middle" font-size="9" font-weight="600" fill="'+CX.muted+'" text-transform="uppercase" letter-spacing=".05em">'+E(opts.yLabel)+'</text>' : '';
  const xAxis = opts.xLabel ? '<text x="'+(pad.l+(w-pad.l-pad.r)/2)+'" y="'+(h-4)+'" text-anchor="middle" font-size="9" font-weight="600" fill="'+CX.muted+'" text-transform="uppercase" letter-spacing=".05em">'+E(opts.xLabel)+'</text>' : '';
  return (opts.title?chartTitle(opts.title):'')
    +'<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="xMidYMid meet">'
    +'<line x1="'+pad.l+'" y1="'+(h-pad.b)+'" x2="'+(w-pad.r)+'" y2="'+(h-pad.b)+'" stroke="'+CX.line+'" stroke-width="1"/>'
    +'<line x1="'+pad.l+'" y1="'+pad.t+'" x2="'+pad.l+'" y2="'+(h-pad.b)+'" stroke="'+CX.line+'" stroke-width="1"/>'
    +yAxis+xAxis
    +groups
    +'</svg>'+legend;
}

// SPARKLINE: linha temporal compacta
function chartSparkline(values, opts) {
  opts = opts || {};
  if (!values?.length) return '';
  const w = opts.width||200, h = opts.height||40;
  const max = Math.max(...values), min = Math.min(...values);
  const span = max-min || 1;
  const step = (w-4)/(values.length-1||1);
  const pts = values.map((v,i)=>(2+i*step)+','+(h-2-((v-min)/span)*(h-4))).join(' ');
  const col = chartColor(opts.tone||'blue');
  const last = values[values.length-1], first = values[0];
  const trendCol = last>=first ? (opts.invert?CX.red:CX.green) : (opts.invert?CX.green:CX.red);
  return '<svg viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'">'
    +'<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+(2+(values.length-1)*step)+'" cy="'+(h-2-((last-min)/span)*(h-4))+'" r="3" fill="'+trendCol+'"/>'
    +'</svg>';
}

// heatCell: célula colorida pra scores 0-100
function heatCell(val, opts) {
  opts = opts || {};
  if (val == null) return '<span style="color:var(--text-muted)">—</span>';
  const t = val>=70?'green':val>=50?'yellow':val>=30?'orange':'red';
  return '<span style="display:inline-block;min-width:40px;padding:.1rem .4rem;background:'+chartColor(t)+';color:white;font-size:.75rem;font-weight:700;border-radius:3px;text-align:center">'+N(val)+(opts.suffix||'')+'</span>';
}

// Garantem que todas as skills rendam o mesmo visual para summary_headline,
// summary_highlights, summary_key_findings, key_insight e honesty_alert.

// Mapa de tons → cor CSS
const TONE_MAP = { green:'var(--success)', red:'var(--danger)', yellow:'var(--warning)', blue:'var(--accent)', gray:'var(--text-muted)' };

// Mapa de categorias de highlights → label + cor do grupo
const HIGHLIGHT_CAT = {
  posicao:     { title: 'Posição',              color: 'var(--warning)' },
  competicao:  { title: 'Cenário Competitivo',  color: 'var(--danger)' },
  janela:      { title: 'Janela / Urgência',    color: 'var(--accent)' },
  maturidade:  { title: 'Maturidade',           color: 'var(--warning)' },
  oportunidade:{ title: 'Oportunidade',         color: 'var(--success)' },
  risco:       { title: 'Risco',                color: 'var(--danger)' },
};

// Mapa de categorias de findings → título, cor, ícone
const FINDING_CAT = {
  vantagem: { title: 'Vantagens Competitivas', color: 'var(--success)', icon: '✓' },
  contexto: { title: 'Contexto',               color: 'var(--accent)',  icon: 'i' },
  ameaca:   { title: 'Ameaças & Riscos',       color: 'var(--danger)',  icon: '!' },
  acao:     { title: 'Ações Recomendadas',     color: 'var(--warning)', icon: '▸' },
};

// renderLeituraEstrategica: renderiza o bloco canônico "Leitura Estratégica"
// = summary_headline + summary_highlights (categorizado) + summary_key_findings (categorizado)
// + resumo completo colapsável. Mesmo visual em TODA skill.
function renderLeituraEstrategica(d, opts) {
  opts = opts || {};
  const title = opts.title || 'Leitura Estratégica';
  const verdictLabel = opts.verdictLabel || 'Veredito';

  if (!d.summary_headline && !d.summary_highlights?.length && !d.summary_key_findings?.length) {
    // Fallback: se só tem summary simples, usa sm()
    return d.summary ? sm(d.summary) : '';
  }

  let hero = '';

  // A. Veredito (headline)
  if (d.summary_headline) {
    hero += '<div style="padding:1.125rem 1.25rem;background:linear-gradient(135deg, rgba(220,38,38,0.08), rgba(234,179,8,0.04));border-left:4px solid var(--danger);border-radius:4px;margin-bottom:1rem">'
      +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--danger);margin-bottom:.375rem">'+E(verdictLabel)+'</div>'
      +'<div style="font-size:.9375rem;font-weight:600;color:var(--text-primary);line-height:1.55">'+E(d.summary_headline)+'</div>'
      +'</div>';
  }

  // B. KPIs — grid uniforme com categoria como chip no card (evita colunas assimétricas)
  if (d.summary_highlights?.length) {
    const hasCategories = d.summary_highlights.some(hi => hi.category && HIGHLIGHT_CAT[hi.category]);

    if (hasCategories) {
      // Ordem canônica de categorias — prioriza posicionamento/contexto antes de ação
      const CAT_ORDER = ['posicao', 'maturidade', 'competicao', 'janela', 'oportunidade', 'risco'];
      const sorted = [...d.summary_highlights].sort((a, b) => {
        const ia = CAT_ORDER.indexOf(a.category); const ib = CAT_ORDER.indexOf(b.category);
        return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
      });

      hero += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.75rem;margin-bottom:1rem">'
        + sorted.map(hi => {
          const cat = hi.category || 'outros';
          const lab = HIGHLIGHT_CAT[cat] || { title: cat.toUpperCase(), color: 'var(--text-muted)' };
          const col = TONE_MAP[hi.tone] || 'var(--accent)';
          const valStr = String(hi.value==null?'':hi.value);
          // Font adaptativo: números/códigos curtos ficam grandes; textos longos ficam compactos
          const len = valStr.length;
          const valFont = len <= 6 ? '1.75rem' : len <= 14 ? '1.25rem' : len <= 30 ? '1rem' : '.875rem';
          const valLineH = len <= 6 ? '1.05' : '1.3';

          return '<div style="display:flex;flex-direction:column;padding:.875rem 1rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid '+col+';border-radius:4px;min-width:0">'
            +'<div style="display:flex;align-items:center;gap:.375rem;margin-bottom:.625rem;padding-bottom:.5rem;border-bottom:1px dashed var(--border)">'
            +  '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:'+lab.color+';flex-shrink:0"></span>'
            +  '<span style="font-size:.5625rem;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:'+lab.color+'">'+E(lab.title)+'</span>'
            +'</div>'
            +'<div style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);line-height:1.3;margin-bottom:.375rem">'+E(hi.label)+'</div>'
            +'<div style="font-size:'+valFont+';font-weight:800;color:'+col+';line-height:'+valLineH+';letter-spacing:-.01em;word-wrap:break-word;overflow-wrap:break-word;margin-bottom:auto">'+E(valStr)+'</div>'
            +(hi.subtext?'<div style="font-size:.75rem;color:var(--text-secondary);margin-top:.5rem;line-height:1.45">'+E(hi.subtext)+'</div>':'')
            +'</div>';
        }).join('')
        +'</div>';
    } else {
      // Fallback sem categoria — grid responsivo
      hero += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.625rem;margin-bottom:1rem">'
        + d.summary_highlights.map(hi => {
          const col = TONE_MAP[hi.tone] || 'var(--accent)';
          const valStr = String(hi.value==null?'':hi.value);
          const len = valStr.length;
          const valFont = len <= 6 ? '1.625rem' : len <= 14 ? '1.125rem' : '.9375rem';
          const valLineH = len <= 6 ? '1.05' : '1.25';
          return '<div style="padding:.75rem .875rem;background:var(--surface);border:1px solid var(--border);border-top:3px solid '+col+';border-radius:3px;min-width:0">'
            +'<div style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);line-height:1.3;margin-bottom:.375rem">'+E(hi.label)+'</div>'
            +'<div style="font-size:'+valFont+';font-weight:800;color:'+col+';line-height:'+valLineH+';letter-spacing:-.005em;word-wrap:break-word;overflow-wrap:break-word">'+E(valStr)+'</div>'
            +(hi.subtext?'<div style="font-size:.75rem;color:var(--text-secondary);margin-top:.375rem;line-height:1.4">'+E(hi.subtext)+'</div>':'')
            +'</div>';
        }).join('')
        +'</div>';
    }
  }

  // C. Findings categorizados
  if (d.summary_key_findings?.length) {
    const normalized = d.summary_key_findings.map(f => typeof f === 'string' ? { category:'contexto', text:f } : f);
    const groups = {};
    const order = [];
    normalized.forEach(f => {
      const cat = f.category || 'contexto';
      if (!groups[cat]) { groups[cat] = []; order.push(cat); }
      groups[cat].push(f);
    });
    const hasCats = order.some(k => FINDING_CAT[k]);

    if (hasCats) {
      hero += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:.75rem;margin-bottom:1rem">'
        + order.map(cat => {
          const meta = FINDING_CAT[cat] || FINDING_CAT.contexto;
          const items = groups[cat];
          return '<div style="background:var(--surface);border:1px solid var(--border);border-top:3px solid '+meta.color+';border-radius:3px;padding:.75rem .875rem">'
            +'<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.375rem;border-bottom:1px dashed var(--border)">'
            +  '<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:'+meta.color+';color:white;font-size:.6875rem;font-weight:800">'+meta.icon+'</span>'
            +  '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:'+meta.color+'">'+E(meta.title)+'</div>'
            +  '<div style="margin-left:auto;font-size:.625rem;color:var(--text-muted);font-weight:700">'+items.length+'</div>'
            +'</div>'
            +'<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.5rem">'
            + items.map(f => '<li style="font-size:.8125rem;color:var(--text-secondary);line-height:1.5">'+E(f.text)+'</li>').join('')
            +'</ul>'
            +'</div>';
        }).join('')
        +'</div>';
    } else {
      hero += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.75rem 1rem;margin-bottom:1rem">'
        +'<div style="font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.5rem">Principais Achados</div>'
        +'<ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.375rem">'
        + normalized.map(f => '<li style="display:grid;grid-template-columns:18px 1fr;gap:.5rem;align-items:start;font-size:.8125rem;color:var(--text-secondary);line-height:1.45"><span style="color:var(--success);font-weight:700;margin-top:.1rem">▸</span><span>'+E(f.text)+'</span></li>').join('')
        +'</ul></div>';
    }
  }

  // D. Resumo completo (collapsible)
  if (d.summary) {
    hero += '<details style="margin-bottom:.5rem"><summary style="cursor:pointer;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:.375rem 0">Ver resumo completo</summary>'
      +'<div style="padding:.75rem .875rem;background:var(--surface);border-radius:3px;font-size:.8125rem;color:var(--text-secondary);line-height:1.55">'+E(d.summary)+'</div>'
      +'</details>';
  }

  return sc(title, hero);
}

// renderKeyInsight: renderiza o bloco canônico "Ponto de Alavancagem"
// Aceita um objeto {headline, context, numbered_reasons[], discussion_anchor, feasibility?}
// ou um string legado (vira só headline + context).
// Opts: {title, badge, feasibility}
function renderKeyInsight(ki, opts) {
  if (!ki) return '';
  opts = opts || {};
  const title = opts.title || 'Ponto de Alavancagem';
  const badge = opts.badge || 'Whitespace Estratégico · Discussão com Stakeholder';

  // Se vier string, converte
  if (typeof ki === 'string') ki = { context: ki };

  const headline = ki.headline || '';
  const context = ki.context || ki.description || '';
  const reasons = Array.isArray(ki.numbered_reasons) ? ki.numbered_reasons : [];
  const anchor = ki.discussion_anchor || '';
  const feas = (opts.feasibility || ki.feasibility || '').toLowerCase();

  const feasCol = feas==='alta'?'var(--success)':feas==='media'||feas==='média'?'var(--warning)':feas==='baixa'?'var(--danger)':'var(--success)';
  const feasBg = feas==='alta'?'rgba(22,163,74,0.08)':feas==='media'||feas==='média'?'rgba(234,179,8,0.08)':feas==='baixa'?'rgba(220,38,38,0.08)':'rgba(22,163,74,0.08)';

  // Extrai primeira frase em aspas do headline ou context como quote hero (se não houver headline puro)
  let heroQuote = headline;
  let bodyText = context;
  if (!heroQuote && context) {
    const quoteMatch = context.match(/['""']([^'""']{8,})['""']/);
    if (quoteMatch) {
      heroQuote = quoteMatch[1];
      bodyText = context.replace(quoteMatch[0], '');
    }
  }

  let opp = '<div style="background:linear-gradient(135deg, rgba(22,163,74,0.04) 0%, rgba(22,163,74,0.08) 100%);border:2px solid var(--success);border-radius:6px;padding:1.25rem 1.375rem;position:relative;overflow:hidden">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap">'
    +   '<div style="display:flex;align-items:center;gap:.5rem">'
    +     '<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--success);color:white;font-size:.75rem;font-weight:800">★</span>'
    +     '<span style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--success)">'+E(badge)+'</span>'
    +   '</div>'
    +   (feas?'<div style="display:inline-flex;align-items:center;gap:.375rem;background:'+feasBg+';border:1px solid '+feasCol+';padding:.3rem .6rem;border-radius:20px">'
    +     '<span style="width:6px;height:6px;border-radius:50%;background:'+feasCol+';box-shadow:0 0 0 3px '+feasBg+'"></span>'
    +     '<span style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:'+feasCol+'">Viabilidade '+E(feas)+'</span>'
    +   '</div>':'')
    + '</div>';

  if (heroQuote) {
    opp += '<div style="padding:.875rem 1rem;background:white;border-left:4px solid var(--success);border-radius:3px;margin-bottom:1rem;box-shadow:0 1px 2px rgba(0,0,0,0.04)">'
      +'<div style="font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.375rem">Insight-chave</div>'
      +'<div style="font-size:1.0625rem;font-weight:700;color:var(--text-primary);line-height:1.4;font-style:italic">"'+E(heroQuote)+'"</div>'
      +'</div>';
  }

  if (bodyText) {
    opp += '<div style="font-size:.875rem;color:var(--text-secondary);line-height:1.6;margin-bottom:'+(reasons.length?'1.25rem':'.25rem')+'">'+E(bodyText)+'</div>';
  }

  if (reasons.length) {
    opp += '<div style="border-top:1px dashed rgba(22,163,74,0.3);padding-top:1rem">'
      +'<div style="font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-primary);margin-bottom:.75rem">Razões / Evidências</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:.625rem">'
      + reasons.map((r, i) => {
          const clean = String(r).replace(/^\s*\(\d+\)\s*/,'').replace(/^[.,;]\s*/,'').trim();
          return '<div style="display:flex;gap:.625rem;padding:.75rem;background:rgba(255,255,255,0.6);border:1px solid rgba(22,163,74,0.15);border-radius:4px">'
            +'<div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--success);color:white;display:flex;align-items:center;justify-content:center;font-size:.8125rem;font-weight:800">'+(i+1)+'</div>'
            +'<div style="font-size:.75rem;color:var(--text-secondary);line-height:1.5">'+E(clean)+'</div>'
            +'</div>';
        }).join('')
      +'</div></div>';
  }

  if (anchor) {
    opp += '<div style="margin-top:1.125rem;padding:.75rem .875rem;background:rgba(22,163,74,0.12);border-radius:4px;display:flex;align-items:center;gap:.625rem">'
      +'<span style="font-size:1rem">💬</span>'
      +'<div style="font-size:.75rem;color:var(--text-primary);line-height:1.45"><strong>Momento de validar com a stakeholder:</strong> '+E(anchor)+'</div>'
      +'</div>';
  } else {
    opp += '<div style="margin-top:1.125rem;padding:.75rem .875rem;background:rgba(22,163,74,0.12);border-radius:4px;display:flex;align-items:center;gap:.625rem">'
      +'<span style="font-size:1rem">💬</span>'
      +'<div style="font-size:.75rem;color:var(--text-primary);line-height:1.45"><strong>Momento de validar com a stakeholder:</strong> este é o principal ponto de alavancagem desta análise.</div>'
      +'</div>';
  }

  opp += '</div>';
  return sc(title, opp);
}

// renderHonestyAlert: caixa amarela/vermelha para fragilidades reais reveladas
function renderHonestyAlert(text) {
  if (!text) return '';
  const box = '<div style="padding:1rem 1.125rem;background:linear-gradient(135deg, rgba(234,179,8,0.08), rgba(220,38,38,0.04));border:2px dashed var(--warning);border-radius:4px;display:flex;gap:.75rem;align-items:flex-start">'
    +'<span style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--warning);color:white;font-size:.875rem;font-weight:800">!</span>'
    +'<div>'
    +  '<div style="font-size:.6875rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--warning);margin-bottom:.375rem">Alerta de Honestidade</div>'
    +  '<div style="font-size:.8125rem;color:var(--text-primary);line-height:1.55">'+E(text)+'</div>'
    +'</div></div>';
  return sc('Alerta de Honestidade', box);
}

'ee-s1-diagnostico-maturidade'(d) {

    const radarInsight = weakest && strongest

        +'Gap de '+(strongest.score-weakest.score)+' pontos concentra o maior espaço para ganho rápido.'
      : '';
    h += sc('Visão Geral — Pilares vs Setor',

        radarInsight, weakest?.score<40?'bad':weakest?.score<60?'warn':'good'));

    h += sc('Scores por Pilar', d.pillar_scores.map(p => {
      let pi = '<div class="pillar"><div class="pillar__row"><span class="pillar__name">'+E(names[p.pillar]||p.pillar)+'</span>'
        +'<span class="pillar__score" style="color:'+scColor(p.classification)+'">'
        +N(p.score)+'/100 '+tg(CLS[p.classification]||'',cc(p.classification))+(p.estimated?' '+tg('Estimado','gray'):'')+'</span></div>'
        +pb(p.score,cc(p.classification)||'red')
        +(p.highlight?'<p style="font-size:.8125rem;color:var(--text-muted);margin:.25rem 0 0">'+E(p.highlight)+'</p>':'');
      if (p.details?.strengths?.length) pi += '<div style="margin-top:.5rem">'+p.details.strengths.map(s=>'<div style="font-size:.75rem;color:var(--success)">&#10003; '+E(s)+'</div>').join('')+'</div>';
      if (p.details?.weaknesses?.length) pi += '<div>'+p.details.weaknesses.map(w=>'<div style="font-size:.75rem;color:var(--danger)">&#10007; '+E(w)+'</div>').join('')+'</div>';
      return pi+'</div>';

  if (bm?.pillar_comparison?.length) {
    const names = {midia_paga:'Mídia Paga',criativos:'Criativos',cro:'CRO',crm:'CRM',seo:'SEO'};
    const pos = {above:'green',at:'yellow',below:'red',critical_gap:'danger'};
    h += sc('Comparação com o Setor', tb(['Pilar','Cliente','Setor','Gap','Posição'],
      bm.pillar_comparison.map(p=>[
        E(names[p.pillar]||p.pillar), N(p.client_score), N(p.sector_average),
        '<span style="color:var(--'+(p.gap>=0?'success':'danger')+')">'+((p.gap>=0?'+':'')+N(p.gap))+'</span>',
        tg(p.position,pos[p.position]||'gray')
      ])));
  }
  if (d.executive_summary) h += co(d.executive_summary);
  if (d.priorities?.length) {
    const eff = {low:'green',medium:'yellow',high:'red'};
    // Deriva impacto a partir da classificacao do pilar associado
    const pillarCls = {};
    (d.pillar_scores||[]).forEach(p => { pillarCls[p.pillar] = p.classification; });
    const impactFor = p => {
      if (p.impact) return p.impact;
      const cls = pillarCls[p.pillar];
      if (cls === 'critical') return 'alto';
      if (cls === 'low') return 'alto';
      if (cls === 'medium') return 'medio';
      return 'baixo';
    };
    const impLabel = {alto:'Alto',medio:'Medio',baixo:'Baixo'};
    const impTone = {alto:'red',medio:'yellow',baixo:'gray'};
    const matrixItems = d.priorities.map(p => ({
      rank: p.rank,
      label: p.action,
      effort: p.effort,
      impact: impactFor(p),
      tooltip: '#'+p.rank+' — '+p.action+' (Esforco: '+(IMP[p.effort]||p.effort)+' / Impacto: '+impLabel[impactFor(p)]+')'
    }));
    const matrixInsight = 'Priorize o quadrante Quick Wins (alto impacto + baixo esforco): retorno rapido com risco e investimento controlados. Grandes Projetos exigem planejamento e budget. Itens no "Revisar" devem ser questionados antes de executar.';
    h += sc('Prioridades — Matriz Esforço × Impacto',
      insight(chartEffortImpact(matrixItems, {title:'Onde atacar primeiro'}), matrixInsight, 'good'));
    h += sc('Prioridades — Detalhamento', tb(['#','Ação','Justificativa','Pilar','Esforço','Impacto'],
      d.priorities.map(p=>{
        const imp = impactFor(p);
        return [
          E(p.rank), E(p.action), E(p.rationale||'—'), E(p.pillar),
          tg(IMP[p.effort]||p.effort,eff[p.effort]),
          tg(impLabel[imp]||imp,impTone[imp])
        ];
      })));
  }
  h += renderKeyInsight(d.key_insight, { title: 'Ponto de Alavancagem — Pilar Crítico' });
  h += renderHonestyAlert(d.honesty_alert);
  return h;
},

'ee-s1-swot'(d) {
  let h = '';
  h += renderLeituraEstrategica(d, { verdictLabel: 'Veredito SWOT' });
  const quad = (items, cls, title) => {
    return '<div class="swot__quad swot__quad--'+cls+'"><div class="swot__title">'+E(title)+'</div>'
      +(items||[]).map(i => {
        let tags = [];
        if (i.severity) tags.push(tg(i.severity,{critical:'danger',high:'red',medium:'yellow'}[i.severity]||'gray'));
        if (i.probability) tags.push(tg('Prob: '+i.probability,{high:'red',medium:'yellow',low:'green'}[i.probability]||'gray'));
        if (i.impact) tags.push(tg('Imp: '+i.impact,{high:'red',medium:'yellow',low:'green'}[i.impact]||'gray'));
        if (i.time_sensitivity) tags.push(tg({urgent:'Urgente',medium_term:'Médio prazo',long_term:'Longo prazo'}[i.time_sensitivity]||i.time_sensitivity,{urgent:'red',medium_term:'yellow',long_term:'gray'}[i.time_sensitivity]||'gray'));
        return '<div class="swot__item">'
          +'<div class="swot__item-title">'+E(i.title)+'</div>'
          +'<div class="swot__item-desc">'+E(i.description)+'</div>'
          +(i.implication?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem;font-style:italic">↳ '+E(i.implication)+'</div>':'')
          +(tags.length?'<div style="margin-top:.375rem;display:flex;gap:.25rem;flex-wrap:wrap">'+tags.join('')+'</div>':'')
          +'</div>';
      }).join('')+'</div>';
  };
  h += '<div class="swot">'+quad(d.strengths,'s','Forças')+quad(d.weaknesses,'w','Fraquezas')+quad(d.opportunities,'o','Oportunidades')+quad(d.threats,'t','Ameaças')+'</div>';
  if (d.strategic_synthesis) {
    h += sc('Síntese Estratégica',
      (d.strategic_synthesis.leverage?cd('Alavancagem — Forças × Oportunidades',E(d.strategic_synthesis.leverage),'green'):'')
      +(d.strategic_synthesis.protection?cd('Proteção — Fraquezas × Ameaças',E(d.strategic_synthesis.protection),'danger'):'')
      +(d.strategic_synthesis.recommended_strategy?co(d.strategic_synthesis.recommended_strategy):''));
  }
  // TOWS Matrix
  if (d.tows_matrix) {
    const tm = d.tows_matrix;
    const cellsSpec = [
      ['so_strategies','Ofensivas — Forças × Oportunidades','green'],
      ['wo_strategies','Reforço — Fraquezas × Oportunidades','yellow'],
      ['st_strategies','Defensivas — Forças × Ameaças','red'],
      ['wt_strategies','Sobrevivência — Fraquezas × Ameaças','danger'],
    ];
    const towsHtml = cellsSpec.map(spec => {
      const items = tm[spec[0]] || [];
      if (!items.length) return '';
      return cd(spec[1],
        items.map(s =>
          '<div style="margin-bottom:.5rem">'
          +'<div style="font-size:.75rem;font-weight:700;color:var(--accent)">'+E(s.id||'')+'</div>'
          +'<div style="font-size:.8125rem;font-weight:600">'+E(s.strategy||'')+'</div>'
          +(s.rationale?'<div style="font-size:.75rem;color:var(--text-muted);margin-top:.125rem"><em>'+E(s.rationale)+'</em></div>':'')
          +(s.expected_outcome?'<div style="font-size:.75rem;color:var(--text-secondary);margin-top:.125rem">→ '+E(s.expected_outcome)+'</div>':'')
          +'</div>'
        ).join(''),
        spec[2]);
    }).join('');
    if (towsHtml) h += sc('Matriz TOWS — Estratégias Cruzadas', '<div class="gr gr--2">'+towsHtml+'</div>');
  }

  if (d.priority_actions?.length) {
    // risk_adjusted_score pode vir como número (0-100) ou objeto {impact, probability_of_success, reversibility, score}
    const getScore = a => {
      const r = a.risk_adjusted_score;
      if (r == null) return null;
      if (typeof r === 'number') return r;
      if (typeof r === 'object' && r.score != null) return r.score;
      return null;
    };
    // Normaliza escala: se valor é <=10 (escala 1-10), multiplica por 10 para virar 0-100
    const normScore = v => v == null ? null : (v <= 10 ? v * 10 : v);
    // financial_impact: aceita {investment, expected_return_90d, roi_multiple, payback_days} OU {investment_brl, monthly_return_brl, payback_days}
    const fiInv = fi => fi ? (fi.investment ?? fi.investment_brl) : null;
    const fiRet = fi => {
      if (!fi) return null;
      if (fi.expected_return_90d != null) return fi.expected_return_90d;
      if (fi.monthly_return_brl != null) return fi.monthly_return_brl * 3;
      return null;
    };
    const fiRoi = fi => {
      if (!fi) return null;
      if (fi.roi_multiple != null) return fi.roi_multiple;
      const inv = fiInv(fi), ret = fiRet(fi);
      return inv && inv > 0 && ret != null ? ret / inv : null;
    };
    const fiPay = fi => fi?.payback_days ?? null;

    const hasEnriched = d.priority_actions.some(a=>a.financial_impact || getScore(a) != null);
    if (hasEnriched) {
      h += sc('Detalhamento das Ações Prioritárias', tb(
        ['Ação','Base SWOT','Impacto','Invest.','Retorno 90d','ROI','Payback','Score'],
        d.priority_actions.map(a=>{
          const fi = a.financial_impact||{};
          const inv = fiInv(fi), ret = fiRet(fi), roi = fiRoi(fi), pay = fiPay(fi);
          const sc100 = normScore(getScore(a));
          return [
            '<span style="font-size:.8125rem;font-weight:600">'+E(a.action)+'</span>',
            '<span style="font-size:.6875rem;color:var(--text-muted)">'+E(a.swot_basis||'—')+'</span>',
            tg(IMP[a.impact]||a.impact||'—',IMC[a.impact]||'gray'),
            inv!=null?BRL(inv):'—',
            ret!=null?BRL(ret):'—',
            roi!=null?tg(roi.toFixed(1)+'x','green'):'—',
            pay!=null?pay+'d':'—',
            sc100!=null?tg(sc100.toFixed(0),sc100>=70?'green':sc100>=40?'yellow':'red'):'—',
          ];
        })));
    } else {
      h += sc('Ações Prioritárias — Roadmap', renderGantt(d.priority_actions));
    }
  }
  h += renderKeyInsight(d.key_insight, { title: 'Ponto de Alavancagem — Força × Oportunidade' });
  h += renderHonestyAlert(d.honesty_alert);
  return h;
},
