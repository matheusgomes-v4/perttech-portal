e Emergência — a Perttech não aparece no Google quando o gestor busca com urgência, perdendo o lead no momento de maior intenção de compra; (2) Pós-Atendimento — clientes satisfeitos não são convertidos para contrato anual por falta de follow-up proativo via CRM. O resultado: a Perttech só é encontrada por indicação e só é contratada novamente se o cliente lembrar de ligar."},"willingness_to_pay":{"description":"A elasticidade de preço varia radicalmente por contexto: em emergência, o ICP paga premium por agilidade e confiança. Em planejamento, Compras negocia e price sensitivity é alta. Contratos anuais têm a maior disposição a pagar — o gestor técnico os enxerga como 'seguro de operação', não como custo.","services":[{"service":"Manutenção balcão (cliente leva o equipamento)","current_ticket_range":"R$90–R$6.000","perceived_fair_range":"R$200–R$5.000","premium_ceiling":"R$6.000 com diagnóstico técnico documentado e garantia de 90 dias","elasticity":"média — aceita pagar mais se o equipamento for crítico e o prazo de retorno for curto","pricing_lever":"Prazo de entrega, diagnóstico técnico escrito, garantia documentada"},{"service":"Manutenção on-site (técnico vai ao cliente)","current_ticket_range":"R$250–R$7.000","perceived_fair_range":"R$300–R$6.000","premium_ceiling":"R$7.000+ se atendimento for em até 24h e resolução garantida na primeira visita","elasticity":"baixa — aceita pagar mais somente se SLA de resposta for documentado e técnico especializado","pricing_lever":"Agilidade de resposta, resolução em 1 visita, especialização no modelo do equipamento"},{"service":"Contrato anual de manutenção preventiva","current_ticket_range":"Variável por portfólio de equipamentos do cliente","perceived_fair_range":"R$3.000–R$15.000/ano conforme número e criticidade dos equipamentos","premium_ceiling":"R$20.000/ano com inventário ativo, alertas preventivos e SLA prioritário de atendimento","elasticity":"alta — gestor técnico vê o contrato como seguro de operação, não como custo. Argumento de ROI vs. custo de parada resolve a aprovação interna.","pricing_lever":"Previsibilidade, SLA prioritário, relatório periódico de saúde dos equipamentos, custo menor que uma parada de 4 horas"},{"service":"Venda de nobreak / estabilizador","current_ticket_range":"R$150–R$100.000","perceived_fair_range":"Preço de mercado (sensível à variação cambial do dólar)","premium_ceiling":"Acima do mercado se vier com dimensionamento técnico correto + instalação + garantia de 12 meses","elasticity":"alta para preço — Compras decide por preço e prazo. Baixa se for emergência crítica ou se o dimensionamento correto for o diferenciador.","pricing_lever":"Dimensionamento correto (evita sobredimensionamento), prazo de entrega, instalação inclusa, expertise de marca"}]},"objection_library":{"description":"Objeções reais mapeadas a partir do briefing, QNP e comportamento de compra B2B do setor. Linguagem do cliente — não corporativês.","objections":[{"objection":"Já tenho um fornecedor de manutenção.","subtext":"Não quero o atrito de homologar fornecedor novo nem o risco de trocar algo que está funcionando.","bad_response":"Mas a Perttech é melhor! — comparativo vazio sem evidência concreta.","good_response":"Faz sentido. Muitos dos nossos clientes da DHL e Vopak tinham fornecedor também — nos chamaram como backup quando o principal não tinha disponibilidade. Que tal a gente fazer um diagnóstico gratuito dos seus equipamentos? Você fica com uma segunda opinião técnica sem precisar trocar ninguém.","when_to_use":"Primeiro contato via WhatsApp ou ligação fria"},{"objection":"O orçamento de vocês está caro.","subtext":"Preciso justificar esse gasto internamente, e preço é o argumento mais fácil de rejeição.","bad_response":"Posso dar um desconto de X%. — treina o cliente a sempre pedir desconto e comprime margem sem resolver a objeção real.","good_response":"Nosso índice de retorno após manutenção é quase zero — isso significa que você paga uma vez e o equipamento volta funcionando. Uma manutenção 'mais barata' que precisa de segunda visita custa mais no total e causa o dobro de parada. Posso te mandar um comparativo de custo total por atendimento?","when_to_use":"Fase de negociação após envio de proposta"},{"objection":"Preciso de 3 orçamentos para aprovação interna.","subtext":"É processo de Compras que não consigo contornar, mesmo já sabendo quem quero contratar.","bad_response":"Então aguardamos você trazer os outros orçamentos. — passivo, perde timing e controle do processo.","good_response":"Entendemos, é processo padrão. Posso preparar um orçamento com memorial técnico detalhado — assim você tem o argumento técnico além do preço para apresentar internamente. Qual a data limite de Compras?","when_to_use":"Após apresentação da proposta comercial"},{"objection":"Não conheço a Perttech.","subtext":"Contratar alguém desconhecido é risco profissional para mim — se der errado, fui eu que escolhi.","bad_response":"A gente tem 30 anos de mercado! — dado sem ancoragem concreta e sem prova verificável.","good_response":"DHL, Vopak e Wurth também não nos conheciam antes do primeiro chamado. Se quiser, posso te colocar em contato com o gestor de infraestrutura de [cliente do mesmo setor] para uma referência direta — é mais útil que qualquer coisa que eu possa dizer.","when_to_use":"Triagem inicial ou primeira reunião"},{"objection":"Manutenção preventiva não é prioridade agora.","subtext":"Não consigo justificar gasto proativo para o meu gestor — só aprovo budget quando o problema já aconteceu.","bad_response":"Mas é muito importante fazer preventivo! — óbvio para o técnico, não resolve o problema político do interlocutor.","good_response":"Entendo — é mais fácil aprovar budget corretivo do que preventivo. Posso montar um comparativo rápido: quanto custa uma parada de 4 horas do seu servidor vs. um contrato preventivo anual? Em geral, uma hora de parada já paga o contrato. Isso resolve o argumento interno?","when_to_use":"Proposta de contrato anual após atendimento avulso"},{"objection":"O técnico resolve na primeira visita?","subtext":"Tive experiência ruim com fornecedor que veio múltiplas vezes e não resolveu — não quero repetir.","bad_response":"Com certeza! — promessa sem respaldo que cria expectativa impossível e destrói confiança se não cumprir.","good_response":"Nossa taxa de resolução na primeira visita é alta porque o técnico chega com diagnóstico preliminar e estoque das peças mais comuns. Se o equipamento for de marca incomum, prefiro ser honesto: pode precisar de uma segunda visita para peça específica — mas isso é exceção, não regra. Me conta o modelo e o problema agora que já preparo o técnico.","when_to_use":"Agendamento de visita on-site"},{"objection":"Vocês atendem com urgência?","subtext":"Minha dor é agora — não posso esperar agenda de 3 dias.","bad_response":"Verificamos a agenda e retornamos. — impreciso, perde o lead emergencial que fecha rápido com quem der resposta primeiro.","good_response":"Sim. Para equipamentos críticos — servidores, industriais, médicos — priorizamos atendimento. Me conta agora o modelo e o problema: já vejo qual técnico tem disponibilidade mais rápida e te confirmo em minutos.","when_to_use":"Primeiro contato em situação de emergência"}]},"key_message":{"chosen_message":"Sem parada. Sem retrabalho. Perttech cuida dos seus sistemas críticos há 30 anos.","approach":"functional","usage_context":"Headline do site, headline da Landing Page, copy de anúncio Google Search (fundo de funil), proposta comercial — qualquer contexto onde o decisor técnico é o público primário.","alternatives":[{"message":"Sem parada. Sem retrabalho. Perttech cuida dos seus sistemas críticos há 30 anos.","approach":"functional","rationale":"Responde diretamente às dores 1 e 3 — sistema que não para e técnico que resolve na primeira visita. B2B decide racionalmente: o gestor de TI precisa de um argumento que justifique internamente a escolha do fornecedor."},{"message":"A pane não avisa. Mas quem tem Perttech já estava preparado.","approach":"emotional","rationale":"Ativa o medo da imprevisibilidade — que é o gatilho real de contratação de contrato preventivo. Funciona para topo de funil (quem ainda não teve pane mas sabe que pode acontecer). Menos eficaz para quem já está em crise."},{"message":"DHL, Vopak e Wurth escolheram a Perttech. A sua empresa também pode escolher certo.","approach":"social","rationale":"Resolve a objeção de confiança (a principal barreira de entrada) sem precisar explicar. O nome da DHL faz o trabalho. Melhor como prova social de suporte — rodapé de proposta, GMB, página de clientes — do que como headline principal."}]},"summary_headline":"Gestor de TI/Infraestrutura de médias e grandes empresas — decide por confiança e agilidade, não por preço. A Perttech tem a credencial (DHL, Vopak, 30 anos), mas é invisível quando esse gestor busca urgente no Google.","summary_highlights":[{"category":"posicao","label":"Perfil do ICP","value":"B2B — Gestor TI/Facilities","subtext":"50–1.500 funcionários, equipamentos críticos, decisão por confiança","tone":"blue"},{"category":"oportunidade","label":"Maior WTP","value":"Contrato anual preventivo","subtext":"Gestor enxerga como seguro de operação — elasticidade alta","tone":"green"},{"category":"risco","label":"Objeção primária","value":"Confiança","subtext":"Não conheço a Perttech — risco profissional de escolha errada","tone":"red"},{"category":"janela","label":"Ciclo de decisão","value":"Horas (emergência) a 15 dias (contrato)","subtext":"Em emergência: quem responde primeiro vence. Sem GMB, Perttech não é chamada.","tone":"yellow"},{"category":"risco","label":"Ponto de vazamento crítico","value":"Busca + Pós-atendimento","subtext":"Invisível no Google em emergência. Sem CRM, cliente satisfeito não vira contrato.","tone":"red"},{"category":"oportunidade","label":"Prova social inexplorada","value":"DHL, Vopak, Wurth","subtext":"Logos enterprise que eliminam objeção de confiança — não estão em nenhum canal digital","tone":"green"}],"summary_key_findings":[{"category":"vantagem","text":"A Perttech tem a credencial mais valiosa do setor — carteira com DHL, Vopak e Wurth — mas ela não existe em nenhum canal digital. Um GMB com reviews desses clientes elimina a principal objeção (confiança) sem custo de mídia."},{"category":"ameaca","text":"O ICP decide em horas quando está em emergência e fecha com o primeiro fornecedor confiável que aparece no Google. A Perttech não aparece — o lead emergencial vai para o concorrente com GMB ativo, mesmo sendo tecnicamente inferior."},{"category":"contexto","text":"O processo de compra envolve dois perfis distintos: o gestor técnico (TI/Manutenção) que sente a dor e indica o fornecedor, e Compras que formaliza. A mensagem e a proposta precisam servir a ambos — argumento técnico para o iniciador, argumento de preço/risco para Compras."},{"category":"acao","text":"A prioridade imediata é tornar a credencial enterprise visível: GMB com reviews de DHL/Vopak, logos na LP e proposta comercial com memorial técnico. Isso resolve objeção de confiança e captura leads emergenciais — antes de qualquer investimento em mídia paga."}],"key_insight":{"headline":"Ricardo paga o que for por quem chega rápido e resolve — e a Perttech não aparece quando ele busca.","context":"O ICP da Perttech não decide por preço em emergência — decide por disponibilidade e confiança. A Perttech tem 30 anos de track record e clientes como DHL e Vopak que qualquer Ricardo reconheceria como prova de competência. Mas quando a pane acontece às 22h e ele abre o Google, a Perttech não existe. O concorrente com GMB ativo e 4.8 estrelas é contratado em minutos.","numbered_reasons":["(1) A objeção primária é confiança — e a Perttech tem a resposta perfeita (DHL, Vopak, Wurth) que não está em nenhum canal digital hoje","(2) O momento de maior disposição a pagar é a emergência — e é exatamente quando a Perttech é invisível por ausência de GMB e presença digital","(3) Clientes satisfeitos (Ricardo que foi bem atendido) não viram contratos anuais porque não há follow-up — o CRM resolve o que o atendimento de qualidade começa"],"discussion_anchor":"Altair precisa decidir: a Perttech quer continuar sendo encontrada só por quem já conhece — ou quer ser a primeira opção quando Ricardo abrir o Google com a operação parada?"}},"ee-s1-swot":{"summary":"Perttech tem ativos raros (30 anos, clientes DHL/Vopak/Wurth, recomendação 5/5, contratos recorrentes) que nunca foram digitalizados. O gap crítico é CRM + invisibilidade digital — ambos bloqueiam crescimento antes mesmo de qualquer investimento em mídia. Janela de 12-18 meses para ser o primeiro do setor a ter presença digital estruturada na região.","strengths":[{"title":"Carteira enterprise com homologação difícil de replicar (DHL, Vopak, Wurth, Rede Novo Tempo, Trimais)","description":"Manter contratos com empresas de grande porte exige processos rigorosos de homologação de fornecedores — processo que pode levar meses. Esses logos são uma credencial que nenhum concorrente menor ou mais recente consegue copiar com velocidade.","implication":"Usar esses logos como prova social primária em site, GMB, criativos e proposta comercial. Um cliente enterprise cita outro — a logo DHL abre porta na Vopak, e da Vopak no próximo gestor de Facilities de qualquer grande empresa da região.","source":"briefing"},{"title":"Recomendação 5/5 e baixíssimo índice de retorno técnico declarado","description":"Score de recomendação 5/5 (QNP) e 'baixíssimo índice de retorno' declarado por Altair. Em manutenção de nobreaks para ambientes críticos (servidores, equipamentos médicos, sistemas industriais), erro de dimensionamento gera parada catastrófica. Esse histórico de acerto é raro e verificável.","implication":"É a resposta direta à principal objeção do cliente (confiança). Formalizar 5–8 depoimentos de gestores de TI/Engenharia — especialmente de clientes enterprise — e usar em LP, GMB e campanha de mídia. O 5/5 que hoje está informal precisa virar ativo público.","source":"briefing"},{"title":"Expertise técnica de ~30 anos em equipamentos elétricos e nobreaks","description":"Conhecimento profundo de diagnóstico que empresas jovens não têm. Técnicos experientes identificam problemas antes de virar falha — o que é o núcleo da proposta de valor de manutenção preventiva. Declarado pelo cliente como principal força no QNP.","implication":"Posicionar não como 'empresa de manutenção' mas como 'diagnóstico técnico preciso que evita parada e retrabalho'. Conteúdo técnico no LinkedIn e GMB para atingir gestores de TI e Engenharia que valorizam expertise, não apenas preço.","source":"briefing"},{"title":"Modelo de contratos anuais recorrentes já validado pelo mercado (Curva A do negócio)","description":"Contratos anuais de manutenção são o carro-chefe confirmado na curva ABC. Receita recorrente com ticket previsível, menor CAC de retenção vs. aquisição, e maior LTV por cliente. O modelo existe e funciona — o gap é a gestão proativa.","implication":"Com CRM configurado, converter clientes avulsos com 2+ serviços/ano para contratos anuais vira processo sistemático, não depende de lembrança ou sorte comercial.","source":"briefing"},{"title":"Versatilidade de atendimento por vertical (TI, médico, industrial, comunicação, logística)","description":"A Perttech atende onde há equipamentos críticos: servidores, equipamentos médicos, sistemas industriais, segurança, comunicação. Essa versatilidade significa que o portfólio de clientes não é concentrado em um único setor — proteção natural contra choques setoriais.","implication":"Segmentar comunicação digital por vertical — campanha para hospitais, outra para galpões/logística, outra para data centers — aumenta relevância e conversão vs. mensagem genérica para 'todos os segmentos'.","source":"briefing"}],"weaknesses":[{"title":"CRM inexistente: renovações, carteira e clientes dormentes são completamente invisíveis","description":"Zero sistema de CRM. Contatos em planilha solta. Renovações de contratos anuais dependem do cliente lembrar de ligar. Clientes dormentes não são rastreados. FMA: 'Nem sei quanto tenho a receber.' Diagnóstico digital: 5/100.","implication":"Cada mês sem CRM = contratos que vencem sem abordagem proativa, clientes dormentes que nunca voltam, e qualquer lead de mídia futura que morre no WhatsApp. Mitigação prioritária: Kommo configurado com pipeline de renovação e régua de reativação antes de qualquer ação de aquisição.","severity":"critical","source":"diagnostico"},{"title":"Invisibilidade digital total: 10/100 de maturidade, 71% abaixo da média do setor B2B","description":"Zero investimento em mídia paga estruturada. Site lento e sem CTA funcional. Sem pixel instalado. Sem SEO estruturado. Impulsionamento esporádico de posts sem meta ou segmentação. Reconhecimento de marca: 3/5 mesmo com 30 anos no mercado.","implication":"Quando um gestor de TI busca 'manutenção de nobreak' no Google, a Perttech não aparece — e o concorrente com GMB ativo aparece. Sequência de resolução mapeada: GMB → pixel → LP → mídia paga.","severity":"critical","source":"diagnostico"},{"title":"Dependência 100% de indicação passiva sem canal alternativo nem programa formal de referral","description":"Canal principal é 'indicação e clientes recorrentes' — mas sem sistema: a Perttech pede indicação 'informalmente, quando lembra'. Sem incentivo estruturado, rastreamento ou régua. O processo funciona mas não escala e não tem substituto se o volume cair.","implication":"Saída de um cliente enterprise por política corporativa (licitação, troca de fornecedor) não tem canal alternativo de compensação imediata. Mitigação: programa de referral formal (incentivo + rastreamento via CRM) + canal digital como segunda fonte de leads.","severity":"high","source":"briefing"},{"title":"Gestão financeira baseada em feeling — margem desconhecida, KPIs inexistentes, DRE informal","description":"FMA: 'Nunca calculei margem', 'Misturo tudo', 'Decido no feeling', 'Não tenho dashboards.' Faturamento 2025 caiu 4,3% vs. 2024 (R$2,3M→R$2,2M) sem diagnóstico claro do motivo. Meta de R$230-240K/mês sem metodologia de acompanhamento.","implication":"Sem margem conhecida, não é possível precificar campanhas com retorno garantido nem absorver choque de custo (câmbio, tributação) de forma controlada. Risco de tomar decisão de escala que comprime o negócio silenciosamente. Mitigação: DRE simplificado por categoria antes de qualquer investimento de escala.","severity":"critical","source":"diagnostico"},{"title":"Equipe de 5 pessoas sem documentação de processo — ruptura operacional se técnico-chave sair","description":"FMA: 'Se alguém sai, o processo para.' Sem PDI, sem onboarding estruturado, sem processo técnico documentado. A expertise de 30 anos está nas cabeças dos técnicos, não em nenhum sistema. Equipe comercial sem treinamento formal.","implication":"Escala de contratos requer novos técnicos — mas sem processo documentado, contratar é lento e arriscado. Risco adicional: histórico de cada cliente está na memória do técnico que o atendeu. Mitigação: CRM como memória institucional + documentação dos 3 processos técnicos principais.","severity":"high","source":"diagnostico"}],"opportunities":[{"title":"GMB com reviews de clientes enterprise domina busca local de manutenção sem custo de mídia","description":"Busca por 'manutenção de nobreak' é de alta intenção, especialmente em contextos emergenciais. Em B2B, decisores usam Google para validar credibilidade antes de fechar. Um GMB com 20+ reviews de clientes como DHL, Vopak e Wurth cria autoridade que concorrentes menores não conseguem replicar.","implication":"Acesso ao GMB + solicitação estruturada de reviews para 5 clientes âncora. Custo: R$0. Impacto em 30–60 dias — e valida credibilidade até para leads que chegam via indicação.","time_sensitivity":"urgent","source":"diagnostico"},{"title":"Upsell de clientes avulsos recorrentes para contratos anuais — receita sem novo CAC","description":"Clientes que usam serviços avulsos 2x+/ano já gastam valor próximo ao de um contrato preventivo — mas sem a previsibilidade e a relação formalizada. Com CRM, é possível mapear esse perfil e abordá-lo com proposta de contrato + argumento de ROI claro.","implication":"Com CRM + régua de abordagem comercial, converter avulsos recorrentes para contrato é processo sistemático. Sem investimento adicional de aquisição — receita da base que já existe.","time_sensitivity":"urgent","source":"briefing"},{"title":"Setor B2B de manutenção elétrica digitalmente imaturo — janela de first-mover de 12-18 meses","description":"Concorrência declarada como 'moderada' e sem concorrentes identificados pelo nome — sinal de setor fragmentado e pouco digitalizado. O primeiro a ter GMB ativo + LP profissional + pixel instalado captura a demanda inbound sem disputa. Mercados digitalmente imaturos têm CPMs baixos e CPL excelente.","implication":"Executar fundação digital agora. A janela fecha quando concorrentes perceberem o movimento e replicarem. Primeiros meses de mídia paga em mercados imaturos têm eficiência de custo que não volta.","time_sensitivity":"medium_term","source":"diagnostico"},{"title":"LinkedIn orgânico como canal de autoridade técnica para gestores de TI, Engenharia e Facilities","description":"O processo de compra da Perttech é iniciado por Engenharia, Manutenção, TI e Facilities — exatamente o perfil que consome conteúdo técnico no LinkedIn. Conteúdo sobre manutenção preventiva, dimensionamento correto de nobreak e cases de cliente posiciona a Perttech como referência antes da decisão de compra, não só durante.","implication":"Perfil da empresa otimizado + 2 posts técnicos/semana (dicas de manutenção, erros comuns, comparativo de marcas). Após 60-90 dias de consistência, publicar primeiro case com ROI. Começar orgânico — avaliar LinkedIn Ads somente após validar que o conteúdo ressoa com a audiência.","time_sensitivity":"medium_term","source":"briefing"},{"title":"Manutenção preventiva como alternativa de custo menor quando câmbio encarece reposição de equipamentos","description":"Quando o dólar sobe, o custo de nobreaks novos aumenta. A Perttech pode transformar esse cenário externo em argumento de venda consultiva: 'Consertar e manter preventivamente custa menos do que substituir com o câmbio assim.' Cria urgência de contrato sem depender de pane do cliente.","implication":"Material comercial com comparativo de custo (manutenção preventiva vs. substituição de equipamento). Especialmente relevante em períodos de alta do dólar — e técnico experiente faz esse diagnóstico com credibilidade que vendedor sem background não tem.","time_sensitivity":"medium_term","source":"briefing"}],"threats":[{"title":"Concorrentes com GMB ativo e site funcional capturam leads emergenciais que a Perttech perde","description":"Sem presença digital, a Perttech é invisível para gestores de TI que buscam fornecedor urgente após pane elétrica. Concorrentes com GMB ativo e site com CTA aparecem antes — e o lead emergencial fecha rápido, sem pesquisar mais.","implication":"GMB e pixel são a primeira linha de defesa. Cada mês de atraso é receita que vai para concorrente e não volta.","probability":"high","impact":"high","source":"diagnostico"},{"title":"Variação cambial do dólar comprime margem na categoria C (venda de produtos importados)","description":"Declarado pelo próprio Altair no QNP: 'Variação do dólar impacta venda de produtos.' Nobreaks e estabilizadores têm componentes importados — alta do dólar eleva custo e reduz competitividade de preço ou comprime margem se a empresa absorver o aumento.","implication":"Concentrar estratégia de crescimento no serviço (manutenção), onde margem não depende de câmbio. Usar alta do dólar como argumento de venda pró-manutenção preventiva vs. reposição de equipamento.","probability":"high","impact":"medium","source":"briefing"},{"title":"Perda de técnico-chave pode paralisar operação sem substituto técnico qualificado disponível","description":"FMA: 'Se alguém sai, o processo para.' Escassez de mão de obra técnica qualificada em elétrica/nobreaks. Sem processo documentado e sem programa de retenção estruturado, a permanência dos técnicos depende de relação pessoal com Altair.","implication":"Documentar os 3 processos técnicos principais + usar CRM como memória institucional dos clientes. Programa de retenção para técnicos-chave (participação nos resultados, plano de carreira básico).","probability":"medium","impact":"high","source":"diagnostico"},{"title":"Alterações tributárias aumentam custo operacional sem margem conhecida para absorver","description":"Identificado no QNP como fator externo relevante. Com gestão financeira 'no feeling' e margem não calculada formalmente, qualquer choque de custo tributário é absorvido sem capacidade de resposta estruturada ou decisão de repasse.","implication":"DRE simplificado antes de qualquer escala. Com margem conhecida por categoria (contrato / avulso / produto), a Perttech sabe quando e quanto repassar — sem comprimir o negócio silenciosamente.","probability":"medium","impact":"medium","source":"briefing"},{"title":"Concentração de receita em poucos clientes enterprise sem visibilidade de quanto representa cada um","description":"Sem CRM, não é possível saber qual % do faturamento vem de cada cliente. Se DHL, Vopak ou Wurth mudarem de fornecedor por política corporativa (licitação nacional, contrato consolidado), o impacto pode ser severo — e não haverá aviso antecipado.","implication":"Mapear concentração real via CRM (prioridade imediata). Diversificar gradualmente com médias empresas usando os logos enterprise como credencial de entrada. Meta: nenhum cliente responde por mais de 15% do faturamento em 18 meses.","probability":"medium","impact":"high","source":"briefing"}],"tows_matrix":{"description":"Cruzamento estratégico dos quadrantes SWOT para derivar estratégias acionáveis. Cada célula indica onde o negócio deve ATACAR (SO), INVESTIR (WO), PROTEGER (ST) ou MINIMIZAR DANO (WT).","so_strategies":[{"id":"SO1","strategy":"Publicar case de ROI da manutenção preventiva com dados reais de cliente enterprise no LinkedIn orgânico, assinado pela expertise de 30 anos da Perttech.","rationale":"F1 (carteira enterprise) + F3 (expertise 30 anos) + O4 (LinkedIn orgânico). Um case bem construído atinge gestores de TI/Engenharia diretamente, sem custo de mídia. Cria autoridade que concorrente sem histórico não replica.","expected_outcome":"3–5 leads qualificados de médias/grandes empresas por mês via conteúdo orgânico em 60–90 dias de consistência."},{"id":"SO2","strategy":"Converter recomendação 5/5 em 20+ reviews no GMB com pedido estruturado para os 5 clientes âncora (DHL, Vopak, Wurth, Rede Novo Tempo, Trimais).","rationale":"F2 (recomendação 5/5) + O1 (GMB domina busca local). A reputação já existe — falta digitalizar. Reviews de clientes enterprise são barreira de entrada para concorrentes locais.","expected_outcome":"GMB com 4.8+ estrelas e 20+ reviews em 90 dias. Conversão de leads de indicação aumenta — validação digital instantânea antes de qualquer contato comercial."},{"id":"SO3","strategy":"Campanha de upsell via WhatsApp e ligação para converter avulsos recorrentes para contratos anuais, usando modelo recorrente já validado com proposta de ROI calculado.","rationale":"F4 (modelo de contrato recorrente) + O2 (upsell base existente). Cada cliente avulso com 2+ serviços/ano é candidato a contrato. Proposta com comparativo de custo (avulso acumulado vs. contrato preventivo anual).","expected_outcome":"2–5 novos contratos anuais/mês na base existente. Incremento de R$15–30k/mês em receita recorrente sem custo de aquisição."}],"wo_strategies":[{"id":"WO1","strategy":"Implementar CRM antes de qualquer ação de aquisição para capturar a oportunidade de upsell e garantir que leads futuros de mídia tenham para onde ir.","rationale":"Fr1 (CRM inexistente) + O2 (upsell base) + O3 (first-mover digital). Sem CRM, upsell é manual e aleatório. Com CRM, vira processo sistemático — e qualquer lead gerado por mídia paga tem pipeline e follow-up.","expected_outcome":"100% das renovações rastreadas. Primeira campanha de reativação de dormentes em 30 dias após setup."},{"id":"WO2","strategy":"Criar presença digital (pixel + GMB + LP com logos enterprise) aproveitando a janela de first-mover antes que concorrentes percebam a oportunidade.","rationale":"Fr2 (invisibilidade digital) + O3 (janela de first-mover). Setor imaturo = CPMs baixos, pouca disputa por keywords locais. A Perttech chega primeiro com credencial que concorrente não tem.","expected_outcome":"Primeiros leads digitais inbound em 60–90 dias com CAC estimado abaixo de R$200 para contratos de R$1.500–7.000."},{"id":"WO3","strategy":"Desenvolver roteiro comercial com argumento de ROI da manutenção preventiva vs. substituição com câmbio alto para equipe comercial sem treinamento formal.","rationale":"Fr5 (equipe sem treinamento) + O5 (argumento câmbio/preventivo). Com roteiro pronto e calculado, a vendedora não precisa improvisar — o argumento de ROI está documentado e ela só precisa conduzir.","expected_outcome":"Equipe comercial fecha contrato preventivo sem depender de urgência ou pane do cliente. Ciclo de venda consultiva reduzido."}],"st_strategies":[{"id":"ST1","strategy":"Programa de contato proativo com carteira (revisão preventiva, check-in semestral via CRM) para blindar base contra abordagem de concorrente digital.","rationale":"F4 (contrato recorrente) + A1 (concorrente captura lead online). Cliente em contrato ativo e sendo contatado periodicamente não busca alternativa no Google. A Perttech chega antes do problema — e do concorrente.","expected_outcome":"Churn próximo de zero na base contratada. Cliente não vira lead do concorrente digital."},{"id":"ST2","strategy":"Usar alta do dólar como argumento comercial pró-manutenção: 'consertar custa menos que comprar novo com o câmbio assim' — ancorado na expertise técnica dos 30 anos.","rationale":"F3 (expertise) + A2 (câmbio). Transforma ameaça externa em alavanca de venda consultiva. O técnico experiente faz esse diagnóstico com credibilidade — e o argumento de ROI é calculável.","expected_outcome":"Em períodos de alta do dólar, aumento de pedidos de diagnóstico e manutenção corretiva em vez de reposição de equipamento."},{"id":"ST3","strategy":"Usar logos enterprise como credencial ativa para diversificar base com médias empresas e reduzir concentração de receita.","rationale":"F1 (carteira enterprise) + A5 (concentração em poucos clientes). 'Se DHL confia na Perttech, sua empresa pode confiar também.' Abre portas em médias empresas sem processo de licitação.","expected_outcome":"Redução gradual de concentração. Meta: nenhum cliente responde por mais de 15% do faturamento em 18 meses."}],"wt_strategies":[{"id":"WT1","strategy":"Usar CRM como memória institucional dos clientes para proteger carteira se técnico-chave sair — histórico não pode estar só na cabeça do técnico.","rationale":"Fr1 (CRM inexistente) + A3 (perda de técnico). CRM não é só vendas — é a continuidade do relacionamento com o cliente mesmo com troca de técnico. Sem CRM, o técnico sai e leva o contexto de cada cliente junto.","expected_outcome":"Histórico de equipamentos, manutenções e preferências de cada cliente documentados. Troca de técnico sem ruptura de atendimento nem perda de relacionamento."},{"id":"WT2","strategy":"Estruturar DRE simplificado por categoria antes de qualquer choque tributário — sem margem conhecida, não há defesa nem decisão de repasse possível.","rationale":"Fr4 (gestão no feeling) + A4 (tributação). Com margem por categoria conhecida, a Perttech sabe o quanto absorver e quando repassar. Sem ela, absorve no escuro e comprime o negócio silenciosamente.","expected_outcome":"Primeira DRE mensal operacional em 30 dias. Capacidade de precificar campanhas e novos contratos com rentabilidade garantida."}]},"strategic_synthesis":{"leverage":"A Perttech tem dois ativos que poucos concorrentes do setor conseguem replicar rapidamente: 30 anos de expertise técnica com clientes enterprise (DHL, Vopak, Wurth) e um modelo de contrato recorrente já validado pelo mercado. A jogada ofensiva é digitalizar esses ativos antes que qualquer concorrente o faça. Um case de ROI no LinkedIn orgânico, reviews de clientes enterprise no GMB, e logos dessas empresas em um site renovado são suficientes para dominar a busca B2B local no segmento — sem precisar competir em preço ou volume de mídia. A janela é de 12–18 meses: o setor de manutenção elétrica é digitalmente imaturo, e o primeiro a ter presença digital estruturada captura a demanda inbound sem disputa.","protection":"A combinação de CRM inexistente com dependência de técnicos-chave é o cenário de ruptura mais provável. Se um técnico sai e leva consigo o histórico de clientes — que está na cabeça, não no sistema — a Perttech perde o relacionamento junto com o profissional. Somado à ausência de canal digital alternativo, qualquer queda no volume de indicações não tem compensação imediata. E sem margem calculada, a empresa não sabe se pode absorver um choque de custo. Esses três gaps (CRM, digital, gestão financeira) estão encadeados: resolver CRM primeiro desbloqueia os outros.","recommended_strategy":"Nos próximos 90 dias, a Perttech deve executar em duas frentes paralelas. Frente 1 (retenção e receita imediata): implementar CRM com pipeline de renovação, mapear clientes dormentes e converter avulsos recorrentes para contrato anual — o objetivo é recuperar receita da base existente antes de gastar R$1 em nova aquisição. Frente 2 (fundação digital): obter acesso ao GMB, solicitar reviews dos 5 clientes âncora, instalar pixel no site, e criar LP básica com logos enterprise + CTA. Essas duas frentes custam pouco, entregam resultado em 30–60 dias, e constroem a estrutura para que mídia paga (semana 3) funcione com retorno mensurável."},"priority_actions":[{"action":"Criar Meta Business Manager e instalar pixel no site com eventos básicos (PageView, Lead, Contact)","impact":"high","risk_adjusted_score":{"score":9.3}},{"action":"Obter acesso ao Google Meu Negócio + otimizar perfil completo + solicitar reviews para DHL, Vopak, Wurth, Trimais e Rede Novo Tempo","impact":"high","risk_adjusted_score":{"score":9.0}},{"action":"Implementar CRM (Kommo) com pipeline de renovação de contratos, registro de clientes ativos e régua de reativação de dormentes","impact":"high","risk_adjusted_score":{"score":8.7}},{"action":"Campanha de upsell: abordar clientes avulsos com 2+ serviços/ano para migração para contrato anual de manutenção preventiva","impact":"high","risk_adjusted_score":{"score":8.0}},{"action":"Publicar conteúdo técnico semanal no LinkedIn orgânico e primeiro case com cliente enterprise em 60–90 dias","impact":"medium","risk_adjusted_score":{"score":7.7}},{"action":"Criar Landing Page com headline de proposta de valor, logos enterprise, CTA para WhatsApp/formulário e velocidade otimizada","impact":"high","risk_adjusted_score":{"score":7.0}},{"action":"Estruturar DRE simplificado por categoria (contrato anual / serviço avulso / venda de produto) para ter margem conhecida antes de qualquer escala","impact":"medium","risk_adjusted_score":{"score":6.5}}],"summary_headline":"Perttech tem 30 anos e clientes como DHL e Vopak — mas é invisível no digital. Janela de 12-18 meses para ser o primeiro do setor a ter presença digital estruturada na região antes que concorrentes percebam.","summary_highlights":[{"category":"posicao","label":"Forças vs Fraquezas","value":"5 Forças / 5 Fraquezas","subtext":"2 fraquezas críticas imediatas: CRM (5/100) e invisibilidade digital","tone":"yellow"},{"category":"oportunidade","label":"Maior aposta SO","value":"GMB + Case Enterprise","subtext":"Custo R$0 — reviews de DHL/Vopak dominam busca local em 60 dias","tone":"green"},{"category":"risco","label":"Ameaça prioritária","value":"Concorrente digital captura inbound","subtext":"Cada mês sem GMB e LP = leads emergenciais perdidos irreversivelmente","tone":"red"},{"category":"janela","label":"Janela de first-mover","value":"12–18 meses","subtext":"Setor B2B de manutenção elétrica ainda digitalmente imaturo na região","tone":"yellow"},{"category":"oportunidade","label":"ROI mais rápido","value":"Upsell base existente","subtext":"Converter avulsos em contratos via CRM = receita sem novo CAC (volume real mapeado no CRM)","tone":"green"}],"summary_key_findings":[{"category":"vantagem","text":"30 anos de expertise + clientes DHL, Vopak, Wurth = prova social enterprise que nenhum concorrente regional tem — e que não está em nenhum canal digital hoje."},{"category":"ameaca","text":"Concorrentes mais jovens com GMB ativo e site funcional já capturam leads de manutenção emergencial online enquanto a Perttech não aparece no Google."},{"category":"contexto","text":"A Perttech tem receita recorrente (contratos anuais), clientes satisfeitos (5/5) e modelo de negócio comprovado — o que falta é infraestrutura digital mínima para capturar demanda além da indicação passiva."},{"category":"acao","text":"Os próximos 90 dias devem focar em duas frentes paralelas: CRM para proteger e expandir a base existente, e GMB + pixel + LP para criar a fundação digital necessária antes de qualquer investimento em mídia paga."}],"key_insight":{"headline":"30 anos de clientes enterprise não digitalizados = a maior assimetria estratégica da Perttech","context":"A Perttech mantém contratos com DHL, Vopak e Wurth — empresas que qualquer gestor de TI reconhece e respeita. Essa prova social, que levou 30 anos para construir, não existe em lugar nenhum online. Um case bem estruturado + GMB com reviews desses clientes transforma credibilidade acumulada em vantagem digital imediata — sem investimento em mídia, sem criativo complexo, sem esperar meses de construção de marca.","numbered_reasons":["(1) Nenhum concorrente regional consegue colocar logo DHL/Vopak em anúncio ou no GMB — esses nomes são barreira de entrada real para novos competidores","(2) O setor de manutenção B2B ainda não digitalizou sua credibilidade — o espaço está vazio para o primeiro que fizer com consistência","(3) A janela é agora: antes que concorrentes percebam que basta GMB otimizado + logos enterprise para dominar a busca local de manutenção elétrica"],"discussion_anchor":"Altair precisa decidir se quer usar os clientes enterprise como marketing ativo (reviews, cases, prova social) ou continuar deixando esse ativo de 30 anos dormindo enquanto concorrentes menores aparecem primeiro na busca."}},"ee-s2-diagnostico-criativos":{"summary":"A Perttech tem 62 posts no Instagram mas zero criativos pagos — base de análise é 100% orgânica. De 7 criativos avaliados: 0 para Manter, 4 para Otimizar, 3 para Eliminar. Score médio 11,4/25. Problema sistêmico: nenhum criativo menciona DHL/Vopak/Wurth, nenhum tem CTA explícito, e 55%+ do feed é conteúdo de datas comemorativas irrelevante para o ICP B2B enterprise. Único ponto positivo identificado: post com fundo dramático (raio/trovão) é o mais impactante visualmente — esse padrão deve ser amplificado na Semana 3.","summary_headline":"Perttech: 0 anúncios ativos, 7 criativos orgânicos avaliados com score médio 11,4/25 — DHL/Vopak/Wurth nunca aparecem, 0 posts têm CTA, padrão mais forte (fundo dramático) não foi replicado.","summary_highlights":[{"category":"maturidade","label":"Score médio criativos","value":"11,4/25","subtext":"7 avaliados · 0M · 4O · 3E","tone":"red"},{"category":"posicao","label":"Distribuição M/O/E","value":"0M · 4O · 3E","subtext":"Nenhum criativo está no padrão enterprise esperado","tone":"red"},{"category":"competicao","label":"Ads ativos concorrentes","value":"0 ads (todos os 5)","subtext":"Nenhum concorrente roda Google Ads ou Meta Ads — janela aberta","tone":"green"},{"category":"risco","label":"Problema mais recorrente","value":"Zero CTAs","subtext":"6 de 7 criativos não têm call-to-action explícito","tone":"red"},{"category":"oportunidade","label":"Padrão missing mais impactante","value":"Prova social enterprise","subtext":"DHL/Vopak/Wurth nunca aparecem — padrão inexistente em todos os concorrentes também","tone":"blue"}],"summary_key_findings":[{"category":"ameaca","text":"Zero criativos pagos ativos: a Perttech não existe em nenhum leilão de mídia paga (Google Ads ou Meta Ads). A análise é baseada exclusivamente em 7 posts orgânicos do Instagram — base insuficiente para diagnóstico de performance paga, mas suficiente para identificar padrões de produção."},{"category":"ameaca","text":"O maior ativo da empresa (carteira DHL/Vopak/Wurth) nunca aparece em nenhum criativo. De 62 posts publicados, zero mencionam esses clientes — a prova social mais poderosa disponível está completamente ausente da comunicação visual."},{"category":"contexto","text":"Nenhum dos 5 concorrentes (Danffer, Recomex, Seko, Central do Nobreak, RD Energia) roda anúncios pagos ou tem criativos de performance. A Perttech entra no mercado de mídia paga sem benchmarks de copy/criativo do setor — o que é simultaneamente uma limitação analítica e uma vantagem competitiva real."},{"category":"vantagem","text":"Post orgânico com fundo dramático de raio/trovão + nobreak é o único criativo que se destaca visualmente no feed. Esse padrão (urgência visual + equipamento em cena + benefício de proteção) é o mais próximo do que vai funcionar para o ICP em contexto de emergência — e deve ser o ponto de partida para os criativos pagos da Semana 3."},{"category":"acao","text":"Briefing de produção Semana 3: priorizar 3 formatos — (1) Reels 30s com técnico em campo resolvendo emergência real, (2) carrossel educacional técnico '5 sinais que seu nobreak precisa de manutenção', (3) estático de prova social 'DHL confia na Perttech há X anos' com logo autorizado."}],"creative_catalog":{"total_analyzed":7,"icp_target":"Gestor de TI / Coordenador de Infraestrutura / Facilities Manager — B2B enterprise, 38-42 anos, decide por confiança e agilidade","brand_voice_target":"Transparente · Honesto · Responsável · Técnico sem jargão","objective":"Geração de leads qualificados (emergência + contratos anuais)","performance_data_available":false,"performance_data_reason":"Nenhuma campanha paga ativa — dados de CTR/CPL/impressions inexistentes. Análise baseada em engajamento orgânico visível (curtidas/comentários)."},"creative_matrix":[{"id":1,"type":"Estático vertical — produto + copy de benefício","description":"'Proteja seus equipamentos com nobreak e/ou estabilizador, e fique tranquilo neste momento de intempéries.' — fundo dramático com raio, nobreak em destaque, logo PERTTECH","scores":{"hook":{"score":3,"comment":"Visual de raio prende atenção no feed. 'Proteja seus equipamentos' é hook competente mas genérico — não filtra B2B enterprise."},"clarity":{"score":3,"comment":"Mensagem clara: produto → benefício de proteção. Mas 'equipamentos' é amplo demais — não diz 'servidores', 'UPS 24/7', 'operação crítica'."},"icp_coherence":{"score":2,"comment":"Poderia ser B2C ou B2B indiscriminadamente. Ricardo Silva (Coordenador de Infraestrutura) não se reconhece especificamente."},"cta":{"score":1,"comment":"Zero CTA explícito no criativo. Sem 'Fale com técnico', 'Solicite orçamento', 'Chamar no WhatsApp'."},"visual":{"score":4,"comment":"Melhor visual da conta: contraste dramático raio/nobreak, logo bem posicionado, hierarquia visual clara. Padrão a replicar."}},"total":13,"verdict":"O","organic_engagement":"4 curtidas visíveis — abaixo da média da conta","optimization_suggestion":"Manter o padrão visual de raio/fundo dramático. Substituir copy: 'Seus servidores param quando a energia falha? A Perttech resolve na primeira visita — 30 anos, DHL e Vopak confiam.' + CTA 'Falar com técnico →'"},{"id":2,"type":"Estático — data comemorativa (Ano Novo)","description":"'Feliz 2026 — Nós, da equipe Perttech No-break, desejamos a todos um Ano Novo...' — champagne, glitter, tons dourados","scores":{"hook":{"score":1,"comment":"Champagne e 'Feliz 2026' não param o scroll de nenhum Coordenador de Infraestrutura no contexto B2B."},"clarity":{"score":2,"comment":"Mensagem clara, mas completamente irrelevante para o objetivo de geração de leads."},"icp_coherence":{"score":1,"comment":"Zero conexão com o ICP. Ricardo Silva não está no Instagram para ver 'Feliz Ano Novo da Perttech'."},"cta":{"score":1,"comment":"Sem CTA."},"visual":{"score":2,"comment":"Estética de celebração genérica — champagne e glitter contradizem diretamente o posicionamento 'Confiança · Precisão · Enterprise'."}},"total":7,"verdict":"E","organic_engagement":"6 curtidas visíveis","optimization_suggestion":"Eliminar formato. Se a empresa quiser marcar o Ano Novo, fazer via story (efêmero) — nunca como post permanente no feed de uma empresa que quer posicionamento enterprise."},{"id":3,"type":"Estático — data comemorativa (Dia Internacional da Mulher)","description":"'8 de março Dia Internacional da Mulher — Parabéns Mulher' — flores rosa, estética floral","scores":{"hook":{"score":1,"comment":"Flores cor-de-rosa são o oposto do posicionamento visual 'enterprise de energia crítica'."},"clarity":{"score":2,"comment":"Mensagem clara mas totalmente off-topic para o objetivo de negócio."},"icp_coherence":{"score":1,"comment":"Nenhuma conexão com Gestor de TI, Facilities ou Infraestrutura."},"cta":{"score":1,"comment":"Sem CTA."},"visual":{"score":2,"comment":"Paleta rosa/floral destrói qualquer consistência visual com a identidade enterprise. 0 curtidas visíveis neste post."}},"total":7,"verdict":"E","organic_engagement":"0 curtidas visíveis","optimization_suggestion":"Eliminar do feed. O Dia da Mulher pode ser reconhecido internamente — não precisa virar post permanente em uma conta B2B enterprise que usa a grid como portfólio."},{"id":4,"type":"Estático — copy educacional B2B","description":"'Por que sua empresa precisa de um nobreak? Porque a sua linha de produção não pode parar!!' — texto em fundo escuro com destaque visual","scores":{"hook":{"score":4,"comment":"Pergunta direta que endereça a dor real do ICP industrial. 'Sua linha de produção não pode parar' é a melhor copy da conta — aperta o botão certo."},"clarity":{"score":3,"comment":"Mensagem clara. Mas para depois da pergunta — não desenvolve o argumento nem leva para o próximo passo."},"icp_coherence":{"score":3,"comment":"Melhor alinhamento com ICP da conta. 'Linha de produção' filtra B2B. Poderia ser mais específico: 'servidores', 'data center', 'equipamentos médicos'."},"cta":{"score":2,"comment":"Sem CTA explícito no criativo. Copy implica ação mas não direciona."},"visual":{"score":2,"comment":"Fundo escuro + texto — funcional mas sem hierarquia visual forte. Sem imagem do produto ou técnico em cena."}},"total":14,"verdict":"O","organic_engagement":"Engajamento não visível no print","optimization_suggestion":"Melhor ponto de partida da conta para adaptar em anúncio pago. Otimizar: adicionar imagem de rack de servidores com UPS instalado, especificar segmento ('data center', 'operação 24/7'), adicionar CTA forte + prova social ('Vopak e DHL confiam na Perttech')."},{"id":5,"type":"Estático — benefício de serviço","description":"'Não fique no Escuro!' — play no double meaning, design básico","scores":{"hook":{"score":3,"comment":"Double meaning funciona como hook de curiosidade. Mas é leve demais para o ICP enterprise que vive o custo real de uma parada."},"clarity":{"score":3,"comment":"Claro, mas superficial — não explica o que a Perttech faz especificamente."},"icp_coherence":{"score":2,"comment":"Tom mais B2C residencial do que B2B enterprise. 'Não fique no escuro' ressoa mais com consumidor doméstico do que com Coordenador de Infraestrutura."},"cta":{"score":1,"comment":"Sem CTA."},"visual":{"score":2,"comment":"Design básico. Sem elementos visuais que conectem com equipamentos industriais ou ambiente enterprise."}},"total":11,"verdict":"O","optimization_suggestion":"Reescrever com angulação B2B: 'Quando a energia falha, sua operação para — e cada hora custa [X]. A Perttech chega em [tempo] e resolve na primeira visita.' Fundo dramático (replicar padrão do criativo #1)."},{"id":6,"type":"Estático — promoção de serviço (contrato)","description":"'Invista em um Contrato de Manutenção' — design com elementos visuais do serviço","scores":{"hook":{"score":3,"comment":"'Invista em' é melhor que 'Contrate' — linguagem de decisão de negócio. Mas não comunica o valor específico do contrato."},"clarity":{"score":4,"comment":"O mais direto ao produto A da empresa. Alinhado com a curva ABC (contratos = categoria A)."},"icp_coherence":{"score":3,"comment":"Contrato anual é o produto correto para o ICP que quer previsibilidade. Falta quantificar o benefício."},"cta":{"score":2,"comment":"CTA implícito — 'invista' sugere ação mas não direciona para canal de contato."},"visual":{"score":2,"comment":"Design básico sem elementos que provem o valor do contrato (SLA, tempo de resposta, clientes que já têm contrato)."}},"total":14,"verdict":"O","optimization_suggestion":"Adicionar benefício quantificado: 'Contrato anual Perttech: técnico em até [X]h, manutenção preventiva semestral, prioridade DHL-grade.' + depoimento de cliente com contrato ativo + CTA 'Solicitar proposta'."},{"id":7,"type":"Estático — comunicado operacional (recesso)","description":"'COMUNICADO — Informamos que nos dias 20/04 e 21/04 NÃO HAVERÁ EXPEDIENTE...' — design de aviso interno","scores":{"hook":{"score":1,"comment":"Aviso interno publicado como post de feed — não é conteúdo de marketing."},"clarity":{"score":4,"comment":"Informação clara e útil para clientes existentes."},"icp_coherence":{"score":2,"comment":"Relevante para clientes ativos, mas não para aquisição de novos clientes."},"cta":{"score":1,"comment":"Sem CTA."},"visual":{"score":2,"comment":"Design de aviso corporativo genérico."}},"total":10,"verdict":"E","optimization_suggestion":"Mover para Stories (efêmero) ou comunicação direta por WhatsApp para a base de clientes. Não deve ocupar espaço permanente no feed que serve como portfólio da empresa."}],"patterns_identified":{"recurring_problems":[{"pattern":"Zero CTAs explícitos","affects_creatives":[1,2,3,4,5,6,7],"impact":"Nenhum post direciona o visitante para o próximo passo. 6 de 7 criativos terminam na informação, nunca na ação. ICP que se interessa não sabe para onde ir.","fix":"Todo criativo deve terminar com CTA visual: 'Chamar no WhatsApp ↓', 'Ver contratos disponíveis', 'Solicitar visita técnica' — com link na bio como destino"},{"pattern":"Prova social enterprise completamente ausente","affects_creatives":[1,2,3,4,5,6,7],"impact":"DHL, Vopak, Wurth, JBS, Seara, Kuehne Nagel nunca aparecem em nenhum post. O maior diferencial de credibilidade da Perttech é 100% invisível no canal.","fix":"Mínimo 1 post/mês com referência a cliente enterprise: logo (com autorização), foto de equipamento instalado, ou quote do responsável técnico"},{"pattern":"55%+ de conteúdo de datas comemorativas irrelevante para B2B","affects_creatives":[2,3,7],"impact":"Grid visual poluído com conteúdo sem relação com o posicionamento enterprise. Visitante que acessa o perfil pela primeira vez vê 'Feliz Páscoa' antes de ver qualquer serviço.","fix":"Eliminar datas comemorativas do feed permanente. Mover para Stories (efêmero) se necessário manter por questão cultural interna"},{"pattern":"Linguagem B2C em contexto B2B enterprise","affects_creatives":[3,5],"impact":"'Não fique no Escuro' e posts de dias da mulher falam com consumidor doméstico, não com Gestor de TI de empresa com 200+ funcionários.","fix":"Todo copy deve referenciar: 'sua empresa', 'sua operação', 'seus servidores', 'contrato' — nunca 'você' no sentido individual/doméstico"}],"winning_elements":[{"element":"Fundo dramático escuro + raio/trovão (Criativo #1)","reason":"Contraste visual forte, urgência implícita, equipamento protagonista. Único criativo que para o scroll por apelo visual genuíno. Representa corretamente o contexto de emergência do ICP.","replicate_in":"Todos os criativos de awareness/emergência — esse padrão deve ser o visual anchor da campanha paga"},{"element":"Copy pergunta + consequência (Criativo #4)","reason":"'Por que sua empresa precisa de um nobreak? Porque a sua linha de produção não pode parar!!' — melhor estrutura de copy da conta. Pergunta ativa + consequência negativa = fórmula que funciona para B2B de alta consequência.","replicate_in":"Headlines de anúncios Google Search e Meta. Base para os hooks de Reels."}]},"competitor_analysis":[{"competitor":"Danffer","ads_library_url":"https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=BR&q=Danffer","active_ads_count":0,"google_ads":false,"meta_ads":false,"creative_pattern":"Posts orgânicos ocasionais de instalações reais em campo. Sem estratégia de conteúdo definida.","what_works":"Fotos de equipamentos instalados em ambiente industrial são mais críveis do que imagens de stock","what_to_avoid":"Frequência irregular e sem calendário editorial — não gera consistência de marca","gap_para_cliente":true,"replication_idea":"Perttech tem vantagem: tem acesso a instalações em DHL e Vopak (com autorização) — fotos reais de grandes operações superam qualquer conteúdo dos concorrentes"},{"competitor":"Recomex","ads_library_url":"https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=BR&q=Recomex+nobreak","active_ads_count":0,"google_ads":false,"meta_ads":false,"creative_pattern":"Sem presença ativa identificada em mídia paga ou redes sociais estruturadas","what_works":"N/A — sem padrões positivos identificados","what_to_avoid":"Ausência total digital","gap_para_cliente":false,"replication_idea":null},{"competitor":"Central do Nobreak","ads_library_url":"https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=BR&q=Central+do+Nobreak","active_ads_count":0,"google_ads":false,"meta_ads":false,"creative_pattern":"Catálogo de produtos online com fotos de equipamentos. Foco em produto + preço, sem posicionamento de serviço ou enterprise.","what_works":"Fotos técnicas de produto com especificações — ICP de compras valoriza ficha técnica","what_to_avoid":"Posicionamento produto/preço que compete por commodity — exatamente o que Perttech deve evitar","gap_para_cliente":true,"replication_idea":"Criar ficha técnica visual dos serviços (não produtos): 'Manutenção Preventiva Perttech — o que está incluído' com checklist visual — diferencia de concorrentes de produto"}],"competitor_patterns_missing":[{"pattern":"Vídeo vertical (Reels/Stories) com técnico em campo resolvendo problema real","seen_in_competitors":[],"ads_count":0,"why_it_works":"Nenhum concorrente faz isso — é território completamente vago. Vídeo de técnico em campo em empresa reconhecível (DHL, Vopak) é prova social irrefutável. ICP de TI/Infraestrutura consome conteúdo técnico no YouTube/Instagram Reels.","how_client_could_implement":"Gravar 30-60s no próximo atendimento em cliente enterprise (com autorização): chegada do técnico → diagnóstico → resolução. Narração técnica simples. Logo Perttech + logo do cliente (se autorizado).","priority":"alta"},{"pattern":"Carrossel educacional técnico ('X sinais que seu nobreak precisa de manutenção')","seen_in_competitors":[],"ads_count":0,"why_it_works":"Formato de alta retenção e compartilhamento no Instagram. ICP técnico (TI/Manutenção) salva e compartilha conteúdo que o ajuda a fazer seu trabalho melhor. Posiciona a Perttech como autoridade técnica, não apenas como prestador de serviço.","how_client_could_implement":"Criar carrossel de 6-7 slides: 'Slide 1: Seu nobreak está dando sinais? Slide 2-6: sinal A, B, C, D, E + o que fazer. Slide 7: CTA Perttech.' Altair ou técnico sênior valida o conteúdo técnico.","priority":"alta"},{"pattern":"Post de prova social enterprise com logo + resultado quantificado","seen_in_competitors":[],"ads_count":0,"why_it_works":"Nenhum concorrente tem clientes DHL-grade para mostrar. Um único post 'DHL confia na Perttech para manutenção dos sistemas de energia em [X unidades]' cria distância competitiva imediata. ICP B2B decide por confiança — ver que empresa igual à dele é cliente da Perttech reduz objeção de compra.","how_client_could_implement":"Com autorização do Altair (já confirmada genericamente): criar post template 'Presente há [X] anos na operação da [logo do cliente]' + foto do equipamento instalado ou técnico no local.","priority":"alta"},{"pattern":"Post de 'antes/depois' de manutenção com dados técnicos","seen_in_competitors":[],"ads_count":0,"why_it_works":"Prova concreta do resultado. ICP técnico entende dados de bateria, autonomia, carga — um post mostrando 'UPS com autonomia de 8min → após manutenção Perttech: 45min' é irrefutável.","how_client_could_implement":"Fotografar equipamento antes (deteriorado) e depois (revisado) com dados técnicos: autonomia, carga, condição da bateria. Requerer apenas que técnico documente no próximo atendimento.","priority":"média"},{"pattern":"Conteúdo sobre riscos de não fazer manutenção preventiva (custo de parada)","seen_in_competitors":[],"ads_count":0,"why_it_works":"ICP de TI/Infraestrutura precisa justificar o gasto com manutenção preventiva para a diretoria. Conteúdo que ajuda o Ricardo a fazer esse argumento internamente é extremamente valioso — e potencialmente viral no B2B.","how_client_could_implement":"Post ou carrossel: 'Quanto custa 1h de parada na sua operação? Para empresas de logística: R$[X-Y]K/h. Contrato preventivo Perttech: [faixa de preço]. Calcule o ROI.' Com CTA para proposta personalizada.","priority":"média"}],"production_briefing":{"hook_direction":{"recommended":"Urgência real + consequência técnica específica","examples":["'Seu nobreak vai falhar — a questão é quando. Você vai estar pronto?' (medo + solução)","'DHL. Vopak. Wurth. Empresas que não podem parar escolheram a Perttech.' (prova social enterprise)","'Servidor caiu às 22h — e agora? A Perttech atendeu em X horas e resolveu na primeira visita.' (urgência + resultado)"],"avoid":"Hooks genéricos ('qualidade e compromisso'), hooks B2C ('proteja sua casa'), datas comemorativas como hook principal"},"priority_format":{"format":"Reels vertical 30-60 segundos + Carrossel educacional (6-8 slides) + Estático de prova social","rationale":"ICP técnico consome Reels no Instagram mas está no LinkedIn e YouTube. Reels de baixo custo de produção com técnico real em campo geram mais confiança do que arte elaborada. Carrossel tem 3x mais retenção que estático. Estático de prova social enterprise é a conversão final do funil de consideração."},"visual_elements":{"include":["Fundo escuro com contraste forte (referência: criativo #1 com raio/trovão)","Equipamentos reais da Perttech em cena (não imagens de stock)","Técnicos reais em ambiente enterprise (galpão, rack de servidores, data center)","Logo PERTTECH posicionado de forma consistente (canto inferior direito ou esquerdo)","Logos de clientes enterprise com autorização (DHL, Vopak, Wurth)","Paleta azul escuro + branco + cinza — consistente com marca e posicionamento enterprise"],"avoid":["Imagens de stock genéricas de técnico em placa eletrônica","Paleta rosa, floral ou tons pastéis","Glitter, confete ou elementos de celebração no feed permanente","Fontes decorativas ou cursivas (usar apenas sans-serif técnica)","Múltiplos templates visuais sem padrão — escolher 2-3 layouts e repetir"]},"copy_guidelines":{"tone":"Técnico direto, sem jargão excessivo. Tom de especialista que sabe o que faz — não de vendedor que empurra produto.","structure":"Hook (dor ou dado surpreendente) → problema específico → solução Perttech → prova social → CTA","length":"Legenda máx 150 palavras em posts orgânicos. Copy do criativo: máx 2 linhas de texto na imagem.","keywords_icp":["operação 24/7","sistemas críticos","primeira visita","manutenção preventiva","contrato anual","nobreak para servidor","sem parada"],"always_include_cta":true,"cta_options":["Chamar técnico agora →","Solicitar proposta","Ver contratos disponíveis","Falar com especialista no WhatsApp"]},"quantity_recommended":{"new_creatives":8,"variations":3,"breakdown":{"reels_tecnico_em_campo":2,"carrossel_educacional":2,"estatico_prova_social_enterprise":2,"estatico_urgencia_emergencia":2},"testing_hypothesis":"Testar hook 'prova social DHL/Vopak' vs hook 'urgência/emergência' nas primeiras 2 semanas de campanha Meta Ads"}},"key_insight":{"headline":"Zero criativos e zero concorrentes com mídia paga: a Perttech não precisa vencer a concorrência — precisa aparecer antes que ela acorde.","context":"Nenhum dos 5 concorrentes regionais (Danffer, Recomex, Seko, Central do Nobreak, RD Energia) roda anúncios pagos ou tem criativos de performance. O mercado de manutenção de nobreaks enterprise no ABC/RMSP opera 100% por indicação e SEO orgânico básico. A Perttech entra com o ativo mais valioso do segmento (carteira DHL/Vopak/Wurth) e pode dominá-lo antes que qualquer concorrente perceba a janela. O problema não é criar criativos melhores do que os concorrentes — é criar os primeiros criativos profissionais do segmento.","numbered_reasons":["(1) 0 ads ativos dos 5 concorrentes — qualquer criativo pago da Perttech vai ser o primeiro do mercado a impactar o ICP com mídia paga","(2) DHL/Vopak/Wurth como prova social é um ativo que nenhum concorrente pode replicar — e que nunca aparece em nenhum criativo atual","(3) O único padrão visual que funcionou organicamente (fundo dramático + equipamento) é o mesmo que funciona para anúncios de emergência/urgência no Meta Ads — base criativa já validada, mesmo que minimamente"],"discussion_anchor":"O stakeholder precisa autorizar fotos reais em clientes enterprise (DHL/Vopak) para produção de Semana 3 — essa é a única decisão que destrava o criativo mais poderoso possível. Sem foto real, os criativos ficam genéricos como os de todo concorrente."},"honesty_alert":"Análise baseada exclusivamente em 7 posts orgânicos do Instagram @perttechnobreaks — sem dados de performance paga (CTR, CPL, ROAS) pois não há histórico de campanhas. Engajamento orgânico visível (curtidas) é anedótico com 426 seguidores. Análise de concorrentes em Meta Ads Library confirmou 0 anúncios ativos — dado confiável. Não foi possível analisar Stories ou Reels da conta (requer login). Facebook Ads (impulsionamentos esporádicos do briefing) não foram localizados na Meta Ads Library — dados de performance histórica dos impulsionamentos indisponíveis.","completed_at":"2026-05-22T18:00:00Z"},"ee-s2-diagnostico-cro":{"summary":"Site da Perttech (www.perttech.com.br) tem SSL expirado como bloqueio absoluto — 100% dos visitantes via Chrome/Firefox recebem alerta de segurança antes de ver qualquer conteúdo. Daqueles que avançam: hero sem PUV ('Multimarcas' não converte ICP enterprise), DHL/Vopak/Wurth somente na página Sobre em texto corrido, formulário de contato com 6 campos e WhatsApp sem destaque. Score de confiança: 3/10. Ação prioritária: criar LP em subdomínio com HTTPS próprio para absorver tráfego das campanhas enquanto o SSL principal é reparado.","summary_headline":"Perttech.com.br: SSL expirado bloqueia 100% do tráfego pago antes do primeiro pixel ver o hero — e quando chega, encontra 'Multimarcas' em vez de PUV enterprise e formulário de 6 campos sem WhatsApp primário.","summary_highlights":[{"category":"maturidade","label":"Score de confiança","value":"3/10","subtext":"SSL expirado + zero reviews visíveis + sem fotos reais de equipe","tone":"red"},{"category":"risco","label":"SSL status","value":"EXPIRADO","subtext":"NET::ERR_CERT_DATE_INVALID — bloqueio total para campanhas pagas","tone":"red"},{"category":"risco","label":"Seções críticas ausentes","value":"4 de 7 faltando","subtext":"FAQ, prova social acima da dobra, urgência/disponibilidade, como funciona","tone":"red"},{"category":"oportunidade","label":"Hipó :"janela","label":"Budget recomendado","value":"R$4.000/mês","subtext":"Cenário B — R$2.800 Google + R$1.200 Meta","tone":"blue"},{"category":"oportunidade","label":"Meta leads/mês (90d)","value":"45 leads [E]","subtext":"CPL R$80 [E] — sem concorrente em leilão pressionando CPC","tone":"green"},{"category":"risco","label":"Janela competitiva","value":"Agora","subtext":"Danffer tem página em SBC — se entrar em ads primeiro, CPC sobe imediatamente","tone":"yellow"}],"summary_key_findings":[{"category":"vantagem","text":"Nenhum dos 5 concorrentes identificados roda Google Ads — todos operam só com SEO orgânico. Perttech seria o único com mídia paga ativa no segmento, disputando CPC mínimo de mercado (R$3–8 [E]) e capturando toda a demanda inbound emergencial que hoje vai para resultados orgânicos."},{"category":"ameaca","text":"O SSL expirado é o único bloqueio real para o lançamento. Solução sem dependência do Altair: criar LP em subdomínio (landing.perttech.com.br) com HTTPS próprio e lançar sem esperar a correção do site principal."},{"category":"contexto","text":"Danffer tem página dedicada para São Bernardo do Campo e portfólio de marcas autorizadas maior que a Perttech (7 marcas vs 3). Não está em Google Ads hoje — mas está no território da Perttech organicamente. Janela para entrar antes: agora."},{"category":"acao","text":"Sequência imediata: (1) pixel instalado hoje — não depende de SSL; (2) LP enterprise em subdomínio na Semana 3; (3) Google Ads Search Emergência ao ar com headline DHL/Vopak que nenhum concorrente pode replicar."}],"key_insight":{"headline":"Nenhum concorrente está no Google Ads — a Perttech pode dominar o único canal de alta intenção do segmento antes que alguém perceba a janela.","context":"A pesquisa de todos os 5 concorrentes identificados confirma: zero Google Ads, zero Meta Ads estruturado. Todos dependem de SEO orgânico. A Perttech entraria como único player com mídia paga no segmento de manutenção de nobreaks B2B no ABC/RMSP — disputando CPC mínimo de mercado e capturando demanda que hoje converte para qualquer resultado orgânico que aparecer primeiro.","numbered_reasons":["(1) CPC sem concorrente em leilão: R$3–8 vs R$8–18 em ambiente disputado — mesmo budget gera 2–3x mais leads","(2) Copy com DHL/Vopak como headline contrasta com 100% do campo competitivo, que usa cópia genérica sem prova social enterprise","(3) Danffer está no território (SBC, ABC Paulista) com presença orgânica — se entrar em ads antes da Perttech, o CPC sobe e a vantagem diminui"],"discussion_anchor":"A janela não é de meses — é de semanas. A pergunta para Altair é: quem vai dominar o Google Search de 'manutenção nobreak urgente São Paulo' — a Perttech com 30 anos e DHL no portfólio, ou o Danffer quando perceber que ninguém está no leilão?"},"honesty_alert":"Todas as projeções são estimativas [E] sem dados históricos de mídia da Perttech. A principal premissa — nenhum concorrente em Google Ads — foi verificada mas pode mudar a qualquer momento. Se Danffer ou Recomex entrarem em ads antes do lançamento da Perttech, CPC sobe e CPL pode dobrar. Criativos do Instagram orgânico não foram analisados neste diagnóstico (requer acesso ao @perttechnobreaks) — coberto em ee-s2-diagnostico-criativos.","completed_at":"2026-05-22T02:00:00Z"},"ee-s2-pesquisa-mercado":{"summary":"Mercado regional (RMSP + 100km) estimado em R$280M [E] para manutenção e venda de equipamentos de proteção de energia B2B. Perttech captura hoje 0,78% do SAM — potencial de R$15M (SOM) com presença digital estruturada e posicionamento enterprise único: nenhum concorrente usa credencial DHL/Vopak/Wurth como ativo digital.","client_name":"Perttech","segment":"Manutenção e venda de equipamentos de proteção de energia (nobreaks e estabilizadores) — B2B","region":"Grande São Paulo (RMSP) e cidades no raio de 50–100km da sede","tam_sam_som":{"tam":{"value_brl":2500000000,"description":"Mercado total brasileiro de equipamentos de proteção de energia (nobreaks + estabilizadores) — produtos + manutenção + serviços, todos os segmentos (data center, comercial, industrial, saúde). Âncora: mercado data center UPS Brasil = USD 153,9M (~R$800M) em 2023, representando ~35% do total. Extrapolação para todos os segmentos: ~R$2,5B [E].","estimated":true},"sam":{"value_brl":280000000,"description":"Mercado acessível à Perttech: RMSP + 100km de raio, empresas B2B com 20+ funcionários e uso relevante de equipamentos críticos de energia. Estimativa [E].","filters":["Região: RMSP + 100km (~27% da atividade comercial B2B brasileira)","Perfil: B2B only — excluindo residencial e micro sem infraestrutura crítica (~65% do regional)","Porte mínimo: empresas com 20+ funcionários e equipamentos críticos reais (~64% do B2B filtrado)"],"estimated":true},"som":{"value_brl":15000000,"description":"Teto tangível de captura para a Perttech como especialista posicionada em manutenção B2B enterprise na região — métrica de mercado, independente da capacidade operacional atual e da meta comercial da empresa. Triangulado por 3 métodos: (1) capacidade operacional madura ~R$6,4M — teto interno, não de mercado; (2) market share top-down: 5,5% do SAM = R$15,4M; (3) niche bottom-up: 10.000 empresas ICP × R$10K/ano × 13% captura = R$13M. Métodos 2 e 3 convergem em R$14–15M. SOM adotado: R$15M [E].","assumptions":["Posicionamento como especialista B2B enterprise com credencial verificável (DHL, Vopak, Wurth)","Presença digital estruturada (GMB + LP + pixel) capturando demanda inbound emergencial","CRM operacional convertendo base dormentes e avulsos recorrentes em contratos anuais","5–8% de share do SAM — benchmark para player especializado de nicho bem posicionado","Métrica de mercado — sem restrição de capacidade operacional atual"],"operational_ceiling_note":"Estrutura atual da Perttech (5 pessoas, ~3 técnicos) topa em R$3–4M de capacidade produtiva. Atingir o SOM de R$15M exige expansão para 8–12 técnicos + processo comercial estruturado com CRM. Gap de capacidade não 0000,"client_annual_revenue_goal_source":"QNP Pré Kick-off (21/05/2026) — meta mensal declarada de R$230–240K","client_goal_vs_som_note":"A meta declarada pela Perttech (R$2,88M/ano) é aspiração operacional conservadora — representa crescimento de ~31% sobre o faturamento 2025 (R$2,2M) e apenas 19% do SOM. O mercado suporta muito mais do que a meta atual indica. Isso é positivo: a Perttech não precisa criar demanda — ela precisa capturá-la."},"competitors":[{"name":"Danffer Nobreak","positioning":"Assistência técnica autorizada para múltiplas marcas (SMS e outros). Referência por credencial de fabricante e cobertura geográfica ampla em SP.","channels":["SEO orgânico com múltiplas páginas por região (SP capital, ABCD, interior, litoral)","Nenhuma evidência de Google Ads ou Meta Ads ativos","Instagram ausente ou inativo"],"strengths":["Operando desde 1988 — 37 anos de mercado, maior histórico entre os concorrentes identificados","Assistência técnica autorizada SMS — credencial de fabricante que abre portas em licitações","Cobertura geográfica ampla: SP capital, ABCD, interior e litoral paulista"],"weaknesses":["Não menciona nenhum cliente enterprise no site — 37 anos sem usar carteira como ativo de marketing","Copy completamente genérica: 'vendas, assistência técnica, conserto' sem diferencial claro","Sem prova social visível (depoimentos, cases, reviews)"],"estimated_pricing":"R$200–800 por atendimento avulso [E — não publicado]. Contratos preventivos não comunicados.","digital_score":5,"digital_details":{"website":"Estruturado com múltiplas páginas geográficas, mas conteúdo genérico e sem CTA claro","instagram":"Ausente ou inativo nos resultados de busca","google":"Aparece em buscas regionais via SEO básico. GMB não verificado.","active_ads":"Nenhuma evidência de campanhas pagas ativas"}},{"name":"Recomex Energia (Grupo Gerador)","positioning":"Empresa de manutenção + instalação + venda de nobreaks com investimento agressivo em SEO. Parte de holding (Grupo Gerador) ":"Não identificado","google":"Presente via conteúdo de blog","active_ads":"Nenhuma evidência"}},{"name":"Seko Eletrônica","positioning":"Fabricante de estabilizadores e nobreaks (30+ anos) que também oferece assistência técnica e consultoria. Foco em expertise de fabricação.","channels":["Presença orgânica básica","Localização física em SP (Jardim Marabá)"],"strengths":["Fabricante direto — máxima credencial técnica para diagnóstico de equipamentos próprios","30+ anos com foco em produção — expertise profunda em eletrônica de potência"],"weaknesses":["Posicionamento misto (fabricante + serviço) cria confusão na mensagem","Menor especialização em serviços B2B de campo vs fabricação","Presença digital básica para um player de 30+ anos"],"estimated_pricing":"Potencialmente competitivo por ser fabricante [E]","digital_score":4,"digital_details":{"website":"Focado em produto, não em serviço B2B","instagram":"Não identificado com relevância","google":"Presença básica","active_ads":"Nenhuma evidência"}},{"name":"RD Energia (Energiamais)","positioning":"Assistência técnica multimarca + venda + energia solar. Generalista de energia em SP.","channels":["SEO básico por tipo de serviço e localização (Santo Amaro)","Sem evidência de campanhas pagas"],"strengths":["Atende múltiplas marcas (APC, SMS) — versatilidade para o cliente","Presença em Santo Amaro e bairros adjacentes"],"weaknesses":["Muito generalista — energia solar + nobreak + outros dilui especialização","Sem diferenciação clara para B2B enterprise","Sem prova social visível"],"estimated_pricing":"Padrão de mercado [E]","digital_score":4,"digital_details":{"website":"Estruturado por serviço mas sem profundidade de conteúdo","instagram":"Não identificado","google":"Aparece para termos locais de Santo Amaro","active_ads":"Nenhuma evidência"}}],"competitive_map":{"axis_x":"Baixa presença digital → Alta presença digital","axis_y":"Foco em produto/venda → Foco em serviço/manutenção B2B","positions":[{"name":"Recomex Energia","quadrant":"Alto digital + Serviço (único player aqui)"},{"name":"Central do Nobreak","quadrant":"Digital médio + Serviço"},{"name":"Danffer Nobreak","quadrant":"Digital médio-baixo + Serviço"},{"name":"Perttech","quadrant":"Baixo digital + Serviço (posição atual)"},{"name":"Seko Eletrônica","quadrant":"Baixo digital + Produto"},{"name":"RD Energia","quadrant":"Digital baixo + Misto"}],"empty_spaces":"Alto digital + Serviço B2B enterprise com credencial verificável — nenhum player usa clientes grandes (DHL, Vopak, Wurth) como diferenciador digital. Recomex tem digital, mas zero prova social enterprise. É o quadrante mais valioso e está vago.","crowded_spaces":"Baixo digital + Serviço — onde estão Danffer, Perttech e a maioria dos players históricos. Todos com 25–37 anos de mercado, todos invisíveis digitalmente.","recommended_position":"Perttech deve migrar para 'Alto digital + Serviço B2B enterprise' — quadrante hoje desocupado. A credencial existe. O processo de captura é simples. O custo é zero."},"trends":[{"trend":"Expansão de IA e nuvem pressiona demanda por infraestrutura elétrica crítica — crescimento estrutural de longo prazo para manutenção de UPS","evidence":"Brasil vai investir R$2 trilhões em tecnologia entre 2026–2029 (R$765,6B em nuvem + R$736,6B em IA). Setor de TI cresceu 18,5% em 2025, superando média global. 28% dos data centers brasileiros já adaptam estrutura para IA generativa. Cada novo workload exige UPS mais robusto e manutenção mais frequente. [TI Inside, 2026; DC Market Insights, 2025]"},{"trend":"Câmbio e imposto de importação encarecem reposição de equipamentos — argumento consultivo pró-manutenção preventiva se fortalece","evidence":"Dólar volátil em 2026 + GECEX 852/2026 aumentam impostos de importação em até 12,6% para CPUs, GPUs e componentes eletrônicos. Custo de nobreak novo sobe em 15–30 dias após alta do câmbio. Para o ICP da Perttech, manutenção preventiva passa a ter ROI comparativo mais forte vs. substituição. [Correio Braziliense, Agência Brasil, 2026]"},{"trend":"Digitalização acelerada de PMEs e expansão de data centers regionais cria nova demanda por fornecedores locais qualificados de manutenção UPS","evidence":"Mercado de data centers Brasil cresceu de USD 6,3B (2020) para USD 10,8B (2025) — CAGR de 10,06%, devendo atingir USD 28,5B até 2035. Expansão inclui data centers regionais fora de SP capital, que precisam de fornecedores locais qualificados — mercado sub-atendido por grandes players nacionais. [DC Market Insights; Zeittec, 2026]"}],"threats":[{"threat":"Recomex Energia consolida autoridade digital de busca no segmento antes que a Perttech estruture presença","potential_impact":"Recomex (4 anos de mercado) já tem presença digital superior a todos os concorrentes históricos. Cada mês que passa sem a Perttech estruturar GMB + SEO + LP, Recomex consolida posição nas primeiras páginas do Google para 'manutenção nobreak SP'. Reversão desse posicionamento orgânico leva 6–12 meses após ação — janela fechando nos próximos 12–18 meses."},{"threat":"Alta do câmbio e aumento de impostos de importação comprimem margem na venda de produtos (Curva C da Perttech)","potential_impact":"Nobreaks e estabilizadores com componentes importados encarecem em 15–30 dias após variação cambial. Com margem desconhecida (FMA: 'nunca calculei margem') e sem política de repasse estruturada, a Perttech pode absorver compressão de margem silenciosamente na categoria de menor valor estratégico. Impacto imediato em 2026 dado GECEX 852."}],"unexploited_opportunity":{"description":"Ocupar o território 'O único especialista em manutenção de energia para empresas enterprise da região' — usando a carteira DHL/Vopak/Wurth como ativo digital que nenhum concorrente pode replicar rapidamente. Nenhum player regional usa credencial de clientes grandes em canal digital: Danffer tem 37 anos e não cita um único cliente enterprise no site; Recomex tem SEO mas zero prova social de clientes relevantes.","why_nobody_does_it":"(1) Empresas do setor cresceram por indicação e relacionamento há décadas — nunca precisaram articular posicionamento digital e não têm processo de captura de depoimentos ou cases. (2) A maioria dos players não tem clientes enterprise para mostrar — ou tem relacionamentos informais mas nunca pensou em usar como ativo de marketing. (3) Formalizar reviews e cases de clientes enterprise exige CRM e processo de relacionamento pós-atendimento que nenhum concorrente do segmento tem operando hoje.","feasibility":"alta"},"market_jtbd":{"current_solutions":"Majoritariamente reativo. A maioria das médias empresas opera em modo 'break-fix': chama fornecedor quando o equipamento falha, sem contrato preventivo ativo. Apenas empresas com gestão de TI ou Facilities madura têm contratos preventivos formalizados. Descoberta do fornecedor por indicação de colegas ou busca emergencial no Google.","alternatives":[{"type":"direct","description":"Outros prestadores de manutenção locais (Danffer, Recomex, RD Energia) — escolhidos por disponibilidade imediata ou ranqueamento no Google, não por qualificação técnica verificada"},{"type":"indirect","description":"Assistência técnica autorizada do fabricante (NHS, Schneider/APC, SMS) — mais cara, prazo de atendimento mais longo, mas com garantia de procedimento oficial do fabricante"},{"type":"diy","description":"Técnico interno de TI tenta resolver — funciona para problemas simples (bateria, fusível), falha em equipamentos trifásicos ou industriais. Risco alto de dano secundário."},{"type":"inaction","description":"Não fazer manutenção preventiva, torcer para não quebrar — padrão dominante em médias empresas sem política de gestão de infraestrutura. Custo invisível até a pane."}],"cost_of_inaction":"Uma hora de parada de servidor em empresa de 200 funcionários: R$3.000–15.000 em produtividade perdida [E]. Reposição de nobreak industrial com câmbio alto: R$8.000–80.000. Contrato preventivo anual para o mesmo equipamento: R$5.000–15.000. O
